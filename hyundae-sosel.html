<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e0a">
<title>[오름] 국어 - 수능특강 현대소설 본문해석</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep:#0a0e0a;--bg-card:#111a11;--bg-input:#101a10;
  --border-row:rgba(255,255,255,.35);--border-div:rgba(255,255,255,.40);--border-outer:rgba(255,255,255,.35);
  --green-brand:#4a5a3a;--green-accent:#6b8f5e;--green-light:#8aad7a;--green-bright:#4ade80;
  --gold:#c9a84c;--gold-dim:#a08838;
  --text-primary:#ece8e0;--text-secondary:#c4bfb4;--text-muted:#928d82;--text-dim:#7a7568;
  --correct:#22c55e;--wrong:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-deep);color:var(--text-primary);font-family:'Noto Sans KR',sans-serif;word-break:keep-all;font-size:15px;line-height:1.7;-webkit-tap-highlight-color:transparent}

/* === SELECTION SCREEN === */
.sel-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.sel-logo{font-family:'Noto Serif KR',serif;font-size:28px;font-weight:700;color:var(--gold);text-align:center;margin-bottom:4px}
.sel-sub{font-size:16px;color:var(--green-light);text-align:center;margin-bottom:6px}
.sel-desc{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:24px}
.sel-card{background:linear-gradient(145deg,#141e14,#0e160e);border:1px solid var(--border-outer);border-radius:14px;padding:24px;width:100%;max-width:600px;box-shadow:0 8px 32px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06)}
.sel-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.sel-toggle{background:none;border:1px solid var(--green-accent);color:var(--green-light);padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit}
.sel-toggle:hover{background:var(--green-brand)}
.sel-count{font-size:13px;color:var(--text-muted)}
.sel-count b{color:var(--gold);font-size:16px}
.sel-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.sel-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:.15s;border:1px solid rgba(255,255,255,.06)}
.sel-item:hover{background:rgba(255,255,255,.04)}
.sel-item .cb{width:20px;height:20px;border-radius:5px;border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;font-size:13px;color:transparent}
.sel-item.checked .cb{background:var(--green-brand);border-color:var(--green-accent);color:var(--green-light)}
.sel-item .lbl{font-size:13px;color:var(--text-secondary);line-height:1.4}
.sel-item .lbl small{color:var(--text-muted);font-size:11px;display:block}
.sel-start{width:100%;padding:14px;background:linear-gradient(135deg,var(--green-brand),var(--green-accent));color:var(--text-primary);border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
.sel-start:hover{filter:brightness(1.1)}
.sel-start:disabled{opacity:.4;cursor:not-allowed}

/* === HEADER === */
.header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#0d130d,#1a2a1a);border-bottom:1px solid var(--border-outer);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.hdr-left{display:flex;align-items:center;gap:10px}
.btn-back{background:none;border:1px solid var(--text-muted);color:var(--text-muted);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit}
.btn-back:hover{color:var(--text-primary);border-color:var(--text-primary)}
.logo{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:700;color:var(--gold)}
.logo span{color:var(--green-light);font-size:13px;font-weight:400;margin-left:6px}
.hdr-right{display:flex;align-items:center;gap:10px}
.progress-wrap{display:flex;align-items:center;gap:5px}
.progress-ring{width:34px;height:34px}
.progress-text{font-size:12px;color:var(--text-secondary)}
.btn-sm{background:var(--green-brand);color:var(--text-primary);border:1px solid var(--green-accent);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;transition:.2s;white-space:nowrap}
.btn-sm:hover{background:var(--green-accent)}
.btn-sm:disabled{opacity:.4;cursor:not-allowed}

/* === SUBMIT BAR === */
.submit-bar{background:var(--bg-card);border-bottom:1px solid var(--border-outer);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.submit-bar input{background:var(--bg-input);border:1px solid var(--border-row);border-radius:6px;padding:6px 12px;color:var(--text-primary);font-size:16px;font-family:inherit;flex:1;min-width:120px;max-width:200px}
.submit-bar input:focus{outline:none;border-color:var(--gold)}
.btn-submit{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#1a1a0a;border:none;padding:7px 18px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}

/* === TABS === */
.tabs{display:flex;overflow-x:auto;background:var(--bg-card);border-bottom:1px solid var(--border-outer);padding:0 8px;scrollbar-width:thin;-webkit-overflow-scrolling:touch}
.tab{padding:9px 14px;cursor:pointer;font-size:12px;color:var(--text-muted);border-bottom:2px solid transparent;white-space:nowrap;transition:.2s;flex-shrink:0}
.tab:hover{color:var(--text-secondary)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:500}

/* === CONTENT === */
.content{max-width:1100px;margin:0 auto;padding:16px}
.poem-header{text-align:center;margin-bottom:14px}
.poem-author{font-size:12px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.poem-title{font-family:'Noto Serif KR',serif;font-size:21px;color:var(--gold);font-weight:700}
.poem-genre{font-size:11px;color:var(--green-light);margin-top:3px}
.dual-card{border:1px solid var(--border-outer);border-radius:10px;overflow:hidden;margin-bottom:18px;background:var(--bg-card)}
.dual-header{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border-row)}
.dual-header div{padding:7px 14px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--green-light);font-weight:500}
.dual-header div:first-child{border-right:1px solid var(--border-div)}
.dual-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid rgba(255,255,255,.12)}
.dual-row:last-child{border-bottom:none}
.dual-row .left{padding:7px 14px;border-right:1px solid var(--border-div);font-size:15px;color:var(--text-primary);line-height:1.8}
.dual-row .right{padding:7px 14px;font-size:14.5px;color:var(--text-secondary);line-height:1.8}
.dual-row .left .ln{color:var(--text-muted);font-size:11px;margin-right:5px}
.note-line{margin-bottom:3px}.note-line:last-child{margin-bottom:0}
.summary-note{background:rgba(74,90,58,.15);padding:5px 10px;border-radius:6px;font-size:13px;color:var(--green-light);font-weight:500;margin:3px 0}
.blank-input{background:var(--bg-input);border:1px solid var(--border-row);border-radius:4px;padding:2px 6px;font-size:16px;color:var(--text-primary);font-family:inherit;min-width:60px;max-width:160px;outline:none;transition:.2s}
.blank-input:focus{border-color:var(--gold)}
.blank-input.correct{border-color:var(--correct);background:rgba(34,197,94,.1);color:var(--correct)}
.blank-input.wrong{border-color:var(--wrong);background:rgba(239,68,68,.1);color:var(--wrong)}
.hint-btn{background:none;border:1px solid var(--text-muted);color:var(--text-muted);width:20px;height:20px;border-radius:50%;font-size:11px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;margin-left:2px;transition:.2s;vertical-align:middle}
.hint-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.hint-btn:disabled{opacity:.3;cursor:not-allowed}
.analysis-card{border:1px solid var(--border-outer);border-radius:10px;overflow:hidden;margin-bottom:18px;background:var(--bg-card)}
.analysis-header{padding:7px 14px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--green-light);font-weight:500;border-bottom:1px solid var(--border-row)}
.analysis-body{padding:12px 14px;font-size:14.5px;color:var(--text-secondary);line-height:1.9}
.controls{display:flex;gap:10px;justify-content:center;margin:14px 0;flex-wrap:wrap}
.dash{color:var(--text-muted)}
.warning{max-width:700px;margin:40px auto 20px;padding:16px 20px;border:1px solid rgba(239,68,68,.3);border-radius:8px;background:rgba(239,68,68,.05);font-size:12px;color:#d4a0a0;line-height:1.8;text-align:center}
.warning strong{color:#ef4444}

/* === TOAST === */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--green-brand);color:var(--text-primary);padding:12px 24px;border-radius:10px;font-size:14px;z-index:999;transition:.4s;opacity:0;border:1px solid var(--green-accent)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* === CELEBRATION === */
.celebration{position:fixed;inset:0;z-index:998;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,14,10,.92);opacity:0;pointer-events:none;transition:.5s}
.celebration.show{opacity:1;pointer-events:auto}
.cele-emoji{font-size:64px;animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.cele-title{font-family:'Noto Serif KR',serif;font-size:32px;color:var(--gold);font-weight:700;margin:16px 0 8px}
.cele-msg{font-size:15px;color:var(--text-secondary);margin-bottom:24px;text-align:center;padding:0 20px}
.cele-close{background:var(--green-brand);color:var(--text-primary);border:1px solid var(--green-accent);padding:10px 28px;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit}
.confetti{position:fixed;top:-10px;width:10px;height:10px;border-radius:2px;z-index:999;animation:fall linear forwards;pointer-events:none}
@keyframes fall{to{top:110vh;transform:rotate(720deg)}}

/* === HIDDEN === */
.hidden{display:none!important}
@media(max-width:768px){
  .dual-row,.dual-header{grid-template-columns:1fr}
  .dual-header div:first-child,.dual-row .left{border-right:none;border-bottom:1px solid rgba(255,255,255,.12)}
  .sel-grid{grid-template-columns:1fr}
  .submit-bar{flex-direction:column;align-items:stretch}
  .submit-bar input{max-width:100%}
  .header{padding:8px 10px}
  .content{padding:10px}
}
</style>
</head>
<body>

<!-- SELECTION SCREEN -->
<div id="selScreen" class="sel-screen">
  <div class="sel-logo">[오름] 국어</div>
  <div class="sel-sub">수능특강 현대소설 본문해석</div>
  <div class="sel-desc">시험 범위에 해당하는 작품을 선택하세요.</div>
  <div class="sel-card">
    <div class="sel-top">
      <button class="sel-toggle" onclick="toggleAll()">전체 선택/해제</button>
      <div class="sel-count"><b id="selCnt">0</b>개 작품 선택됨</div>
    </div>
    <div class="sel-grid" id="selGrid"></div>
    <button class="sel-start" id="selStart" disabled onclick="startStudy()">시작하기 →</button>
  </div>
</div>

<!-- STUDY SCREEN -->
<div id="studyScreen" class="hidden">
  <div class="header">
    <div class="hdr-left">
      <button class="btn-back" onclick="goBack()">← 작품 선택</button>
      <div class="logo">[오름] 국어<span>현대소설 본문해석</span></div>
    </div>
    <div class="hdr-right">
      <div class="progress-wrap">
        <svg class="progress-ring" viewBox="0 0 36 36">
          <path d="M18 2.0845a15.9155 15.9155 0 010 31.831 15.9155 15.9155 0 010-31.831" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="3"/>
          <path id="progPath" d="M18 2.0845a15.9155 15.9155 0 010 31.831 15.9155 15.9155 0 010-31.831" fill="none" stroke="var(--green-bright)" stroke-width="3" stroke-dasharray="0,100" stroke-linecap="round"/>
        </svg>
        <span class="progress-text" id="progText">0%</span>
      </div>
      <button class="btn-sm" onclick="revealAll()">전체 정답</button>
      <button class="btn-sm" onclick="resetAll()">초기화</button>
    </div>
  </div>
  <div class="submit-bar">
    <input type="text" id="studentName" placeholder="이름을 입력하세요">
    <button class="btn-submit" id="btnSubmit" onclick="submitResults()">결과 제출</button>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"></div>
  <div class="warning">
    본 자료는 오직 <strong>[오름] 국어</strong> 학원 수강생들의 성적 향상을 위해 제작된 비매품입니다.<br>
    본 자료를 외부로 유출하거나 무단 배포하는 행위는 학원과 동료 수강생들에게 심각한 피해를 주는 범죄 행위입니다.<br>
    무단 배포 적발 시, 즉각적인 퇴원 조치는 물론, 유출로 인한 경영상 손실에 대해 <strong>강력한 법적 조치</strong>를 취할 예정입니다.
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- CELEBRATION -->
<div class="celebration" id="celebration">
  <div class="cele-emoji">🎉</div>
  <div class="cele-title">완벽해!</div>
  <div class="cele-msg">이대로면 시험도 100점이지. 조금 더 파이팅!</div>
  <button class="cele-close" onclick="closeCelebration()">닫기</button>
</div>

<!-- HIDDEN FORM FOR GOOGLE SHEETS -->
<iframe name="submitFrame" style="display:none"></iframe>
<form id="submitForm" method="POST" target="submitFrame" style="display:none">
  <input type="hidden" name="data" id="submitData">
</form>

<script>

 세상을 구경하는 것은, 행복은 아니어도, 어떻든 한 개의 일일 수 있다.", "notes": []}, {"orig": "(중략)", "notes": []}, {"orig": "조그만", "notes": ["고독을 사랑한 일에 대한 생각과 관련지어 구보의 {양면적}인 사고방식과 {혼란}한 심리가 드러남"]}, {"orig": "한 개의 기쁨을 찾아, 구보는 남대문을 안에서 밖으로 나가 보기로 한다. 그러나 그곳에는 불어 드는 바람도 없이, 양옆에 웅숭그리고 앉아 있는 서너 명의 지게꾼들의 그 모양이 맥없다.", "notes": ["고독을 사랑한다고 믿으려 하지만 실제로는 고독을 두려워하는 구보의 {양면적}이고 모순된 심리 상태"]}, {"orig": "구보는 고독을 느끼고, 사람들 있는 곳으로, 약동하는 무리들이 있는 곳으로, 가고 싶다 생각한다.에 경성역을 본다. 그곳에는 마땅히 인생이 있을 게다. 이 낡은 서울의 호흡과 또 감정이 있을 게다. 도회의 소설가는 모름지기 이 도회의 항구 한다. 그러나 물론 그러한 직업의식은 어떻든 좋았다. 다만 구보는 고독을 삼등 대합실 군중 속에 피할 수 있으면 그만이다.", "notes": ["동전의 발행 연도를 통해 과거를 회상하며 행복이 부재했음을 깨닫는 과정이 {의식의흐름}기법을 통해 형상화되었음", "뚜렷한 {목적의식}이 없고 {방향}을 상실한 구보의 모습 -> 당시 지식인의 무기력한 모습"]}, {"orig": "그러나 오히려 고독은 그곳에 있었다한옆에 끼여 앉을 수도 없게시리 사람들은 그곳에 빽빽하게 모여 있어도, 그들의 누구에게서도 인간 본래의 온정을 찾을 수는 없었다. 그네들은 거의 옆엣사람에게 한 마디 말을 건네는 일도 없이, 오직 자기네들 사무에 바빴고, 그리고 간혹 말을 건네도, 그것은 자기네가 타고 갈 열차의 시각이나 그러한 것에 지나지 않았다. 그네들의 동료가 아닌 사람에게 그네들은 변소에 다녀 올 동안의 그네들 짐을 부탁하는 일조차 없었다. 믿지 않는 그네들의 눈은 보기에 딱하고 또 가엾었다.", "notes": ["첫 어절을 소제목으로 처리하여 {시각적}인 집중 유도", "{생기}와 {활력}이 없는 남대문 밖의 풍경", "지루한 {고독}에서 벗어나 사람들 사이에서 생동감 있는 활력과 따뜻한 인간애를 느끼고 싶어 하는 구보씨의 소망"]}, {"orig": "구보는 한구석에 가 서서, 그의 앞에 앉아 있는 노파를 본다. 그는 뉘 집에 드난을 살다가 이제 늙고 또 쇠잔한 몸을 이끌어, 결코 넉넉하지 못한 어느 시골, 딸네 집이라도 찾아가는지 모른다. 이미 굳어 버린 그의 안면 근육은 어떠한 다행한 일에도 펴질 턱 없고, 그리고 그의 몽롱한 두 눈은 비록 그의 딸의 그지없는 효양(孝養)을 가지고도 감동시킬 수 없을지 모른다. 중년의 시골 신사는 그의 시골서 조그만 백화점을 경영하고 있을 게다. 그의 점포에는 마땅히 주단포목도 있고, 일용 잡화도 있고, 또 흔히 쓰이는 약품도 갖추어 있을 게다. 그는 이제 그의 옆에 놓인 물품을 들고 자랑스러이 차에 오를 게다. 구보는 그 시골 신사가 노파와 사이에 되도록 간격을 가지려고 노력하는 것을 발견하고, 그리고 그를 업신여겼다. 만약 그에게 옅은 지혜와 또 약간의 용기를 주면 그는 삼등 승차권을 주머니 속에 간수하고 일이등 대합실에 오만하게 자리 잡고 앉을 게다.", "notes": ["경성역을 비유함", "경성역에 와서 군중들의 모습을 봄으로써 오히려 {고독}을 확인함 -> 도시문명의 어두운 면을 부각"]}, {"orig": "문득 구보는 그의 얼굴에 부종을 발견하고 그의 앞을 떠났다. 신장염. 그뿐 아니라, 구보는 자기 자신의 만성 위 확장을 새삼스러이 생각해 내지 않으면 안 되었다. 그러나 구보가 매점 옆에까지 갔었을 때, 그는 그곳에서도 역시 병자를 보지 않으면 안 되었다. 사십여 세의 노동자. 전경부(前頸部)의 광범한 팽륭(澎隆). 돌출한 안구. 또 손의 경미한 진동. 분명한 바제도씨병. 그것은 누구에게든 결코 깨끗한 느낌을 주지는 못한다. 좌석이 비어 있어도 사람들은 그곳에 앉으려 들지 않는다. 뿐만 아니라, 그에게서 두 칸통 떨어진 곳에 있던 아이 업은 젊은 아낙네가 그의 바스켓 속에서 꺼내다 잘못하여 시멘트 바닥에 떨어뜨린 한 개의 복숭아가 굴러 병자의 발 앞에까지 왔을 때, 여인은 그것을 쫓아와 집기를 단념하기조차 하였다.", "notes": ["많은 사람들이 모인 곳을 찾아갔음에도 오히려 {소외감}을 느끼는 군중 속 고독이 드러난 부분", "인정이 사라진 도시 풍경, 주위 사람들에게 관심을 기울이지 않는 도시인의 일상적인 모습 -> 1930년대 {도시화}가 진행되며 전통적인 사회의 따뜻한 {인간미}를 상실해가는 모습, 삭막한 근대 도시의 모습을 비판"]}, {"orig": "구보는 이 조그만 사건에 문득, 흥미를 느끼고, 그리고 그의 ‘대학 노트’를 펴 들었다.가 문 옆에 기대어 섰는 캡 쓰고 린네르 쯔메에리 양복 입은 사내의, 그 온갖 사람에게 의혹을 갖는 두 눈을 발견하였을 때, 구보는 또다시 우울 속에 그곳을 떠나지 않으면 안 된다.", "notes": ["{연민}의 감정을 느낌"]}, {"orig": "개찰구 앞에", "notes": ["구보가 {연민}의 대상인 노파를 보고 추측한 내용"]}, {"orig": "두 명의 사내가 서 있었다. 낡은 파나마에 모시 두루마기 노랑 구두를 신고, 그리고 손에 조그만 보따리 하나도 들지 않은 그들을, 구보는, 확신을 가져 무직자라고 단정한다. 그리고 이 시대의 무직자들은, 거의 다 금광 브로커에 틀림없었다. 구보는 새삼스러이 대합실 안팎을 둘러본다. 그러한 인물들은, 이곳에도 저곳에도 눈에 띄었다.", "notes": []}, {"orig": "황금광 시대(黃金狂時代).", "notes": ["노파는 1930년대 당시 민중의 고단한 삶을 보여줌"]}, {"orig": "저도 모를 사이에 구보의 입술을 무거운 한숨이 새어 나왔다. 황금을 찾아, 황금을 찾아. 그것도 역시 숨김없는 인생의, 분명히, 일면이다. 것은 적어도, 한 손에 단장과 또 한 손에 공책을 들고, 목적 없이 거리로 나온 자기보다는 좀 더 진실한 인생이었을지도 모른다. 시내에 산재한 무수한 광무소. 인지대 백 원. 열람비 오 원. 수수료 십 원. 지도대(地圖代) 십팔 전…… 출원 등록된 광구, 조선 전토(全土)의 칠 할. 시시각각으로 사람들은 졸부가 되고, 또 몰락하여 갔다. 황금광 시대. 그들 중에는 평론가와 시인, 이러한 문인들 조차 끼여 있었다. 보는 일찍이 창작을 위하여 그의 벗의 광산에 가 보고 싶다 생각하였다. 사람들의 사행심, 황금의 매력, 그러한 것들을 구보는 보고, 느끼고, 하고 싶었다. 그러나, 고도의 금광열은, 오히려, 총독부 청사, 동측 최고층, 광무과 열람실에서 볼 수 있었다…….", "notes": ["구보의 {비판}의 대상이 되는 신사를 구보는 업신여긴다 -> 환멸, 멸시, 냉소", "{몽타주}기법: 서로 다른 시공간에서 벌어진 단편적인 사건을 나란히 병치시킬 때 사용함 -> 시골 신사의 우월감에 대해 냉소적으로 비판"]}, {"orig": "문득 한 사나이가 둥글넓적한, 그리고 또 비속한 얼굴에 웃음을 띠고, 구보 앞에 그의 모양 없는 손을 내민다. 그도 벗이라면 벗이었다. 중학 시대의 열등생. 구보는 그래도 약간 웃음에 가까운 표정을 지어 보이고, 그리고, 단장 든 손을 그대로 내밀어 그의 손을 가장 엉성하게 잡았다.이거 얼마 만이야. 어디, 가나.", "notes": ["각종 증상과 병명을 {나열}의 방법으로 나타냄 -> 구보씨와 도시인들이 심각한 정신적, 육체적 질병을 앓고 있음을 드러냄"]}, {"orig": "응, 자네는.", "notes": []}, {"orig": "구보는 친하지 않은 사람에게 ‘자네’ 소리를 들으면 언제든 불쾌하였다. ‘해라’는, 해라는 오히려 나았다. 그 사내는 주머니에서 금시계 꺼내 보고, 다음에 구보의 얼굴을 쳐다보며, 저기 가서 차라도 안 먹으려나. 전당포 집의 둘째 아들. 구보는 그러한 사내와 자리를 같이하여 차를 마실 생각은 없었다. 그러나, 그러한 경우에 한 개의 구실을 지어, 그 호의를 사절할 수 있도록 구보는 용감하지 못하다.그 사내는 앞장을 섰다. 자아 그럼 저리로 가지. 그러나 그것은 구보에게만 한 말이 아니었다.", "notes": ["병자를 피하는 현대인의 {몰인정}한 모습", "구보 또는 작가 박태원의 창작 방법으로 눈앞의 장면을 노트에 적고 그것을 소설화한(고현학적 창작 기법)"]}, {"orig": "구보는 자기 뒤를 따라오는 한 여성을 보았다. 그가 한번 흘낏 보기에도, 한 사내의 애인 된 티가 있었다. 어느 틈엔가 이런 자도 연애를 하는 시대가 왔나. 새삼스러이 그 천한 얼굴이 쳐다보였으나, 그러나 서정 시인조차 황금광으로 나서는 때다.", "notes": ["관찰한 대상을 즉시 기록하는 행위를 통해 당시 세태를 조사하고 기록하는 {고현학}적 창작 태도가 반영됨"]}, {"orig": "의자에 가 가장 자신 있게 앉아, 그는 주문 들으러 온 소녀에게, 나는 가루삐스, 그리고 구보를 향하여, 자네두 그걸루 하지. 그러나 구보는 거의 황급하게 고개를 흔들고, 나는 홍차나 커피로 하지.", "notes": []}, {"orig": "음료 칼피스를, 구보는 좋아하지 않는다. 그것은 외설한 색채를 갖는다. 또, 그 맛은 결코 그의 미각에 맞지 않았다. 구보는 차를 마시며, 문득, 끽다점(喫茶店)*에서 사람들이 취하는 음료를 가져, 그들의 성격, 교양, 취미를 어느 정도까지는 알 수 있을 것이 아닌가, 하고 생각하여 본다. 그리고 그것은 동시에, 그네들의 그때, 그때의 기분조차 표현하고 있을 게다.", "notes": []}, {"orig": "구보는 맞은편에 앉은 사내의, 그 교양 없는 이야기에 건성 맞장구를 치며, 언제든 그러한 것을 연구하여 보리라 생각한다.", "notes": ["첫 어절을 {소제목}으로 처리하여 시각적 집중 유도"]}, {"orig": "*대정: 일본 다이쇼 천황 시대의 연호(年號).", "notes": []}, {"orig": "*끽다점: 예전에, ‘찻집’을 이르던 말.", "notes": []}, {"orig": "", "notes": ["{물질만능주의} 사회를 단적으로 표현함"]}, {"orig": "", "notes": ["{쉼표}의 잦은 사용 – 서술에 속도감을 주고 구보의 {내면의식}을 효과적으로 드러냄"]}, {"orig": "", "notes": ["정신적 가치를 중시하여야 할 문인들조차 금광에 매달리는 세태 -> {정신적가치}를 상실해 가는 황금광 시대의 세태를 비판적으로 인식함"]}, {"orig": "", "notes": ["중학교 동창을 만난 것이 별로 {달갑지}않음"]}, {"orig": "", "notes": ["친구의 {속물성}을 드러내는 소재 -> 구보의 친구가 물질적 가치를 중시하는 {속물적}인물임을 드러내 구보가 느끼는 {거부감}의 원인을 드러냄"]}, {"orig": "", "notes": ["{속물적}인 친구를 경멸하면서도 그의 제안을 단호하게 거절하지 못하는 구보의 {우유부단}하고 {소시민}적인 성격을 확인할 수 있다"]}, {"orig": "", "notes": ["경재적 능력이 가장 중요시되는 시기에 순수 문인까지 물질을 추구하는 현실에 대한 {안타까움}과 {자조}"]}, {"orig": "", "notes": ["친구의 속된 이야기보다 자신만의 {생각}에 빠짐"]}], "analysis": "이 작품은 인물 간의 갈등이나 사건의 {인과}적 전개보다는 거리의 풍경 {묘사}와 구보의 {내면} 흐름을 드러내는 데 중점을 둔다. 구보는 광교, 종로, 화신 상회, 경성역 등 경성 여기저기를 배회하며 {우울}과 {고독}을 느끼고 {행복}의 가능성을 모색한다. 근대화의 병폐와 {물질만능주의}에 빠진 인물들을 {비판}적이고 {냉소}적으로 바라보지만, 구보 자신 또한 현실에 대한 뚜렷한 해결책을 제시하지 못하는 {무기력}하고 {소심}한 식민지 {지식인}으로 형상화된다. 이처럼 소설은 1930년대 지식인의 내면 의식 변화와 서울의 풍물을 잘 표현하여 {세태소설}적 성격을 함께 보여준다."}, {"author": "강경애", "work": "인간문제", "genre": "리얼리즘 소설 (1930년대)", "lines": [{"orig": "해가 지고 아득아득해서야 개똥네 마당질은 끝이 났다. 어둠 속으로 뿌옇게 솟아오른 나락 더미! 나락더미를 중심으로 돌아선 농민들은 술에 취한 듯이 흥분이 되어 있었다.", "notes": ["서술자가 작품 밖에서 뿌듯함과 기쁨을 느끼는 농민들의 행동과 심리를 {전지적}시점에서 서술하고 있다"]}, {"orig": "유 서방과 덕호가 나왔다. 유 서방은 들어가서 등불을 켜 가지고 나왔다. 땃버리는 대두를 들고 나락 더미 앞으로 가서 나락을 손으로 헤쳐 가면서 말을 되었다. / “한 말이요는 가서요우.”", "notes": []}, {"orig": "땃버리는 그 둥글둥글한 음성을 길게 빼어 가지고 소리 곡조로 마디마디를 꺾어 돌렸다. 뒤미처 쏴르륵 하고 섬 속으로 흘러 들어가는 벼알 소리! 그들의 가슴은 어떤 충동으로 스르르 뜨거워지는 것을 깨달았다. 그리고 무의식 간에 그들은 눈을 썩, 썩 비비치고 동무의 어깨를 누르며 바짝바짝 다가들었다. 그때마다 옆의 동무는, / “이 사람아, 넘어지겠구먼!”", "notes": ["땃버리의 구성진 목소리로 수확량을 알리며 타작마당의 분위기를 {고조}시킨다"]}, {"orig": "허허 웃으며, 그들은 이런 말을 주고받았다. 한 섬, 두 섬, 석 섬, 볏섬은 차례로 묶여 놓인다. 그들은 제각기 몇 섬이 날까? 하는 호기심에 묶어 놓은 볏섬과 나락 더미를 번갈아 비교해 보았다.", "notes": []}, {"orig": "땃버리가 마지막 말수를 되어 볏섬에 부으며, / “열닷 섬 닷 말이요는 가서요우.”", "notes": []}, {"orig": "수심가라도 한 곡조 부르려는 듯이 그렇게 흥이 나서 음성을 내뽑았다.", "notes": []}, {"orig": "“열닷 섬 닷 말! 잘은 났다!”", "notes": []}, {"orig": "가슴을 졸이고 섰던 그들은 똑같이 이렇게 중얼거렸다. 땃버리는 톡톡 털고 일어났다. 그리고 개똥의 어깨를 탁 쳤다.", "notes": []}, {"orig": "“이 사람아 한턱내야 되리. 올 농사는 자네네만큼 된 사람이 없으리!” / “암, 허허.”", "notes": []}, {"orig": "개똥이는 이렇게 대답하며 흘금 덕호를 쳐다보았다. 덕호의 얼굴은 잘 보이지 않으나 그가 가만히 섰는 것을 보아 만족해하는 것을 알 수가 있었다. 곡식이 잘 나지 못한 때면 덕호는 잔걱정을 하며 가만히 서 있지를 못하고 왔다 갔다 하면서 밭을 잘 거두지를 못하였느니 미리 베다가 먹었느니 하고 야단을 치곤 하였던 것이다.", "notes": []}, {"orig": "유 서방은 구루마를 갖다 대고 볏섬을 쾅쾅 실었다. 그들도 볏섬을 받들어 올려놓으며,", "notes": []}, {"orig": "“무겁다! 참 벼 한 섬이 이다지도 무거운가!”", "notes": []}, {"orig": "덕호가 들으라고 일부러 이렇게 말하였다. 덕호는 어둠 속으로 궐련만 뻑뻑 빨면서 섰더니,", "notes": []}, {"orig": "“개똥이! 자네 여기서 다 회계 끝내고 말지! 후일에 다시 쓰더라도…… 응? 자네 빚내 온 돈이 얼마인지?”", "notes": ["덕호는 타작을 마친 볏섬이 쌓여 있을  때 갚아야 할 빚을 {볏섬}으로 환산하여 요구함"]}, {"orig": "개똥의 말을 들어 보려고 덕호는 이렇게 물었다. 개똥이는 덕호가 말하기 전부터 빚 말을 내지 않으려나? 하는 불안에 가슴이 조마조마하였다가 마침 이 말을 듣고 보니 전신의 맥이 탁 풀렸다. 아무 대답이 없는 개똥이를 안타까운 듯이 바라보던 덕호는 저놈이 빚을 물지 않으려는 속이구나! 하고 어떻게 하든지 이 자리에서 볏섬으로 차지하지 않으면 못 받을 것 같았다.", "notes": ["개똥이는 타작 날 {회계}가 이뤄질 가능성이 있다고 생각했음", "개똥이의 반응을 보고 {회계}를 서두르기로 마음먹음"]}, {"orig": "“자네 15원 내 온 것이 간 정월달이 아닌가. 그러니 이달까지 꼭 열 달일세. 그래 이자까지 하면 20원이 넘네그리. 우선 벼 넉 섬은 날 줘야 하네. 그래도 내가 삼사 원은 못 받는 속일세. 그러구 비룟값과 장리쌀은 으레이 여기서 회계할 것이지…….”", "notes": []}, {"orig": "유 서방을 돌아보았다.", "notes": []}, {"orig": "“어서 저기서 일곱 섬만 가져오게. 그래도 나는 10여 원을 받지 못하는 셈일세. 그러나 할 수 있는가. 자네들도 농사를 해 먹고 살아가야겠으니 우리에게로 오는 반 섬과 자네게로 가는 반 섬 합해서 한 섬은 내가 주는 것이니 그리 알게. 그것은 이번 농사를 잘 지었다는 것 때문이어. 허허.”", "notes": []}, {"orig": "유 서방은 말 떨어지기가 무섭게 볏섬을 낑 하고 져다가 구루마에 실어 놓는다. 그들은 이제까지 깜박 잊었던 하루 종일의 피로가 조수와 같이 밀려드는 것을 깨달았다. 그들은 볏짚단 위에 펄썩펄썩 주저앉았다. 그때 첫째의 머리에는 풍헌 영감의 모양이 휙 떠오른다.", "notes": ["{비유적} 표현을 사용하여 심리를 표현함", "수확량의 절반 이상 뺏기게 되어 {허탈감}을 느끼고 {의욕}을 잃음"]}, {"orig": "입도 차압(立稻差押)*을 당하고 정신없이 아래윗동네를 미친 듯이 달아다니며 만나는 사람마다 붙잡고,", "notes": []}, {"orig": "“여보게 이런 법이 있는가, 벼를 베기도 전에…….”", "notes": []}, {"orig": "그다음 말은 막히어 하지 못하였다. 첫째는 무슨 말인가 하여 풍헌의 뒤를 따라 논까지 가 보았다. 논귀에 세운 조그만 나무판자에는 무슨 글인지 써 있었다.", "notes": []}, {"orig": "풍헌은 그 나무쪽을 가리키며,", "notes": []}, {"orig": "“글쎄 집달리*라던가? 하는 양복쟁이가 이것을 꽂아 놓으면서, 벼를 베지 못한다구 허두먼…….”", "notes": []}, {"orig": "풍헌은 이렇게 말하며 누릇누릇한 벼 이삭을 바라본다. 첫째는 다가서며,", "notes": []}, {"orig": "“누구의 빚을 얼마나 졌습니까?”", "notes": []}, {"orig": "“아 덕호의 빚이지. 그것 좀 참아 달라구 하는데, 이렇게까지 할 게야 뭐 있겠나! 전날 편지 배달부가 이런 것을 갖다가 주고 가두먼. 그래 나는 그게 무엇인가? 하고 두었더니, 글쎄 글쎄 이런 일이 날 줄이야 누가 꿈밖에나 생각하였겠나.”", "notes": ["생활고로 인해 빚 탕감 시기를 늦춰 달라는 풍헌 영감의 부탁을 들어주지 않고 입도 차압을 한 덕호 -> 덕호의 {몰인정}한 면모"]}, {"orig": "풍헌은 거지 안에서 다 해진 편지봉투를 꺼내어 보인다. 첫째 역시 그것을 한 자 알아볼 리가 없었다. 그래서 편지봉투만 이리저리 만지다가 풍헌을 주었다.", "notes": ["풍헌 영감이 입도 차압을 당했던 일을 회상하고 개똥이가 농사지은 벼를 빼앗기는 장면과 {병치}하여 {몰인정}한 지주의 횡포에 공통받는 농민들의 삶이 부조리하고 구조적으로 잘못된 것임을 깨달아 가는 첫째의 모습"]}, {"orig": "[중략 부분 줄거리] 타작마당에서 바로 벼를 빼앗기게 되어 억울했던 개똥이 결국 울분을 참지 못하고 소리를 지르자 첫째와 농민들이 몰려가 유 서방을 넘어뜨리고 실어 놓은 볏섬을 끌어내리지만, 곧 순사들이 들이닥쳐 그들을 주재소로 끌고 간다. 개똥 어머니는 선처를 부탁하고자 덕호를 찾아간다.", "notes": []}, {"orig": "개똥 어머니는 들어가서 머리를 숙이며,", "notes": []}, {"orig": "“그저 한때 살려 줍시유, 네? 한때만 사정 봐줍슈.”", "notes": []}, {"orig": "덕호는 기침을 하며 일어나서 자리로 몸을 가리고 앉았다.", "notes": []}, {"orig": "“글쎄 그놈들의 행세를 보아서는 분 나는 대로 용서 없이 고생을 시키겠지만 그러나 소위 면의 어룬이라는 나로서 더구나 저런 늙은이들이 불쌍해서 그럴 수야 있는가.”", "notes": []}, {"orig": "개똥 어머니는 너무 감격하여 소리쳐 울고 싶었다. 그리고 저런 후한 어른의 뜻을 몰라주는 개똥이와 그의 동무들이 끝없이 원망스러웠다. / “그저 살려 줍슈. 저를 봐서…….”", "notes": ["덕호의 {이중적}인 모습에 속은 개똥이 어머니"]}, {"orig": "“응. 그런데 마침 오늘이 공일이니까 면에 출근도 안 하니 내 직접 주재소에 가 보리…… 저희 놈들이 암만 그래도 몇십 년을 내 덕에 산 것이 아니겠나. 배은망덕이란 말이 이런 것을 두고 이름일세그려. 허 거정 나두 손두 없는 사람이라 저희들을 내 친자식들과 같이 사랑한단 말이어. 어제만 하더라도 내가 생각해서 벼 한 섬을 거저 주지 않았나. 그런데 그놈이 그 은공을 몰라본단 말이어. 하필 올뿐인가, 작년 재작년에도 그래 왔지.”", "notes": ["겉으로 농민들을 친자식처럼 여긴다고 말해 마을에서 선한 사람으로 포장하며 살아가는 덕호의 {위선}이 드러남"]}, {"orig": "“그까짓 죽일 놈들을 생각하실 게 있습니까. 그저 후하신 맘으로 이 늙은것을 한때 보아주서야지우.”", "notes": []}, {"orig": "“응. 그럼 돌아가게. 내 이따가 가 보리.”", "notes": []}, {"orig": "개똥 어머니는 코가 땅에 닿도록 절을 하고 밖으로 나왔다. 덕호는 도로 자리에 누우며 이놈들을 더 고생시켜 세상의 법이 어떻다는 것을 알리어 정신을 들려주렸더니 날은 점점 추워 오고 어서 눈 오기 전에 마당질은 끝내야겠으니 부득이 놓아주랄 수밖에 별수가 있나! 하고 생각하였다. 더구나 이 가을부터 미곡 통제안(米穀統制案)이 실시된다는 말이 있으니 그렇게 되면 곡가도 오를 것이다. 어서 바삐 그놈들의 빚도 현 곡가로 청산하여야겠다는 생각이 들자, 곧 그는 자리에서 일어났다.", "notes": ["경제적 약자로서 지주와의 {상하관계}에서 벗어나기 어려운 농민들의 상황이 드러남", "덕호는 타작을 마무리하는 것이 더 이득이겠다고 판단해 자신의 {이득}을 챙기기 위해 일꾼들의 석방을 요구하고자 함 -> 자신의 경제적 이익을 극대화하기 위해 농민들의 노동력과 빚 상환이 필요함을 계산하고 있는 덕호의 {이해타산}적 모습"]}, {"orig": "*입도 차압: 추수하기 전부터 벼를 압류함. *집달리: 집행관.", "notes": []}], "analysis": "이 작품은 {지주}에게 착취당하는 가난한 농민들의 삶, 농민들이 일자리를 찾아 도시로 이주한 후 노동자로서의 계급 의식을 {각성}하는 과정을 보여 주며 농민과 노동자의 현실을 {사실주의적}으로 그린 소설이다. 소설 속에는 궁핍한 생활을 하며 지주 덕호에게 맞서다가 마을을 떠나는 ‘첫째’, 그리고 그 이웃인 ‘선비’가 결국 농촌 마을을 떠나게 되는 과정, 도시에 터를 잡기 위해 노동자로 살며 쟁의 행위(지주와 소작인 사이, 또는 근로자와 사용자 사이에서 일어나는 분쟁인 노동 쟁의가 일어났을 때, 자기에게 유리하게 해결하기 위해 노동자나 사용자가 정상적인 업무 운영을 방해하는 행위)를 조직하는 모습 등이 나타나 있다. 제목인 ‘인간 문제’는 착취당하는 모든 인간의 문제가 해결되어야 할 인류의 과제임을 암시하며, 농촌의 착취 구조를 다룬 전반부와 도시 노동자의 착취 문제를 다룬 후반부로 나뉘어 전개된다. 「인간 문제」는 1934년에 발표된 소설로, 당시 한일 투쟁을 직접 다룰 수 없는 상황이었음에도 농민 운동과 노동 쟁의의 문제를 정면으로 제시하고 있다는 점에서 의의가 큰 작품이다. 공장 노동자들의 작업 모습, 기숙사 생활, 인물들 간의 {연대} 등을 생생히 묘사하여 주제 의식을 부각하고 있다."}, {"author": "채만식", "work": "치숙", "genre": "풍자소설 (1930년대)", "lines": [{"orig": "[앞부분 줄거리] ‘나’는 일본인이 주인인 가게의 점원으로, 어린 시절 자신을 돌봐 준 아주머니에게 폐만 끼치는 아저씨를 못마땅히 여긴다. 사회주의 운동을 하다 감옥에서 병에 걸려 온 아저씨는 아주머니의 정성스러운 간호로 병세가 호전되었지만 여전히 집에만 머물러 있다.", "notes": ["‘나’가 비판하는 아저씨는 자기 이상을 추구하느라 가족을 돌보지 않는 {무능력}하고 {무책임}한 인물임."]}, {"orig": "“이 애?” / “네?”", "notes": []}, {"orig": "“사람이란 것은 누구를 물론허구 말이다, 아첨하는 것같이 더러운 게 없느니라.” / “아첨이요?”", "notes": []}, {"orig": "“저 위로는 제왕, 밑으로는 걸인, 그 모든 사람이 위선 시방 이 제도의 이 세상에서 말이다, 제가끔 제 분수대루 살어가는 데 있어서 말이다, 제 개성을 속여 가면서꺼정 생활에다가 아첨하는 것같이 더러운 것이 없고, 그런 사람같이 가련한 사람은 없느니라. 사람이란 건 밥 두 그릇이 하필 밥 한 그릇보다 더 배가 부른 건 아니니까.” / “그건 무슨 뜻인데요?”", "notes": ["{물질적가치}만 중시하는 ‘나’를 비판함. 이를 통해 아저씨는 ‘생활’과 같은 {물질적 가치}보다 ‘개성’과 같은 {정신적 가치}를 중시하는 인물임을 짐작할 수 있음.", "아저씨는 ‘밥 한 그릇’에 배부를 사람이 ‘밥 두 그릇’을 추구하는 것은 자기 분수에 벗어나는 삶의 태도임을 {비유}적으로 표현함. 아저씨는 ‘나’가 ‘밥 한 그릇’에 만족하지 않고 ‘밥 두 그릇’을 추구한다며 ‘나’의 삶의 태도를 비판함."]}, {"orig": "“네가 일본인 여자와 결혼을 해서 성명까지 갈고 모든 생활 법도를 일본화하겠다는 것이 말이다.”", "notes": []}, {"orig": "“네, 그게 좋잖어요?”", "notes": []}, {"orig": "“그것이 말이다, 진실로 깊은 교양이나 어진 지혜의 판단에서 우러나온 것이라면 그도 모를 노릇이겠지. 그렇지만 나는 보매, 네가 그런다는 것은 다른 뜻으로 그러는 것 같다.”", "notes": ["개인적 이익 추구하는 ‘나’의 모습을 보고 아저씨는 ‘나’를 {속물적}이라고 생각함."]}, {"orig": "“다른 뜻이라니요?” / “네 주인의 비위를 맞추고, 이웃의 비위를 맞추고 하자고…….”", "notes": []}, {"orig": "“그야 물론이지요! 다이쇼*의 신용을 받어야 하고, 이웃 내지*인들하구도 좋게 지내야지요. 그래야 할 게 아니겠어요?”/ “…….”", "notes": ["‘나’는 {사회적성공}을 위해서는 주인(다이쇼)의 신용을 받아야 하고, 주인의 신용을 얻으려면 기꺼이 그의 비위를 맞추어야 한다고 생각함."]}, {"orig": "“아저씨는 아직두 세상 물정을 모르시오. 나이는 나보담 많구 대학교 공부까지 했어도 일찌감치 고생살이를 한 나만큼 세상 물정은 모릅니다. 시방이 어느 세상인데 그러시우?”", "notes": ["아저씨에 대한 ‘나’의 {비판}"]}, {"orig": "“이 애?” / “네?”", "notes": []}, {"orig": "“네가 방금 세상 물정이랬지?” / “네.”", "notes": []}, {"orig": "“앞길이 환하니 트였다구 그랬지?” / “네.”", "notes": []}, {"orig": "“환갑까지 십만 원 모은다구 그랬지?” / “네.”", "notes": []}, {"orig": "“네가 말하는 세상 물정하구 내가 말하려는 세상 물정하구 내용이 다르기도 하지만, 세상 물정이란 건 그야말로 그리 만만한 게 아니다.” / “네?”", "notes": ["아저씨의 ‘질문’은 ‘나’가 지닌 ‘세상 물정’에 대한 인식이 잘못된 것임을 지적하기 위함임. 아저씨의 질문은 자신에 대한 ‘나’의 지적이 {부당}함을 드러내는 데 활용됨.", "{물질적이익}을 추구하는 것", "{사회의구조}를 이해하는 것"]}, {"orig": "“사람이란 건 제아무리 날구뛰어도 이 세상에 형적 없이 그러나 세차게 주욱 흘러가는 힘, 그게 말하자면 세상 물정이겠는데, 결국 그것의 지배하에서 그것을 따라가지 별수가 없는 거다.”  / “네?”", "notes": ["일제의 지배도 결국 역사적·사회적 흐름에 따라 {증식}될 것임. 시대의 흐름으로 인해 개인의 삶은 계획대로 되지 않음."]}, {"orig": "“쉽게 말하면 계획이나 기회를 아무리 억지루 만들어 놓아도 결과가 뜻대루는 안 된단 말이다.”", "notes": ["개인의 노력으로는 사회의 흐름을 이길 수 없음. ‘세상 물정’을 단순히 당대의 풍속이나 동향 정도로만 파악하는 ‘나’에게 ‘세상 물정’이 {역사적흐름}을 의미한다고 알려 줌."]}, {"orig": "“젠장, 아저씨두…… 요전『낑구』*라는 잡지에두 보니까, 나폴레옹이라는 서양 영웅이 그랬답디다. 기회는 제가 만든다구. 그리고 불가능이란 말은 바보의 사전에서나 찾을 글자라구요. 아 자꾸자꾸 계획하구 기회를 만들구 해서 분투노력해 나가면 이 세상일 안 되는 일이 어디 있나요? 한번 실패하거든 갑절 용기를 내 가지구 다시 일어서지요. 칠전팔기 모르시오?”", "notes": ["‘나’는 나폴레옹의 말을 {인용}해 아저씨의 생각이 잘못되었다고 반박함. 나폴레옹의 {도전} 정신을 지녀야 한다고 주장함.", "일곱 번 넘어지고 여덟 번 일어난다는 뜻으로, 여러 번 실패하여도 굴하지 아니하고 꾸준히 노력함을 이르는 말"]}, {"orig": "“나폴레옹도 세상 물정에 순응할 때는 성공했어도 그것에 거슬리다가 실패를 했더란다. 너는 칠전팔기해서 성공한 몇 사람만 보았지, 여덟 번 일어섰다가 아홉 번째 가서 영영 쓰러지구는 다시 일지 못한 숱한 사람이 있는 건 모르는구나?”", "notes": ["아저씨는 ‘나’가 나폴레옹의 삶 중 성공했을 때만 보고 {세상물정}을 거스르며 살려고 한다며 비판함."]}, {"orig": "“그래두 두구 보시우. 나는 천하없어두 성공하구 말 테니…… 아저씨는 그래서 더구나 못써요? 일해 보기두 전에 안 될 줄로 낙심 먼저 하구…….”", "notes": ["‘나’는 ‘성공’하기 위해서는 나폴레옹처럼 ‘{칠전팔기}’의 자세로 살아야 한다고 주장함."]}, {"orig": "“하늘은 꼭 올라가 보구래야만 높은 줄 아니?”", "notes": []}, {"orig": "원 마지막 가서는 할 소리가 없으니 동에도 닿지* 않는 비유를 가져다 둘러대는 걸 보아. 그게 어디 당한 말인고? 안 올라가 보면 뭐 하늘 높은 줄 모를 천하 멍텅구리도 있을까?", "notes": []}, {"orig": "(중략)", "notes": []}, {"orig": "“아저씨 올에 몇이지요?” / “서른셋.”", "notes": []}, {"orig": "“그러니 인제는 그만큼 해 두고 맘잡어서 집안일할 나이두 아니오?”", "notes": []}, {"orig": "“집안일은 해서 무얼 하나?” / “그렇기루 들면 그 짓은 해서 또 무얼 하나요?”", "notes": ["‘나’는 아저씨가 ‘그 짓’을 중시하여 {집안일}을 하지 않으려 한다고 생각함."]}, {"orig": "“무얼 하려구 하는 게 아니란다.” / “그럼, 아무 희망이나 목적이 없으면서 그래요?”", "notes": []}, {"orig": "“목적? 희망?” / “네.”", "notes": []}, {"orig": "“개인의 목적이나 희망은 문제가 다르니까…… 문제가 안 되니까…….”", "notes": []}, {"orig": "“원, 그런 법도 있나요?”/ “법?”", "notes": []}, {"orig": "“그럼요!” / “법이라!……”", "notes": []}, {"orig": "“아저씨?” / “…….”", "notes": []}, {"orig": "“아저씨?” / “왜 그래?”", "notes": []}, {"orig": "“아주머니가 고맙잖습디까?” / “고맙지.”", "notes": []}, {"orig": "“불쌍하지요?” / “불쌍? 그렇지, 불쌍하다면 불쌍한 사람이지!”", "notes": []}, {"orig": "“그런 줄은 아시느만？” / “알지.”", "notes": []}, {"orig": "“알면서 그러시우?”", "notes": ["‘나’의 질문은 아주머니를 고생하게 만드는 아저씨의 태도가 잘못된 것임을 지적하기 위함임. ‘나’의 질문에는 자신을 무시하는 아저씨를 {조롱}하려는 태도가 담김."]}, {"orig": "“고생을 낙으로, 그 쓰라린 맛을 씹고 씹고 하면서 그것에서 단맛을 알어내는 사람도 있느니라. 사람도 있는 게 아니라, 사람마다 무슨 일에고 진정과 정신을 꼬박 거기다가만 쓰면 그렇게 되는 법이니라. 그러니까 그쯤 되면 그때는 고생이 낙이지. 너의 아주머니만 두고 보더래도 고생이 고생이면서 고생이 아니고 고생하는 게 낙이란다.”", "notes": []}, {"orig": "“그렇다고 아저씨는 그걸 다행히만 여기시우?” / “아니.”", "notes": []}, {"orig": "“그러거들랑 아저씨두 아주머니한테 그 은공을 더러는 갚어야 옳을 게 아니오？”", "notes": []}, {"orig": "“글쎄, 은공을 모르는 건 아니지만…….”", "notes": []}, {"orig": "“그러니 인제 병이나 확실히 다아 나신 뒤엘라컨…….” / “바뻐서 원…….”", "notes": []}, {"orig": "글쎄 이 한다는 소리 좀 보지요? 시치미 뚝 따고 누워서 바쁘다는군요!", "notes": []}, {"orig": "사람 속 차릴 여망 없어요. 그저 어디로 대나 손톱만치도 쓸모는 없고 남한데 사폐만 끼치고, 세상에 해독만 끼칠 사람이니, 뭐 하루바삐 죽어야 해요. 죽어야 하고. 또 죽어서 마땅해요. 그런데 글쎄 죽지를 않고 꼼지락꼼지락 도로 살아나니 성화라구는, 내…….", "notes": ["‘나’는 아저씨의 말을 듣고 아저씨가 지금까지의 삶의 방식을 버릴 가능성이 {없다}고 생각함.", "‘나’는 아저씨를 가정과 사회에서 {격리}해야 할 부정적 인물로 인식함."]}, {"orig": "* 다이쇼: 일본어로 주인을 이르는 말.", "notes": []}, {"orig": "* 내지: 일제 강점기에 일본을 지칭하는 말.", "notes": []}, {"orig": "* 『낑구』: 일제 강점기의 잡지 이름. 영어 ‘king’의 일본식 발음 표기.", "notes": []}, {"orig": "* 동(이) 닿다: 앞뒤 조리가 맞다.", "notes": []}], "analysis": "이 작품은 {일제강점기}를 배경으로 ‘나’의 눈을 통하여 사회주의 운동을 하다 옥살이를 하고 나온 아저씨의 삶을 보여 주고 있다. 작품의 제목인 ‘치숙’은 {어리석은 아저씨}라는 뜻으로 아저씨의 삶을 부정적으로 여기는 ‘ 나’의 관점을 단적으로 드러낸다. 비판의 대상인 아저씨는 {사회적모순}에 적극적으로 대응하는 지식인이지만 정작 {무능력}하고 {도덕적흠결}이 있는 인물이다. 그런데 그를 비판하는 주체인 ‘나’는 일제의 {식민통치}를 긍정하며 자신의 영달만 추구하는 {현실순응}형 인물로, 올바른 사회의식이 결여된 {무지}한 존재이다. 이런 점에서 작가는 비판의 대상과 주체 모두 당대 사회의 문제형 인간임을 드러내려 한 것으로 볼 수 있다. 이 작품은 특별한 사건 없이 인물의 {대화}와 주인공의 {생각}을 중심으로 내용이 전개되며, {풍자}적이고 {반어}적 문체를 사용하고 있다는 특징이 있다."}, {"author": "하근찬", "work": "나룻배 이야기", "genre": "전후소설 (1960년대)", "lines": [{"orig": "[앞부분 줄거리] 전쟁이 터지자 뱃사공인 삼바우는 징병된 아들 용팔과 마을 청년인 두칠, 천달 등을 배에 태워 강 밖으로 보낸다. 어느 날 마을로 가는 배에 오른 우편배달부에게 자신이 군수가 양 생원에게 보내는 편지를 배달하는 중이라는 말을 듣게 된다.", "notes": ["국가가 법률에 의하여 병역 의무가 주어진 사람들을 강제로 모아서 일정 기간 군대에 복무하게 함.", "양 생원의 아들 천달의 {전사} 통지서임."]}, {"orig": "마을에서 울음소리가 일어난 것은 그로부터 잠시 후의 일이었다. 물론 양 생원네 집이었다. 온 집안이 그대로 울음의 도가니였다. 난데없는 곡성에 마을은 발칵 뒤집히었다. 순녀의 피나는 울음소리는 유독 마을 사람들의 간장을 끊었다. 대열이도 덩달아 삐이삐이 소리를 질렀다. 천달이가 뭐 어쩌고…… 뼈다귀가 뭐 어쩌고저쩌고……. 사람들은 서로 귀에 입을 대고 쑥덕거렸다. 마을은 밤이 되어도 뒤숭숭했다. 목이 잠겨 이제 부서진 풀무 소리 같은 곡성이 그래도 끊일락 이을락 한이 없었다. 뒤 언덕 도토리나무 잎새를 털고 지나가는 바람 소리도 별나게 스산하기만 했다.", "notes": ["{우울}한 마을 사람들의 심리를 {청각적}으로 나타냄. 사건의 {긴장감}을 조성함.", "발생한 사건의 정보를 추가로 제시함.", "곡하는 소리", "간과 창자. 또는 ‘애’나 ‘마음’을 비유적으로 이르는 말"]}, {"orig": "며칠 뒤, 이른 새벽. 양 생원네는 강을 건너 읍내로 들어갔다. 삼바우는 멀어져 가는 그들의 뒷모습을 바라보며 크게 한숨을 쉬었다.", "notes": []}, {"orig": "순녀의 등에 업힌 대열이는 곧장 엄마에게,", "notes": []}, {"orig": "“엄마야, 우이 어디 가노?” / “읍내 간다.”", "notes": []}, {"orig": "“읍내가 머꼬?” / “…….”", "notes": []}, {"orig": "“앙? 엄마.” / “읍내가 읍내지 뭐까 봐. 저어기 가면 읍내라고 있다.”", "notes": []}, {"orig": "“머 하로 가노?” / “…….”", "notes": []}, {"orig": "“앙?” / “…….”", "notes": []}, {"orig": "순녀는 뭐라고 대답할 말이 없었다. 땅이 한쪽으로 기울어지는 듯 어지럽기만 했다. 엄마의 대답이 없으니, 할아버지를 돌아본다.", "notes": ["가족의 죽음을 알지 못하는 순진한 대열이 어른들에게 사정을 묻고, 어른들은 대열에게 사실대로 말하지 못함. 이는 작중 {비극성}을 강화하는 역할을 함.", "남편인 천달의 유골을 가지러 읍내로 가는 순녀의 {괴로운} 심리가 드러남."]}, {"orig": "“…….” / “하부이! 우이 머 하로 가노?”", "notes": []}, {"orig": "“…….” / “하부이 니도 모르나?”", "notes": []}, {"orig": "“…….”/ 벌그레 부어오른 두 눈을 무겁게 내리감을 따름, 할아버지 역시 아무런 대꾸가 없다. 대열이는 울상이 되어 킹킹 칭얼거리다가 그만 엄마의 등짝을 마구 때려 준다.", "notes": ["양 생원", "할아버지의 {표정} 묘사를 통해 자식의 유골을 가지러 가는 {침울}한 심리를 드러냄."]}, {"orig": "그날 저녁답은 왜 그렇게 하늘이 타는지 몰랐다. 벌건 불길이 구름을 태우며 온 벌판으로 쏟아져 내렸다. 강물도 꽃자주색으로 출렁거리고, 불어오는 바람에도 붉은 빛깔이 물들어 있었다. 이처럼 무섭게 저물어 가는 황혼 속으로 양 생원네는 돌아왔다. 양 생원은 목에 띠를 걸고 네모반듯한 상자를 하나 받쳐 안고 있었다. 상자는 하얀 보에 싸여 있었다. 순녀는 고무신을 벗어 들고 맨발이었다. 그녀의 입술은 까맣게 질려 있었고, 양 생원의 얼굴에는 두 봉우리의 광대뼈가 엄청나게 불거져 올랐다. 엄마의 궁둥이에 매달린 대열이는 달랑달랑 종아리를 흔들며 돼지 새끼처럼 잠이 들어 있었다. 모두 지칠 대로 지쳐 있었다.", "notes": ["자식을 잃은 양 생원과 남편을 잃은 순녀의 울분에 찬 심리를 {시각적}으로 나타냄. 사건의 {긴장감}을 조성함.", "유골함"]}, {"orig": "후닥닥 배에서 뛰어내린 삼바우는 양 생원 앞으로 달려가서, / “인자 오시능교?”", "notes": []}, {"orig": "여느 날보다 정중히 머리를 숙였다. 그리고 쯧쯧쯧 혀를 차면서 양 생원이 안고 있는 상자를 자기가 받아 들려고 했다. 으응! 하고 양 생원은 고개를 크게 한번 가로저어 버린다. 배에 오르자 순녀는 대열이를 내려 품에 안았다. 대열이는 보송보송한 눈을 비비면서 잠을 깼다.", "notes": []}, {"orig": "(중략)", "notes": []}, {"orig": "배에서 내린 사람들이 하얗게 돌아간 밭모퉁이를 까만 그림자가 두 개 걸어오고 있는 것이 보였다. 삼바우는 이마에 손을 얹고 그쪽을 바라보며 으으윽! 크게 트림을 했다. 혹시 우리 용팔이 아니가? 용팔이가 오면 혼자 올 낀데…… 보자, 동식이캉 같이 오는 거 아니가? 그렇잖으면 동식이하고 수만이 가들 둘인강? 삼바우는 두 눈을 곧장 껌벅거린다. 그러나 점점 가까워지는데 보니, 그것은 용팔이도 아니고, 동식이도 수만이도 아니다. 자세히 보니, 하나는 총을 어깨에 메고 있고, 하나는 양복쟁이에 틀림없다. / “이크!”", "notes": ["이 작품은 {전지적서술자} 시점을 취하고 있지만 해당 부분은 초점화자인 {삼바우}의 눈에 비친 대상을 서술함."]}, {"orig": "삼바우는 가슴이 덜컥했다. 결코 반가운 사람들이 아니었던 것이다. 또 오는구나. 또 누굴 데려갈라고……. 술기와 함께 온몸의 피가 얼굴로 치솟는 듯했다. 입술도 부들부들 떨렸다. 벌써 몇이나 데려갔노 말이다. 데려가서 두칠이는 그 꼬라지를 만들어 놓았지, 천달이는 돌려준다는 것이 뼈다귀뿐이지, 더구나 우리 용팔이한테서는 소식도 없지, 동식이, 수만이도 마찬가지고, 그만하면 됐지, 또 누굴 데려갈라고, 염치도 없는 것들 같으니……. 삼바우는 뿌드득 어금니를 문다. / “안 되지, 안 돼!”", "notes": ["총을 멘 사람과 양복쟁이가 마을 청년들 중 누군가를 전쟁터로 데려갈 사람들이라고 직감하고 그들에 대한 {적대감}을 드러냄.", "전쟁터에서 {장애}를 얻고 돌아온 두칠", "전사하여 유골로 돌아온 천달"]}, {"orig": "주먹을 불끈 쥐고, 한쪽 발로 땅을 쾅! 내리 구른다. 기세가 이만저만 아니다. 그러나 어찌 된 영문인지 총을 멘 사람과 양복쟁이의 얼굴이 또렷하게 바라보일 만큼 가까워지자, 그만 아랫도리가 후들후들 흔들리는 것이 아닌가. 뿌드득 물었던 어금니도 덜덜 떨리고, 주먹에서도 손가락들이 제가끔 힘없이 풀려 나간다. 하는 수 없다는 생각이 들자, 두 눈에 뜨거운 것이 핑 돈다. 그러나 그 순간, 참 희한한 생각이 하나 뒤통수를 갈기고 지나갔다./ “옳지!”", "notes": ["마을 청년을 강 밖으로 데려가는 역할을 수행할 수밖에 없는 처지에 {괴로움}을 느끼는 삼바우"]}, {"orig": "삼바우는 궁둥이를 탁 치고, 고의춤을 불끈 추켜올렸다. / “좋은 수고말고! ”", "notes": ["자신이 내린 결정에 {만족}하는 삼바우."]}, {"orig": "얼른 닻줄을 풀어 배 안에 던지고, 가볍게 몸을 날렸다. 그리고 후닥닥 노를 잡고 마구 물을 휘젓는다. 깜짝 놀란 배는 어지럽게 흔들리다가 머리를 불끈 물 위로 쳐든다. 삼바우는 아랫입술을 질끈질끈 깨물며 있는 힘을 다한다. 이마에 기름 같은 땀이 끈적끈적 내밴다. 배는 자세를 가다듬고 신나게 내닫는다.", "notes": ["{역동}적인 배의 모습을 {의인}화함."]}, {"orig": "강 길을 끊어 버리고 만 것이다.", "notes": ["두 사람을 태우지 않고 혼자 돌아감. 총을 멘 사람과 양복쟁이에 대한 삼바우의 {저항} 방식"]}, {"orig": "손님도 태우지 않고 부리나케 떠나는 배를 보자, 두 사람은 눈을 휘둥그레 가지고 달려오며 냅다 고함을 지른다.", "notes": []}, {"orig": "“여보! 아 여보오――――― ”", "notes": []}, {"orig": "“여기 탈 사람 있소! 좀 기다리쇼!”", "notes": []}, {"orig": "그러나 삼바우는 입 언저리로 흘러내리는 땀방울을 혀끝으로 씩 핥으며 고소하게 웃는다. 어디 탈 테면 한번 타 보지, 흥! 콧방귀를 팡 뀌어 준다.", "notes": []}, {"orig": "“아, 저놈의 영감쟁이가 돌았나? 우쨌노?”", "notes": []}, {"orig": "“아, 이리 빨리 배를 안 갖다 댈 끼가?”", "notes": []}, {"orig": "두 사람은 얼굴이 빨개 가지고 주먹으로 삿대질을 해 쌓는다.", "notes": ["자신들을 배에 태우지 않은 삼바우에 대해 {분노}를 드러냄."]}, {"orig": "삼바우는 이만저만 통쾌하지가 않았다. 자기에게도 이런 용기가 있었는가 싶으니 스스로 놀랍기도 했다. 안 되지, 안 돼, 안 되고말고. 마을에서 나룻배를 만들 때는 마을 사람들 편리하라고 만들었지, 누가 저거 자식 잡아가라고 만든 줄 아나? 흥! 안 되지 안 돼.", "notes": ["삼바우가 {외지사람들}을 배에 태우지 않으려는 이유."]}, {"orig": "그러나 삼바우는 차츰 술이 깨는 듯 오스스 떨리어 왔다.", "notes": []}], "analysis": "이 작품은 1959년에 발표된 작품으로, {전쟁}이 평화로운 농촌 마을과 그곳 주민의 삶을 어떻게 파괴하는지 보여 준다. 작품의 배경이 되는 마을은 나룻배만이 외지에 오갈 수 있는 유일한 교통수단일 정도로 세상과 {고립}된 공간이지만, 전쟁은 이런 마을의 청년들을 폭력이 난무하는 세상 밖으로 끄집어낸다. 즉 나룻배는 자식들과 평탄한 삶을 마을에서 앗아간 세상과의 {연결고리}가 되는 것이다. 주인공인 뱃사공 ‘배삼바우’는 자기 아들과 마을 청년들을 나룻배를 통해 전쟁터로 떠나보내고 전쟁에서 상처 입은 청년들을 다시 마을로 돌려보내거나 청년들의 전사 소식을 전하는 인물로, 직접 전쟁에 참여하지 않지만 전쟁으로 인해 극심한 {정신}적 고통을 받는다. 이러한 그가 청년들을 전쟁터로 데려가려는 외지 사람들을 자신의 나룻배에 태우지 않으려는 행위는 {무의미한저항}처럼 보이지만 힘없는 이가 보이는 세상에 대한 치열한 몸부림으로 볼 수 있다. 삼바우에게는 크나큰 저항이지만 마을 청년들은 또 차출되어 전쟁터로 끌려갈 수밖에 없는 것이 당대의 시대 현실이다. 이처럼 이 작품은 {전쟁}이라는 거대한 폭력에 의해 {파괴}된 민중들의 삶과 그로 인한 상처와 아픔을 다루고 있다."}, {"author": "박경리", "work": "불신 시대", "genre": "전후소설 (1950년대)", "lines": [{"orig": "한여름 내내 진영은 앓았다. 애당초 극히 경미하게 발생한 폐결핵이 전연 방치되었기 때문에 점점 악화되어 갔던 것이다. 뿐만 아니라 다른 병까지 연속적으로 병발하는 것이었다. 찬물만 마셔도 배탈이 났다. 눈병이 나고 입이 부르트고 하기가 일쑤였다. 앓다 못해 귀까지 앓았다. 그리고 여러 해째 건드리지 않고 둔 충치가 일시에 쑤시어 밤낮을 가리지 않고 욱신거렸다.", "notes": ["진영이 한여름 내내 앓았던 이유"]}, {"orig": "진영은 진실로 하나의 육신이 해체되어 가는 과정 속에서 몸서리치는 무서움을 느꼈다. 그것은 마치 쨍쨍하게 내리쬐는 햇볕 아래 늘어진 한 마리의 지렁이 같은 생명이었다.", "notes": ["진영의 {과거}의 기억이 동시다발적으로 떠오르며 심리적 고통을 가중시키는 것을 {진영}의 시각에서 서술하여 {내면}을 효과적으로 드러냄."]}, {"orig": "이러한 육신과 더불어 정신도 해체되어 가는 과정 속에 진영은 있었다.", "notes": ["{비유}적 표현을 통해 진영 자신의 비참한 처지를 형상화함."]}, {"orig": "밤마다 귓가에 울려오는 아이의 울음소리, 산이, 언덕이, 집이 무너지는 소리, 산산이 바스러진 유리 조각이 수없이 날아와서 얼굴 위에 박히는 환각, 눈을 감으면 내장이 터진 소년병의 얼굴이, 남편의 얼굴이, 아이의 얼굴이, 분홍빛, 노란빛, 파란빛, 마지막에는 시꺼먼 빛, 그런 빛깔로 차례차례 뒤덮여 가면은 드디어 무한정한 공간이 안개처럼 진영의 주변을 꽉 싸는 것이었다.", "notes": ["육체적, 정신적 고통을 겪는 진영", "{비유}적 표현"]}, {"orig": "소리와 감각과 색채, 이러한 순서로 진영의 신경은 궤도에서 무너져 나갔다.", "notes": []}, {"orig": "진영은 그 이상 견딜 수가 없어서 내버려두었던 몸을 끌고 H 병원으로 갔다. 그러나 그곳에도 일주일이 멀다고 그만, 가는 것을 그만 중지하고 말았던 것이다.", "notes": []}, {"orig": "얼마 남지 않은 돈을 생활비에다 써야 한다는 이유도 있었다. 그러나 직접의 동기는 외국제 주사약의 빈 병들을 팔아 버리는 장면을 본 때문이다.", "notes": ["진영이 {병원}을 불신하게 된 결정적인 계기"]}, {"orig": "Y 병원에서는 주사약의 분량을 속였고 S 병원은 엉터리였다. 그리고 H 병원에서는 빈 약병을 팔았다.", "notes": ["진영이 {병원}을 불신하게 된 계기"]}, {"orig": "진영은 간호원이 빈 병을 헤아리고 있을 때 짐작으로 가짜 주사약 생각을 했던 것이다. 그러나 H 병원만이 빈 약병을 파는 것은 아니다. 또 그 빈 병만 하더라도 반드시 가짜 약병으로 사용된다고 말할 수도 없다. 잉크병으로 물감병으로 혹은 후춧가룻병으로 흔히 이용되고 있다. 그렇지만 사실 거리에는 가짜 주사약이 범람하고 있는 것이다. 상인들은 태연히 그런 가짜를 진짜 속의 진짜라고 나발 불었다. 진영은 그것을 생각하니 인술이라는 권위를 지닌 의사가 그런 상인 따위들 같아서 신뢰감이 사라지는 것이었다. 물론 아무리 대수롭지 않은 빈 병일지라도 그것은 전연 그 의사의 소유이며 처분의 자유는 그의 기본 권리에 속한다. 그래도 진영은 그의 기본적 권리보다 무수히, 마치 페스트처럼 눈에 보이지 않게 만연되어 가는 가짜 주사약 생각만 하는 것이었다.", "notes": ["{속물}적인 인간상➀", "태연히 가짜를 진짜라고 속이는 사람들", "의사를 {상인}과 동일한 속물적인 존재로 간주하며 {불신}함.", "페스트균이 일으키는 급성 전염병", "전염병이나 나쁜 현상이 널리 퍼짐."]}, {"orig": "해바라기의 꽃이 씨앗을 안았다.", "notes": []}, {"orig": "며칠 전에 아주머니가 원금만은 돌려주겠다던 약속대로 마지막 남은 만 환을 가지고 왔다. 이것으로 원금 십만 환은 다 받은 셈인데 조금씩 조금씩 보내 준 돈은 지금 집에 한 푼도 있지 않았다.", "notes": ["이전에 아주머니가 진영에게 십만 환을 빌렸었고, 원금을 돌려주겠다고 진영과 한 약속을 지켰음을 알 수 있음."]}, {"orig": "아주머니는 돈을 주고 난 다음 가려고 일어서면서 문수의 위패*를 절에다 모신 데 대한 불만을 말했다. 그리고 왜 그런 우상을 숭배하느냐고 나무라는 것이었다. 진영은 어느 것이면 우상이 아니냐고 말하고 싶었으나, 곧 말하고 싶은 충동을 억눌러 버리고 그저 멍멍히 아주머니를 쳐다보았던 것이다. 자기 자신이 지닌 모순을 설명할 도리가 없어서 그랬던 것이다.", "notes": ["아주머니는 진영이 문수의 {위패}를 절에 맡긴 것을 {부정}적으로 바라봄."]}, {"orig": "추석날이었다.", "notes": []}, {"orig": "진영은 어머니가 절에 가는 것을 말리지 않았다. 도리어 정성 들여서 사다 놓은 실과를 바구니에 차곡차곡 넣어 주었다. 배, 사과, 포도, 밤, 대추, 먹음직한 과자도 서너 가지 있었다.", "notes": []}, {"orig": "어머니가 바구니를 들고 걸어가는 뒷모습을 문 앞에서 바라보고 섰던 진영은 “당신네 같으면 중이 먹고 살갔수.” 하던 말이 문득 생각났다. 문수가 먹을 것을 중이 먹다니, 아깝다. 밉살스럽다. 그러나 진영은 다음 순간 부끄럼 때문에 얼굴이 붉어졌다. 이러한 파렴치한 생각을 내가 왜 했던고…….", "notes": ["{속물}적인 인간상➁", "제물을 {속물}적 가치로 환산하고 있는 자신의 모습에 {환멸}을 느꼈기 때문임."]}, {"orig": "진영은 문을 걸고 뒷산으로 올라갔다. 울고 싶었고, 외치고 싶은 마음에서였다.", "notes": []}, {"orig": "산에는 게딱지만 한 천막집이 군데군데 서 있었다. 들꽃 한 송이, 나무 한 뿌리 볼 수 없는 이곳에는 벌써 하나의 빈민굴이 형성되어 말이 산이지 이미 산은 아니었다.", "notes": []}, {"orig": "짜짜하게 괴인 샘터에서 물을 긷는, 거미같이 가는 소녀의 팔, 천막집 속에서 내미는 누렇게 뜬 얼굴들一진영은 울고 싶고 외치고 싶은 마음에서 집을 나와 산으로 올라온 자기 자신이 여기서는 차라리 하나의 사치스러운 존재였다는 것을 깨달았다.", "notes": ["{비유}적 표현", "진영이 빈민굴에 사는 사람들의 {비참}한 처지를 마주한 뒤 깨달은 것"]}, {"orig": "진영은 한참 올라와서 어느 커다란 바위에 가서 앉았다.", "notes": []}, {"orig": "산등성이에서 바라다보이는 시가(市街)는 너절했다. 구릉을 이룬 곳마다 집들이 마치 진딧물 모양으로 다닥다닥 붙어 있었다. 그 속에는 절이 있고, 예배당이 있고 그리고 서양적인 것, 동양적인 것이 과도기처럼 있고, 조화를 깨뜨린 잡다한 생활이 그 속에 있었다.", "notes": ["도시의 큰 길거리, 인가(집이나 상가가 많이 늘어선 거리)", "산둥성이에서 바라다보이는 시가의 모습을 구체적으로 {묘사}함.", "비유적 표현을 통해 너절하고 다닥다닥 붙어 있는 {시가}의 모습을 드러내어 {전쟁} 후 도시의 무질서와 {혼란}을 보여줌. 삶의 터전을 잃고 경제적 궁핍을 겪은 이들이 한곳에 모일 수밖에 없는 전후 사회의 모습이 나타남."]}, {"orig": "이러한 도시 속에 꿈이 있다면 그것은 가로수라고나 할까! 보랏빛이 서린 먼 산을 스쳐 가는 구름이라고나 할까. / 진영은 얄팍한 턱을 괴인다.", "notes": []}, {"orig": "[중략 부분 줄거리] 신앙으로 의지하려 했던 갈월동 아주머니에게 빌려준 돈의 이자를 받지 못한 진영은 아주머니에게서 대학생의 사기 행각으로 돈을 잃게 된 사연을 듣고는 도덕성이 붕괴된 인간의 모습에 지치고 만다. 그때 명절이니 절에 돈을 보내야겠다는 어머니의 말을 들은 진영은 그동안 벼르던 일을 해치우겠다는 생각을 한다. 그러고는 돈이 많고 적음에 따라 사람들을 다르게 대접하고 자신들을 홀대하던 절에 찾아가 외아들 문수의 사진과 위패를 찾아온다.", "notes": []}, {"orig": "진영은 비탈길을 돌아 산으로 올라간다. 올라가면서 이리저리 기웃거린다. 어느 커다란 바위 뒤에 눈이 없는 마른 잔디 옆에 이르자 진영은 그 자리에 주저앉는다. 그리하여 문수의 사진과 위패를 놓고 물끄러미 한동안 내려다본다.", "notes": []}, {"orig": "한참 만에 그는 호주머니 속에서 성냥을 꺼내어 사진에다 불을 그어 댄다. 위패는 이내 살라졌다. 그러나 사진은 타다 말고 불꽃이 잦아진다. 진영은 호주머니 속에서 휴지를 꺼내어 타다 마는 사진 위에 찢어서 놓는다. 다시 불이 붙기 시작한다.", "notes": []}, {"orig": "사진이 말끔히 타 버렸다. 노르스름한 연기가 차차 가늘어진다.", "notes": ["절에서 아들의 사진과 위패를 찾아와 태움으로써 시대에 대한 {반감}을 드러내는 동시에 타락한 시대와의 연결 고리를 {끊음}."]}, {"orig": "진영은 연기가 바람에 날려 없어지는 것을 언제까지나 쳐다보고 있었다.", "notes": []}, {"orig": "“내게는 다만 쓰라린 추억이 남아 있을 뿐이다. 무참히 죽어 버린 추억이 남아 있을 뿐이다.”", "notes": []}, {"orig": "진영의 깎은 듯 고요한 얼굴 위에 두 줄기 눈물이 흘러내리고 있었다.", "notes": []}, {"orig": "겨울 하늘은 매몰스럽게도 맑다. 잡목 가지에 얹힌 눈이 바람을 타고 진영의 외투 깃에 날아내리고 있었다.", "notes": ["보기에 인정이나 싹싹한 맛이 없고 쌀쌀맞은 데가 있음."]}, {"orig": "“그렇지, 내게는 아직 생명이 남아 있었다. 항거할 수 있는 생명이.”", "notes": ["타락한 시대에 맞서 앞으로의 삶을 살아가겠다는 {저항}과 {의지}의 표현으로, 앞으로의 삶을 살아갈 수 있는 {원동력}을 보여줌."]}, {"orig": "진영은 중얼거리며 잡나무를 휘어잡고 눈 쌓인 언덕을 내려오는 것이다.", "notes": []}, {"orig": "* 위패: 단, 묘, 원, 절 따위에 모시는 죽은 사람의 이름을 적은 나무패.", "notes": []}], "analysis": "이 작품은 {전쟁} 이후의 {부조리}한 사회에 대한 분노와 고발을 담고 있으며, 전쟁이 초래한 인간성의 상실과 {불신}이 가득한 현실 속 무기력하고 외로운 인간의 모습이 나타난다. {전지적작가} 시점이지만 특정 인물({진영})의 시각에서 내면을 서술하고 있다. 전쟁으로 가족을 잃은 진영은 타락한 {종교}와 부패한 {의료}계 등 부조리한 사회 현실에 깊은 {환멸}을 느끼며 {불신}을 쌓아간다. 결국 그녀는 허상뿐인 아들의 {위패}를 불태우며 과거와의 연결 고리를 끊고 부당한 세상에 대한 {저항}적 의지를 드러낸다."}, {"author": "이병주", "work": "관부연락선", "genre": "사상소설 (1960년대)", "lines": [{"orig": "초년병의 교육 기간도 끝나고 보충병도 들어오고 해서 유태림 등이 한시름 놓게 된 무렵의 어느 날, 태림과는 같은 고향이라서 보다 가깝게 지내는 사이인 허봉도란 친구가 태림을 근처에 있는 방공호 속으로 끌어들였다. 그러고는 한다는 말이 안달영 씨가 교양회를 가지자고 하는데 그러자면 태림이 관리하고 있는 창고를 빌려야겠다는 것. 태림은 그때 부대의 소모품 창고를 관리하는 임무를 맡고 있는 터였다.", "notes": ["허봉도가 유태림을 방공호로 끌어들인 이유"]}, {"orig": "어떤 교양회냐고 물은 태림에 대한 허 군의 답은, 아마 공산주의 교양이 아닌가 싶다고 했다. 태림은 허 군의 얼굴을 들여다보면서, 너 정신이 있는 사람이냐고 쏘았다.군의 평소 언동엔 엉뚱한 데가 있는 데다가 그때 하는 말이 하도 어이가 없었기 때문이었다.", "notes": ["유태림은 일본 병영 내에서 {공산주의}를 바탕으로 한 조선 독립에 대해 조선인들이 교양회를 개최하려고 하는 것에 {부정적}으로 생각."]}, {"orig": "허 군은 발끈하면서 안 씨(안달영)는 애국자이며 사상가이니 그릇된 짓을 할 사람이 아니라고 우겼다. 시절에 사상 관계로 몇 번이나 감옥 출입을 했기 때문에 저렇게 나이가 많은데도 학병으로 끌려오지 않았느냐는 설명까지 붙이고는 일본의 패망과 조국의 독립을 목전에 둔 이 마당에서 안 씨를 중심으로 한 교양회와, 나아가 결사를 만들어야 한다고 사뭇 열띤 어조로 말했다.", "notes": ["허봉도는 안달영을 애국자이며 사상가로 추앙하며 그의 계획에 {동조}하고 있음."]}, {"orig": "그 자리에서 시비를 벌여 보았자 아무런 보람이 없을 것을 짐작하고 태림은 생각할 여유를 달라면서 허 군과 헤어졌다. 그러나 난처한 문제가 아닐 수 없었다. 그 시국에 더더구나 일본의 병영 내에서 공산주의의 모임을 가지려는 행위는 그 사상에 동조하건 안 하건은 둘째로 하고 대단한 용기라고 아니 할 수 없었다.", "notes": ["유태림과 안달영의 갈등이 발생하게 된 내막"]}, {"orig": "(중략)", "notes": []}, {"orig": "안의 몸뚱어리가 바르르 떨리듯 하는 양이 어둠 속에서도 보이는 듯했다.", "notes": []}, {"orig": "“여보시오, 유 형! 당신에겐 애국심도 없소? 젊은 사람다운 정의감도 없소?다운 진리에의 정열도 없소? 몇십 년 전부터 애국자는 스스로를 희생할 각오를 하고 조국과 인민을 위해서 싸우고 있소. 번히 안 되는 일인 줄 알면서도 명분과 대의를 위해서 무수한 지도자가 살을 에고 뼈를 깎고 있소. 그런 정도까질 나는 유 형에게 기대하지는 않소. 그렇지만 조국의 해방을 눈앞에 두고도 돌멩이 한 개 치우는 노력마저 안 하겠단 말요? 난 유 형을 그런 사람으로 보지는 않았는데 정말 실망했소", "notes": ["자신의 요청을 허락하지 않는 유태림은 {비난}함.", "상대방이 {지식인}으로서 지녀야 할 마땅한 도리를 언급하며 행동을 {촉구}하고 있음."]}, {"orig": "나지막하나마 분노에 격한 어조였다. 유태림도 흥분했다.", "notes": []}, {"orig": "“안 선생은 안 선생의 신념을 말했습니다. 신념에 대해서 참견할 의사는 조금도 없습니다. 그러니까 나는 내 생각을 말해 보겠습니다. 독립운동은 독립에만 목적을 두는 운동이라야 한다고 믿습니다. 특정한 사상과 주의를 개재시키면 독립운동의 과정에서 단결할 수 있는 접착력을 잃기 쉽습니다.은 아일랜드의 예, 인도의 예를 보아서도 분명하지 않습니까. 어떠한 정체(政體)를 택할 것인가는 독립할 수 있는 환경을 쟁취한 연후에 다수의 의사에 따라 결정할 문제가 아니겠습니까. 공산주의자들은 공산주의자대로 그들의 단결을 굳게 하고 동지를 포섭하되 독립할 수 있는 환경을 만들 때까진 그 주의와 사상을 전면에 내놓아선 곤란하다는 말씀입니다. 민족주의라도 그렇고 미국식 민주주의를 신봉하는 사람도 그렇고 프랑스의 정체를 좋아하는 사람도 그래야 되리라고 믿습니다. 그런 뜻에서 우리나라가 나갈 길이 공산주의의 길밖에 없다는 사상은 그것을 찾으러 오는 사람 이외엔 강요해선 안 된다는 말입니다. 강요해서 될 문제도 아니구요.", "notes": ["유태림은 {이데올로기}와 관련없이 순수한 생각을 지닌 지식인이었음.", "유태림은 이데올로기적 {획일}성을 거부한 사상적 {유연}성을 가진 인물임."]}, {"orig": "“그것이 돼먹지 않은 망상이란 거요. 주의와 사상이 없이 어떻게 힘을 결집한단 말이오. 그저 독립만 하라고 떠들어 가지고 일이 될 줄 압니까? 꼭 그렇게 믿고 있다면 어리석기 짝이 없는 잠꼬대에 지나지 않고, 고의로 하는 소리라면 비겁하고 음흉한 술책에 불과한 수단적인 궤변이오.”", "notes": []}, {"orig": "“나라와 나라가 싸울 때. 주의와 사상을 가지고 싸우는 거요? 나라를 사랑하는 감정. 내 나라를 지켜야겠다는 의무감, 그것을 가지고 싸우는 것 아뇨?  다르고 의견이 다르고 직업이 다르고 계급이 다른 사람들이 그저 나라를 지키겠다는 일념으로 싸우는 것 아뇨? 독립운동이 가능하다면 그 싸움과 다를 것이 무엇이 있단 말요. 나라를 잃은 사람들이 나라를 찾겠다는 마음과 감정만으로 왜 싸우지 못한단 말요. 공산주의 사상이 아니면 독립할 수 있는 힘을 결집하지 못한다면 미합중국은 어떻게 독립할 수 있었지요? 필리핀의 아기날도는 어떻게 싸웠지요? 인도의 간디와 네루는 어쩌자는 거지요? 아일랜드의 독립운동은 공산주의가 없기 때문에 그처럼 약한 건가요?”", "notes": ["구체적 사례를 {열거}하며 안달영의 생각이 잘못된 것임을 역설함."]}, {"orig": "“공산주의로써 무장하지 않으면, 다시 말해서 계급 투쟁의 의식이 투철하지 못하면 모처럼 얻은 독립의 기회를 사악한 제국주의의 세력에게 가로채일 위험이 있고 반동분자에게 횡령당할 염려가 있는 거요. 그리고 튼튼한 기초를 인민대중 속에 박고 다수의 백성이 고루 잘사는 나라가 되어야만 독립한 보람이 있고 반동분자에게 횡령당하지 않는다는 얘기요. 그렇게 하자면 공산주의 국가로서의 독립이라야 한다 이 말씀이오.”", "notes": ["독림운동 과정에서 {공산주의} 이념으로 무장해야만 혁명의 순수성을 지킬 수 있다는 유태림의 사상."]}, {"orig": "거칠어져 있는 안의 숨소리를 들으면서 태림은 자기의 숨소리도 거칠어져 있구나 하고 느꼈다. 그래 되도록이면 침착해지려고 애쓰면서 조용히 입을 열었다.", "notes": []}, {"orig": "“공산주의 국가로서 독립하지 못할 바엔 독립을 할 필요가 없다는 뜻으로 들립니다, 안 선생의 말은. 나는 그런 사고방식엔 승복할 수 없다는 겁니다. 공산주의를 비판할 역량도 없고 그럴 필요도 지금 느끼고 있지 않습니다. 다만 독립운동을 하려면 순수한 독립운동으로 일관해야 하고 정체의 채택은 국민 다수가 자유로운 의사로써 결정할 수 있도록 여유를 남겨 두어야 옳지 않을까 생각했을 뿐입니다. 물론 공산당이 내적으로 단결해서 정체 채택의 마당에선 국민 다수의 의사를 움직일 수 있도록 노력하는 것까질 막을 수는 없겠지요. 동시에 공산당에 반대하는 세력의 노력도 막을 순 없을 겁니다. 그건 그렇고 나를 비겁하다고 해도 좋고 뭐라고 해도 좋습니다만 이 창고를 모임에 이용하려는 것은 거절하겠습니다.", "notes": ["안달영은 {공산주의}에 기반한 독립운동과 나라의 독립만이 {합당}한 것임을 이야기 하며 유태림에게 이데올로기에 대한 선택을 {강요}.", "유태림은 {공산주의} 사상을 절대시하는 안달영의 신념에 {반대}함."]}, {"orig": "“결국 창고를 빌려주기 싫다는 뜻을 알리기 위한 장광설이었구먼…….”", "notes": []}, {"orig": "안달영의 말엔 모멸하는 냉소가 섞였다.", "notes": []}, {"orig": "“뭐라고 해도 좋소. 창고를 빌려주지 않을뿐더러 그런 모임을 갖는 일에까지 나는 반대할 작정이오.”", "notes": []}, {"orig": "“뭣이?” / “어떻게 해서라도 그런 모임엔 반대한다고 했소.”", "notes": []}, {"orig": "“남의 신념엔 간섭하지 않겠다고 해 놓고서?”", "notes": []}, {"orig": "“이건 신념의 문제가 아니오. 나는 주의보다 사상보다 극언하면 독립운동보다 지금 나와 같이 이 부대에 있는 친구들의 생명이 중요하오.선생은 그런 모임을 가졌다가 만약 탄로 날 때를 생각해 보았소?”", "notes": ["창고는 안달영이 교양회 장소로 쓰기를 원했지만 유태림이 거절함으로써 {갈등}의 중심이 되는 공간임."]}, {"orig": "“대단한 휴머니즘이로구먼. 그런 건 개도 먹지 않는 썩어 빠진 센티멘털리즘이란 말요. 탄로 나면 깨끗이 죽지. 이왕에 개죽음할지도 모르는 생명들이 아뇨?라리 조국과 인민을 위해서 노력하다가 수틀리면 죽는 것이 숭고한 일이지. 유 선생! 비겁하게 굴지 마시오.” / 안의 말엔 독기가 서려 있었다.", "notes": ["이념보다 인간의 존엄을 {우위}에 두는 유태림의 비판적 {휴머니스트}의 면모를 보여줌."]}, {"orig": "", "notes": ["안달영은 유태림이 동료들의 생명을 걱정하는 것을 {나약}하고 감상적인 태도로 봄."]}], "analysis": "이 작품은 6·25 전쟁 중 행방불명된 유태림이라는 식민지 지식인 청년의 행적과 삶을 통해, 일제 강점, 해방, 6·25 전쟁이라는 우리의 현대사를 성찰하고 당시를 살아가던 지식인들의 {정신적고통}과 혼란을 조명하고 있다. 특히 이 작품은 유태림이라는 중심인물의 삶에 대해, ‘나’의 기억과 유태림이 쓴 수기인 ‘관부 연락선’을 {교차}하여 서술하는 방식과 구성을 취하고 있다. 그리고 이러한 서술과 구성 방식을 통해 일제 강점과 {이념} 대립의 고통스러웠던 역사를, 당시의 시점과 1960년대의 시점에서 통합하여 바라보도록 함으로써 지나온 역사를 통찰하고 이러한 시대를 살아가야 했던 지식인의 {비애}를 효과적으로 드러내고 있다. 특히 수능특강 수록 부분에서는 인물 간의 논쟁을 통해 가치관의 차이와 당시의 {이념적} 갈등 양상을 보여주며, 특정한 이념에 맹목적으로 동조하기보다, 인간의 존엄성과 생명 보존을 더 중시하는 {지식인}의 현실적이고 {비판}적인 인식을 드러내고 있다. 또한 구체적인 {사례}를 예시로 들어 주장의 타당성을 뒷받침하며 {논리}적인 설득 과정을 보여준다."}, {"author": "박완서", "work": "세상에서 가장 무거운 틀니", "genre": "분단소설 (1980년대)", "lines": [{"orig": "내 기억으론 내 외당숙이 조성구였지만 그가 조정구라니 조정구가 틀림없다 싶었다. 그가 설사 내 딸 연이가 현이라고 했다면 아마 내 딸은 현이였음에 틀림없을 것이다.", "notes": ["서술자가 자신의 내면 {심리}를 {고백}적인 어조로 서술하고 있음."]}, {"orig": "나는 그 앞에 그렇게 무력했고 그는 그렇게 전능했다. 그는 내가 완전히 허탈 상태에 빠진 것을 확인한 후 비로소 엄숙히 선언했다.", "notes": ["‘나’의 외당숙에 대한 정보를 가진 인물로, 오빠의 친지를 찾아 {단속}하는 인물임."]}, {"orig": "6·25 때 의용군으로 나간 오빠가 이북에서 밀봉교육을 받고 곧 남파되리라는 것이었다. 먼저 남파됐다가 체포된 간첩에 의해 확인된 정확한 정보란다.", "notes": ["국가나 사회의 위급을 구하기 위하여 민간인으로 조직된 군대 또는 그런 군대의 군인을 말함.", "임무를 주어 남쪽으로 보내는 일을 말함. 북한에서 남한으로 {간첩} 따위를 보내는 일을 이름."]}, {"orig": "오빠는 오면 반드시 집에 들를 테고 그러면 어떻게 하겠느냐고 그는 물었다.", "notes": ["{월북}한 오빠가 남파되어 집에 들를 경우 어떻게 할지를 ‘나’에게 물음."]}, {"orig": "“어떡하긴요. 그야 당연히 시, 신고를 하거나 자수를 시켜야죠.”", "notes": []}, {"orig": "나는 아주 밉고 서툴게 아양을 떨었다.", "notes": []}, {"orig": "“잘 생각하셨습니다. 아주머니만 믿겠습니다.”", "notes": ["‘나’가 말한 내용에 대한 {책임}을 환기함."]}, {"orig": "그리고 그는 협조해 줘서 고맙다고 덧붙였다. 나도 고맙다고 서너 번 고개를 조아리고 또 한 번 아양을 떨었다. 그리고 놓여났다. 남편과 어머니가 같은 꼴을 당한 건 말할 것도 없고 충청도 진천에서 거의 한 마을을 이루고 살고 있는 외가와 그 밖에 오빠가 알 만한 대소가가 다 한 번씩 그런 일을 당한 것을 후에 알게 되었다.", "notes": ["오빠의 {주변} 사람들을 찾아가 오빠와 만나면 신고를 하거나 오빠에게 {자수}를 시키도록 {단속}함."]}, {"orig": "그로부터 대문 소리에 가슴이 내려앉는 날이 시작되었다.", "notes": []}, {"orig": "“말이 자수지, 그놈이 벌써 마흔인데 그곳에 계집자식이 없을 리 없을 테니 이 에미 말을 들을까? 계집 자식 생각이 앞설 테지. 차라리 넘어오다…….”", "notes": ["앞으로 벌어질지도 모르는 상황에 대해 언급하며 {염려}를 드러냄."]}, {"orig": "어머니는 말끝을 흐리고 눈물을 닦는다. 그러나 나는 다음 말을 알고 있다. 나도 방금 그런 생각을 하고 있었으니까. 어머니보다 훨씬 진작부터 그런 생각을 하고 있었으니까. 넘어오다 차라리 사살되었으면 하고.", "notes": ["‘나’는 간첩이 된 오빠와 상봉하는 것으로 인해 일어날 일이 {두려워} 오빠가 차라리 {사살}되었으면 하는 생각을 함."]}, {"orig": "간첩이 된 혈연과는 상봉이 몰고 올 사건과의 당면이 두려운 나머지 십팔 평 블록 집 속의 안일이 소중한 나머지, 어머니와 나는 마녀(魔女)보다도 더 잔인해졌다.", "notes": ["‘나’가 어머니와 함께 살아가면서 지키려 하는 {일상}적 행복을 의미함.", "혈육의 정보다 자신의 {생존}과 안위를 우선시할 수밖에 없는 {비극}적 상황을 {자조}적으로 표현함."]}, {"orig": "[중략 부분 줄거리] ‘나’의 이웃인 설희 엄마는 장애를 가진 딸을 키우며 살아간다. ‘나’는 그런 그녀에게 힘겹게 현실을 살아간다는 데 동병상련의 감정을 느끼면서 월북한 오빠와 관련된 집안 사정을 털어놓기도 한다. 그러던 어느 날 미국에 가 있던 설희 엄마의 남편이 취직을 하고, 설희 엄마는 딸과 함께 미국으로 떠난다.", "notes": ["어려운 처지에 있는 사람끼리 {서로} 가엾게 여김."]}, {"orig": "그 틀니는 해 넣은 지가 삼 년은 되었고, 몸에 닿는 것에 좀 지나칠 정도의 결벽성을 가진 나는 실상 내 경제 사정으론 분수에 넘칠 만큼 고가로 한 것으로 일류 치과에서 해 넣은 것이어서 처음부터 크게 불편한 줄 몰랐으나 어찌 된 영문인지 가끔 마음이 울적하다든가 몸이 불편할 때에는 이 틀니가 쑤셨다. 아니 정확히 말해서 틀니가 얹힌 턱뼈가 쑤신달까.", "notes": ["{결벽성} 때문에 고가의 틀니를 할 수밖에 없었음.", "틀니의 {통증}이 신체적인 것과 {무관}하며, {심리}적 상황과 관련되어 있음을 나타냄."]}, {"orig": "의사는 뭐 인체의 거부 반응이라든가 하는 어려운 말로 내 동통을 진찰하고 시일이 지나면 자연히 나을 거라 했지만 삼 년이 지나도록 거부 반응은 불쑥불쑥 나를 괴롭혔다.", "notes": ["몸이 쑤시고 {아픔}."]}, {"orig": "그 동통과 중압감은 경우에 따라 경중의 차이가 있는데 오늘은 아주 심한 편이었다.", "notes": ["오늘 심한 {스트레스}를 받았음을 암시함."]}, {"orig": "틀니가 천근의 무게로 턱뼈를 눌러 꼭 턱이 떨어지고 말 것 같았다. 나는 손으로 턱을 받쳐도 보고, 슬슬 주물러도 보고, 더위 먹은 짐승처럼 턱을 축 늘어뜨려 입을 헤벌리고 침을 흘려도 보았으나, 턱뼈가 부서질 듯한 동통은 조금도 덜어지지 않았다. 몸의 온갖 신경이 턱뼈를 중심으로 방사선으로 전신에 퍼진 듯, 중압감에 수반한 동통은 턱뼈에서 목구멍으로, 귓속으로 골로 퍼져 내 두상은 완전히 틀니의 횡포가 지배했다.", "notes": ["{촉각}적 묘사를 통해 ‘나’의 {신체}적 고통이 심화되는 상황을 나타냄."]}, {"orig": "누가 이런 고통을 감히 짐작이나 할 수 있으랴. 이 고통에서 벗어나는 길은 오직 틀니를 빼는 길밖에 없겠는데 나는 틀니를 빼고 있는 내 모습에 늘 몸서리를 쳐 왔으므로 차중에서나 길에서 사람들의 시선을 의식하며 차마 그 짓은 할 수 없었다.", "notes": ["{중압감}을 틀니의 무게로 표현함. {중압감}은 설희 엄마에 대한 {부러움}과 월북한 오빠를 두었다는 {부담감}에서 생긴 것임. 주인공이 느꼈던 틀니의 무게는 {실재}하는 무게가 아니라 삶을 짓누르는 {현실}의 무게라고 볼 수 있음."]}, {"orig": "어찌어찌해서 가까스로 내 집 문 앞까지 왔을 즈음 나는 거의 발광 직전이었다.", "notes": ["틀니가 {사회}적 제약 속에서 벗을 수 없는 멍에와 같은 것임을 보여줌."]}, {"orig": "방에 들어서자마자 입을 크게 벌리고 침을 질질 흘려 가며 틀니를 뽑아냈다.", "notes": []}, {"orig": "양쪽 두 개씩 도합 네 개의 어금니가 심어진 반달 모양의 섬세한 백금 틀은 내 손바닥에서 거의 무게를 지니지 않은 채 차게 빛났다.", "notes": ["틀니 자체가 고통의 {원인}이 아님을 드러냄."]}, {"orig": "마침내 무서운 동통과 중압감으로부터 자유로워진 내 몸은 가볍다 못해 공중으로 둥실 뜨는 듯했다.", "notes": []}, {"orig": "이럴 수가, 이렇게 가벼울 수가, 우화이등선(羽化而登仙)이란 이런 기분을 두고 이름인가.", "notes": ["‘나’의 후련함. {해방감}이 표현됨."]}, {"orig": "나는 내 편안감을 충분히 만끽하기 위해 몸을 장판 위에 눕혔다.", "notes": []}, {"orig": "그 여편네 설희 엄마는 지금쯤 어디를 날고 있을까? 제아무리 공중에 떠 있기로서니, 말도 많고 탈도 많은 온갖 사는 어려움부터 벗어났기로서니 지금의 나만큼이야 가볍고 편할쏘냐. 나는 코웃음을 친다.", "notes": ["설희 엄마와의 {비교}를 통한 자신을 {위로}함."]}, {"orig": "지금의 내 팔자는 그렇게 편타.", "notes": ["틀니를 빼고 난 후의 ‘나’의 {편안}함."]}, {"orig": "그런데 아까부터 누가 대문을 조심스럽게 두들기고 있지 않은가. 어머니가 누구냐고 몇 번 묻는 것 같다.", "notes": ["{긴장감}을 조성하고 있음."]}, {"orig": "그래도 대답 없이 똑똑 두들기기만 한다. 어머니의 신소리가 들린다. 나는 별안간 가슴이 두방망이질을 한다.", "notes": ["{청각}적 묘사를 통해 월북했던 오빠가 왔을지도 모른다는 ‘나’의 심리적 {불안}이 고조되는 상황을 나타냄."]}, {"orig": "대문 소리가 나고 아주 낮은 대화가 들린다. 분명 상대는 남자다. 그것도 사십 대의 남자.", "notes": ["{긴장감}을 조성하고 있음.", "{긴장감}을 조성하고 있음.", "{긴장감}을 조성하고 있음."]}, {"orig": "남의 이목을 꺼리듯 대화는 여전히 수군수군 낮다.", "notes": []}, {"orig": "드디어 올 것이 오고 만 것이다! 이제 끝장이다. 파멸이다. 오오 이렇게 파멸이 쉬 올 줄이야.", "notes": ["{긴장감}을 조성하고 있음. 오빠와 {비슷}한 나이."]}, {"orig": "숨죽은 대화는 아직도 계속된다. 어머니는 자수 권고에 실패한 눈치다. 이렇게 오래 끄는 걸 보니.", "notes": []}, {"orig": "가엾은 어머니! 어쩌면 그 남자는 어머니에게 도리어 월북을 권하고 아니 협박하고 있는지도 모른다. 혹시 강제로 납치하려는 거나 아닌지.", "notes": ["{간첩}이 된 오빠가 왔다고 생각함."]}, {"orig": "그렇게끔 내버려둘 수는 없지. 나는 벌떡 일어난다. 그 남자와 죽든 살든 결판을 내고 말 테다. 나에게 ‘그 남자’는 이미 조금도 오빠일 필요가 없다. 그냥 ‘그 남자’다.", "notes": ["{위기감}을 고조시켜 글의 흥미를 유발함.", "자신의 삶을 위해 혈연의 {정}을 무시함. ‘나’의 {소시민}적 태도가 드러남."]}, {"orig": "막 나가려는데 어머니가 문을 걸고 돌아 들어온다.", "notes": []}, {"orig": "“아유 별 끈덕진 사내도 다 봤네. 월부 책을 사라고 어찌나 조르는지…… 말이 그렇게 청산유수고 신수도 희멀겋던데 고작 월부 장사밖에 해 먹을 게 없나, 쯧쯧.”", "notes": ["갈등이 {해소}됨. 문을 두드리던 사내의 정체가 월부 책 장수임이 드러남.", "말을 잘함.", "사람의 얼굴에 나타나는 밝은 기운"]}, {"orig": "나는 다시 장판방에 눕는다. 한숨을 휴우 내쉰다. 그런데 이미 좀 전의 편안감은 없다.", "notes": []}, {"orig": "옴짝달싹할 수 없으면서도 펄펄 뛰지 않고는 또 못 배길 것 같은 중압감과 동통이 여전하지 않은가? 이미 입속엔 빼 버릴 틀니도 없는데.", "notes": ["동통의 {원인}에 대한 의구심을 제기함."]}, {"orig": "빼 버릴 틀니가 없기에 그 고통은 절망적이다.", "notes": ["고통의 {원인}이 정신적인 것에 있음을 나타냄. 남북 분단의 {현실}이 존대하는 한 ‘나’의 고통이 사라지지 않을 것임을 암시함."]}, {"orig": "나는 비로소 깨닫는다. 여태껏 얼마나 교묘하게 스스로를 이중 삼중으로 기만하고 있었나를.", "notes": ["{이념} 갈등에 따른 분단 상황에서 월북한 식구를 둔 가족들에 대한 권력 기관의 {감시} 등 사회적 {제약}을 경험하며 이념의 {중압감}을 깨닫게 됨."]}, {"orig": "내 아픔은 결코 틀니에서 기인한 아픔이 아니었던 것이다.", "notes": []}, {"orig": "나는 설희 엄마가 부러워서, 이 나라와 이 나라의 풍토가 주는 온갖 제약으로부터 자유로워진 그녀가 부러워서, 그녀에의 선망과 질투로 그렇게도 몹시 아팠던 것이다.", "notes": []}, {"orig": "나는 그런 아픔이 부끄러운 나머지 틀니의 아픔으로 삼으려 들었고, 나를 내리누르는 온갖 한국적인 제약의 중압감, 마침내 이 나라를 뜨는 설희 엄마와 견주어 한층 못 견디게 느껴지는 중압감조차 틀니의 중압감으로 착각하려 들었던 것이다.", "notes": []}], "analysis": "이 작품은 전쟁과 {분단}으로 고통받는 가족의 모습을 통해, 1970년대의 {폐쇄}적 사회 분위기와 당시 {소시민}들이 겪었던 시대적 아픔을 그려 낸 단편 소설이다. {월북}한 식구를 둔 주인공 모녀를 향한 정보기관의 추적과 감시는, 전쟁이 끝난 뒤에도 {분단} 현실이 개인의 삶에 {지속}적인 정신적, 심리적 {압박}으로 작용했음을 보여준다. 특히 주인공이 ‘틀니’에서 느끼는 {무게}와 {통증}에 대한 묘사는 당대 한국 사회의 제약과 그로 인한 시민들의 {고통}을 우회적으로 보여 준다. 시대의 {모순}적 상황을 틀니의 고통과 연관시켜 효과적으로 드러냈으며 자신의 안위를 위해 혈육을 {거부}하는 {소시민}의 솔직한 심리를 고백적 어조로 서술한다. {감각}적 묘사를 활용하여 인물이 느끼는 심리적 {압박감}과 긴장을 생생하게 형상화하였다."}, {"author": "김소진", "work": "눈사람 속의 검은 항아리", "genre": "성장소설 (1990년대)", "lines": [{"orig": "[앞부분 줄거리] ‘나’는 재개발로 인해 이제 곧 사라지게 될 고향 산동네를 찾아가면서 어린 시절의 기억을 떠올린다", "notes": ["작중 인물의 {회상}을 통해 과거의 사건이 드러나고 있음."]}, {"orig": "나는 낡은 털신 밑에서 뽀드득거리는 소리가 나도록 성큼성큼 무릎을 들어 발걸음을 옮겼다. 그리고 아홉 가구가 함께 쓰는 변소 문을 열고 문턱에 올라 두 번씩이나 푸드덕푸드덕 몸서리를 치며 오줌을 갈겼다. 이빨을 위아래로 서너 번 맞부딪치며 뽑아내는 오줌 줄기가 원뿔형으로 딱딱하게 굳은 언 똥에 둔탁하게 달라붙는 소리가 들렸다. 곧이어 따스한 오줌 세례를 받은 언 똥이 물컹물컹하게 녹아내리는 소리를 눈을 지그시 감고 듣다가 김이 되어 무럭무럭 콧속을 파고드는 지린내에 코를 쫑긋거리며 돌아 나온 것까지는 좋았다.", "notes": ["뽀드득거리는 소리, 이빨을 맞부딪치는 소리 등 {음성상징어}를 활용해 상황을 묘사하고 있으며 {계절감} 또한 나타내고 있음. 어린 ‘나’가 오줌을 누는 장면을 {청각}과 {후각}적 이미지를 활용해 생생하게 표현하고 있음."]}, {"orig": "바지춤을 추스르며 김장독을 가지런히 묻어 둔 곁을 어정어정 걸어 나오다가 발끝으로 눈 덮인 가마니때기 밑에서 뭔가 묵직한 것을 밟았다.니때기 속에 발을 담근 채 눈을 푹 뒤집어쓰고 벽에 기대 있던 그 기다란 물체는 고개를 발딱 젖히는가 싶더니 옆으로 풀썩 쓰러졌다. 눈이 털려 나간 그 물체는 공사판에서 쓰는 빠루라는 연장이었다. 어른 엄지보다도 굵은 그 기다란 쇠뭉치는 지렛대로 쓰였는데 끝이 물음표처럼 생겼고 또 갈래가 져서 대못 같은 것을 빼는 데 아주 쓸모가 있었다. 그런데 그 빠루가 넘어지면서 하필이면 땅속에 묻지 않고 그냥 바깥에 놔둔 조그마한 짠지 단지를 스치자 뚜껑은 두 동강이 나 떨어졌고 몸통에는 왕금이 좌악 그어졌다. 금은 갔지만 그 짠지 단지가 당장 두 쪽으로 갈라질 것 같진 않았다. 하지만 그 갈라진 틈새에서는 시금털털한 김치 냄새를 풍기는 국물이 쨀끔쨀끔 새어 나오고 있었다.", "notes": ["또한 ‘좋았다’는 것은 뒤이어 바로 이어지는 사건에 대해 ‘나’가 전혀 {짐작}하지 못했음은 드러냄."]}, {"orig": "사태는 명백하고도 돌이킬 수가 없었다. 일어나서는 안 되는 일을 저지른 것이었다. 나는 삭풍이 부는 황량한 벌판으로 변한 마당 가에 서서 힘이 쭈욱 빠져 나간 두 어깨를 거느리며 고개를 젖혀 하늘을 바라보았다. 오오, 하느님 지금 무슨 일이 벌어진 것입니까! 그러나 무거운 눈을 밤새 다 털어 버린 새벽하늘은 너무 높이 올라가 있어 내 혼잣소리가 도저히 닿을 수 없었다. 고개를 숙였다. 나는 시치미를 떼고 누워 있는 그 시커먼 빠루가 마치 마녀의 주문을 받아 밤새 뿌린 눈송이를 덮고 위장한 채 기다리다가 내 발길을 일부러 잡아채지나 않았는가 하는 엉뚱한 의심이 들 정도였다.", "notes": ["‘나’의 의도치 않은 행동이며, 앞으로 일어날 사건의 {직접}적 원인이 됨."]}, {"orig": "나는 어린애답지 않게 몹시 피로하다는 생각이 들었던 듯하다. 그것은 내가 그 순간 헐떡이고 있었던 이유를 적절하게 해명해 줄 수 있었다. 피로하다는 것, 이루 말할 수 없는 피로감하긴 어찌 피로하지도 않고 감쪽같이 기절할 수 있겠는가. 바로 그때 내가 피로해야 하는 목적은 두말할 나위 없이 기절하는 것이었다. 기절이라도 하고 나면 이 세상에 뭔가가 달라져 있겠지, 혹은 최소한 모면의 여지는 남겠지 하는 맹렬한 위안이 달라붙었다.에 그 피로감은 어쨌든 세상에 대한 것이라는 게 명백해졌다. 변소에서 오줌보를 비우고 돌아서기까지 나는 너무나 생생했고, 빠루를 밟고 나서 갑자기 피로감을 느끼기까지 불과 십여 초가 흐르는 동안 나는 아무 일도 하지 않았다. 따라서 그 피로감이란 육체적 고단함에서 비롯된 게 아니라 정신적 흔들림에서 우러난 것이 분명했다. 그런 의미에서 그 피로감은 어른에게나 해당하는 피로였다.", "notes": ["어린이다운 나의 {상상력}이 드러나는 부분이며 ‘나’가 느끼는 {당혹감}이 잘 드러남.", "짠지 단지를 실수로 깬 후 ‘나’가 느끼는 감정.", "감당하기 힘든 현실에서 {도피}하여 기절하고 싶은 심리."]}, {"orig": "한편으로는 그 피로감은 몹시 물리치기 어려운 불길함을 품고 있었다. 몇 해 전 길게 뺀 혓바닥 위에 거꾸로 올려놓은 박탄-D 병의 밑바닥을 손으로 탁탁     <div class="sel-item ${selected.has(i)?'checked':''}" onclick="toggleItem(${i})">
      <div class="cb">✓</div>
      <div class="lbl">${d.work}<small>${d.author} · ${d.genre}</small></div>
    </div>
  `).join('');
  document.getElementById('selCnt').textContent = selected.size;
  document.getElementById('selStart').disabled = selected.size === 0;
}

function toggleItem(i) {
  selected.has(i) ? selected.delete(i) : selected.add(i);
  buildSelection();
}

function toggleAll() {
  if (selected.size === DATA.length) selected.clear();
  else DATA.forEach((_,i) => selected.add(i));
  buildSelection();
}

function startStudy() {
  if (selected.size === 0) return;
  activeData = [...selected].sort((a,b)=>a-b);
  currentTab = 0;
  document.getElementById('selScreen').classList.add('hidden');
  document.getElementById('studyScreen').classList.remove('hidden');
  buildTabs();
  buildContent();
}

function goBack() {
  document.getElementById('studyScreen').classList.add('hidden');
  document.getElementById('selScreen').classList.remove('hidden');
}

// === STUDY SCREEN ===
const nums=['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳','㉑','㉒','㉓','㉔','㉕','㉖','㉗','㉘','㉙','㉚'];

function normalize(s) { return s.replace(/\s+/g,'').toLowerCase().replace(/[.,!?;:~'"\u201C\u201D\u2018\u2019\u2500\-\u2013\u2014]/g,''); }

function parseTemplate(text) {
  const parts=[]; let idx=0;
  const rx=/\{([^}]+)\}/g; let m, last=0;
  while((m=rx.exec(text))!==null) {
    if(m.index>last) parts.push({type:'text',value:text.slice(last,m.index)});
    parts.push({type:'blank',answer:m[1],id:idx++});
    last=m.index+m[0].length;
  }
  if(last<text.length) parts.push({type:'text',value:text.slice(last)});
  return parts;
}

function renderParts(parts,pi,section) {
  return parts.map(p => {
    if(p.type==='text') return p.value;
    const uid=`${pi}-${section}-${p.id}`;
    const w=Math.max(60,Math.min(160,p.answer.length*16+20));
    const st=state[pi]?.[uid];
    const cls=st?.graded?(st.correct?'correct':'wrong'):'';
    const val=st?.value||'';
    return `<input class="blank-input ${cls}" id="${uid}" data-answer="${p.answer.replace(/"/g,'&quot;')}" data-poem="${pi}" style="width:${w}px" value="${val}" ${st?.graded?'readonly':''} onkeydown="handleKey(event,this)" oninput="onInput(this)"><button class="hint-btn" onclick="showHint('${uid}')" ${!val&&!st?.graded?'disabled':''}>?</button>`;
  }).join('');
}

function buildTabs() {
  document.getElementById('tabs').innerHTML = activeData.map((di,i) => {
    const d=DATA[di];
    return `<div class="tab ${i===currentTab?'active':''}" onclick="switchTab(${i})">${d.author} · ${d.work}</div>`;
  }).join('');
}

function buildContent() {
  const di=activeData[currentTab];
  const d=DATA[di]; const pi=di;
  if(!state[pi]) state[pi]={};
  let html=`<div class="poem-header"><div class="poem-author">${d.author}</div><div class="poem-title">${d.work}</div><div class="poem-genre">${d.genre}</div></div>`;
  html+=`<div class="dual-card"><div class="dual-header"><div>원 문</div><div>줄별 해석 메모 · 빈칸</div></div>`;
  let ln=0;
  d.lines.forEach((line,li) => {
    const isO=line.orig.trim().length>0;
    if(isO) ln++;
    const left=isO?`<span class="ln">${nums[ln-1]||ln}</span>${line.orig}`:'';
    let right='';
    if(line.notes.length===0) right='<span class="dash">—</span>';
    else right=line.notes.map((n,ni) => {
      const isS=n.startsWith('▶');
      const r=renderParts(parseTemplate(n),pi,`n${li}_${ni}`);
      return isS?`<div class="summary-note">${r}</div>`:`<div class="note-line">${r}</div>`;
    }).join('');
    html+=`<div class="dual-row"><div class="left">${left}</div><div class="right">${right}</div></div>`;
  });
  html+=`</div>`;
  if(d.analysis) {
    const r=renderParts(parseTemplate(d.analysis),pi,'analysis');
    html+=`<div class="analysis-card"><div class="analysis-header">작품 해설 · 빈칸 채우기</div><div class="analysis-body">${r}</div></div>`;
  }
  html+=`<div class="controls"><button class="btn-sm" onclick="gradeSection(${pi})">이 섹션 채점</button><button class="btn-sm" onclick="revealSection(${pi})">이 섹션 정답</button></div>`;
  document.getElementById('content').innerHTML=html;
  updateProgress();
}

function switchTab(i) { currentTab=i; buildTabs(); buildContent(); window.scrollTo(0,0); }

function handleKey(e,el) {
  if(e.key==='Enter') {
    e.preventDefault(); gradeOne(el);
    const all=[...document.querySelectorAll('.blank-input:not([readonly])')];
    const idx=all.indexOf(el);
    if(idx>=0&&idx<all.length-1) all[idx+1].focus();
  }
}

function onInput(el) {
  const uid=el.id, pi=parseInt(el.dataset.poem);
  if(!state[pi]) state[pi]={};
  state[pi][uid]={value:el.value,graded:false,correct:false};
  const hb=el.nextElementSibling; if(hb) hb.disabled=!el.value.trim();
}

function gradeOne(el) {
  const uid=el.id, ans=el.dataset.answer, pi=parseInt(el.dataset.poem), val=el.value.trim();
  if(!val) return;
  const ok=normalize(val)===normalize(ans);
  el.classList.remove('correct','wrong'); el.classList.add(ok?'correct':'wrong');
  el.readOnly=true;
  if(!state[pi]) state[pi]={};
  state[pi][uid]={value:val,graded:true,correct:ok};
  updateProgress();
}

function showHint(uid) {
  const el=document.getElementById(uid); if(!el) return;
  el.value=el.dataset.answer; el.classList.remove('wrong'); el.classList.add('correct'); el.readOnly=true;
  const pi=parseInt(el.dataset.poem);
  if(!state[pi]) state[pi]={};
  state[pi][uid]={value:el.dataset.answer,graded:true,correct:true};
  updateProgress();
}

function gradeSection(pi) {
  const blanks=[...document.querySelectorAll(`.blank-input[data-poem="${pi}"]`)];
  const unfilled=blanks.filter(el=>!el.readOnly&&!el.value.trim());
  if(unfilled.length>0){showToast(`⚠️ 빈칸 ${unfilled.length}개를 먼저 채워 주세요.`);unfilled[0].focus();return;}
  blanks.forEach(el=>{if(!el.readOnly&&el.value.trim()) gradeOne(el);});
}
function revealSection(pi) {
  const blanks=[...document.querySelectorAll(`.blank-input[data-poem="${pi}"]`)];
  const unfilled=blanks.filter(el=>!el.readOnly&&!el.value.trim());
  if(unfilled.length>0){showToast(`⚠️ 빈칸 ${unfilled.length}개를 먼저 채워 주세요.`);unfilled[0].focus();return;}
  blanks.forEach(el=>{if(!el.readOnly) showHint(el.id);});
}
function revealAll() {
  let totalUnfilled=0;
  activeData.forEach(di=>{
    const blanks=[...document.querySelectorAll(`.blank-input[data-poem="${di}"]`)];
    totalUnfilled+=blanks.filter(el=>!el.readOnly&&!el.value.trim()).length;
  });
  if(totalUnfilled>0){showToast(`⚠️ 전체 빈칸 ${totalUnfilled}개를 먼저 채워 주세요.`);return;}
  activeData.forEach(di=>revealSection(di));
}
function resetAll() { activeData.forEach(di => { delete state[di]; }); buildContent(); }

function countBlanks(di) {
  const d=DATA[di]; let t=0;
  d.lines.forEach(l => l.notes.forEach(n => { const m=n.match(/\{[^}]+\}/g); if(m) t+=m.length; }));
  if(d.analysis) { const m=d.analysis.match(/\{[^}]+\}/g); if(m) t+=m.length; }
  return t;
}

function updateProgress() {
  let total=0, correct=0;
  activeData.forEach(di => {
    total+=countBlanks(di);
    if(state[di]) Object.values(state[di]).forEach(s => { if(s.graded&&s.correct) correct++; });
  });
  const pct=total>0?Math.round(correct/total*100):0;
  document.getElementById('progText').textContent=pct+'%';
  document.getElementById('progPath').setAttribute('stroke-dasharray',pct+',100');
}

// === SUBMISSION ===
function getResultData() {
  const name=document.getElementById('studentName').value.trim();
  let totalB=0, totalC=0; const sections=[];
  activeData.forEach(di => {
    const d=DATA[di], tb=countBlanks(di);
    let sc=0; const wrongs=[];
    if(state[di]) Object.entries(state[di]).forEach(([uid,s]) => {
      if(s.graded) { if(s.correct) sc++; else wrongs.push(s.value+'→'+document.getElementById(uid)?.dataset.answer); }
    });
    totalB+=tb; totalC+=sc;
    sections.push({work:d.author+' - '+d.work, total:tb, correct:sc, rate:tb>0?Math.round(sc/tb*100):0, wrongs:wrongs.slice(0,10)});
  });
  return {studentName:name, sections, totalBlanks:totalB, totalCorrect:totalC, totalRate:totalB>0?Math.round(totalC/totalB*100):0};
}

function submitResults() {
  const name=document.getElementById('studentName').value.trim();
  if(!name) { showToast('⚠️ 이름을 입력해 주세요.'); return; }
  const data=getResultData();
  if(SCRIPT_URL) {
    const form=document.getElementById('submitForm');
    form.action=SCRIPT_URL;
    document.getElementById('submitData').value=JSON.stringify(data);
    form.submit();
  }
  if(data.totalRate===100) { showCelebration(); }
  else { showToast('✅ 결과가 제출되었습니다!'); }
}

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// === CELEBRATION ===
function showCelebration() {
  document.getElementById('celebration').classList.add('show');
  for(let i=0;i<60;i++) {
    const c=document.createElement('div'); c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=['var(--gold)','var(--green-bright)','var(--green-light)','#fff','var(--gold-dim)'][Math.floor(Math.random()*5)];
    c.style.width=(6+Math.random()*8)+'px'; c.style.height=(6+Math.random()*8)+'px';
    c.style.animationDuration=(2+Math.random()*3)+'s';
    c.style.animationDelay=(Math.random()*2)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),6000);
  }
}
function closeCelebration() { document.getElementById('celebration').classList.remove('show'); }

// INIT
buildSelection();
</script>
</body>
</html>
