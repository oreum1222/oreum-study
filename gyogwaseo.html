<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e0a">
<title>[오름] 국어 - 수능특강 교과서개념학습 본문해석</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep:#0a0e0a;--bg-card:#111a11;--bg-input:#101a10;
  --border-row:rgba(255,255,255,.35);--border-div:rgba(255,255,255,.40);--border-outer:rgba(255,255,255,.35);
  --green-brand:#4a5a3a;--green-accent:#6b8f5e;--green-light:#8aad7a;--green-bright:#4ade80;
  --gold:#c9a84c;--gold-dim:#a08838;
  --text-primary:#ece8e0;--text-secondary:#c4bfb4;--text-muted:#928d82;--text-dim:#7a7568;
  --correct:#22c55e;--wrong:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-deep);color:var(--text-primary);font-family:'Noto Sans KR',sans-serif;word-break:keep-all;font-size:15px;line-height:1.7;-webkit-tap-highlight-color:transparent}

/* === SELECTION SCREEN === */
.sel-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.sel-logo{font-family:'Noto Serif KR',serif;font-size:28px;font-weight:700;color:var(--gold);text-align:center;margin-bottom:4px}
.sel-sub{font-size:16px;color:var(--green-light);text-align:center;margin-bottom:6px}
.sel-desc{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:24px}
.sel-card{background:linear-gradient(145deg,#141e14,#0e160e);border:1px solid var(--border-outer);border-radius:14px;padding:24px;width:100%;max-width:600px;box-shadow:0 8px 32px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06)}
.sel-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.sel-toggle{background:none;border:1px solid var(--green-accent);color:var(--green-light);padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit}
.sel-toggle:hover{background:var(--green-brand)}
.sel-count{font-size:13px;color:var(--text-muted)}
.sel-count b{color:var(--gold);font-size:16px}
.sel-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.sel-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:.15s;border:1px solid rgba(255,255,255,.06)}
.sel-item:hover{background:rgba(255,255,255,.04)}
.sel-item .cb{width:20px;height:20px;border-radius:5px;border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;font-size:13px;color:transparent}
.sel-item.checked .cb{background:var(--green-brand);border-color:var(--green-accent);color:var(--green-light)}
.sel-item .lbl{font-size:13px;color:var(--text-secondary);line-height:1.4}
.sel-item .lbl small{color:var(--text-muted);font-size:11px;display:block}
.sel-start{width:100%;padding:14px;background:linear-gradient(135deg,var(--green-brand),var(--green-accent));color:var(--text-primary);border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
.sel-start:hover{filter:brightness(1.1)}
.sel-start:disabled{opacity:.4;cursor:not-allowed}

/* === HEADER === */
.header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#0d130d,#1a2a1a);border-bottom:1px solid var(--border-outer);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.hdr-left{display:flex;align-items:center;gap:10px}
.btn-back{background:none;border:1px solid var(--text-muted);color:var(--text-muted);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit}
.btn-back:hover{color:var(--text-primary);border-color:var(--text-primary)}
.logo{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:700;color:var(--gold)}
.logo span{color:var(--green-light);font-size:13px;font-weight:400;margin-left:6px}
.hdr-right{display:flex;align-items:center;gap:10px}
.progress-wrap{display:flex;align-items:center;gap:5px}
.progress-ring{width:34px;height:34px}
.progress-text{font-size:12px;color:var(--text-secondary)}
.btn-sm{background:var(--green-brand);color:var(--text-primary);border:1px solid var(--green-accent);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;transition:.2s;white-space:nowrap}
.btn-sm:hover{background:var(--green-accent)}
.btn-sm:disabled{opacity:.4;cursor:not-allowed}

/* === SUBMIT BAR === */
.submit-bar{background:var(--bg-card);border-bottom:1px solid var(--border-outer);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.submit-bar input{background:var(--bg-input);border:1px solid var(--border-row);border-radius:6px;padding:6px 12px;color:var(--text-primary);font-size:16px;font-family:inherit;flex:1;min-width:120px;max-width:200px}
.submit-bar input:focus{outline:none;border-color:var(--gold)}
.btn-submit{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#1a1a0a;border:none;padding:7px 18px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}

/* === TABS === */
.tabs{display:flex;overflow-x:auto;background:var(--bg-card);border-bottom:1px solid var(--border-outer);padding:0 8px;scrollbar-width:thin;-webkit-overflow-scrolling:touch}
.tab{padding:9px 14px;cursor:pointer;font-size:12px;color:var(--text-muted);border-bottom:2px solid transparent;white-space:nowrap;transition:.2s;flex-shrink:0}
.tab:hover{color:var(--text-secondary)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:500}

/* === CONTENT === */
.content{max-width:1100px;margin:0 auto;padding:16px}
.poem-header{text-align:center;margin-bottom:14px}
.poem-author{font-size:12px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.poem-title{font-family:'Noto Serif KR',serif;font-size:21px;color:var(--gold);font-weight:700}
.poem-genre{font-size:11px;color:var(--green-light);margin-top:3px}
.dual-card{border:1px solid var(--border-outer);border-radius:10px;overflow:hidden;margin-bottom:18px;background:var(--bg-card)}
.dual-header{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border-row)}
.dual-header div{padding:7px 14px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--green-light);font-weight:500}
.dual-header div:first-child{border-right:1px solid var(--border-div)}
.dual-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid rgba(255,255,255,.12)}
.dual-row:last-child{border-bottom:none}
.dual-row .left{padding:7px 14px;border-right:1px solid var(--border-div);font-size:15px;color:var(--text-primary);line-height:1.8}
.dual-row .right{padding:7px 14px;font-size:14.5px;color:var(--text-secondary);line-height:1.8}
.dual-row .left .ln{color:var(--text-muted);font-size:11px;margin-right:5px}
.note-line{margin-bottom:3px}.note-line:last-child{margin-bottom:0}
.summary-note{background:rgba(74,90,58,.15);padding:5px 10px;border-radius:6px;font-size:13px;color:var(--green-light);font-weight:500;margin:3px 0}
.blank-input{background:var(--bg-input);border:1px solid var(--border-row);border-radius:4px;padding:2px 6px;font-size:16px;color:var(--text-primary);font-family:inherit;min-width:60px;max-width:160px;outline:none;transition:.2s}
.blank-input:focus{border-color:var(--gold)}
.blank-input.correct{border-color:var(--correct);background:rgba(34,197,94,.1);color:var(--correct)}
.blank-input.wrong{border-color:var(--wrong);background:rgba(239,68,68,.1);color:var(--wrong)}
.hint-btn{background:none;border:1px solid var(--text-muted);color:var(--text-muted);width:20px;height:20px;border-radius:50%;font-size:11px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;margin-left:2px;transition:.2s;vertical-align:middle}
.hint-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.hint-btn:disabled{opacity:.3;cursor:not-allowed}
.analysis-card{border:1px solid var(--border-outer);border-radius:10px;overflow:hidden;margin-bottom:18px;background:var(--bg-card)}
.analysis-header{padding:7px 14px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--green-light);font-weight:500;border-bottom:1px solid var(--border-row)}
.analysis-body{padding:12px 14px;font-size:14.5px;color:var(--text-secondary);line-height:1.9}
.controls{display:flex;gap:10px;justify-content:center;margin:14px 0;flex-wrap:wrap}
.dash{color:var(--text-muted)}
.warning{max-width:700px;margin:40px auto 20px;padding:16px 20px;border:1px solid rgba(239,68,68,.3);border-radius:8px;background:rgba(239,68,68,.05);font-size:12px;color:#d4a0a0;line-height:1.8;text-align:center}
.warning strong{color:#ef4444}

/* === TOAST === */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--green-brand);color:var(--text-primary);padding:12px 24px;border-radius:10px;font-size:14px;z-index:999;transition:.4s;opacity:0;border:1px solid var(--green-accent)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* === CELEBRATION === */
.celebration{position:fixed;inset:0;z-index:998;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,14,10,.92);opacity:0;pointer-events:none;transition:.5s}
.celebration.show{opacity:1;pointer-events:auto}
.cele-emoji{font-size:64px;animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.cele-title{font-family:'Noto Serif KR',serif;font-size:32px;color:var(--gold);font-weight:700;margin:16px 0 8px}
.cele-msg{font-size:15px;color:var(--text-secondary);margin-bottom:24px;text-align:center;padding:0 20px}
.cele-close{background:var(--green-brand);color:var(--text-primary);border:1px solid var(--green-accent);padding:10px 28px;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit}
.confetti{position:fixed;top:-10px;width:10px;height:10px;border-radius:2px;z-index:999;animation:fall linear forwards;pointer-events:none}
@keyframes fall{to{top:110vh;transform:rotate(720deg)}}

/* === HIDDEN === */
.hidden{display:none!important}
@media(max-width:768px){
  .dual-row,.dual-header{grid-template-columns:1fr}
  .dual-header div:first-child,.dual-row .left{border-right:none;border-bottom:1px solid rgba(255,255,255,.12)}
  .sel-grid{grid-template-columns:1fr}
  .submit-bar{flex-direction:column;align-items:stretch}
  .submit-bar input{max-width:100%}
  .header{padding:8px 10px}
  .content{padding:10px}
}
</style>
</head>
<body>

<!-- SELECTION SCREEN -->
<div id="selScreen" class="sel-screen">
  <div class="sel-logo">[오름] 국어</div>
  <div class="sel-sub">수능특강 교과서개념학습 본문해석</div>
  <div class="sel-desc">시험 범위에 해당하는 작품을 선택하세요.</div>
  <div class="sel-card">
    <div class="sel-top">
      <button class="sel-toggle" onclick="toggleAll()">전체 선택/해제</button>
      <div class="sel-count"><b id="selCnt">0</b>개 작품 선택됨</div>
    </div>
    <div class="sel-grid" id="selGrid"></div>
    <button class="sel-start" id="selStart" disabled onclick="startStudy()">시작하기 →</button>
  </div>
</div>

<!-- STUDY SCREEN -->
<div id="studyScreen" class="hidden">
  <div class="header">
    <div class="hdr-left">
      <button class="btn-back" onclick="goBack()">← 작품 선택</button>
      <div class="logo">[오름] 국어<span>교과서개념학습 본문해석</span></div>
    </div>
    <div class="hdr-right">
      <div class="progress-wrap">
        <svg class="progress-ring" viewBox="0 0 36 36">
          <path d="M18 2.0845a15.9155 15.9155 0 010 31.831 15.9155 15.9155 0 010-31.831" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="3"/>
          <path id="progPath" d="M18 2.0845a15.9155 15.9155 0 010 31.831 15.9155 15.9155 0 010-31.831" fill="none" stroke="var(--green-bright)" stroke-width="3" stroke-dasharray="0,100" stroke-linecap="round"/>
        </svg>
        <span class="progress-text" id="progText">0%</span>
      </div>
      <button class="btn-sm" onclick="revealAll()">전체 정답</button>
      <button class="btn-sm" onclick="resetAll()">초기화</button>
    </div>
  </div>
  <div class="submit-bar">
    <input type="text" id="studentName" placeholder="이름을 입력하세요">
    <button class="btn-submit" id="btnSubmit" onclick="submitResults()">결과 제출</button>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"></div>
  <div class="warning">
    본 자료는 오직 <strong>[오름] 국어</strong> 학원 수강생들의 성적 향상을 위해 제작된 비매품입니다.<br>
    본 자료를 외부로 유출하거나 무단 배포하는 행위는 학원과 동료 수강생들에게 심각한 피해를 주는 범죄 행위입니다.<br>
    무단 배포 적발 시, 즉각적인 퇴원 조치는 물론, 유출로 인한 경영상 손실에 대해 <strong>강력한 법적 조치</strong>를 취할 예정입니다.
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- CELEBRATION -->
<div class="celebration" id="celebration">
  <div class="cele-emoji">🎉</div>
  <div class="cele-title">완벽해!</div>
  <div class="cele-msg">이대로면 시험도 100점이지. 조금 더 파이팅!</div>
  <button class="cele-close" onclick="closeCelebration()">닫기</button>
</div>

<!-- HIDDEN FORM FOR GOOGLE SHEETS -->
<iframe name="submitFrame" style="display:none"></iframe>
<form id="submitForm" method="POST" target="submitFrame" style="display:none">
  <input type="hidden" name="data" id="submitData">
</form>

<script>
const DATA = [{"author": "김소월", "work": "길", "genre": "자유시·서정시", "lines": [{"orig": "어제도하룻밤", "notes": ["반복되는 {유랑} 생활"]}, {"orig": "나그네집에", "notes": ["{유랑}하는 화자의 처지, 일제 강점기 {고향}을 상실한 우리 민족"]}, {"orig": "가마귀가왁가왁 울며 새었소.", "notes": ["{감정이입}의 대상", "음성 상징어이자 {청각적} 심상을 사용함으로써 불안한 분위기를 형성함.", "청자에게 말하는 방식을 나타내는 ‘-오’, ‘-소’ 비슷한 {종결어미}의 반복."]}, {"orig": "오늘은", "notes": []}, {"orig": "또 몇 십 리", "notes": ["끝없이 반복되는 {유랑}"]}, {"orig": "어디로 갈까.", "notes": ["계속해서 {유랑}하는 화자의 고단한 삶의 행로를 드러냄."]}, {"orig": "산으로 올라갈까", "notes": []}, {"orig": "들로 갈까", "notes": ["유사한 문장 구조를 반복하여 {방황}하는 화자의 모습을 제시함."]}, {"orig": "오라는 곳이 없어 나는 못 가오.", "notes": ["자문자답"]}, {"orig": "말 마소 내 집도", "notes": []}, {"orig": "정주(定州) 곽산(郭山)", "notes": ["구체적 지명 언급으로 {향토적} 분위기를 형성함."]}, {"orig": "차(車)가고 배 가는 곳이라오", "notes": ["{차}나 {배}를 타고 갈 수 있는 곳이지만 화자는 그곳에 가지 못함."]}, {"orig": "여보소 공중에", "notes": []}, {"orig": "저 기러기", "notes": ["기러기에게 말을 건내는 {의인법}이 사용됨.", "하늘에서 자유롭게 나는 존재로, 화자와 {대조}되는 대상"]}, {"orig": "공중엔 길 있어서 잘 가는가?", "notes": ["{주체적} 삶의 길", "의문형 종결을 통해 화자의 {자조}적인 태도를 부각함."]}, {"orig": "여보소 공중에", "notes": ["기러기가 가는 {자유로운} 공간이라는 점에서 화자의 인생길과는 {대조}됨"]}, {"orig": "저 기러기", "notes": []}, {"orig": "열 십자(十字) 복판에 내가 섰소.", "notes": []}, {"orig": "갈래갈래 갈린 길", "notes": ["‘ㄱ’와 ‘ㄹ’의 반복을 통해 {운율}을 형성함.", "음성 상징어"]}, {"orig": "길이라도 내게 바이* 갈 길은 하나 없소,", "notes": ["절망감을 강조함.", "길이 많아도 화자가 갈 길은 없다는 의미로, {주체적} 삶의 길을 잃은 유랑민의 비애와 절망감을 상징적으로 형상화함."]}, {"orig": "*바이: 전혀", "notes": []}], "analysis": "이 작품은 일제 강점기라는 시대적 고난 속에서 삶의 터전을 잃고 정처 없이 떠돌아다니는 {유랑민}의 비애와 절망감을 형상화한 현대 시이다. 전통적인 3음보 율격을 변형하여 사용함으로써 운율적 효과를 드러내는 동시에, ‘-오’, ‘-소’와 같은 종결 어미를 반복하여 대화하듯 건네는 말투로 화자의 처지를 강조하고 있다. 특히 ‘열 십자 복판’이라는 방향성을 상실한 {공간적} 배경과 자문자답의 형식을 통해 어디로도 나아가지 못하는 나그네의 허무를 드러내며, {감정이입}의 대상인 ‘까마귀’를 통해 비극적 정서를 심화한다. 결국 상징적 시어들을 통해 {주체적}인 삶의 길을 잃었던 우리 민족의 보편적인 한(恨)과 정한을 민요적 성격으로 노래한 작품이다."}, {"author": "안민영", "work": "고울사 저 꽃이여~", "genre": "시조", "lines": [{"orig": "고울사 저 꽃이여 반(半)만 여윈 저 꽃이여", "notes": ["{영탄}적 어조", "{예찬}의 대상", "{돈호법}을 사용하여 {의인화}된 명시적 청자에게 말을 건네는 듯한 어조를 취함. genre": "현대소설", "lines": [{"orig": "아내를 찾아다니느라고 시골에서 벌어 온 돈마저 모두 깨 먹어 버리고, 얼마 안 남은 산동네 사글셋방값마저 찾아 쓴 칠복이는, 방울재에서 나올 때 나눠 가진 굿물인 징 하나만 들고 거렁뱅이 신세가 되어 떠돌았다.", "notes": ["‘칠복’이라는 이름은 7가지 복을 의미하지만 칠복은 댐 개발로 인해 7가지 (고향, 아내, 자기 자신, 마을 사람들, 집, 재산, 직업)을 잃음.", "농촌의 풍물놀이에 주로 사용되는 것으로, 산업화로 인해 사라져 가는 농촌 공동체에 대한 {향수}를 의미함."]}, {"orig": "칠복이는 거렁뱅이 신세가 되어 떠돌면서도 방울재에서 가지고 나온 징을 마치 그의 딸아이만큼이나 애지중지했으며, 밤에 잠을 잘 때는 그 징을 꼭 베고 잤다. 그런데 그 징을 베고 잘 때마다 이상하게 그 징에서 마치 방울재 할미산 너덜겅이 와르르 허물어지는 것 같은 소리가 들려오기도 하고, 또 어찌 들으면 방울재 사람들 한 사람 한 사람이 흐느껴 우는 소리가 아슴하게 들려오곤 했다.", "notes": ["상징적 소재를 사용하여 주제를 {암시}하고 있음.", "칠복이 {징}에 큰 {애착}을 가지고 있음을 알 수 있음."]}, {"orig": "그때마다 방울재에 살던 시절이 눈에 선하게 떠올랐다.", "notes": []}, {"orig": "칠복이는 징에서 고향 사람들이 그를 오라고 부르는 소리를 들었다. 그 소리를 들은 뒤 딸아이를 업고 꼬박 하루를 걸어 방울재에 닿았다.", "notes": ["칠복은 {고향}을 그리워하고, {징}을 치는 것은 ‘{고향}을 잃은 사람들의 {한}을 감싸고 풀어내는 것’임을 암시함."]}, {"orig": "[중략 부분 줄거리] 칠복은 수몰된 방울재 사람들이 모여 사는 댐 인근으로 와서 징 울리는 행위를 반복하고 낚시꾼들의 불만을 산다. 이에 낚시꾼들을 상대로 매운탕을 팔며 살아가게 된 방울재 사람들이 그를 쫓아내기로 한다.", "notes": ["칠복은 도시에 적응하지 못하고 다시 {고향}으로 돌아감."]}, {"orig": "“강촌 영감님, 부탁입니다요. 제발 쫓아내지만 마셔유. 다시는 훼방 치지 않겠구먼유. 이렇게 빌게유.”", "notes": ["{생계}를 방해한다는 이유로 칠복을 쫓아내려는 마을 사람들의 모습"]}, {"orig": "칠복이는 우르르 강촌 영감에게로 달려들어 어깨죽지며 팔을 붙들고 애원을 하다가, 그대로 무릎을 꿇고 비대발괄* 빌었다.", "notes": []}, {"orig": "이 모습을 본 봉구와 덕칠이, 강촌 영감까지도 목울대에 모닥불이 타오르면서 시울이 시큰시큰했다.", "notes": ["대화 상황에서 사투리를 활영하여 사건 전개에 {현장감}을 불어넣고 있음."]}, {"orig": "“안 가겠다면 더석머리를 해서라도 내쫓을 거여!”", "notes": ["강촌 영감도 {죄책감}을 느낌."]}, {"orig": "강촌 영감은 담배 연기를 허공에 토해 내며 결연히 말했다.", "notes": []}, {"orig": "“봉구, 덕칠이, 팔만이 나를 내쫓지 말어. 고향에서 내쫓기면 워디로 갈 것인감. 이보게들 내 사정 좀 봐줘!”", "notes": ["칠복을 {매정}하게 쫓아내는 강촌 영감의 성격이 들어남."]}, {"orig": "칠복이는 무릎을 꿇은 채 친구들의 아랫도리를 두 팔로 덥석 껴안으며 통사정을 했으나, 방울재 친구들은 도시 말이 없었다.", "notes": ["{인간성}에 호소하는 칠복의 모습"]}, {"orig": "칠복이는 소리 내어 울고 싶었으나 이를 응등물고 참아 냈다. 강촌 영감의 말마따나 고향이 없어져 버린 판국에 고향 사람인들 남아 있을 리 없지 않겠느냐는 생각이 들었다.", "notes": ["{생계}로 인해 칠복을 외면하는 친구들의 모습"]}, {"orig": "그런데 이상한 일이었다. 칠복이 자신이 참을 수 없는 매매로 그의 눈에 방울재와 방울재의 옛사람들이 너무도 선명하게 보이면서, 그가 영락없이 방울재 사람들과 한데 어울려 살고 있는 환각에 정신을 가눌 수 없게 된 거였다. 방울재를 삼킨 호수의 물도 거대한 댐도 보이지 않고 낯익은 하늘, 반갑게 맞아 주는 마을 사람들만이 눈에 가득 들어오고, 그럴 때는 정월 대보름날 밤 매귀굿을 할 때처럼 어깨가 들썩거리면서 껑충껑충 춤을 추고 싶어져 징을 찾아 들고 나서는 거였다.", "notes": ["{고향}의 상실은 인간성의 상실과 연관됨.", "칠복은 환각으로 과거 {방울재}의 모습과 사람들을 봄."]}, {"orig": "그러다가 온몸이 흠뻑 땀에 젖은 채 정신을 차리고 보면, 방울재와 낯익은 사람들은 온데간데없고 호수의 물만이 그를 삼킬 듯 넘실거리고 댐은 더욱 하늘 닿게 높아지는 듯싶었다.", "notes": []}, {"orig": "“자네 정신 말짱허니께 허는 소리네만 좋은 얼굴로 헤어지세. 제발 부탁이니 지금 떠나도록 히여.”", "notes": ["굿은 맺힌 {한}을 풀어주는 것으로 칠복이 징을 치는 행위 역시 {방울재} 사람들의 {한}을 감싸안는 것임을 암시함."]}, {"orig": "강촌 영감이 볼멘소리로, 그러나 약간은 사정 조로 말하고 나서 칠복의 겨드랑이에 손을 넣어 일으키려고 했다.", "notes": []}, {"orig": "“낼 아침 떠나라 허고 싶네만, 정은 단칼에 자르는 거이 좋은겨.”", "notes": []}, {"orig": "칠복이는 아이를 업고 천천히 일어서서 희끄무레한 램프 불빛에 비춰 보이는 침울하게 가라앉은 마을 사람들의 얼굴들을 하나하나 가슴속 깊이 새기며 찬찬히 뜯어보았다. 그의 눈에서는 금방 눈물이 소나기처럼 주르륵 쏟아질 것만 같았다.", "notes": []}, {"orig": "“핑 서둘러 나가면 광주 나가는 버스를 탈 꺼여!”", "notes": []}, {"orig": "강촌 영감이 앞서 술청을 나가며 하는 말이다. 강촌 영감을 따라 칠복이가 고개를 떨구고 나갔고, 뒤이어 봉구와 덕칠이, 팔만이가 차례로 몸을 움직였다.", "notes": []}, {"orig": "봉구네 주막에서 나온 그들은 칠복이를 앞세우고 미루나무가 두 줄로 가지런히 비를 맞고 늘어서 있는 자갈길 구신작로를 향해 어둠 속을 걸었다. 그들은 아무도 입을 열지 않았다. 칠복이의 등에 업힌 그의 딸아이가 캘록캘록 기침을 하자, 바짝 뒤를 따르던 봉구가 잠바를 벗어 덮어씌워 주었다.", "notes": ["강촌 영감은 {고향} 사람인 칠복을 내쫓기 위해 마음을 다잡고 있음.", "{시간적} 배경이 밤임을 알 수 있음.", "아무 말도 하지 않고 걷는 모습에서 칠복이를 향한 사람들의 {죄책감}을 엿볼 수 있음."]}, {"orig": "빗방울은 점점 굵어졌고 호수를 훑고 온 몸에 젖은 가을바람에 으스스 몸이 떨렸다.", "notes": ["딸아이의 기침은 칠복이네의 {가난한} 상황을 드러냄."]}, {"orig": "이따금씩 고속 도로에서 자동차들이 헤드라이트로 눅눅한 어둠의 이 구석 저 구석을 쿡쿡 쑤셔 대며 바람처럼 내달았다. 자동차의 불빛이 길게 어둠을 가를 때마다 칠복이를 앞세우고 걷는 방울재 사람들의 가슴이 마치 총을 맞는 것만큼이나 섬찟섬찟했다.", "notes": ["날씨의 {악화}와 사건의 {전개}가 연결됨."]}, {"orig": "신작로에 당도해서 조금 기다리자 읍으로 들어가는 헌털뱅이 버스가 왔으며, 그들은 서둘러 차를 세우고 칠복이를 밀어 넣었다.", "notes": []}, {"orig": "“정현 고향 다시는 오지 말어.”", "notes": []}, {"orig": "봉구가 천 원짜리 두 장을 칠복이의 호주머니에 푹 쑤셔 넣어 주며 울먹먹한 목소리로 말했다.", "notes": []}, {"orig": "칠복이가 무슨 말인가 하는 것 같았으나 부르릉 버스가 굴러가는 바람에 알아들을 수가 없었다.", "notes": []}, {"orig": "그들은 버스가 어둠 속에 묻히고 자동차 불빛이 보이지 않게 되어서야 말없이 돌아섰다.", "notes": []}, {"orig": "한사코 가기 싫다는 칠복이 부녀를 억지로 버스에 태워 쫓아 보낸 그날 밤, 방울재 사람들은 잠을 이룰 수가 없었다. 빗방울이 굵어지고 땅껍질 벗겨 가는 소리가 드세어질 무렵, 봉구는 잠결에 어슴푸레하게 들려오는 징 소리에 퍼뜩 놀라 일어나 앉았다.", "notes": ["칠복을 쫓아내는 마을 사람들의 {정서}를 {비유적}으로 표현함.", "{죄책감}으로 인해 잠을 잘 수 없음."]}, {"orig": "“아니, 이 밤중에 무신 징 소리당가?”", "notes": []}, {"orig": "그는 마른기침을 토해 내고 삐그덕 열어, 송곳 하나 박을 틈도 없이 꽉 들어찬 어둠의 여기저기를 쑤셔 보았다. 어둠 속 어디선가 딸을 업은 칠복이가 휘적휘적 비에 젖은 채 바보처럼 벌쭉벌쭉 웃으면서 불쑥 나타날 것만 같았다.", "notes": ["서술 과정에서 {초점화자}를 바꿔 인물의 {죄책감}을 효과적으로 드러내고 있음."]}, {"orig": "그는 문을 안으로 걸어 잠그고 자리에 들어 아내의 넙상스러운 허리를 꼭 껴안고 잠을 청하려고 했으나, 땅껍질을 두드리는 빗방울 소리 사이사이로, 징 소리가 쉬지 않고 큰 황소울음처럼 사납고도 구슬프게 들려왔기 때문에 잠시도 눈을 붙일 수가 없었다. 어쩌면 바람 소리와도 같은 그 징 소리는 바로 뒤란의 아카시아 숲게에서 가깝게 들린 것 같다가도 다시 댐 쪽으로 어슴푸레 멀어져 가곤 했다.", "notes": []}, {"orig": "“바람 소린지, 징 소린지.”", "notes": []}, {"orig": "*비대발괄: 억울한 사정을 하소연하면서 간절히 청하여 빎.", "notes": []}], "analysis": "이 작품은 1970년대 산업화와 근대화의 물결 속에서 댐 건설로 인해 삶의 터전을 잃은 수몰 지구 주민들의 비극을 사실적으로 그려낸 사회 고발적 성격의 작품이다. 3인칭 {전지적작가} 시점을 통해 전남 장성호의 {방울재}를 배경으로 실향민과 도시 빈민으로 전락한 농민들이 겪는 고향 상실의 아픔과 고달픈 삶을 형상화하고 있다. 특히 작품의 핵심 상징인 징 소리는 수몰된 고향에 대한 집착과 농민들의 뿌리 깊은 한의 정서를 집약적으로 드러내는 장치로 활용된다. 작가는 날씨의 변화와 사건의 {전개}를 긴밀하게 연결하며 극적 긴장감을 높이는 한편, 공동체의 안녕을 위해 주인공 칠복을 내쫓을 수밖에 없는 마을 사람들의 비정한 현실을 통해 전통적 공동체의 붕괴와 가치관의 혼란을 예리하게 비판한다. 수몰로 인한 정신적·물질적 고통은 단순히 개인의 비극을 넘어 급격한 사회 변화 속에서 소외된 우리 민족의 보편적인 아픔을 대변한다. 이 작품은 산업 사회로의 이행 과정에서 상실된 인간적 삶의 가치가 무엇인지에 대한 근원적인 문제를 제기하고 있다."}, {"author": "백문보", "work": "율정설", "genre": "고전산문 (설)", "lines": [{"orig": "윤 상군곤강 남쪽에 집터를 마련하였다. 집터 동서쪽에 밤나무 숲이 울창하여 그곳에 집을 짓고 ‘밤나무 정자’라는 뜻으로 ‘율정’이라는 이름을 붙였다. 지금 또 조금 서쪽으로 가서 새로 집을 샀는데 밤나무 숲이 더욱 무성하였다. 성안에 있는 주택에는 밤나무를 심는 사람이 드문데, 윤 공은 집을 사기만 하면 밤나무가 있는 곳을 선택하였다.", "notes": ["봉구의 {죄책감}을 나타냄.", "윤택(윤 공)으로 글쓴이의 지인"]}, {"orig": "그나게 말했다.", "notes": ["일반인과 윤 공의 차이점 : 남들이 잘 심지 않는 {밤나무}에 가치를 둠.", "{윤공}을 나타냄."]}, {"orig": "“봄이면 성근 가지가 꽃과 서로 어른거리고 여름이면 잎이 우거져서 그 그늘에서 쉴 수 있으며 가을이면 밤이 맛이 들어 내 입에 가득 채울 만하며 겨울이면 껍질을 모아 내 아궁이에 불을 땐다.%！ÿ 나는 이 때문에 밤나무를 선택한다.”", "notes": ["글쓴이", "{열거}법을 사용하여 밤나무를 선택한 {실용}적인 이유를 계절별로 {나열}하고 있음. 인물의 말을 통해 밤나무의 {특성}이 제시됨.", "봄은 {시각}적 {아름}다움을 제공하는 계절임", "여름은 {휴식}처를 제공함.", "가을 let activeData = [];
const state = {};

// === SELECTION SCREEN ===
function buildSelection() {
  const grid = document.getElementById('selGrid');
  grid.innerHTML = DATA.map((d,i) => `
    <div class="sel-item ${selected.has(i)?'checked':''}" onclick="toggleItem(${i})">
      <div class="cb">✓</div>
      <div class="lbl">${d.work}<small>${d.author} · ${d.genre}</small></div>
    </div>
  `).join('');
  document.getElementById('selCnt').textContent = selected.size;
  document.getElementById('selStart').disabled = selected.size === 0;
}

function toggleItem(i) {
  selected.has(i) ? selected.delete(i) : selected.add(i);
  buildSelection();
}

function toggleAll() {
  if (selected.size === DATA.length) selected.clear();
  else DATA.forEach((_,i) => selected.add(i));
  buildSelection();
}

function startStudy() {
  if (selected.size === 0) return;
  activeData = [...selected].sort((a,b)=>a-b);
  currentTab = 0;
  document.getElementById('selScreen').classList.add('hidden');
  document.getElementById('studyScreen').classList.remove('hidden');
  buildTabs();
  buildContent();
}

function goBack() {
  document.getElementById('studyScreen').classList.add('hidden');
  document.getElementById('selScreen').classList.remove('hidden');
}

// === STUDY SCREEN ===
const nums=['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳','㉑','㉒','㉓','㉔','㉕','㉖','㉗','㉘','㉙','㉚'];

function normalize(s) { return s.replace(/\s+/g,'').toLowerCase().replace(/[.,!?;:~'"\u201C\u201D\u2018\u2019\u2500\-\u2013\u2014]/g,''); }

function parseTemplate(text) {
  const parts=[]; let idx=0;
  const rx=/\{([^}]+)\}/g; let m, last=0;
  while((m=rx.exec(text))!==null) {
    if(m.index>last) parts.push({type:'text',value:text.slice(last,m.index)});
    parts.push({type:'blank',answer:m[1],id:idx++});
    last=m.index+m[0].length;
  }
  if(last<text.length) parts.push({type:'text',value:text.slice(last)});
  return parts;
}

function renderParts(parts,pi,section) {
  return parts.map(p => {
    if(p.type==='text') return p.value;
    const uid=`${pi}-${section}-${p.id}`;
    const w=Math.max(60,Math.min(160,p.answer.length*16+20));
    const st=state[pi]?.[uid];
    const cls=st?.graded?(st.correct?'correct':'wrong'):'';
    const val=st?.value||'';
    return `<input class="blank-input ${cls}" id="${uid}" data-answer="${p.answer.replace(/"/g,'&quot;')}" data-poem="${pi}" style="width:${w}px" value="${val}" ${st?.graded?'readonly':''} onkeydown="handleKey(event,this)" oninput="onInput(this)"><button class="hint-btn" onclick="showHint('${uid}')" ${!val&&!st?.graded?'disabled':''}>?</button>`;
  }).join('');
}

function buildTabs() {
  document.getElementById('tabs').innerHTML = activeData.map((di,i) => {
    const d=DATA[di];
    return `<div class="tab ${i===currentTab?'active':''}" onclick="switchTab(${i})">${d.author} · ${d.work}</div>`;
  }).join('');
}

function buildContent() {
  const di=activeData[currentTab];
  const d=DATA[di]; const pi=di;
  if(!state[pi]) state[pi]={};
  let html=`<div class="poem-header"><div class="poem-author">${d.author}</div><div class="poem-title">${d.work}</div><div class="poem-genre">${d.genre}</div></div>`;
  html+=`<div class="dual-card"><div class="dual-header"><div>원 문</div><div>줄별 해석 메모 · 빈칸</div></div>`;
  let ln=0;
  d.lines.forEach((line,li) => {
    const isO=line.orig.trim().length>0;
    if(isO) ln++;
    const left=isO?`<span class="ln">${nums[ln-1]||ln}</span>${line.orig}`:'';
    let right='';
    if(line.notes.length===0) right='<span class="dash">—</span>';
    else right=line.notes.map((n,ni) => {
      const isS=n.startsWith('▶');
      const r=renderParts(parseTemplate(n),pi,`n${li}_${ni}`);
      return isS?`<div class="summary-note">${r}</div>`:`<div class="note-line">${r}</div>`;
    }).join('');
    html+=`<div class="dual-row"><div class="left">${left}</div><div class="right">${right}</div></div>`;
  });
  html+=`</div>`;
  if(d.analysis) {
    const r=renderParts(parseTemplate(d.analysis),pi,'analysis');
    html+=`<div class="analysis-card"><div class="analysis-header">작품 해설 · 빈칸 채우기</div><div class="analysis-body">${r}</div></div>`;
  }
  html+=`<div class="controls"><button class="btn-sm" onclick="gradeSection(${pi})">이 섹션 채점</button><button class="btn-sm" onclick="revealSection(${pi})">이 섹션 정답</button></div>`;
  document.getElementById('content').innerHTML=html;
  updateProgress();
}

function switchTab(i) { currentTab=i; buildTabs(); buildContent(); window.scrollTo(0,0); }

function handleKey(e,el) {
  if(e.key==='Enter') {
    e.preventDefault(); gradeOne(el);
    const all=[...document.querySelectorAll('.blank-input:not([readonly])')];
    const idx=all.indexOf(el);
    if(idx>=0&&idx<all.length-1) all[idx+1].focus();
  }
}

function onInput(el) {
  const uid=el.id, pi=parseInt(el.dataset.poem);
  if(!state[pi]) state[pi]={};
  state[pi][uid]={value:el.value,graded:false,correct:false};
  const hb=el.nextElementSibling; if(hb) hb.disabled=!el.value.trim();
}

function gradeOne(el) {
  const uid=el.id, ans=el.dataset.answer, pi=parseInt(el.dataset.poem), val=el.value.trim();
  if(!val) return;
  const ok=normalize(val)===normalize(ans);
  el.classList.remove('correct','wrong'); el.classList.add(ok?'correct':'wrong');
  el.readOnly=true;
  if(!state[pi]) state[pi]={};
  state[pi][uid]={value:val,graded:true,correct:ok};
  updateProgress();
}

function showHint(uid) {
  const el=document.getElementById(uid); if(!el) return;
  el.value=el.dataset.answer; el.classList.remove('wrong'); el.classList.add('correct'); el.readOnly=true;
  const pi=parseInt(el.dataset.poem);
  if(!state[pi]) state[pi]={};
  state[pi][uid]={value:el.dataset.answer,graded:true,correct:true};
  updateProgress();
}

function gradeSection(pi) {
  const blanks=[...document.querySelectorAll(`.blank-input[data-poem="${pi}"]`)];
  const unfilled=blanks.filter(el=>!el.readOnly&&!el.value.trim());
  if(unfilled.length>0){showToast(`⚠️ 빈칸 ${unfilled.length}개를 먼저 채워 주세요.`);unfilled[0].focus();return;}
  blanks.forEach(el=>{if(!el.readOnly&&el.value.trim()) gradeOne(el);});
}
function revealSection(pi) {
  const blanks=[...document.querySelectorAll(`.blank-input[data-poem="${pi}"]`)];
  const unfilled=blanks.filter(el=>!el.readOnly&&!el.value.trim());
  if(unfilled.length>0){showToast(`⚠️ 빈칸 ${unfilled.length}개를 먼저 채워 주세요.`);unfilled[0].focus();return;}
  blanks.forEach(el=>{if(!el.readOnly) showHint(el.id);});
}
function revealAll() {
  let totalUnfilled=0;
  activeData.forEach(di=>{
    const blanks=[...document.querySelectorAll(`.blank-input[data-poem="${di}"]`)];
    totalUnfilled+=blanks.filter(el=>!el.readOnly&&!el.value.trim()).length;
  });
  if(totalUnfilled>0){showToast(`⚠️ 전체 빈칸 ${totalUnfilled}개를 먼저 채워 주세요.`);return;}
  activeData.forEach(di=>revealSection(di));
}
function resetAll() { activeData.forEach(di => { delete state[di]; }); buildContent(); }

function countBlanks(di) {
  const d=DATA[di]; let t=0;
  d.lines.forEach(l => l.notes.forEach(n => { const m=n.match(/\{[^}]+\}/g); if(m) t+=m.length; }));
  if(d.analysis) { const m=d.analysis.match(/\{[^}]+\}/g); if(m) t+=m.length; }
  return t;
}

function updateProgress() {
  let total=0, correct=0;
  activeData.forEach(di => {
    total+=countBlanks(di);
    if(state[di]) Object.values(state[di]).forEach(s => { if(s.graded&&s.correct) correct++; });
  });
  const pct=total>0?Math.round(correct/total*100):0;
  document.getElementById('progText').textContent=pct+'%';
  document.getElementById('progPath').setAttribute('stroke-dasharray',pct+',100');
}

// === SUBMISSION ===
function getResultData() {
  const name=document.getElementById('studentName').value.trim();
  let totalB=0, totalC=0; const sections=[];
  activeData.forEach(di => {
    const d=DATA[di], tb=countBlanks(di);
    let sc=0; const wrongs=[];
    if(state[di]) Object.entries(state[di]).forEach(([uid,s]) => {
      if(s.graded) { if(s.correct) sc++; else wrongs.push(s.value+'→'+document.getElementById(uid)?.dataset.answer); }
    });
    totalB+=tb; totalC+=sc;
    sections.push({work:d.author+' - '+d.work, total:tb, correct:sc, rate:tb>0?Math.round(sc/tb*100):0, wrongs:wrongs.slice(0,10)});
  });
  return {studentName:name, sections, totalBlanks:totalB, totalCorrect:totalC, totalRate:totalB>0?Math.round(totalC/totalB*100):0};
}

function submitResults() {
  const name=document.getElementById('studentName').value.trim();
  if(!name) { showToast('⚠️ 이름을 입력해 주세요.'); return; }
  const data=getResultData();
  if(SCRIPT_URL) {
    const form=document.getElementById('submitForm');
    form.action=SCRIPT_URL;
    document.getElementById('submitData').value=JSON.stringify(data);
    form.submit();
  }
  if(data.totalRate===100) { showCelebration(); }
  else { showToast('✅ 결과가 제출되었습니다!'); }
}

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// === CELEBRATION ===
function showCelebration() {
  document.getElementById('celebration').classList.add('show');
  for(let i=0;i<60;i++) {
    const c=document.createElement('div'); c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=['var(--gold)','var(--green-bright)','var(--green-light)','#fff','var(--gold-dim)'][Math.floor(Math.random()*5)];
    c.style.width=(6+Math.random()*8)+'px'; c.style.height=(6+Math.random()*8)+'px';
    c.style.animationDuration=(2+Math.random()*3)+'s';
    c.style.animationDelay=(Math.random()*2)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),6000);
  }
}
function closeCelebration() { document.getElementById('celebration').classList.remove('show'); }

// INIT
buildSelection();
</script>
</body>
</html>
