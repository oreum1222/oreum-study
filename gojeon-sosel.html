<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e0a">
<title>[오름] 국어 - 수능특강 고전산문 본문해석</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep:#0a0e0a;--bg-card:#111a11;--bg-input:#101a10;
  --border-row:rgba(255,255,255,.35);--border-div:rgba(255,255,255,.40);--border-outer:rgba(255,255,255,.35);
  --green-brand:#4a5a3a;--green-accent:#6b8f5e;--green-light:#8aad7a;--green-bright:#4ade80;
  --gold:#c9a84c;--gold-dim:#a08838;
  --text-primary:#ece8e0;--text-secondary:#c4bfb4;--text-muted:#928d82;--text-dim:#7a7568;
  --correct:#22c55e;--wrong:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-deep);color:var(--text-primary);font-family:'Noto Sans KR',sans-serif;word-break:keep-all;font-size:15px;line-height:1.7;-webkit-tap-highlight-color:transparent}

/* === SELECTION SCREEN === */
.sel-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.sel-logo{font-family:'Noto Serif KR',serif;font-size:28px;font-weight:700;color:var(--gold);text-align:center;margin-bottom:4px}
.sel-sub{font-size:16px;color:var(--green-light);text-align:center;margin-bottom:6px}
.sel-desc{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:24px}
.sel-card{background:linear-gradient(145deg,#141e14,#0e160e);border:1px solid var(--border-outer);border-radius:14px;padding:24px;width:100%;max-width:600px;box-shadow:0 8px 32px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06)}
.sel-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.sel-toggle{background:none;border:1px solid var(--green-accent);color:var(--green-light);padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit}
.sel-toggle:hover{background:var(--green-brand)}
.sel-count{font-size:13px;color:var(--text-muted)}
.sel-count b{color:var(--gold);font-size:16px}
.sel-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.sel-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:.15s;border:1px solid rgba(255,255,255,.06)}
.sel-item:hover{background:rgba(255,255,255,.04)}
.sel-item .cb{width:20px;height:20px;border-radius:5px;border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;font-size:13px;color:transparent}
.sel-item.checked .cb{background:var(--green-brand);border-color:var(--green-accent);color:var(--green-light)}
.sel-item .lbl{font-size:13px;color:var(--text-secondary);line-height:1.4}
.sel-item .lbl small{color:var(--text-muted);font-size:11px;display:block}
.sel-start{width:100%;padding:14px;background:linear-gradient(135deg,var(--green-brand),var(--green-accent));color:var(--text-primary);border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
.sel-start:hover{filter:brightness(1.1)}
.sel-start:disabled{opacity:.4;cursor:not-allowed}

/* === HEADER === */
.header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#0d130d,#1a2a1a);border-bottom:1px solid var(--border-outer);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.hdr-left{display:flex;align-items:center;gap:10px}
.btn-back{background:none;border:1px solid var(--text-muted);color:var(--text-muted);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit}
.btn-back:hover{color:var(--text-primary);border-color:var(--text-primary)}
.logo{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:700;color:var(--gold)}
.logo span{color:var(--green-light);font-size:13px;font-weight:400;margin-left:6px}
.hdr-right{display:flex;align-items:center;gap:10px}
.progress-wrap{display:flex;align-items:center;gap:5px}
.progress-ring{width:34px;height:34px}
.progress-text{font-size:12px;color:var(--text-secondary)}
.btn-sm{background:var(--green-brand);color:var(--text-primary);border:1px solid var(--green-accent);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;transition:.2s;white-space:nowrap}
.btn-sm:hover{background:var(--green-accent)}
.btn-sm:disabled{opacity:.4;cursor:not-allowed}

/* === SUBMIT BAR === */
.submit-bar{background:var(--bg-card);border-bottom:1px solid var(--border-outer);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.submit-bar input{background:var(--bg-input);border:1px solid var(--border-row);border-radius:6px;padding:6px 12px;color:var(--text-primary);font-size:16px;font-family:inherit;flex:1;min-width:120px;max-width:200px}
.submit-bar input:focus{outline:none;border-color:var(--gold)}
.btn-submit{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#1a1a0a;border:none;padding:7px 18px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}

/* === TABS === */
.tabs{display:flex;overflow-x:auto;background:var(--bg-card);border-bottom:1px solid var(--border-outer);padding:0 8px;scrollbar-width:thin;-webkit-overflow-scrolling:touch}
.tab{padding:9px 14px;cursor:pointer;font-size:12px;color:var(--text-muted);border-bottom:2px solid transparent;white-space:nowrap;transition:.2s;flex-shrink:0}
.tab:hover{color:var(--text-secondary)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:500}

/* === CONTENT === */
.content{max-width:1100px;margin:0 auto;padding:16px}
.poem-header{text-align:center;margin-bottom:14px}
.poem-author{font-size:12px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.poem-title{font-family:'Noto Serif KR',serif;font-size:21px;color:var(--gold);font-weight:700}
.poem-genre{font-size:11px;color:var(--green-light);margin-top:3px}
.dual-card{border:1px solid var(--border-outer);border-radius:10px;overflow:hidden;margin-bottom:18px;background:var(--bg-card)}
.dual-header{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border-row)}
.dual-header div{padding:7px 14px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--green-light);font-weight:500}
.dual-header div:first-child{border-right:1px solid var(--border-div)}
.dual-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid rgba(255,255,255,.12)}
.dual-row:last-child{border-bottom:none}
.dual-row .left{padding:7px 14px;border-right:1px solid var(--border-div);font-size:15px;color:var(--text-primary);line-height:1.8}
.dual-row .right{padding:7px 14px;font-size:14.5px;color:var(--text-secondary);line-height:1.8}
.dual-row .left .ln{color:var(--text-muted);font-size:11px;margin-right:5px}
.note-line{margin-bottom:3px}.note-line:last-child{margin-bottom:0}
.summary-note{background:rgba(74,90,58,.15);padding:5px 10px;border-radius:6px;font-size:13px;color:var(--green-light);font-weight:500;margin:3px 0}
.blank-input{background:var(--bg-input);border:1px solid var(--border-row);border-radius:4px;padding:2px 6px;font-size:16px;color:var(--text-primary);font-family:inherit;min-width:60px;max-width:160px;outline:none;transition:.2s}
.blank-input:focus{border-color:var(--gold)}
.blank-input.correct{border-color:var(--correct);background:rgba(34,197,94,.1);color:var(--correct)}
.blank-input.wrong{border-color:var(--wrong);background:rgba(239,68,68,.1);color:var(--wrong)}
.hint-btn{background:none;border:1px solid var(--text-muted);color:var(--text-muted);width:20px;height:20px;border-radius:50%;font-size:11px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;margin-left:2px;transition:.2s;vertical-align:middle}
.hint-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.hint-btn:disabled{opacity:.3;cursor:not-allowed}
.analysis-card{border:1px solid var(--border-outer);border-radius:10px;overflow:hidden;margin-bottom:18px;background:var(--bg-card)}
.analysis-header{padding:7px 14px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--green-light);font-weight:500;border-bottom:1px solid var(--border-row)}
.analysis-body{padding:12px 14px;font-size:14.5px;color:var(--text-secondary);line-height:1.9}
.controls{display:flex;gap:10px;justify-content:center;margin:14px 0;flex-wrap:wrap}
.dash{color:var(--text-muted)}
.warning{max-width:700px;margin:40px auto 20px;padding:16px 20px;border:1px solid rgba(239,68,68,.3);border-radius:8px;background:rgba(239,68,68,.05);font-size:12px;color:#d4a0a0;line-height:1.8;text-align:center}
.warning strong{color:#ef4444}

/* === TOAST === */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--green-brand);color:var(--text-primary);padding:12px 24px;border-radius:10px;font-size:14px;z-index:999;transition:.4s;opacity:0;border:1px solid var(--green-accent)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* === CELEBRATION === */
.celebration{position:fixed;inset:0;z-index:998;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,14,10,.92);opacity:0;pointer-events:none;transition:.5s}
.celebration.show{opacity:1;pointer-events:auto}
.cele-emoji{font-size:64px;animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.cele-title{font-family:'Noto Serif KR',serif;font-size:32px;color:var(--gold);font-weight:700;margin:16px 0 8px}
.cele-msg{font-size:15px;color:var(--text-secondary);margin-bottom:24px;text-align:center;padding:0 20px}
.cele-close{background:var(--green-brand);color:var(--text-primary);border:1px solid var(--green-accent);padding:10px 28px;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit}
.confetti{position:fixed;top:-10px;width:10px;height:10px;border-radius:2px;z-index:999;animation:fall linear forwards;pointer-events:none}
@keyframes fall{to{top:110vh;transform:rotate(720deg)}}

/* === HIDDEN === */
.hidden{display:none!important}
@media(max-width:768px){
  .dual-row,.dual-header{grid-template-columns:1fr}
  .dual-header div:first-child,.dual-row .left{border-right:none;border-bottom:1px solid rgba(255,255,255,.12)}
  .sel-grid{grid-template-columns:1fr}
  .submit-bar{flex-direction:column;align-items:stretch}
  .submit-bar input{max-width:100%}
  .header{padding:8px 10px}
  .content{padding:10px}
}
</style>
</head>
<body>

<!-- SELECTION SCREEN -->
<div id="selScreen" class="sel-screen">
  <div class="sel-logo">[오름] 국어</div>
  <div class="sel-sub">수능특강 고전산문 본문해석</div>
  <div class="sel-desc">시험 범위에 해당하는 작품을 선택하세요.</div>
  <div class="sel-card">
    <div class="sel-top">
      <button class="sel-toggle" onclick="toggleAll()">전체 선택/해제</button>
      <div class="sel-count"><b id="selCnt">0</b>개 작품 선택됨</div>
    </div>
    <div class="sel-grid" id="selGrid"></div>
    <button class="sel-start" id="selStart" disabled onclick="startStudy()">시작하기 →</button>
  </div>
</div>

<!-- STUDY SCREEN -->
<div id="studyScreen" class="hidden">
  <div class="header">
    <div class="hdr-left">
      <button class="btn-back" onclick="goBack()">← 작품 선택</button>
      <div class="logo">[오름] 국어<span>고전산문 본문해석</span></div>
    </div>
    <div class="hdr-right">
      <div class="progress-wrap">
        <svg class="progress-ring" viewBox="0 0 36 36">
          <path d="M18 2.0845a15.9155 15.9155 0 010 31.831 15.9155 15.9155 0 010-31.831" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="3"/>
          <path id="progPath" d="M18 2.0845a15.9155 15.9155 0 010 31.831 15.9155 15.9155 0 010-31.831" fill="none" stroke="var(--green-bright)" stroke-width="3" stroke-dasharray="0,100" stroke-linecap="round"/>
        </svg>
        <span class="progress-text" id="progText">0%</span>
      </div>
      <button class="btn-sm" onclick="revealAll()">전체 정답</button>
      <button class="btn-sm" onclick="resetAll()">초기화</button>
    </div>
  </div>
  <div class="submit-bar">
    <input type="text" id="studentName" placeholder="이름을 입력하세요">
    <button class="btn-submit" id="btnSubmit" onclick="submitResults()">결과 제출</button>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"></div>
  <div class="warning">
    본 자료는 오직 <strong>[오름] 국어</strong> 학원 수강생들의 성적 향상을 위해 제작된 비매품입니다.<br>
    본 자료를 외부로 유출하거나 무단 배포하는 행위는 학원과 동료 수강생들에게 심각한 피해를 주는 범죄 행위입니다.<br>
    무단 배포 적발 시, 즉각적인 퇴원 조치는 물론, 유출로 인한 경영상 손실에 대해 <strong>강력한 법적 조치</strong>를 취할 예정입니다.
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- CELEBRATION -->
<div class="celebration" id="celebration">
  <div class="cele-emoji">🎉</div>
  <div class="cele-title">완벽해!</div>
  <div class="cele-msg">이대로면 시험도 100점이지. 조금 더 파이팅!</div>
  <button class="cele-close" onclick="closeCelebration()">닫기</button>
</div>

<!-- HIDDEN FORM FOR GOOGLE SHEETS -->
<iframe name="submitFrame" style="display:none"></iframe>
<form id="submitForm" method="POST" target="submitFrame" style="display:none">
  <input type="hidden" name="data" id="submitData">
</form>

<script>

데 정예 부대에 군량도 충분하니, 만약 이들과 힘을 합해 명나라 황실을 부흥하기로 맹세한다면 어찌 만전지책이 아니겠습니까?”", "notes": ["국내외 정세를 자의적으로 해석하여 승리를 확신하는 정 공의 {낙관}적인 태도. 과거의 패배를 설욕하려는 강한 의지를 지녔으나 현실적인 군사적 역량을 {간과}하고 있음."]}, {"orig": "“사또는 아직도 탁상공론을 하고 있소? 천하만사가 천시(天時)와 지리(地利)와 인사(人事)의 제약을 넘지 못하는 법이오. 지금 중화의 운은 차츰 쇠하고 북방의 운은 왕성하니 청나라의 통치가 300년은 지속될 거요. 이게 바로 천시의 어쩔 수 없음이오. 산해관은 천험의 요새이니 우리나라 오합지졸이 험한 천 리 길을 가는 동안 100번 싸우며 산해관 앞에 이르면 저들은 연(燕), 계(薊)의 군사들로 요충지를 굳게 지키며 편안하게 쉰 군대로 피로한 군대를 맞이할 것이오. 게다가 영고의 여진족 군사가 우리 군대의 후방을 치면 우리는 앞뒤로 적의 공격을 받아 전군과 후군이 서로 응할 수 없을 거요. 군량을 수송하는 길도 끊어지고 후퇴해 돌아올 길도 가로막히면 수레 한 대라도 귀국할 수 있겠소? 이게 바로 지리의 어쩔 수 없음이오.", "notes": ["전쟁의 승패는 {구호}가 아닌 {객관}적인 정세와 물리적 조건에 의해 결정됨을 강조하며 정 공의 낙관론을 {반박}함.", "하 공의 북벌 불가론의 근거➀:", "{천시}"]}, {"orig": "돌이켜 보건대 병자년에 저들은 기병 수천으로 우리 영토 깊숙이 들어와 마치 드넓은 바다에 외로운 배 한 척, 넓은 들판에 썩은 풀 같은 신세였지만, 수천 리 우리 땅에 저들을 똑바로 쳐다보는 사람 하나 없더니 마침내 도성까지 침략당해 굴욕적인 강화 조약에 운명을 걸고 말았소. 지금 오랑캐의 부강함은 그때에 비할 바가 아니오. 우리 군대의 진법은 고작해야 장사진뿐이고, 용렬한 장수와 나약한 병사들은 적을 보면 미리 후퇴할 생각부터 하니 젖먹이를 호랑이 굴로 들여보내는 것과 무엇이 다르겠소? 또 오삼계는 임금의 은의를 저버리고 나라를 배신한 뒤 스스로 제위를 엿보고 있으니 이런 자와 동맹하는 것은 불가하오.”", "notes": ["- 청나라의 국운이 왕성한 시기임을 불어 북벌의 시기적 {부적절함}을 지적함. 청나라의 성장을 거스를 수 없는 시대적 흐름임을 인정하는 하 공의 냉철하고 현실적인 국제 정세 인식", "하 공의 북벌 불가론의 근거➁:"]}, {"orig": "“참으로 말씀하신 그대롭니다. 화의를 고수해야 하겠습니다.”", "notes": ["{지리}"]}, {"orig": "“우리나라 사람들은 허황된 논의를 좋아하다가 막상 일이 닥치면 겁부터 집어먹소. 좀 전에 하신 말씀은 모두 부질없는 생각에 지나지 않소.”", "notes": []}, {"orig": "“우리나라의 법이 지극히 훌륭하나 법이 오래되면 폐단이 생기는 법인지라 지금 백성들에게 해를 끼치고 국정을 좀먹는 것을 일일이 열거할 수 없을 지경입니다. 어르신께서 가르침을 주시기 바랍니다.”", "notes": []}, {"orig": "“부유한 권세가에 노예가 많아 곳간과 곡식 창고와 동산과 채마밭마다 지키는 자를 두고, 농사와 길쌈과 물 긷는 일과 나무하는 일마다 담당하는 종이 있소. 이 여덟 가지 일은 본래 폐단의 근원이 아니나 종 하나가 자기 직분을 다하지 못하면 한 가지 일에 폐단이 생기고, 종 여덟 명이 직분을 다하지 못하면 여덟 가지 일에 폐단이 생기오. 그러나 가장이 용렬하고 게으른 종을 도태시키고 똑똑하고 부지런한 자를 그 자리에 대체하면 모든 일이 잘 돌아가게 될 거요. 하물며 나랏일이야 더 말할 나위가 있겠소?", "notes": ["- 산해관 요새의 견고함과 원거리 원정으로 인한 보급로 및 퇴로 차단의 {지리}적 위험성을 강조함."]}, {"orig": "정 공이 절하며 사례하고 말했다.", "notes": []}, {"orig": "“지금의 가르침은 참으로 간명하면서도 핵심을 찌른 말씀이라 마음과 몸이 모두 경복하게 만듭니다.”", "notes": []}, {"orig": "“내가 오랫동안 이승에 머물 수 없으니 이제 작별을 고해야겠소이다. 사또는 몸조심하고 안녕히 계시오.”", "notes": []}, {"orig": "", "notes": ["하 공의 북벌 불가론의 근거➂:"]}, {"orig": "", "notes": ["{인사}"]}, {"orig": "", "notes": ["아군 병력의 실질적 무능함과 동맹 세력 오삼계의 {도덕}적 결함 및 {신뢰성} 부족을 강조함."]}, {"orig": "", "notes": ["조선 군대의 실질적인 {무기력함}과 훈련 부족을 지적하며 무모한 전쟁이 가져올 비극적 결말을 경고함. ‘호랑이 굴’이라는 {비유}를 통해 조선 군대가 전쟁터에 나갈 경우 겪게 될 비극적 결말을 {경고}하고 있음."]}, {"orig": "", "notes": ["하 공의 논리적이고 현실적인 정세 분석을 전적으로 {수용}하여, 명분 중심의 북벌론에서 {실리} 중심의 화의론으로 정 공의 인식이 {전환}되었음을 보여줌."]}, {"orig": "", "notes": ["국가 개혁의 성패는 제도 자체보다 역량 있는 {인재}를 적재적소에 배치하는 인사에 있음을 비유적 표현을 통해 역설함."]}], "analysis": "이 작품은 포천 현감으로 부임한 정태화(정 공)이 조선 개국 동신 하륜(하 공)의 혼령을 만나 대화하는 {비현실}적인 설정을 통해 지극히 현실적인 정치 비판을 수행하고 있다. 영의정을 지낸 정태화와 권위 있는 조상 하륜을 등장시켜 당시 집권 세력이 정권 유지와 명분 세우기용으로 활용하던 북벌론의 {허구성}을 폭로한다. 하 공이 설명하는 세 가지 근거와 함께 산해관, 장사진 같은 구체적인 실례를 들어 논리적 설득력을 갖추고 있다. 이는 당대 지식인 사이에 퍼져있던 {실리주의}적 태도를 반영한 것이며, 귀신이라는 설정을 통해 정치적으로 민감한 발언에 대한 책임에서 작가를 {보호}하려는 서사적 장치를 마련했다. 결국 진정한 국정 쇄신은 {유능한인재}를 가려 쓰는 {인사}에 있다는 통찰을 담고 있다. 정 공이 공손하고 겸손한 태도로 응대하자 하 공이 말했다."}, {"author": "작자미상", "work": "왕수대취득용녀설", "genre": "영웅 소설", "lines": [{"orig": "“하늘엔 바람 한 점 없고 바다엔 작은 파도 하나 없는데 이런 뜻밖의 변고를 당해 사흘 동안이나 앞으로 나아가지 못하니, 이 일을 어찌하면 좋단 말인가?”", "notes": ["자연법칙에 어긋나는 비정상적인 상황을 통해 신이한 사건이 발생했음을 암시함. 인물간의 대화를 통해 사건의 원인과 향후 전개 방향을 {암시}하고 있음."]}, {"orig": "배 안에 있던 한 사람이 말했다.", "notes": []}, {"orig": "“이는 필히 해신(海神)이 우리를 가로막고 장난하는 것입니다. 정성을 다해 기도를 올리면 당장 길을 갈 수 있을 것입니다.”", "notes": ["초자연적 존재인 해신의 의지에 의해 항해가 중단되었다는 당시의 {세계관}이 드러남."]}, {"orig": "상사는 그 말을 옳게 여겼다. 이에 목욕재계하고 제문을 지어 고한 뒤 제물을 갖추어 제사를 지내 보았지만 별다른 변화가 없었다. 다시 두 번 세 번 제사를 지내 보았지만 역시 배는 움직이지 않았다. 사정이 이러하니 일행 중에 두려움에 떨지 않는 사람이 없었다. 상사가 물었다.", "notes": []}, {"orig": "“정성을 다해 기도했거늘 이처럼 효력이 없으니, 이 일을 어쩌면 좋단 말인가?”", "notes": []}, {"orig": "일행 모두가 입을 다물고 한마디도 하지 못했다. 이때 왕수재가 말했다.", "notes": []}, {"orig": "“이는 분명 일행 중에 부정한 자가 있어 함께 갈 수 없으므로 해신이 우리를 가로막고 장난하는 것입니다.부정한 이를 찾아낸 다음 버려두고 데려가지 않는다면 우리를 가로막고 희롱하는 일이 바로 없어질 것입니다.”", "notes": ["고난의 원인을 공동체 내의 부정한 존재에게서 찾는 {주술}적 사고방식의 반영"]}, {"orig": "상사가 말했다. / “그 사람을 어떻게 알아내서 버리고 간단 말이냐?”", "notes": []}, {"orig": "수재가 말했다.", "notes": []}, {"orig": "“알아낼 방법이 있습니다. 모든 사람이 각자 자기 윗옷의 옷깃을 잡고 해신에게 이렇게 고하면 됩니다. ‘영험하신 신의 밝은 계시를 알고자 저희 옷깃에 이름을 써서 바다에 던지려고 합니다. 가도 되는 사람의 옷은 물속에 가라앉혀 보이지 않게 하시고, 갈 수 없는 사람의 옷은 물 위에 띄워 가라앉지 않게 해 주십시오. 영험하신 뜻을 보여 주시면 마땅히 가르침대로 거행할 것입니다.’ 이렇게 해 보시는 게 좋겠습니다.”", "notes": ["{비현실}적인 변별 방법을 통해 일행 중 부정한 자를 가려내려는 왕수재의 제안. 신이한 시험을 통해 초월적 존재의 계시를 확인하려는 {전기적구성 방식}을 보임. 자신의 계획을 신의 뜻으로 승화함으로써 {정당성}을 확보함."]}, {"orig": "상사가 말했다. / “그 말에 묘리가 있구나.”", "notes": []}, {"orig": "이에 모든 사람이 수재의 말대로 윗옷을 벗어 손수 그 옷깃을 잡고 기도한 뒤 옷을 물에 던졌다. 모든 옷이 곧바로 가라앉아 그림자도 보이지 않았지만, 유독 수재의 옷 하나만이 물 위에 떠 가라앉지 않았다. 부사 이하 모두가 의아하게 여겨 수재의 옷을 향해 돌을 던졌다. 돌이 수재의 옷 위에 있었건만 옷은 끝내 가라앉지 않았다. 일행 모두가 고개를 돌려 왕수재를 계속 쳐다보았다. 상사가 수재에게 말했다.", "notes": ["왕수재가 해신에 의해 선택된 특별한 인물임을 보여주는 {전기}적 장치"]}, {"orig": "“네 말대로 옷을 던져 보았는데, 유독 네 옷만이 물 위에 떠서 끝내 가라앉질 않는구나. 이 일을 어쩌면 좋겠느냐?”", "notes": []}, {"orig": "수재가 대답했다.", "notes": []}, {"orig": "“이는 신이 초래한 일입니다. 제 운명이 그렇다는데, 더 무슨 말을 하겠습니까? 제가 이번 사행에 따라 오기를 자청했던 건 중국 수도의 장려한 모습을 보고 대장부의 울울한 심사를 풀고 싶어서였습니다. 하지만 지금 해신이 이처럼 길을 막고 장난을 하니 제가 어찌 감히 억지로 떠날 수가 있겠습니까? 이제 저는 바다에 빠져 죽겠지만, 사신 일행은 만리 길을 무사히 다녀오셔서 임금의 명을 욕되이 하지 않으시기만을 바랄 뿐입니다.", "notes": ["상대의 거부감을 낮추고 숭고한 충을 강조함. {자발적희생}의 태도를 보임.", "자신의 비범한 능력을 발휘할 기회를 얻지 못해 마음속에 쌓인 {답답함}과 {포부}를 보여줌.", "공동체를 위해 자신을 희생하려는 왕수재의 {유교}적 충의와 비장미가 나타남. 개인의 안위보다 국가적 대업과 {유교}적 충의를 우선시하는 왕수재의 가치관을 보여줌."]}, {"orig": "그렇게 말하더니 몸을 날려 바다로 뛰어들려 했다.", "notes": []}, {"orig": "[중략 부분 줄거리] 상사와 일행은 바다로 뛰어들려는 왕수재를 만류한 후 가까운 섬에 내려 주고 떠난다. 섬에 도착한 왕수재는 대숲 사이로 난 길을 따라가다 초가집을 발견하고, 그곳에서 자신을 기다리던 노인으로부터 음식을 대접받는다.", "notes": ["‘{배}’는 인물들이 집단적 위기를 겪는 공간이고, ‘섬’은 그 위기의 원인이 {해소}되어 인물이 영웅적 과업을 부여받는 공간임."]}, {"orig": "이윽고 날이 어두워지자 노인은 불을 붙여 등을 켜고 앉더니 한숨을 내쉬며 이렇게 말했다.", "notes": []}, {"orig": "“수재는 잠깐 이 늙은이의 말을 좀 들어 보오. 나는 본래 속세 사람이 아니라 서해 용왕의 아들이라오. 이 섬에 산 지도 벌써 천 년이 넘었소. 구름을 타고 하늘에 오를 날이 이제 겨우 몇 년 남았는데, 불행히도 이 섬에 사는 삼천 년 묵은 구미호가 내 집을 빼앗으려 하고 있소. 닷새 동안 일전을 벌였지만, 늙은 내가 구미호에게 대항하는 게 너무 힘들어 수재의 귀신같은 활 솜씨를 좀 빌렸으면 하오. 나를 좀 도와 달라고 수재를 이런 궁벽한 땅에 모셔 오게 했으니, 참으로 미안하고 죄송스럽기 그지없소이다.”", "notes": ["{비현실}적 존재", "용왕의 아들(선)과 구미호(악)의 {대ㄹ립구조}를 설정하여 주인공에게 ‘요물 퇴치’라는 영웅적 과업을 부여함.", "노인이 {수재}를 기다린 이유"]}, {"orig": "수재가 물러나 앉더니 이렇게 말했다.", "notes": []}, {"orig": "“저는 속세의 천한 사람이고 선생께선 용궁의 귀한 아드님이신데, 어찌 감히 한자리에 나란히 앉을 수 있겠습니까? 게다가 저는 원래 아무 재주가 없는 사람이니 어찌 감히 선생의 청을 감당할 수 있겠습니까?”", "notes": ["자신을 {낮추}는 말하기 방식"]}, {"orig": "노인이 말했다.", "notes": []}, {"orig": "“수재가 신궁이라는 건 오래전부터 알고 있거늘, 겸손이 지나치시군요. 모레가 구미호와 싸우기로 한 날이오. 수재께서는 한번 수고로움을 아끼지 말고 이 늙은이를 위험한 처지에서 구해 주시기 바라오.”", "notes": ["{조력자}인 노인의 발화를 통해 왕수재가 비범한 영웅적 능력을 갖춘 인물힘을 {직접}적으로 드러냄."]}, {"orig": "“선생의 말씀이 이러하니 어찌 감히 온 힘을 다하지 않을 수 있겠습니까? 하지만 지금 활도 없고 화살도 없으니 어쩌면 좋겠습니까?”", "notes": []}, {"orig": "“튼튼한 활과 독화살을 준비해 놓은 지 이미 오래니, 그 일은 염려 마시오.”", "notes": []}, {"orig": "밤이 깊어 피곤해지자 각자 잠자리에 들었다. 수재는 잠에 곯아떨어져 날이 새는지도 몰랐다.", "notes": []}, {"orig": "오후가 되자 종소리, 북소리, 피리 소리가 멀리서부터 점점 가까이 들려왔다. 소리가 청아한 것이 인간 세계의 음악과는 달랐다. 수재가 노인에게 물었다.", "notes": ["{청각}적 심상을 통해 구미호의 등장이 지닌 위압감과 신비로운 분위기를 동시에 자아내고 있음."]}, {"orig": "“하늘에서 울려 퍼지는 저 음악소리는 뭡니까?”", "notes": ["요사스런 구미호의 짓으로, 노인이 경계해야 할 대상임."]}, {"orig": "노인은 이마를 찌푸리며 대답했다.", "notes": []}, {"orig": "“요사스런 구미호의 짓이라오.”", "notes": []}, {"orig": "“일개 요물일 뿐인 여우가 어떻게 이런 신선의 음악 소리를 낼 수 있습니까?”", "notes": []}, {"orig": "“저 구미호는 변화무쌍한 놈이오. 귀신이 되었다가는 인간이 되고, 바람을 부르고 비를 내리게 하며, 앞에 있는가 싶으면 어느새 뒤에 가 있으니, 실로 천하의 요물이라 할 수 있소. 지금 이리로 오는 게 분명하니 수재도 곧 보게 될 거요.”", "notes": ["부인의 외양 속에 숨겨진 요물로서의 실체를 지적함."]}, {"orig": "조금 있으니 “물렀거라!” 하는 소리가 점점 가까이 들려왔다. 수재가 몸을 숨기고 바라보니 부인 한 사람이 임금이 타는 가마 위에 앉아 있었다. 휘장을 활짝 열어젖히고 있어 그 얼굴을 볼 수 있었는데, 꽃처럼 아름다운 얼굴과 달처럼 고운 자태에서 온갖 교태가 피어나 보는 사람의 눈을 황홀하게 하고 마음을 격동시켰다. 위엄 있는 의장(儀仗)이며 온갖 물건과 의식이 임금이 출입할 때와 똑같았다. 어여쁘게 단장한 시비들이 앞뒤를 에워쌌고 기치와 창검이 좌우로 빽빽이 늘어서 있었는데, 피리 불고 북 치는 이들 모두가 곱게 분을 바른 미녀들이었다. 수재가 노인에게 말했다.", "notes": ["구미호의 매혹적인 {외양묘사}를 통해 요물인 구미호가 미인으로 변신하여 주인공의 판단력을 {흐리}게 만드는 것을 보여줌."]}, {"orig": "“저게 모두 요망한 여우들입니까?”", "notes": []}, {"orig": "“그렇소.”", "notes": []}, {"orig": "“그렇다면 빨리 활과 화살을 갖다 주세요! 가마 위의 부인을 쏴죽여야겠으니.”", "notes": []}, {"orig": "“안 돼요, 안 돼! 지금 활을 쐈다가는 한 번에 백 발의 화살을 쏜다 한들 한 손으로 막아 낼 테니, 소용없는 일이오.”", "notes": []}, {"orig": "“그렇다면 내일 싸움에서 저와 같은 사람 열 명이 있다 한들 화살을 모조리 다 막아 낼 텐데 어쩔 작정이십니까?”", "notes": []}, {"orig": "“내일 나하고 한창 싸울 때에는 저 요물도 다른 생각을 할 겨를이 없을 테니. 화살이나 돌이 날아드는 걸 알아차리지 못할 거요. 그 틈을 타서 명치를 쏜다면 성공할 수 있소이다. 내일까지 기다립시다.”", "notes": []}, {"orig": "이튿날 과연 요망한 여우가 많은 군졸을 거느리고 와서 싸움을 걸었다. 노인은 수재에게 거듭 부탁을 하고는 싸움을 하러 바다로 나섰는데, 바다 위를 마치 평지 밟듯이 다녔다. 수재는 화살을 메기고 시위를 잔뜩 당겨 부인을 쏘려 했지만, 부인의 얼굴이 너무도 아름다운 것을 보고는 차마 활을 쏠 수가 없었다. 수재는 이렇게 생각했다.", "notes": ["새끼 여우들", "{전기}적 요소를 통해 노인의 {신이함}을 드러냄.", "{여우}가 둔갑한 모습", "부인을 활로 쏘라는 노인의 부탁을 지키지 못한 이유"]}, {"orig": "‘저건 사람이다. 여우가 둔갑을 한다고 어찌 저리될 수 있겠나? 사람이 사람을 쏴 죽여서야 되겠는가?’", "notes": ["여우를 {사람}이라고 여기고 활을 쏘지 못함. 적대자의 외양에 현혹되어 도덕적 윤리감과 실체 사이에서 방황하는 왕수재의 {내적갈등}을 보여줌."]}, {"orig": "결국 활을 쏘지 못한 채 시위를 당기고 있던 손을 풀었다. 곧이어 노인과 부인은 한바탕 큰 싸움을 끝낸 뒤 각자 자기 진영으로 돌아갔다.", "notes": ["완전무결한 영웅상이 아닌 인간적 고뇌와 약점을 지닌 {입체}적 인물형을 제시함."]}], "analysis": "고려 태조 왕건의 아버지인 왕수재가 주인공으로 등장하는 영웅 소설이다. 왕수재가 서해 용왕의 아들을 도와 구미호를 퇴치하고 용녀와 혼인하게 된 내력을 다룸으로써 왕건 가계가 용의 후손이라는 {신성성}을 부여하고 고려 건국의 {정당성}을 강조하고 있다. 특히 왕수재가 구미호의 외양에 현혹되어 활쏘기를 주저하는 {내적갈등}을 보임으로써 그를 완벽한 영웅이 아닌, 인간적 고뇌를 지닌 {입체}적 인물의 모습을 보여주고 있다. 이는 서사적 {긴장감}을 높이고 독자의 {흥미}를 유발한다. 상사가 일행에게 말했다."}, {"author": "작자 미상", "work": "서해무릉기", "genre": "고전 소설", "lines": [{"orig": "이럭저럭 3년이 지났을 때, 유생은 여승으로 변장하고 서해에 배를 띄워 대양(大洋)을 방황하고 있었다.  날, 푸른 산들이 첩첩이 물 위에 솟아 있고 천봉만학이 봉우리마다 기이한 어느 곳에 이르렀다. 마침 달빛마저 넓게 비추고 있어 그야말로 경개(景槪)가 절승한 곳이었다.", "notes": ["유생은 최 씨를 찾기 위해 {여장}을 함."]}, {"orig": "유생이 배에서 내려 점점 깊이 들어가 보니 인가(人家)는 없고 산수 경치가 더욱 맑고 수려하였다. 마음속으로 감탄하고 칭찬하며 10여 리를 더 들어가니 거기에 큰 섬이 있었다. 섬에는 평평하고 넓은 벌판이 펼쳐져 있었고 푸릇푸릇한 경치 사이로 호화로운 인가가 10여 호 자리 잡고 있었다. 게다가 섬 앞으로 15리나 되는 큰 강이 가로막혀 있었으니 깊숙하고 한가한 풍치를 비할 데가 없었다. 이에 유생이 반드시 은인(隱人)이나 도사가 사는 곳이라 생각하여 찾아가 보기로 하였다.", "notes": ["-> {여장모티프}가 드러남."]}, {"orig": "그 섬에 들어가 유생이 흰옷을 단정하게 입고 삿갓을 바로 쓰고 바랑을 메고 죽장을 짚고서 양식을 구하니, 마을 사람들이 이렇게 말하였다.", "notes": []}, {"orig": "“이렇게 깊은 곳에 스님이 찾아오는 것도 뜻밖의 일이로되 저렇게 아름다운 여승은 더욱 처음이로다.”", "notes": ["섬의 비범한 풍경을 보고 {특별한인물}이 있을 것을 짐작함"]}, {"orig": "이에 유생이 대답하였다.", "notes": []}, {"orig": "“소승은 금산사 뒤 암자에 있는 여승이온데, 이곳의 아름다운 산과 바다 같은 강을 구경하려고 여기에 이르게 되었습니다. 그런데 여기를 무어라 부릅니까? 청컨대 가르쳐 주옵소서.”", "notes": []}, {"orig": "마을 사람들이 여승의 미모를 부러워하고 감탄하면서 말하였다.", "notes": []}, {"orig": "“이곳은 서해무릉이라는 곳이오. 꽃이 피어서야 봄인 줄 알고 단풍이 들고 나뭇잎이 떨어져야 가을인 줄 알지요.”", "notes": ["마을 사람들이 유생을 여자로 알고 최 씨의 거처에 들어갈 수 있게 되는 {서사적개연성}을 부여함"]}, {"orig": "이렇게 말하며 다투어 양식을 주는 사람이 많아 바랑이 무거워 멜 수 없을 지경이었다. 유생이 이에 이곳 인심이 순박하고 후덕함을 알고 다시 큰 누각 앞으로 나아갔다.", "notes": []}, {"orig": "이때 최 씨는 밤낮으로 명철하신 하느님을 향하여 길게 탄식하며 지냈고, 자나 깨나 고향을 그리는 마음이 가슴속에서 떠나지 않았다. 그런데 이날 밤, 비몽사몽 사이에 한 노승이 나타나 이렇게 말하였다.", "notes": []}, {"orig": "“나는 금산사의 부처로다. 네 지아비의 지극한 정성에 감동하여 너희 두 사람을 도와주러 왔노라. 일 오시(午時)에 한 여승이 밖에 있을 것이다. 이 사람이 바로 유생이니, 이제 서로 만날 수 있을 것이다.”", "notes": ["{속세}와 단절되어 자연의 변화만으로 시간을 인지하는 탈속적이고 이상적인 공간의 분위기가 드러남"]}, {"orig": "최 씨가 반가워하며 사례하고자 할 때 문득 꿈 에서 깨어났다. 최 씨는 한낱 꿈속의 헛된 일인 듯 여겨져 몸과 마음이 모두 어지럽고 뒤숭숭한 가운데 날이 밝기를 기다렸다.", "notes": []}, {"orig": "다음 날 정오 무렵 계선이 밖으로부터 쫓아 들어오면서 말하였다.", "notes": []}, {"orig": "“장지문 밖에 한 여승이 와서 양식을 청하옵는데, 그토록 아리따운 미모와 옥 같은 얼굴 영롱한 풍모를 저는 처음 보았습니다. 청수하고 단아한 자태가 마치 우리 아가씨와 방불하였습니다.”", "notes": ["{초월적존재}가 꿈에 개입하여 두 사람의 만남을 주선하는 {전기적요소}가 나타남"]}, {"orig": "최 씨가 다 듣고는 어제 꿈속 일이 생각나 마음속으로 놀라워하고 있었는데,계선이 은근히 권하며 말하였다.", "notes": ["계선이 유생과 최 씨의 외모를 비범하고 아름답게 묘사하여 이들이 전형적인 {재자가인형} 인물임을 드러내고 최 씨와 유생의 만남을 유도하는 역할을 함"]}, {"orig": "“여승은 내당에 들어와도 괜찮으니 아가씨께서 한번 보신들 무슨 일이 있겠습니까?”", "notes": ["꿈이 현실의 행동을 유발하며 사건 전개에 {개연성}을 부여함"]}, {"orig": "최 씨가 이곳에 온 지 수삼 년이 지났으나 몸을 일으켜 연보(蓮步)를 옮김이 없었는데, 이날은 꿈속 일에 의심이 생겨 한번 나갈 결심을 하였다. 이에 계선이 크게 기뻐하며 하인들에게 채비를 차리라고 일렀다.", "notes": []}, {"orig": "계선이 이끄는 대로 따라와 나와 보니, 서쪽으로 강물이 굽돌아 흐르는 곳에 산 우물이 있었고, 그 앞에 흰옷을 입은 여승이 바랑을 메고 대나무 막대기를 쥐고 표연히 서 있었다. 최 씨가 은근히 눈을 들어 살펴보니, 삿갓 밑에 옥 같은 얼굴을 한 여승은 다름이 아니라 바로 자신의 지아비 유연이었다.", "notes": []}, {"orig": "최 씨가 보니 낯빛과 용모가 바뀌고 풍채와 신수가 초췌하여 가슴이 찢어지는 듯하였다. 구나 이렇게 머리를 깎고 중이 되는 부끄러움도 무릅쓰고 허다한 풍상과 천신만고의 고생을 겪은 것이 모두 자신 때문이었으니, 최 씨의 심정이 오죽하였겠는가?", "notes": ["유생이 목적하는 장소로 이동하거나 인물을 만날 수 있는 {계기}를 마련한다", "자신을 찾기 위해 고생을 겪어 변해버린 남편의 모습을 보고 느끼는 최 씨의 안타까움과 {죄책감}"]}, {"orig": "[중략 부분 줄거리] 유생은 최 씨를 따라갔다가 최 씨를 납치해 간 장군과 우연히 마주치고, 장군은 여승을 수상히 여겨 멀리 내쫓는다.", "notes": []}, {"orig": "이때 유생은 장군에게 쫓겨 나와 원촌(遠村)에 숨어서 오직 깊은 산과 은밀한 곳을 살피고 있었다. 이때 부처님이 도우시고 하늘이 가르쳐 주어 물을 따라가다가 바람이 통하는 굴을 찾을 수 있었다. 통하는 구멍이 작았지만 그 안은 몇 사람이 머물 수 있을 만큼 넓었다.게 기뻐하며 여기에 머물러 몸을 숨기고 마을에서 얻어 온 양식으로 연명하며 엎드려 지냈다.", "notes": ["서술자가 개입하여 인물의 처지에 대해 안타까운 감정을 직접 드러내고 있다 -> {편집자적논평}", "위기의 상황에서 {초월적힘}의 도움으로 은신처를 발견했다는 우연성"]}, {"orig": "마침 그곳은 장군의 집 뒷산이었다. 유생이 이곳에 머무르며 낮에는 바위 구멍에 숨어 지내다 밤이 되기를 기다려 인적이 끊기는 야삼경에 장원 밖에 와서 두루 살펴보았으나 실로 들어갈 곳이 없었다. 여러 날이 지나도록 아무런 대책이 없자 유생도 어찌할 바를 몰라 장탄식이 밤낮으로 끊어질 때가 없었다.", "notes": []}, {"orig": "이때 최 씨는 식음을 전폐하고 항상 하늘을 우러러 탄식하고 슬피 울기를 그치지 못하였는데, 하루는 정부인이 최 씨를 불러 달래며 말하였다.", "notes": []}, {"orig": "“소저가 여기에 이른 지 벌써 몇 해가 지났습니다. 그사이 제 자식이 오히려 소저를 핍박하지 않은 것은 이로써 소저를 위로하기 위해서였습니다. 우리 아들의 청춘이 이제 저물어 가고 소저의 나이도 적지 않으니 혼례를 이루어 길이 복록을 누리도록 하십시오. 이제 그만 마음을 돌려 부부의 연을 맺고 자식을 낳아 기름이 이치에 맞는 일일 것입니다. 이제 택일하여 조만간 혼례를 치를 것이니 모름지기 소저는 고집하지 마십시오.”", "notes": ["유생의 {은신처}로 기능할 수 있음"]}, {"orig": "최 씨가 다 듣고는 너무 놀라고 치욕스러워 곧바로 맑은 물에 귀를 씻으려 하였다. 그러고 나서 한참 뒤에 최 씨가 대답하여 말하였다.", "notes": []}, {"orig": "“저의 신세가 이러하니 더욱 죽는 것이 마땅하옵니다. 어찌 다른 말이 필요하겠습니까?”", "notes": ["최 씨를 회유하여 자신의 아들(장군)과 혼인시키려는 장 부인의 말로 유생과 최 씨의 결합을 방해하는 {현실적장애물}임"]}, {"orig": "말을 마치자마자 붉은 치마를 떨치고 일어나 거처로 돌아가니, 정 부인이 최 씨의 뜻이 한결같음을 보고 크게 근심하였다.", "notes": ["정 부인의 회유를 거절하며 {죽음}으로써 정절을 지키겠다는 최 씨의 {의지}가 표출됨"]}, {"orig": "장군은 핍박하여 혼례를 치를 뜻이 다급하여 혼삿날이 아직 이르지 않았음을 안타깝게 여겼지만, 최 씨는 날이 갈수록 더욱 심신이 초조하여 빨리 죽고자 할 뿐이었다. 그러나 유생의 정성을 생각하니 차마 죽을 수가 없어서 숨죽여 오열하며 어찌할 바를 몰랐다.", "notes": []}, {"orig": "그러던 어느 날 밤, 이부자리에 기대어 잠깐 졸다가 한 꿈을 꾸었는데, 어떤 여승이 앞에 다가와 이렇게 말하였다.", "notes": []}, {"orig": "“나는 금산사 부처로다. 네 지아비의 정성에 감동하여 두 사람을 돕노라. 지금 장원 밖에 유생이 와 있으니 바삐 나가 달아날 기약을 정하여라.", "notes": []}, {"orig": "이 말을 듣고 최 씨가 놀라 깨어 보니 잠결에 꾼 한바탕 꿈이었다. 그러나 마음속으로 부처님이 꿈에 지시한 것이 헛된 적이 없었으니 어찌 믿지 않을 수 있겠는가 하고 밖으로 나왔다. 그러고는 장원을 향하여 축원을 올리며 말하였다.", "notes": []}, {"orig": "“아득하고 아득한 하늘이시여! 저의 이 모습을 알고 계신다면 여기서 벗어날 계책을 가르쳐 주시옵소서. 그리하여 유생과 저의 쇠잔한 목숨을 구해 주시옵소서.”", "notes": []}, {"orig": "그런데 이때 마침 유생이 담장 안의 동정을 살피고 있다가 최 씨가 하늘에 애원하는 목소리를 들었다. 기에 답하여 말하였다.", "notes": ["최 씨의 {단호}한 태도와 뜻을 이루지 못할까 염려하는 정 부인의 심리"]}, {"orig": "“낭자가 옛 정인을 아직도 그리워하거든 서로 만날 기약을 정해 알려 주십시오.”", "notes": ["유생이 최 씨의 목소리를 우연히 듣게 된다. -> 고전 소설의 특징인 {우연성}"]}, {"orig": "최 씨가 이렇게 답하는 말을 들어 보니, 너무나도 분명한 유생의 목소리였다. 그 신기하고 반가움을 무슨 말로 표현할 수 있으리오.", "notes": ["담장 안 최 씨의 목소리를 듣고 자신의 정체를 암시하며 {재회의사}를 확인하는 유생의 말"]}, {"orig": "", "notes": ["서술자가 개입 -> {편집자적논평}"]}], "analysis": "이 작품은 주인공 유생과 최 씨가 여러 시련을 극복하고 혼사를 성취하는 과정을 그린 고전 소설이다. 두 주인공은 인척 관계라는 사회적 관습의 벽과, 도적(장군)에 의한 납치라는 {외부적 시련}을 겪게 된다. 제시된 지문에서는 유생이 {여승}으로 변장하여 최 씨가 갇힌 서해무릉으로 찾아오고, 초월적 조력자인 부처의 도움(꿈)을 통해 두 사람이 극적으로 재회하는 장면이 그려진다. 또한 장군의 어머니인 정 부인의 회유에도 굴하지 않고 죽음으로 정절을 지키려는 최 씨의 태도를 통해, 제도와 폭력에 굴하지 않고 사랑을 지키려는 인물의 주체적인 의지를 보여준다. 위기의 순간마다 비현실적 {조력자}가 개입하여 사건을 해결하는 것은 고전 소설의 전형적인 특징인 {전기성}을 잘 보여준다."}, {"author": "작자미상", "work": "반씨전", "genre": "가정소설", "lines": [{"orig": "[앞부분 줄거리] 위윤, 위진, 위준 삼 형제는 각각 반 씨, 채 씨, 맹 씨를 아내로 맞이한다. 맏며느리 반 씨는 어질지만, 두 동서는 반 씨를 시기하고 모함한다. 시어머니 양 씨는 반 씨의 진심을 알고, 두 며느리를 꾸짖는다.", "notes": []}, {"orig": "채 씨가 분함을 참지 못하여 양 부인께 하직하고 맹 씨와 더불어 서로 이별할새, 채 씨 왈,", "notes": []}, {"orig": "“이제는 그대도 외로운지라. 반 씨의 참소를 어찌 견디리오. 필경은 잔명을 보전치 못할 것이니, 빨리 본부로 돌아가 있음이 가하리로다.”", "notes": ["채 씨 자신의 잘못을 뉘우치기는커녕 반 씨를 모함하며 맹 씨에게 친정으로 돌아갈 것을 종용하는 {적반하장}의 태도"]}, {"orig": "맹 씨 탄식 대 왈,", "notes": []}, {"orig": "“첩도 미상불* 그러하올 줄 아오되, 존고*께서 아직 있으라 하시니 임의로 못 하거니와, 얼마나 오래 견딜 수 있을꼬.”", "notes": ["채 씨의 말에 동조하며 반 씨에 대한 {적대감}을 드러내는 맹 씨의 모습"]}, {"orig": "하고, 서로 눈물을 뿌려 이별하고 돌아가니라.", "notes": []}, {"orig": "차설,본부에 돌아와 부모 슬하에 배알하고 그간 존후를 묻자오니, 부모와 집안 전체가 대경하여 그 연고를 물으니, 채 씨가 눈물을 머금어 양 씨가 반 씨의 참소를 듣고 무죄히 내쳐짐을 이르니, 채영 부부와 부자가 절치부심하여 설분하기를 꾀하더라.", "notes": ["{화제}를 돌려 다른 이야기를 시작할 때 쓰는 고전 소설의 상투적 어휘"]}, {"orig": "차시 좌승상 채영이니, 위엄이 당당하고 권세가 일세에 으뜸일러라. 일찍 아들 일곱이 있어 다 입조하여 명망이 조야에 진동하고 천자가 승상의 부자를 총애하사 은권이 조정에 따를 이 없더라.", "notes": ["{동시간대} 다른 장소의 일을 서술할 때 쓰는 고전 소설의 상투적 어휘", "서술자가 {주관적판단}을 통해 인물의 위세를 강조하는 {편집자적논평}이 나타남"]}, {"orig": "차시에 채 승상이 딸의 말을 듣고 대로 왈,", "notes": []}, {"orig": "“내 사람을 살피지 못하여 교양이 없어 말과 행동이 서투르고 무식한 집에 딸을 출가시켰다가 문호에 욕이 미치게 하니 어찌 분한치 아니하리오.”", "notes": []}, {"orig": "하고, 이에 천자로 더불어 의논하고 표를 올려 반옥과 위윤의 죄상을 주달하니, 차시 위 시랑이 경사에 와 벼슬에 나아가매 청렴 정직하여 직분을 수행함에 일호라도 구차함이 없으니,상이 위윤의 재주를 기특히 여기사 벼슬을 돋우어 예부 상서를 시키시니, 위 상서가 천은에 숙사하고 돌아왔으나, 고향 소식을 알지 못하여 아침저녁으로 부모님께 문안드리고 싶은 마음이 간절하더니, 문득 반 씨의 종형 직금랑 반희가 궐중에 들어갔다가 나오는 길에 위 상서를 보고 예필 후 이르되,", "notes": ["{서술자}가 인물의 성격을 직접 제시하고 있음"]}, {"orig": "“금일 간에 채영의 아들 채원의 상소를 보니, 형의 허물과 숙부의 죄과를 고달하되, ‘숙부가 병부 상서로 성총을 가리어 상벌이 분명치 못하니, 이는 기군망상*한 죄인이라. 민심을 산란케 하니, 위윤과 반옥을 함께 참하여 민심을 안정케 하여지이다.’하였으니, 알지 못하겠노라. 이런 일이 있나니이까.”", "notes": ["채영이 천자에게 상소를 올리는 것은 가정 내의 갈등이 {공적영역}으로 확대된 결과이다"]}, {"orig": "상서가 앙천 탄 왈,", "notes": []}, {"orig": "“이는 간인이 있어 모해함이라. 그러나 어찌 기군이라 하는고. 이제 그저 있지 못하리니 궐하에 대죄하리라.”", "notes": []}, {"orig": "희 왈, / “들으니 형이 채가와 불화가 있다 하더라.”", "notes": []}, {"orig": "하거늘, 상서가 탄식하고 궐하에 나아가니, 반희가 참연하여 하더라.", "notes": []}, {"orig": "상이 상소를 보시고 대로 왈,", "notes": []}, {"orig": "“짐이 어찌 사람을 그릇 쓰리오. 위윤은 청렴 강직하고 반옥은 충실의 후예라 짐이 수족을 삼았더니, 이제 참언이 여차하니 가장 통해하도다*.”", "notes": ["위윤과 반옥의 됨됨이를 {신뢰}하며 간신들의 참소를 {안타까워}하는 천자의 심리"]}, {"orig": "채영이 주 왈,", "notes": []}, {"orig": "“위윤과 반옥은 일대 소인이라. 두렵건데 후환이 있을까 하나이다.”", "notes": ["자신의 권력을 이용해 위윤과 반옥을 {모함}하는 채영의 악행"]}, {"orig": "제신이 다 채영의 권세를 두려워하여 상고묵묵*이라. 상이 위·반 이 인을 아끼시나 조신 중 일인도 변백*치 못하는지라, 할 수 없어 위윤은 장사에 원찬하고*, 반옥은 강동에 정배하시고 탄식해 마지아니하더라.", "notes": ["채영의 위세에 눌려 충신을 보호하지 못하는 조정의 상황과 악인이 득세하여 선인이 {고난}을 겪게 되는 위기 상황"]}, {"orig": "(중략)", "notes": []}, {"orig": "화설 채 씨는 흥이 스승을 얻어 글을 배운다 하되, 기이한 선관이 밤마다 임한다 함을 듣고 위진에게 이 말을 일러 왈,", "notes": ["새로운 국면으로 {전환}될 때 쓰는 고전소설의 상투적 어휘"]}, {"orig": "“반 씨가 삼 년이나 나오지 아니함을 괴이히 알았더니, 원래 이같이 음일*한 행사가 낭자하니 이제 바삐 처치하소서.”", "notes": ["반 씨와 그 아들 위흥을 제거하기 위해 {거짓말}로 남편 위진을 부추기는 채 씨의 {간악함}"]}, {"orig": "위진이 대로하여 이날 밤에 창두 이십여 인을 보내어 반 씨 모자를 죽이려 할새, 이에 분부 왈,", "notes": []}, {"orig": "“너희는 반 씨의 여막에 가 불을 놓고 반 씨 모자를 불의에 들이치면 마땅히 중상하리라.”", "notes": []}, {"orig": "하니, 창두가 저마다 용약하여 일시에 가니라.", "notes": []}, {"orig": "차시에 반 씨는 정히 혼미하여 잠깐 졸더니, 비몽사몽간에 일위 부인이 대호 왈,", "notes": []}, {"orig": "“미구에 액이 당도하였거늘 무슨 잠을 자느뇨.”", "notes": ["반 씨가 꿈에서 일위 부인의 경고를 듣고 위기를 모면하는 것은 반 씨가 지닌 {도덕적정당성}이 {초월적존재}를 통해 보호 받고 있음을 드러냄"]}, {"orig": "반 씨 놀라 깨달으니 침상일몽이라. 또 들으니 또 이르되,", "notes": []}, {"orig": "“어서 피하라. 만일 지체할진대 가히 면치 못하리라.”", "notes": ["꿈속에 나타난 초월적 존재가 반 씨 모자에게 닥칠 위험을 미리 경고하여 피신을 돕는 {전기적요소}가 나타남"]}, {"orig": "반 씨 대경하여 급히 흥을 불러 이 말을 이르니, 흥이 놀라 왈,", "notes": []}, {"orig": "“이는 반드시 왕모의 혼령의 가르침이라. 바삐 피하사이다.”", "notes": ["반 씨 모자가 꿈의 내용을 {신뢰}하는 모습"]}, {"orig": "하고, 모친을 붙들어 한 뫼를 넘어가 부인을 바위틈에 앉히고 뫼에 올라 바라보니, 벌써 집에 불이 일어나고 무수한 사람이 두루 다니며 요란하거늘, 급히 돌아와 모친께 고 왈,", "notes": []}, {"orig": "“만일 도적 같으면 우리를 찾을 바 없거니와, 우리를 방문하여 찾아보니 매우 의심스러운지라. 이곳에 있지 못할지니 멀리 가사이다.”", "notes": []}, {"orig": "하고, 모친을 인도하여 산곡으로 들어가니, 천지가 아득하여 갈 길이 묘연하고 기력이 점점 쇠진하니 모자가 서로 붙들고 통곡하더라.", "notes": []}, {"orig": "이때 문득 ⓑ한 노인이 이르러 문 왈,", "notes": []}, {"orig": "“그대는 어떤 사람이관데 적막한 산중에서 이같이 방황하며 슬퍼하느뇨.”", "notes": ["위기 상황에서 반 씨 모자를 도와줄 {조력자}의 등장"]}, {"orig": "흥이 대 왈, / “깊은 밤에 길을 잃고 정신이 아득하여 우나이다. 원컨대 대인은 길을 인도하소서.”", "notes": []}, {"orig": "노인이 웃어 왈, / “공자가 과도히 놀랐도다.”", "notes": []}, {"orig": "하고, 인하여 소매 안으로부터 줄 같은 것들을 내어 주며 왈, / “모자가 하나씩 나눠 먹으라.”", "notes": ["신비한 물건을 통해 반 씨 모자의 심신을 {안정}시키고 문제를 해결해 주는 초월적 조력자의 역할"]}, {"orig": "하니, 흥의 모자가 받아먹으매 문득 정신이 쇄락한지라. / 정히 사례코자 하더니, 노인 왈,", "notes": []}, {"orig": "“나는 이 산을 지키는 신령이더니, 양 부인의 청을 듣고 그대 모자를 구하노라.”", "notes": ["죽은 시어머니(양 부인)가 사후에도 며느리와 손자를 지키려 함을 보여주는 {전기적요소}가 나타남"]}, {"orig": "하고 문득 간데없거늘, 흥이 공중을 우러러 무수히 사례하고 모친을 모셔 양강에 이르니, 부인이 통곡하여 왈, / “친정이 비록 서로 허물없이 가깝게 지내나 이 거동으로 어찌 촌중에 들어가리오.”", "notes": []}, {"orig": "흥이 위로하며 모셔 외가 반부를 찾아 나아가니, 유 부인이 여아를 보고 크게 반기며 흥이 이같이 장성하여 수미함을 보고 반기는 중, 반 공과 위 상서가 원찬됨이 슬퍼 모녀가 서로 위로하더라.", "notes": []}, {"orig": "*미상불: 아닌 게 아니라 과연. *존고: ‘시어머니’를 높여 이르는 말.", "notes": []}, {"orig": "*기군망상: 임금을 속임. *통해하다: 몹시 이상스러워 놀랍다.", "notes": []}, {"orig": "*상고묵묵: 서로 돌아보며 아무 말 없이 잠잠함. *변백: 옳고 그름을 가려 사리를 밝힘.", "notes": []}, {"orig": "*원찬하다: 먼 곳으로 귀양 보내다. *음일: 마음껏 음탕하게 놂.", "notes": []}], "analysis": "이 작품은 위씨 가문의 세 형제와 그 아내들 간의 갈등을 중심으로 한 {가정소설}로, 여자 동서 사이의 알력과 복수, 고부 갈등, 형제간 갈등 등 다양한 가족 내 분쟁을 다루고 있다. 특히 중국을 배경으로 여자 동서들 사이에 벌어지는 {가정비극}을 중심에 두고 전개된다. 위 승상의 둘째 아들 위진의 부인 채 씨와 셋째 아들 위준의 부인 맹 씨는 큰아들 위윤의 부인 반 씨의 착함을 시기해 {모해}한다. 시모 양 부인에 의해 친정으로 쫓겨난 채 씨는 부친의 권세를 이용해 반 씨의 남편 위 상서를 유배 보낸다. 이 일로 양 부인은 병사하고, 채 씨가 반 씨를 음녀로 몰아가자 반 씨는 선계로 피신한다. 이후 반 씨의 아들 위흥이 과거에 장원 급제하여 돌아와 가문에 얽힌 문제를 해결한다. 이 작품은 악인들의 개과천선보다는 {권선징악}의 주제를 강조하며, 황제가 악인들을 처벌하고 훈계함으로써 가정의 비극을 마무리 짓는다."}, {"author": "작자미상", "work": "현몽쌍룡기", "genre": "가문소설", "lines": [{"orig": "[앞부분 줄거리] 송나라의 상국 조숙과 부인 위 씨는 신이한 꿈을 꾸고 두 아들 용홍과 용창을 얻는다. 대원수의 기질을 가진 용홍과 승상의 기품을 가진 용창이 각각 금가락지와 은가락지의 인연과 이어질 것이란 예언을 들은 조 공은 아들 용홍을 금가락지의 인연인 정채임과 정혼시킨다. 이후 채임의 부친 정 참정이 계모의 모함만 믿고 채임을 다른 곳에 시집보내려 하자, 채임은 시녀들과 함께 남복을 하고 도망치다가 나쁜 이들에게 쫓겨 강물에 몸을 던진다. 그 근처를 지나가던 용홍과 용창은 우연히 이들을 구한다.", "notes": ["여성 주인공이 활동의 제약을 극복하고 위기를 피하기 위해 {남장}을 하는 {남장모티프}가 사용됨"]}, {"orig": "용홍과 용창은 물에 빠져 죽으려 하던 두 명의 서동을 불러 좌우의 사람들을 물러가게 하고 물었다.", "notes": []}, {"orig": "“우리는 서울로 가던 길인데 너희 등 노비와 주인 세 명이 물에 빠져 죽으려 하는 것을 보았다. 사람의 마음이 슬프고 매우 놀라서 구하였다. 너희와 주인을 보니 몸 위에 두건과 의복이 있으나 결코 남자가 아니다. 무슨 까닭으로 떠돌아다니느냐? 실상을 속이지 마라. 우리들은 결단코 너희에게 해를 주지 않을 것이다.”", "notes": ["물에 빠진 사람들을 구한 조 공자 형제가 정 소저 일행이 {남장}을 하고 있음을 {간파}하고 그 사연을 묻고 있음"]}, {"orig": "춘앵과 벽란이 생각지도 못했는데 죽은 몸을 물에서 건져 내어 살려 주고 근본을 묻는 것을 들으니 매우 의심스럽고 괴이하다고 생각하며 다시 눈을 들어 두 공자를 보았다. 풍채가 시원하고 깨끗하며 골격이 비상하고 아름다운 얼굴과 별 같은 눈과 누에가 누워 있는 듯한 두 눈썹으로 인간 세상에서 뛰어났다. 반악(潘岳)*의 고움과 위개(衛玠)*의 미려함을 비웃는 듯하였다. 춘앵과 벽란이 크게 마음속 깊이 존경하며 복종하고 두 공자의 선함을 칭찬하였다. 벽란 등이 마음속으로 생각하였다.", "notes": ["중국 고사의 인물을 인용하여 조 공자 형제의 외모가 매우 뛰어남을 {비유적}으로 표현함"]}, {"orig": "‘죽은 몸을 건져 내어 살려 주고 근본을 물으며 저 상공이 남녀를 자세히 구별할 줄 알고 하물며 우리 노비와 주인을 살려 내어 다시 살려 준 은혜가 매우 크다. 두 공자의 어진 덕이 눈빛에 나타나니 의연히 성인군자구나. 결단코 우리에게 해를 줄 사람이 아니니 우리 소저의 슬픈 한을 바른대로 고하여 처리하는 것을 보아야겠구나.’", "notes": ["시비들은 조 공자 형제의 비범함과 인품을 {신뢰}하여 자신들의 처지를 사실대로 밝히기로 함"]}, {"orig": "이에 눈물을 떨어뜨리며 공경히 받들어 사례하며 말하였다.", "notes": []}, {"orig": "“천인(賤人)들은 민가의 시비이고 남자는 아닙니다. 우리 소저께서 태평성대에 액경(厄境)*이 남달리 심하여 남자의 옷을 입고 유리하여서 타인을 대하여 근본을 자세하게 아뢰지 못하옵니다. 강도의 흉악한 자취가 목전에 급하여 천금 같은 몸을 강물에 던져 속절없이 노비와 주인이 물고기의 배를 채울 뻔했는데, 상공의 자비하고 어진 마음을 만나게 되었고 상공의 살려 주신 은혜는 태산 같습니다. 감히 묻사온데 상공의 존귀한 성과 커다란 이름을 알고 난 후에 저희들의 지극한 원통함을 다 고하고자 합니다. 원컨대 귀댁의 시비 항렬에 들어가 은덕을 만분지일이나 갚고자 합니다.”", "notes": ["{남장}을 할 수밖에 없었던 정 소저의 불가피한 사정과 위급했던 상황을 솔직하게 털어놓음"]}, {"orig": "두 공자는 두 사람의 언사가 민첩하고 재능이 세상을 뒤덮을 충의를 지닌 시비임을 보고 민가의 시비가 식견이 원대함을 계속해서 칭찬하며 말하였다.", "notes": []}, {"orig": "“너희들이 주인을 위하는 충성스러운 마음은 가히 기특하다. 우리는 조 상국 자제로 선영(先塋)에 절사(節祀)를 지내고 돌아오는 길이다. 너희들이 서울 사람이면 조 상국을 모르지 않을 것이다.”", "notes": []}, {"orig": "벽란 등이 다 듣고 난 후에 이 사람이 자기 소저가 정혼하고 빙폐*를 받은 조 공자 형제라는 사실이 요행스러웠으며 기특하고 다행스럽다고 생각하였으나 소저의 뜻을 몰라 아뢰었다.", "notes": ["자신들을 구해준 이가 정 소저의 정혼자인 조 공자임을 알게 된 시비들이 {안도}하면서도 정 소저의 의사를 먼저 확인하려 함"]}, {"orig": "“천인이 무식하여 주인의 휘자를 자세히 알지 못하니 소저께 물어서 자세히 아뢰겠습니다.”", "notes": []}, {"orig": "그런 후에 선창 안에 들어가 소저께 조 공자와 문답한 일을 일일이 고하였다. 소저가 매우 놀라며 말하였다.", "notes": []}, {"orig": "“내가 외가로 가지 않고 구차하게 길가에서 분주하게 다닌 것은 조 숙모에게 부끄럽고, 아버지의 허물을 드러내고 싶지 않아서였다. 뜻밖에 저 공자들을 만나니 내가 차마 사실을 말하여 부끄러움을 더하겠는가? 은인의 덕이 산과 바다 같으나 차마 근본을 아뢰게 되어 저 집에서 우리 집의 허물을 알게 되면 매우 부끄럽게 될 것이다. 모름지기 너는 다만 대답하기를 내가 타향에서 떠돌아다니다가 서울의 친척을 찾으러 왔다가 도적을 만나 물에 빠져 죽을 뻔했다고 말하여라. 조 공자가 이미 우리가 여자인 줄을 알았으니 남녀는 구별이 있는 것이다. 생명을 구해 준 은혜에 몸소 사례하지 못함을 아뢰어라.”", "notes": ["정 소저가 집안의 허물이 알려지는 것을 두려워하여 자신의 {신분}을 밝히지 않으려 함", "정 소저의 행동은 개인의 자존심보다 {가문의위상}을 더 중요하게 생각했기 때문에 아버지의 허물을 드러내지 않으려는 효심과 가문의 명예를 지키려는 의도에서 비롯된 것이다"]}, {"orig": "벽란과 춘앵이 굳이 근본을 이르지 말라는 소저의 말을 듣고 나와서 상의하여 말하였다.", "notes": []}, {"orig": "“이제 하늘이 도와주셔서 조 공자를 만났으나 어찌 차마 좋은 기회를 놓치게 되면 우리 주인과 노비는 어디에 의지하며 소저의 백년가약을 어느 날 이루겠는가? 우리들이 가만히 사실을 아뢰어 조 공자가 일을 처리하는 것을 보아야겠구나.”", "notes": ["생명의 은인 앞에서도 직접 대면을 꺼릴 만큼 남녀유별이라는 당대의 {유교적가치관}이 반영됨"]}, {"orig": "이에 조 공자의 안전에 나가 말하였다.", "notes": []}, {"orig": "“우리 소저께서는 타향에서 떠돌아다니시다 친척을 찾으러 왔다가 도적을 만나 물에 빠져 죽게 되었습니다. 은인께서 생명을 구해 준 은혜를 입어 남은 목숨을 회생하게 되었습니다. 우리 소저께서 은혜는 태산 같사오나 몸소 사례치 못함을 아뢰라 하셨습니다.”", "notes": []}, {"orig": "조 공자들이 크게 아쉬워하고 섭섭해하며 어떻게 일을 처리할까를 마음속 깊이 생각하고 주저하고 있었다. 두 명의 시비가 다시 머리를 조아리며 말하였다.", "notes": []}, {"orig": "“소저께서 차마 상공께 근본을 바로 고하지 못하여 이리하였습니다만, 저희들이야 상공을 만나 사실대로 고하지 아니하겠습니까? 더욱 대공자는 저희들의 주군이시고 은인이시니 어찌 숨기는 죄를 더하며 주인의 평생을 매몰되게 하겠습니까? 저희의 주인은 정 참정의 딸로 외가에서 조 공자와 정혼하였습니다. 그러나 소저가 본댁으로 돌아오신 후에 가내에 어질지 못한 사람이 있어서 수많은 방법으로 정 참정을 보채고 소저를 재해에 빠지게 하였습니다. 마침내는 소저를 정 참정 부인의 사촌인 박수관의 후실로 위협하고 명령하여 시집보내려 하였습니다. 그래서 소저가 외가로 가시고자 하나 석공 어르신께서 성품이 엄숙하셔서 반드시 정 공과 더불어 큰 사달을 일으키실 것이라 생각하였습니다. 일의 형세가 매우 난처하여 소저께서는 남장으로 바꿔 입고 소저의 고모이신 강가의 이 평장 부인을 찾아가 의지하고자 하셨습니다. 그러나 이 평장 부인이 이사를 가신 지 수일이 지났고 가신 곳을 모르기 때문에 강변에서 방황하시다가 따르는 도적을 만나서 소저께서 억울하고 원통하게도 강물에 몸을 던졌습니다. 상공께서 저희의 목숨을 살려 주신 은혜를 만나 주인과 노비 세 사람이 살아나니 이 은덕은 분골쇄신하더라도 다 갚지 못할 것입니다.”", "notes": ["절체절명의 위기 상황에서 우연히 정혼자를 만나게 되는 {전기적}요소를 통해 하늘이 정한 연분임을 강조함", "시비들은 정 소저의 지시를 따르지 않고 조 공자에게 사실대로 말하는 행동은 주인의 앞날과 정혼자의 결연을 돕기 위한 {충성심}에서 비롯된 것이다", "두 시비는 정 소저의 비밀을 고지하는 {매개자} 역할로 정 소저와 조 공자 사이의 정보 불균형을 해소하는 역할을 한다"]}, {"orig": "두 공자가 이 말을 들으니 참혹함은 말할 것도 없고 정 소저의 굳은 절개와 아름다운 행동은 깊이 사람을 감동시킬 만하였다. 또한 그 계모 박 씨가 자애롭지 못해 이 변을 일으킴을 짐작하고 사람의 마음이 자연스럽게 측은하였다. 정 소저의 절행이 빼어나 자기를 위하여 온갖 고생이 이 지경에 미쳤음에 감복하고 하물며 평생의 아름다운 배필과 하늘이 정한 연분이 심상치 않다는 것을 알았다. 용홍 공자의 두 눈에는 가을 물처럼 고운 광채가 어리었다. 용홍이 말하였다.", "notes": ["정 소저가 위기를 피하기 위한 수단으로 {남장}을 선택함"]}, {"orig": "“소저의 수많은 고초와 슬픈 한이 이 조생을 위함이니 어찌 감사하지 않겠는가? 너희들은 우리가 집에 들어가 일을 처리할 사이에 소저를 보호하라.”", "notes": []}, {"orig": "이에 둘째 공자와 의논하고 본부의 강정이 여기서 멀지 않은 까닭에 한 대의 교자를 세내어 소저를 태우고 강정에 이르렀다. 여러 명의 노복이 서서 정 소저를 지켰으며 안채에서는 두 명의 시비가 지키고 가늘고 길게 누에고치를 쳐서 길쌈하여 정 소저에게 올렸다.", "notes": []}, {"orig": "두 공자는 정 소저의 근본을 모르는 체하고 강정에 잠깐 몸을 숨길 것을 청하였다. 소저는 이 지경에 이르러 몸을 숨길 곳을 얻지 못하고 있다가 벽란 등이 자기 근본을 밝히고 믿음직스럽고 조심스럽게 자신을 보호함을 모르고 있었다. 소저는 두 공자가 종내 살 도리를 이끌어 주는 것에 감사해하고 설움을 참고 부끄러움을 견디며 강정에 이르렀다.", "notes": ["정 소저가 강물에 몸을 던지면서까지 정혼자와의 {신의}를 지키려고 한 모습에서 {유교}적 덕목인 절(節)의 가치를 확인할 수 있음"]}, {"orig": "두 공자가 종에게 명령하여 깊고 안정한 처소를 치우고 정리하여 소저를 편안하게 안정시키고 아침저녁의 음식을 각별히 조심해서 올리라고 말하였다. 또한 포진(鋪陳)과 병풍과 장막을 정결히 하여 정 소저를 머무르게 하고 집 안팎의 비복에게 엄하게 당부하여 이곳에 소저가 있다는 것을 누설치 말라고 하였다. 춘앵 등에게 당부하여 자신의 처치를 기다리라고 하고 또 소저에게 말을 붙였다.", "notes": ["{서술자}가 직접 작품에 개입하여 정 소저의 사연에 대해 감동시킬 만하다라고 평가를 내리고 정 소저의 {절개}와 {행동}을 칭찬함 -> {편집자적논평}"]}, {"orig": "“소생이 비록 소저의 사정을 알지 못하지만 소저의 재앙이 대단하십니다. 마침 제게 누추한 집이 있고 종이 안팎으로 많으니 안심하고 화를 피할 곳입니다. 가볍게 몸을 물에 던지지 마십시오. 저의 아버지께서 평생 적선(積善)을 일삼으시니 돌아가 아뢰어 혹시라도 소저께 유익함이 있을까 합니다.”", "notes": ["여성 독자들에게 유교적 덕목을 강조하는 교훈적 성격과 {영웅적}인 여성을 동경하게 만드는 통속적 재미가 나타남"]}, {"orig": "말을 마치고 형제가 말 머리를 나란히 하여 도성으로 향하면서 다시 소저 보기를 청하지 아니하고 표연히 떠났다. 벽란 등은 탄복하고 기뻐하였으나 소저는 자기 형세가 이 지경까지 미쳐서 외간 남자를 상대하고 그들의 손에 의해 물에서 건져져서 살게 된 것을 생각하니 심신이 놀라 달아날 것 같았다. 그러나 요행히도 그 남자가 조 공자여서 몸을 절간에 의탁하고 평생을 마치며 조 공자의 은혜를 생각하려고 하였다. 그러나 얼음과 옥같이 깨끗한 마음에 이렇듯이 자신의 운수가 두루 기이하고 괴이함을 슬퍼하며 이 또한 운명이라고 생각하였다. 소저는 깊이 집 안에 있으면서 아침저녁의 음식 걱정이 없고 욕됨이 없었다. 두 명의 시비와 더불어 조생의 의기를 감탄하였으나 두 공자가 자기 근본을 들은 줄은 조금도 알지 못했다.", "notes": ["조 공자 형제는 정 소저를 배려하여 정체를 아는 내색을 하지 않음으로써 독자에게 {정보}의 격차에서 오는 흥미를 유발함"]}, {"orig": "*반악: 서진(西晉)의 문학가. 어릴 때부터 신동(神童)이라 불렸고, 용모가 준수하였음.", "notes": []}, {"orig": "*위개: 진(晉)나라 안읍(安邑)의 사람으로, 뛰어난 외모와 수려한 인품으로 알려짐.", "notes": []}, {"orig": "*액경: 모질고 사나운 운수의 고비.", "notes": []}, {"orig": "*빙폐: 혼례를 올릴 때 신랑 측에서 신부 측에 보내는 예물", "notes": []}, {"orig": "", "notes": ["조 공자 형제가 정 소저를 안전하게 보호하고 부모님께 이 사실을 알릴 시간을 벌기 위해 {비밀유지}를 명령함"]}, {"orig": "", "notes": ["가문의 어른(아버지)의 덕행과 권위를 빌려 문제를 해결하는 모습에서 가문 질서와 화합을 중요시 하는 {가문소설}의 특징이 드러남"]}, {"orig": "", "notes": ["조 공자가 정 소저를 {안심}시키며 부모의 도움을 받아 문제를 해결할 암시를 주고있다"]}, {"orig": "", "notes": ["정 소저는 조 공자의 배려에 감사하면서도 그가 자신의 정체를 알고 있다는 사실은 모르는 상태로 인물 간 {정보불균형}이 지속됨"]}, {"orig": "", "notes": ["이러한 {정보불균형}을 통해 이후에 전개될 사건에 대한 독자의 호기심과 {긴장감}을 유발함"]}], "analysis": "이 작품은 작자, 연대 미상의 고전 소설로 조용홍과 조용창 형제의 영웅적 활약과 결연 과정을 다룬 {가문소설}이다. 제시된 부분은 조용홍이 정혼자인 정 소저를 우연히 구해내고 인연을 맺어가는 과정을 그리고 있다. 특히 이 대목은 통속적인 흥미 요소가 두드러지는데, {남장}을 한 여인의 정체가 드러나는 과정, 정 소저가 자신의 신분을 숨기려는 태도와 이를 이미 알고 있는 조 공자 사이의 ‘{정보의격차}’가 독자의 몰입을 돕는다. 또한, 정 참정과 계모로 인한 혼사 장애 갈등이 조 공자 형제의 도움으로 해소되는 국면을 보여주며, 이는 당시 유교적 가치관 내에서 가문의 번영과 화합을 지향하는 주제 의식을 반영하고 있다. 작품은 전반적으로 {가부장제}하의 이상적인 가족상과 영웅적 면모를 강조하며, 훗날 ‘조 씨 삼대록’으로 이어지는 가문 소설의 전형적인 특징을 보여준다."}, {"author": "심의", "work": "대관재몽유록", "genre": "몽유록계 소설", "lines": [{"orig": "바로 그날 단기(單騎)로 길을 떠났는데, 다만 첨두노(尖頭奴)* 몇 명만 데리고 밤낮을 가리지 않고 갔다.浥%이 채 못 되어 적의 성채로 달려갔더니 무기가 햇빛에 번쩍이며 세 겹으로 에워싸고 있었다. 내가 기(氣)를 돋우어 입술을 벌리고 한 번 휘파람을 불었더니 적은 용기를 잃었고, 두 번 불었더니 만 명의 기병이 북쪽으로 달아났다.浥% 소리가 점점 멀어지자 채색 구름이 자욱하게 가리었고, 난새와 봉황이 엇갈려 날았으며, 바다와 산이 변색하고 천지가 떨리고 흔들렸다. 몇 되지 않은 모든 반적들은 바람에 쓰러지듯이 달아나고 흩어졌다.  적장 김시습浥%두 손을 앞으로 묶고 투항하며 말했다.", "notes": []}, {"orig": "“뜻밖에 문단의 노장 심 공께서 오셨구려!”浥%", "notes": []}, {"orig": "나는 노포*를 걸고 개선가를 불렀다.  천자께서 크게 기뻐하시고 상을 내리셨으며, 좌우를 돌아보며,", "notes": []}, {"orig": "“옛날에 긴 휘파람으로 오랑캐의 기병을 물리친 일이 있었거늘, 이제 경에게서 그것을 보았노라.”", "notes": []}, {"orig": "하고는, 배식사문 경륜일시 진국공신의 호를 내리게 하고, 안동백에 봉했으며, 몇 만의 큰 상을 내리시고 김시습을 폐하여 좌선(坐禪)을 삼았다. 이로부터 위명이 날로 드러나고 임금의 총애가 더욱 커서 매일 새벽에 출근하여 밤에 들어오며 마음을 다하여 나라의 은혜에 보답하였다. 벼슬한 지 10년에 아들을 낳고 손자를 길러 문벌이 빛났으며, 많은 녹을 받아 집안 재산이 넘쳤다浥%경 중에 누가 명함을 내고 보기를 청탁하는 사람이 있으면 번번이", "notes": []}, {"orig": "[ “신하 된 도리로 사사로이 교제할 수가 없습니다.”", "notes": []}, {"orig": "하고는 읍하고 사양했다. 浥%에 있는 백집사들은 음풍농월이나 하며 사치가 몸에 배었으므로, 나와 같이 청렴하고 검소한 사람은 여러 사람의 논란거리가 되었을 뿐이다. 나는 늘 우승상 이규보를 허물하며 대궐에 가서 항소하기를", "notes": []}, {"orig": "“이 아무개는 문장이 경솔부박(輕率浮薄)*하며 나약하고 뼈대가 없어, 비록 귀신처럼 날래지만 귀하지 못합니다. 다른 것은 적지 않습니다.”浥%", "notes": []}, {"orig": "라고 하였더니 천자께서 그 아뢴 것이 옳다 하여 나에게 오거서(五車書)를 내리고 영경연사로 특진을 시키셨다.", "notes": []}, {"orig": "벽부의 가운데뜰에는 옥탑이 우뚝 솟아 있는데 깎고 새겨서 만들었다. 높이가 백 층이며 ‘사단’이란 액자가 걸려 있었는데 종자가 이것을 가리켜 말했다.", "notes": []}, {"orig": "“이 단은 태산처럼 숭고하며 바위나 돌, 나무가 없어 비록 원숭이같이 날랜 것이라도 올라갈 수가 없는데 하물며 사람의 힘이 미치겠습니까?”浥%", "notes": []}, {"orig": "서리가 말했다.", "notes": []}, {"orig": "“단 위에 옥루가 있는데 조정 안의 재사들이 때로 서로 왕래하며 함께 모여 잔치하며 놉니다.”", "notes": []}, {"orig": "하루는 천자께서 조회를 마치고 나서 문득 두 선녀가 난새와 학이 끄는 수레를 타고 나타나더니, 각자 조문희와 사자연이라고 말하면서 바로 황제가 계신 곳으로 가서 말했다.", "notes": []}, {"orig": "“대당 천자이신 두보가 친구 이백을 붙잡아서 사단에 모였습니다. 멀리서 생황과 퉁소 소리를 듣고 탑 위로부터 왔습니다.”浥%", "notes": []}, {"orig": "우리 천자가 깊은 궁궐로부터 나와 조용히 손을 맞잡고 활보하며 단을 향해 날아오르기를 구름같이 하였다. 삼정승과 신하 몇 명이 겨우 중간층에 이르렀으나 다리가 떨려 두려워서 엎드려 한 사람도 시종을 하지 못했다浥%려다보니 한 이서가 문서로 배우의 희롱하는 말을 지어 바지를 치켜들고 억지로 살금살금 걸었지만, 첫 번째 층에도 이르지 못하고 땅에 떨어져 다리가 부러졌다. 보던 사람들이 무릎을 치고 나아가 물었더니 사문 이숙함이었다. 천자께서는 며칠을 머물면서 매우 즐기시다가 옥지를 내리고 말씀하셨다.", "notes": []}, {"orig": "“내가 이하(李賀)를 보고 「옥루기(玉樓記)」를 외우게 하고 왕희지가 쓴 글씨를 벽에 걸게 하였노라.”", "notes": []}, {"orig": "하시고는 크게 탄식하며 말씀하셨다.", "notes": []}, {"orig": "“두 천자는 문장으로 3백 편의 유작이 있고, 따르는 신하와 재자(才子)로는 한유, 유종원, 소식, 황정견 등의 뛰어난 인물들이 있어 짐이 감히 당할 수가 없다. 하물며 짐의 여러 신하 중 한 사람이라도 이들과 같이 재능이 있는 자가 있는가?”", "notes": []}, {"orig": "며칠이 지나 낮 시강을 마치고, 천자께서 정색을 하고 불쾌한 표정으로 글 하나를 보라고 하셨는데 [ 바로 한림 선생이 나를 탄핵하는 상소문이었다.", "notes": []}, {"orig": "“심 모는 속세의 허물을 벗지 못하여 사사로운 욕심이 너무 지나칩니다. 나머지는 적지 않습니다.” 浥%", "notes": []}, {"orig": "라고 하였다. 천자께서는", "notes": []}, {"orig": "“한때의 부질없는 논의를 어찌 마음에 두리오!”", "notes": []}, {"orig": "하고 대관 선생이라는 호를 내리고 고향에 돌아가라고 하면서 손에 술잔을 잡고 나에게 주며 말씀하셨다.", "notes": []}, {"orig": "[ “초목의 산하를 함부로 침범하지 마시오. 조물이 공을 꺼리는 것이 있소. 경의 첩인 옥란은 다시 집안 살림을 맡게 되어 내 명을 기다리게 되었소. 공은 옛날 직분으로 돌아가시오.” 浥%", "notes": []}, {"orig": "나는 머리를 섬돌에 부딪치고 하직하였는데, 눈물이 옷을 적셨다.浥%안 식구를 돌아보아 생각하니 차마 서로 떠날 수가 없었다. 조금 있으니 상국 이색이 등을 쓰다듬으며 협실로 꾀어 들여서 나를 난초 탕에 목욕시키고는 금 칼로 나의 오장육부를 갈라놓고 갈아 놓은 먹물 몇 말을 들어부으며 말했다.浥%", "notes": []}, {"orig": "“40여 년을 기다리면 꼭 여기에 다시 돌아와 함께 부귀를 누릴 것이니 걱정하지 마시오.”", "notes": []}, {"orig": "배가 칼로 찌르는 듯이 아파 갑자기 깨니, 배가 북처럼 부풀어 올랐고, 잔등은 가물가물하는데 병든 아내가 곁에 누워 앓는 소리를 할 뿐이었다浥%", "notes": []}, {"orig": "아! 사람이 세상에 나서 궁달*은 팔자소관이니 어찌 꿈을 깨는 자가 있을 것인가!浥%", "notes": []}, {"orig": "괴이쩍은 이야기를 드러내어 꿈에 겪었던 일을 적는다.", "notes": []}, {"orig": "가정 8년 12월 상한에 심의는 대관재에서 쓰다.浥%", "notes": []}, {"orig": "- 심의, 「대관재몽유록」", "notes": []}, {"orig": "* 첨두노: 붓의 별칭.", "notes": []}, {"orig": "* 노포: 장대에 매달아 전승(戰勝)을 보도하는 표시.", "notes": []}, {"orig": "* 경솔부박: 경솔하고 천박함.", "notes": []}, {"orig": "* 이하: 요절한 당나라의 천재 시인.", "notes": []}, {"orig": "* 초목의 산하: 공자가 편찬한 『시경』의 영역을 비유적으로 일컬음으로써 『시경』이 시가의 표본임을 누구나 인정하는 그 권위를 말함.", "notes": []}, {"orig": "* 궁달: 가난과 부귀.", "notes": []}, {"orig": "", "notes": ["붓을 {의인화}한 첨두노만을 데리고 향하는 모습으로 무력보다 문을 중시하는 작가의 {관념}을 투영."]}, {"orig": "", "notes": ["또한 문인으로서 정체성에 대한 {우의적표현}이 나타남."]}, {"orig": "", "notes": ["휘파람은 주인공이 가진 비범한 능력을  {청각적} 심상을 사용하여 표현함으로써 {전기적}인 요소가 드러난다."]}, {"orig": "", "notes": ["역사적 실존인물을 등장시키되, 작가의 {주관적} 평가에 따라 지위와 역할을 재배치."]}, {"orig": "", "notes": ["김시습을 반란의 우두머리로 설정하고 그가 주인공에 패배하여 투항하게 함으로써 작가가 김시습의 인품을 자신보다 낮게 평가했음을 알 수 있음. 즉 작가의 {주관적} 인물평가가 반영됨."]}, {"orig": "", "notes": ["현실에서 벼슬에 오르지 못하고 가난했던 작가가 꿈속 세계에서 {대리만족}을 얻고있음."]}, {"orig": "", "notes": ["공사를 구분하여 청탁을 거절하는 주인공의 {강직한} 태도."]}, {"orig": "", "notes": ["이규보에 대해 비판적인 평가를 담은 상소로 꿈속 세계가 현실의 권력이 아닌 문장 실력이 중심이 되는 사회임을 보여줌. 인물의 {문장력}을 탄핵의 근거로 삼고 있음."]}, {"orig": "", "notes": ["범접하기 힘들 정도로 {절대적}이고 성스로운 공간임을 강조."]}, {"orig": "", "notes": ["중국의 대표적인 시인 두보와 이백을 등장시켜 문인들이 동경하는 {이상적}인 문인 왕국의 모습은 형상화함."]}, {"orig": "", "notes": ["사단이 지체높은 관리들조차 감당하기 어려울 만큼 {절대적}이고 성스러운 공간임을 드러냄."]}, {"orig": "", "notes": ["한림선생의 탄핵상소는 꿈속세계, 즉 이상세계에서 쫓겨나 현실로 돌아가게 되는 {서사적} 계기가 됨."]}, {"orig": "", "notes": ["주인공의 뛰어난 재능이 {조물주}의 시기를 받을 정도임을 암시하며, 천자가 주인공에게 꿈에서 깨어 현실로 돌아갈 것을 명함."]}, {"orig": "", "notes": ["주인공은 {억울함}을 호소하는 대신 눈물을 흘리며 천자의 명에 따라 하직함."]}, {"orig": "", "notes": ["꿈에서 현실로 돌아오게 하는 비현실적이고 {환상적}인 장치이자 꿈에서 깨게 되는 {직접적}인 원인 행위. 꿈속에서 먹물을 부은 행위가 현실의 통증으로 이어지는 것은 꿈과 현실이 긴밀하게 {연결}되어있기 때문임."]}, {"orig": "", "notes": ["화려했던 꿈속 세계와 비참한 현실상황이 극명한 {대조}를 이룸."]}, {"orig": "", "notes": ["각몽의 과정을 통해 현실-꿈-현실로 이어지는 {몽유록계} 소설의 구조가 확인됨."]}, {"orig": "", "notes": ["빈궁과 영달은 운명에 달린 것이라는 인식을 통해 현실에 대한 체념과 {인생무상}을 드러냄. 서술자가 자신의 정서를 {직접적}으로 노출하고, 운명론적 태도를 통해 인생무상이라는 주제의식을 집약적으로 제시하는 고전소설의 결말처리 방식이 나타남"]}, {"orig": "", "notes": ["시간적 배경의 세밀한 묘사를 통해 창작시기를 명시하고 있으나 전기적인 사건이 주를 이루며 사실성보다는 {주관적} 환상을 강조하고 있음."]}], "analysis": "갈래: 고전 소설(한문 소설), 몽유록계 소설 성격: 체험적, 비현실적, 비판적 주제: 꿈속에서 문인들로 구성된 이상 세계를 경험함, 문인 소외의 현실 비판과 인생무상 특징 ‘현실 세계 - 꿈(입몽) - 현실 세계(각몽)’의 구조로 사건이 전개됨. 몽유자(꿈을 꾸는 사람)가 서술자이자 작가 심의 자신임. 이상적인 문인 왕국을 통해 문장 실력이 아닌 권력 중심인 현실 사회에 대한 불만을 우회적으로 드러냄. 꿈속의 행위(먹물을 부음)가 현실의 신체적 반응(배가 부어오름)으로 이어짐. 역사적 실존 인물(최치원, 이규보, 김시습 등)을 등장시켜 작가의 주관적 기준에 따라 문장력을 평가하고 관직을 부여함. 이 작품은 조선 중종 때 심의가 지은 한문 소설로, 문인들의 이상 세계를 그린 대표적인 {몽유록계} 소설이다. 작품 속 ‘문인 왕국’은 서로 다른 시대의 {역사적} 인물들이 공존하는 공간으로, 철저히 문장 실력에 따라 지위가 결정되는 이상적 세계이다. 이는 문장에 능했으나 현실에서는 벼슬길이 막혀 뜻을 펼치지 못했던 작가의 불만과 보상 심리가 {투영}된 것이다. 꿈에서 깨어나는 과정 또한 독특한데, 이색이 배에 먹물을 붓는 행위로 인해 배가 아파 잠을 깨고 실제 배가 부어올랐다는 설정은 꿈과 현실을 긴밀하게 {연결}하는 장치로 기능한다. 결말부에서 꿈을 깬 주인공이 병든 아내가 있는 비참한 현실을 마주하며 인생의 궁달을 운명으로 돌리는 모습은, 이상과 현실의 괴리에서 오는 {허무감}과 {좌절감}을 효과적으로 드러낸다."}, {"author": "작자미상", "work": "옥단춘전", "genre": "고전 소설", "lines": [{"orig": "[앞부분 줄거리] 이혈룡과 김진희는 함께 공부하며 우정을 나눈 친구 사이였다. 김진희가 먼저 평양 감사가 되고, 가세가 기운 이혈룡은 유리걸식하다 평양 감사가 되었다는 김진희의 소식을 듣고 찾아간다. 그러나 김진희는 이혈룡을 괄시하며 대동강에 던지라고 사공에게 명한다. 이때 옥단춘이 이혈룡의 비범함을 알아보고 이혈룡을 구해 준다. 이혈룡은 자신을 구해 준 옥단춘과 연분을 맺고, 학업에 매진하여 암행어사가 되어 자신의 신분을 숨기고 돌아온다.", "notes": []}, {"orig": "“임아 임아 낭군님아, 이처럼 좋은 얼굴, 어쩌면 그 지경이 되어 왔소?”", "notes": []}, {"orig": "이렇게 옥단춘이 말하니, 이혈룡은,", "notes": []}, {"orig": "“서울 본집에 올라가 보니, 수십여 명의 권솔이 무슨 까닭인지 가세도 풍부하고 노비와 전답이 흡족하게 지내므로 그 연고를 물었더니, 그대가 재물을 많이 보내어 호의호식으로 지내는 것을 비로소 짐작하고 그대의 은혜가 백골난망인 것을 알았네. 가족들도 모두 자네의 호의를 고맙게 여기고 잘 지냈지만, 그전에 곤궁할 때에 수천 냥 빚을 얻어 썼더니, 그 빚쟁이들이 졸부가 되었다는 소문을 듣고 모여들어서 성화같이 빚 독촉을 하지 않겠나. 양반의 체면으로 갚지 않을 수 없어서 가정 기물을 모조리 팔아도 오히려 부족한지라. 그리하여 과거도 보지 못하였으니, 참으로 그대를 볼 낯이 없네. 이런 민망한 소리 하기 싫어서 오지 않으려 하였으나 그러면 배은망덕이 될 듯하여 오기는 하였네. 그러나 안 되는 놈은 자빠져도 코가 깨진다고, 도중의 주막에서 자다가 도적에게 노자와 의복을 모두 빼앗기고 거지꼴이 되어서 그대 보기가 무안하여 그리하였네.”", "notes": ["가세가 기운 자신의 집안을 남몰래 도와준 옥단춘의 지극 정성과 신의에 대한 {고마움}을 표현함.", "자신이 거지꼴이 된 이유를 그럴듯하게 둘러대며, 옥단춘의 진심을 {시험}하고 정체를 숨기기 위한 거짓말을 함.", "{속담}을 인용하여 자신의 불운한 처지를 강조하고, 남루한 행색의 {타당성}을 부여하며 {합리화}함."]}, {"orig": "라고 대답하였다. 옥단춘은 말을 받아,", "notes": []}, {"orig": "“사람이 일생을 살아가려면 무슨 일을 안 당하리까. 그런 근심 걱정일랑 아예 마세요. 과거를 못 보신 것은 역시 운수입니다. 다음에 또 보실 수가 있으니 그것도 낙망하실 것 없나이다. 내 집에 서방님 드릴 옷이 없겠어요? 밥이 없겠어요? 그만 일에 장부가 근심하면 큰일을 어찌하시리까.”", "notes": ["{설의}적 표현을 사용해 상대의 처지를 {운명론}적으로 위로하고 경제적 지원을 약속하며, 대장부로서의 기개를 잃지 말 것을 당부하는 옥단춘의 {주체}적이고 {헌신}적인 면모를 보여줌."]}, {"orig": "하고 위로하니 연연한 정이 측량할 수 없었다.", "notes": []}, {"orig": "이튿날 옥단춘은 혈룡에게 뜻밖의 말을 하였다.", "notes": []}, {"orig": "“오늘은 평양 감사가 봄놀이로 연광정에서 잔치를 한다는 영이 내렸습니다. 내 아직 기생의 몸으로서 감사의 영을 거역하고 안 나갈 수 없으니 서방님은 잠시 용서하시고 집에 계시면 속히 돌아오겠습니다.”", "notes": ["개인의 의지와 상관없이 관의 명령에 따라야 하는 {기생} 신분의 한계가 드러남. 하지만 그 상황 속에서 기지를 발휘하여 이혈룡을 구출하게 됨."]}, {"orig": "말을 하고 난 후에 옥단춘은 연광정으로 나갔다. 그 뒤에 이혈룡도 집을 나와서 비밀 수배한 역졸을 단속하고 연광정의 광경을 보려 내려갔다. 이때 평양 감사 김진희는 도내 각 읍의 수령을 모두 청하여 큰 잔치를 벌였는데, 그 기구가 호화찬란하고 진수성찬의 배반(杯盤)이 낭자하였다. 이때는 춘삼월 호시절이었다. 좌우 산천을 둘러보니 꽃이 피어 온통 꽃산이 되었고 나뭇잎은 피어서 온통 청산으로 변해 있었다. 맑은 강가의 버들가지엔 황금 같은 꾀꼬리가 날아들고 두견새, 접동새, 온갖 새들은 쌍쌍이 모여드는데, 말 잘하는 앵무새, 춤 잘 추는 학두루미, 요지 연못에 소식 전하던 청조새, 만첩청산에 홀로 앉아서 슬피 우는 두견새는 청천명월 깊은 밤에 이리 가며 뻐꾹, 저리 가며 뻐꾹뻐꾹 우는 그 소리가 몹시도 처량하였다. 그 소리에 어사또는 심란하였다. 구경하는 사람들도 녹의홍상으로 곱게 입고 오락가락 다니면서 춘흥을 못 이겨 춤도 추고 노래도 따라 하며 놀았다. 이리저리 구경을 다한 어사또는 남루한 의관과는 달리 의기는 양양하였다. 역졸들과 약속한 시각이 다가오자 이혈룡은 그 남루한 행색으로 성큼성큼 연광정 대상(臺上)으로 올라가려 하였다. 그러자 당황한 나졸들이 와르르 달려와서 덜미를 잡아 끌어내며,", "notes": ["김진희에게는 향락과 과시의 공간이지만, 이혈룡에게는 모욕과 죽음의 위기를 겪는 {시련}의 공감임.", "탐관오리인 김진희의 사치스러운 생활을 보여주며, 이혈룡의 남루한 행색과 {대조}를 이룸.", "화려한 봄 경치와 이혈룡의 복잡한 심경을 대비하며 {비극성}을 심화하고, {객관적상관물}인 새들의 울음소리에 {감정}을 이입하여 처량한 분위기를 조성함. 화려한 봄 경치 속에서 인물이 느끼는 복잡한 심경을 나타냄.", "외양은 초라하지만 내면에는 암행어사라는 권위를 감추고 있는 인물의 당당한 태도"]}, {"orig": "“이 미친놈아, 이 자리가 어느 안전이라고 함부로 올라가려 하느냐!”", "notes": ["이혈룡의 겉모습만 보고 괄시하는 나졸들의 태도를 통해 {권력}에 기생하는 하층민의 부정적 일면을 보여줌."]}, {"orig": "하고 호통을 치며 혹심하게 구박했다. 그러니 어사또는 헌 파립 헌 의복이 모두 떨어져서 알몸이 보이게 되었다. 이에 화가 치민 이혈룡은 김 감사의 이름을 부르며 큰 소리로,", "notes": []}, {"orig": "“네 이놈 김진희야, 나 이혈룡을 모른단 말이냐?”", "notes": ["친구였던 평양 감사에게 {하대}하며 호통을 치는 모습으로, 이혈룡의 분노와 당당함이 표출됨."]}, {"orig": "하고 호통을 쳤다. 이 소리에 옥단춘이 깜짝 놀라 살펴보니 음성은 혈룡 서방님의 음성이나 의복이 달랐다. 이 혈룡의 말을 김 감사가 듣고 크게 노하여 이혈룡을 잡아들이라는 소리가 천지를 진동할 듯하였다. 김 감사의 영을 받은 나졸들이 와르르 달려들어 이혈룡의 풀어진 상투를 휘휘 칭칭 감아쥐고 뺨도 때리고 등도 밀치고 재빠르게 잡아들여 층계 아래에 엎쳐 놓았다.", "notes": []}, {"orig": "(중략)", "notes": []}, {"orig": "이혈룡이 탄식하면서 하는 말이,", "notes": []}, {"orig": "“붕우유신(朋友有信) 쓸데없고, 결의형제 쓸데없다. 전에 너와 내가 생사를 같이하자고 태산같이 맺은 언약 철석같이 맺었더니, 살리기는 고사하고 죄 없이 죽이기를 일삼으니 무심하고 야속하다. 오륜을 박대하면 앙화가 자손에게까지 미치리라.”", "notes": ["{신의}를 저버린 김진희를 비판하며, 유교적 덕목이 지켜지지 않는 현실에 대한 개찬과 {인과응보}적 경고를 보냄. 친구를 죽여서라도 자신의 권력을 지키려는 김진희의 모습을 통해 {유교윤리}보다 {현실적이익}을 추구하는 당대 지배층의 부정적 일면을 보여줌."]}, {"orig": "하였다. 이혈룡이 대동강의 맑은 물을 바라보며 큰 소리로 한탄하였다.", "notes": []}, {"orig": "“대동강 맑은 물아, 너와 내가 무슨 원수로, 한 번 죽기도 어려운데 두 번이나 죽이려고 이 모양을 시키느냐. 정말로 죽게 되면 가련하고 원통하다.”", "notes": []}, {"orig": "이때에 옥단춘이 이혈룡의 손을 부여잡고 만경창파 바라보고 애통해하며,", "notes": ["자신의 안위보다 이혈룡의 죽음을 더 슬퍼하는 옥단춘의 {희생}적이고 {지고지순}한 사랑"]}, {"orig": "“원통하고 가련하다. 죄 없는 목숨 천명을 못다 살고 어복중의 원혼 되니, 명천은 감동하사 무죄한 이 인생을 제발 덕분 살려 주소서.”", "notes": []}, {"orig": "하고 수없이 통곡하였다. 그때 물에 던지기를 재촉하는 북소리가 한 번 울렸다. 옥단춘은 더욱 기가 막혀,", "notes": ["{청각}적 장치➀: {처형} 시간이 임박했음을 알리며 인물들의 {위기감}을 고조시키고 서사에 {긴장감}을 부여함."]}, {"orig": "“애고애고 이 일을 어찌할까. 임아 임아 낭군님아, 어찌하면 산단 말이오?”", "notes": []}, {"orig": "하고 울부짖자 이혈룡이 옥단춘을 달래며,", "notes": []}, {"orig": "“울지 마라 울지 마라, 죄 없으면 사느니라. 울지 말고 진정하여라.”", "notes": []}, {"orig": "하고 말했다. 이때 북소리가 두 번째 울렸다. 옥단춘이 또 자지러지게 놀라면서,", "notes": ["{청각}적 장치➁"]}, {"orig": "“임아 임아 서방님아, 이제는 죽는구려. 살려 주오 살려 주오. 무죄한 이 소첩을 제발 덕분 살려 주오. 맹세코 아무 죄도 없습니다.”", "notes": []}, {"orig": "하고 통곡할 때 세 번째 북소리가 들렸다. 그러자 사공들은 황급히 재촉하기를,", "notes": ["{청각}적 장치➂"]}, {"orig": "“어서 물에 들어가쇼. 일시라도 지체하면 우리 목숨이 죽을 테니 어서 들어가쇼.”", "notes": []}, {"orig": "하고 성화같이 독촉하였다. 옥단춘이 넋을 잃고 사공들에게 애걸하며,", "notes": []}, {"orig": "“여보 사공님들 들어 보소. 당신들도 사람인데 죄 없는 우리 인생을 왜 그리 무고하게 우리를 죽이려 하오. 나만은 자결할 테니 우리 낭군 살려 주소.”", "notes": []}, {"orig": "하였다. 그러자 사공들이 대답하기를,", "notes": []}, {"orig": "“아무리 야속해도 감사님 명령이 지엄하시니 살릴 묘책이 없소이다. 어서 바삐 조처하쇼.”", "notes": ["감사의 명령과 자신들의 목숨 보전을 핑계로 이혈룡과 옥단춘의 죽음을 재촉함."]}, {"orig": "하였다. 옥단춘은 단념하고 하는 수 없이 두 눈을 꼭 감고 치마를 걷어 올려서 머리에 쓰고 이를 박박 갈고 벌벌 떨면서,", "notes": []}, {"orig": "“애고머니 나 죽는다!”", "notes": []}, {"orig": "한마디 지르고는 풍덩 뛰어들려고 하는 순간이었다. 이혈룡이 깜짝 놀라서 옥단춘의 손을 부여잡고 하는 말이,", "notes": []}, {"orig": "“죽어도 같이 죽고 살아도 같이 살자.”", "notes": ["생사를 함께하겠다는 맹세로, 양반과 기생 간의 신분의 차이를 넘어선 인간적 {연대} 의식과 굳건한 {신의}를 드러냄."]}, {"orig": "하고 잡아서 옆에 앉히고 저쪽 연광정을 건너다보면서,", "notes": []}, {"orig": "“얘들, 서리 역졸들아! 어디 갔느냐?”", "notes": []}, {"orig": "하고 소리치는데 그 소리 천지를 진동할 듯하였다. 그러자 난데없는 역졸들이 벌떼처럼 내달으며 달과 같은 마패를 일월(日月)같이 치켜들고 우레와 같은 큰 소리를 벽력같이 지르면서,", "notes": []}, {"orig": "“암행어사 출두요! 암행어사 출두요!”", "notes": ["{극적반전}이 일어나는 부분으로, 갈등이 일시에 해소되고 악인에 대한 징벌이 시작됨을 알리며 독자에게 카타르시스를 제공함."]}], "analysis": "몰락한 양반 이혈룡과 기생 옥단춘의 사랑과 신의를 다룬 조선 후기의 고전 소설이다. 표면적으로는 남녀 간의 사랑을 다루지만, 그 이면에는 조선 후기 {신분제}의 동요와 양반 사회의 {허구성}에 대한 비판 의식이 담겨있다. 친구와의 {신의}를 저버린 비도덕적이고 위선적인 양반 김진희와, 기생의 신분임에도 목숨을 걸고 {신의}를 지키는 옥단춘의 {대조}적인 태도를 통해 도덕적 우위가 {신분}에 있지 않음을 보여주며 양반 중심의 지배 이데올로기를 비판하고 있다. 또한 이혈룡이 옥단춘을 시험하는 과정이나 극적인 암행어사 출두 장면은 독자들에게 흥미를 유발하고, {권선징악}의 결말을 통해 대리만족과 통쾌함을 선사한다. 특히 옥단춘의 헌신은 {주체}적인 애정 실현이라는 점에서 근대적 여성상을 보여준다."}, {"author": "이광정", "work": "김순부전", "genre": "전(傳)", "lines": [{"orig": "진수 정양빈은 원래 방백 황선이 이끄는 토벌군의 좌방장이었는데, 반란군에 빌붙었다가 사태가 실패로 기울어지는 것을 보고는 다시 방백에게 돌아가 공을 세우고자 하였다. 한 종인(種人)이 진수에게 말했다.", "notes": ["자신의 안위를 위해 {이리저리} 진영을 옮기는 {기회주의}적이고 이기적인 진수 정양빈의 성격을 {직접}적으로 제시함.", "진수 정양빈은 자신의 정치적 {과오}를 만회하고 공을 세우기 위해 김 씨 집안사람들을 이용하려 함.", "진수(鎭帥): 특정 지역에 파견되어 부대를 책임지는 무관.", "방백(方伯): 조선 시대 종이품 벼슬. 그 지방의 경찰권·사법권·징세권 등 행정상 권한을 가짐."]}, {"orig": "“수백 명의 사람들이 군청을 빼앗고는 소를 잡고 풍악을 울리며 모였었는데, 어떤 반란을 모의했는지 알 수 없으니, 당일 그곳에서 시중을 들었던 하인들을 신문하여 제일 먼저 모이자고 주창한 사람을 지적하여 고발하게 하십시오.”", "notes": ["종인(種人): 여기서는 ‘어떤 사람’의 의미임."]}, {"orig": "이 말을 들은 김씨 집안사람들이 매우 두려워하며 의논했다.", "notes": []}, {"orig": "“곧 관청에 들어가 신문에 응하다가 말을 잘못하면 재앙이 이르게 될 것이니, 순부를 시켜 관리의 신문에 응하도록 하는 것이 좋겠다.”", "notes": ["김 씨 집안사람들을 {모함}하여 공을 세우려는 종인의 제안으로 사건의 {발단}이 됨."]}, {"orig": "그리하여 그들은 순부를 제일 먼저 모임을 주창한 사람으로 관청에 알렸고, 진수는 즉시 순부를 잡아 오도록 했다. 순부는 자신을 잡으러 온 포졸에게 말했다.", "notes": []}, {"orig": "“진수란 직책은 도적을 잡아 다스리면 그뿐인데 어찌하여 상부의 명령도 없이 감히 선비를 잡아 신문하려 한단 말이냐? 돌아가 이 말씀을 그대로 전해 드려라.”", "notes": ["김순부가 문중 내에서 {신망}이 두텁고 언변과 대처 능력이 {뛰어난} 인물임을 알 수 있음."]}, {"orig": "그러자 포졸은 감히 순부를 핍박하지 못했다. 이를 안 김씨 집안사람들이 끊임없이 와서는 말했다.", "notes": []}, {"orig": "“자네가 아니고서는 이 분란을 해결할 수가 없네.”", "notes": []}, {"orig": "그리하여 순부가 관청에 들어가 신문에 응하니, 진수가 몹시 노하여 말했다.", "notes": []}, {"orig": "“저 무신년 이래로 조정에서는 사사로이 모여 이야기하는 것을 금하여, 이를 어긴 자는 법으로 다스리도록 명했다. 그런데 지금 너희들이 군청에 모여서 소를 잡고 풍악을 울리며 즐기느라 3일 동안이나 머물렀으니, 어떤 일을 모의한 것인지 실상을 숨김없이 바른대로 말하라. 실상을 숨기면 법을 적용하여 다스리겠다.”", "notes": []}, {"orig": "“영남에 사는 종인(宗人)들이 해마다 한 번씩 모여 친족 간의 신의를 이야기하고 화목함을 다진 것이 비단 이번 한 번만이 아니었소. 이는 황강 김계휘와 사계 김장생 두 부자 어르신의 시첩이 아직 남아 있어서 금방 알 수 있을 것이오. 또한 나쁜 일을 모의하는 자라면 반드시 인적이 드문 외딴곳에 숨어서 다른 사람들이 알까 두려워할 것인데, 어찌 사람이 많고 넓은 군청 앞마당에서, 그것도 수령 앞에서 풍악을 울리며 비밀스런 일을 모의하겠소? 우리 집안사람들은 늙은이와 젊은이 가리지 않고 다 함께 모이는지라 흥을 돋우지 않을 수 없어 각자 술과 안주들을 가지고 오게 하여 넓은 곳에서 먹고 마셨고, 우리가 먹은 소고기는 관주에서 산 것이니 아전들에게 물어보시오.”", "notes": ["부당한 {공권력} 행사에 대해 위축되지 않고 {당당}하게 맞서는 김순부의 강직한 태도가 나타남.", "상대방의 직책이 가진 {한계}를 지적하며 절차적 {정당성}이 결여되었음을 비판하고 있음."]}, {"orig": "진수는 더 이상 책망하여 물을 것이 없어서 순부를 풀어 주며 나가도록 했다. 며칠이 지나자 한 종인(種人)이 와서 진수에게 성내며 말했다.", "notes": []}, {"orig": "“공께서는 어찌하여 김순부를 풀어 주시었습니까? 그자는 무오년 김상헌의 사원을 부순 사건이 일어났을 때 주모자인데, 그의 행위를 조사하여 다스리지 않으면 반드시 상사(上司)의 마음을 거슬러서 노여움을 살 것입니다.”", "notes": []}, {"orig": "이에 진수가 다시 순부를 잡아들이고는 비밀리에 상사에게 보고하였다.", "notes": []}, {"orig": "이보다 앞서, 그 종인은 향권을 차지하려고 청음사를 안동부 서쪽에 지었다. 그의 본심은 청음 김상헌을 사모하고 존경하여 배향하려 한 것이 아니고, 안동에 자기와 의견이 다른 사람들이 많다는 것을 알고 그들을 노려서 치려는 것이었는데, 결국 안동 사림들에 의해서 김상헌의 사당은 철거되었다. 그러자 당시에 득세했던 서인(西人) 세력은 모두 안동 사람들을 원수로 여겨 그들을 아주 결딴내고자 하였다. 서인 세력의 화(禍)가 두려워 그들을 따르는 자들은 무거운 죄를 졌어도 관대한 처분을 받았고, 책자(冊子)에 이름을 쓰고는 ‘귀정(歸正)’이라 하였다. 서인 세력이 함정을 만들어 사람을 모함하면서 싹 다 꾀어내니 ‘귀정’한 사람이 날로 많아졌는데, 이렇게 한 의도는 영남 사람들 모두를 서인 세력의 편으로 만들고자 한 것이었다.", "notes": ["모임의 관례성과 장소가 {공개된} 장소임을 근거로 들어 역모 혐의의 {부당함}을 논리적으로 반박함.", "종인(宗人): ‘촌수가 아주 먼 일가’의 사람.", "향권(鄕權): 향촌 사회에서 양반이나 지배층이 가지고 있던 권력이나 영향력을 이르는 말.", "종인이 서원을 건립하려던 의도가 {순수한} 존경심이 아니라, 반대 세력, 즉 {안동사림}을 탄압하기 위한 {정치}적 계략이었음을 밝힘."]}, {"orig": "방백이 진수의 보고를 받고는 매우 기뻐하면서 신임 지부에게 비밀리에 관문을 내려보내어, 김순부의 일가친척이 군청에서 모의한 것을 순부의 죄목으로 삼도록 하였다.", "notes": []}, {"orig": "경신년(1740) 정월 초하룻날 순부가 일찍 일어나 점괘를 보니 불길하여 머리쓰개를 벗고 누워 있는데, 안동부의 아전이 순부를 잡으러 왔다. 순부는 병든 아들에게 말했다.", "notes": []}, {"orig": "“나는 운수가 좋지 않아 곤액을 치르거나 죽을지도 모르겠다. 부디 걱정하지 말고 몸조리 잘하도록 해라.”", "notes": ["사림(士林): 향촌에 기반을 둔 유학자들과 지식인 계층을 이름."]}, {"orig": "순부가 안동부에 들어가니, 부에서는 큰칼을 씌우고 족쇄와 굴레를 채웠다. 그리고 범죄 조서를 갖추어 놓고는 순부에게 서명하라고 닦달하였으나, 순부는 큰 소리로 말했다.", "notes": []}, {"orig": "“이 범죄 조서는 진상과 전혀 다르니, 바라건대 종이와 붓을 빌려주시고 아전 중에 글에 능한 사람을 시켜 제가 부르는 대로 조서를 대신 쓰게 해 주시오.”", "notes": []}, {"orig": "순부가 칼에 기대어 조서 내용을 부르니, 아전은 멈춤 없이 받아 적었다. 지부가 그것을 살펴보고는 찬탄하면서 천천히 말했다.", "notes": []}, {"orig": "“내가 너를 사면해 줄 터이니, 너는 김씨 가문의 문장(門長)과 유사(有司)를 대신 고발하여라.”", "notes": ["당파 간의 {갈등}이 극심했던 당시 사회상과 서인 세력의 보복에 대한 {두려움} 때문에 생존을 위해 {변절}할 수밖에 없었던 당대의 {비극}적이고 {엄혹}한 정치 현실을 고발함."]}, {"orig": "순부가 말했다.", "notes": []}, {"orig": "“문장은 나의 집안 어른과 같은 항렬이고, 유사는 같은 문중의 연소자이거늘, 우리 집안의 일이 이 지경에 이르렀다고 해서 어찌 그들을 곤경에 빠뜨려 놓고 스스로 풀려나려 할 수 있단 말이오?”", "notes": ["자신의 {불길}한 운명을 예감하면서도 병든 아들을 먼저 걱정하는 김순부의 {부성애}가 드러남."]}, {"orig": "지부가 말했다.", "notes": []}, {"orig": "“네가 그들을 끌어들이지 않으니, 나는 다만 너를 옥에 가둘 수밖에 없다.”", "notes": []}, {"orig": "순부가 감옥에 갇혀 있을 때 천연두가 매우 심하여, 주위에 있는 사람들이 순부에게 횡액이 닥칠까 걱정하였다. 방백이 이 보고를 받고 지부에게 다시 추문하되 순부를 유인하도록 지시하니, 지부가 말했다.", "notes": ["김순부의 {능력}을 인정하면서도, 사면을 빌미로 가문을 {배신}할 것을 종용하는 {정치}적 회유책을 사용함."]}, {"orig": "“기사년(1689) 이래 뜻있는 선비들은 모두 남인(南人)이 됨을 부끄러워하는데, 너는 지금 뜻밖의 재앙을 만났으니 생각해 보아라. 너의 고향에는 반드시 너에게 살아날 방도를 가르쳐 줄 사람이 있을 것이야.”", "notes": []}, {"orig": "순부가 말했다.", "notes": []}, {"orig": "“나으리! 저는 아무 죄가 없는데 살아날 방도를 찾아야 한다는 것이 슬프오. 그러니 살 방도를 찾는 것은 비록 죽임을 당하더라도 할 수가 없소.”", "notes": ["자신의 {안위}를 위해 친족을 {배신}할 수 없다는 김순부의 {의리} 있는 성격과 {도덕}적 결벽성이 드러남."]}, {"orig": "지부가 노하여 다시는 말하지 않았다. 이때 친구가 옷소매 속에 일가친척의 편지를 넣어 왔으나, 순부는 뜯어보지도 아니하고 돌려보냈다.", "notes": []}, {"orig": "(중략)", "notes": []}, {"orig": "내가 장례 치르는 일로 마을에 있으면서 서둘러 입관하도록 하고 나오니, 순부가 기운이 고르지 못하여서 집에 돌아가 몸조리하도록 했다. 그런데 얼마 되지 않아 순부의 온 집안사람들이 천연두에 걸렸고, 순부는 끝내 2월 28일에 죽었고, 그의 부인 홍 씨도 뒤를 이어 죽었다. 순부의 나이 48세였다. 슬프도다! 뜻밖의 재난이 닥치리라는 것을 이미 알았었거늘, 능히 피할 수 없었던 것이 운명인가 보다. 순부의 2남 2녀도 한꺼번에 천연두에 걸렸으나 모두 온전하였다.", "notes": ["추문(推問): 죄상을 추궁하여 심문함."]}, {"orig": "정첨윤이 “10촌인 척이라도 오히려 짧아 보이는 수가 있고, 1촌이라도 오히려 길어 보이는 수가 있으니, 점을 친다고 한들 세상일을 다 알 수는 없다.”라고 했는데, 그 말이 정녕 믿을 만하도다.", "notes": []}, {"orig": "진수가 김씨 문중을 그물로 옭아맸을 때 가문 사람들은 헤어날 수 없는 화(禍)로 여겼지만 순부는 웃으며 말로써 그 화에서 벗어났고, 바다 근처 고을에서 귀양살이를 했을 때도 천하의 명승지를 두루 다녔으며, 그의 집안에 화가 미치기 전에 그 낌새를 알고 미리 피할 수 있을 것 같았는데, 끝내 피하지 못하였으니 바로 그것이 짧아 보이는 경우이다.", "notes": ["죄가 없음을 {확신}하기에 {비굴}하게 타협하여 목숨을 구걸하지 않겠다는 {절의}적 태도를 보임."]}, {"orig": "순부는 총명함이 남보다 뛰어나 경사의 요체나 제가의 비밀스런 진기함을 지나쳐 보기만 해도 문득 깨달았고, 주역점을 치는 것도 오묘했다. 나는 항상 그의 탁월함을 사랑했다. 다만 그의 미간에 뭉친 기운이 있음을 마음속으로 걱정했으나, 평탄치 못한 기구한 삶이 이 지경에까지 이를 줄은 생각하지 못했다. 하지만 순부가 재앙을 만나지 않았다면 명승지를 두루 다니고 그것을 문장으로 옮겨 후세에 보는 자로 하여금 상쾌한 기분으로 몸소 그곳을 밟는 것처럼 만들 수는 없었을 것이니, 기이하도다.", "notes": ["{서술자}인 ‘나’가 작품 속에 등장하여 김순부과의 인연을 드러내고, {실존} 인물의 이야기를 다루고 있음을 보여줌.", "{서술자의논평}으로 김순부가 뛰어난 예지력으로 여러 번 위기를 모면했던 능력자였음에도, 결국 {정해진} 운명 앞에서는 무력하게 {희생}될 수밖에 없었던 상황의 아이러니를 부각하고 있음.", "인물에 대한 서술자의 {긍정}적 평가로, 김순부의 {비범}한 능력을 {예찬}함."]}, {"orig": "", "notes": ["뛰어난 능력을 지녔음에도 {비극}적 운명을 피하지 못한 인물에 대한 {안타까움}과 {연민}의 정서가 드러남."]}, {"orig": "", "notes": ["김순부의 불행이 {역설}적으로 훌륭한 문학 작품을 남기는 계기가 되었음을 지적하며, {비극}적 삶 속에서도 문학적 가치를 발견하여 인물을 {재평가}함."]}], "analysis": "이 작품은 조선 후기에 이광정이 지은 전(傳)으로, {김순부}라는 선비의 생애를 다루고 있다. 송사 사건에 얽힌 김순부의 삶과 죽음, 김순부의 현실 {대응방식}과 비극적 {삶}을 주제로 한다. {무고} 사건에 연루된 김순부와 그를 조사하는 진수 정양빈을 중심으로 당시의 사회적 분위기와 {당파} 간의 갈등을 잘 드러내고 있다. 사건의 진행 과정과 갈등의 양상을 {구체}적으로 제시하고, 인물 간의 대화를 {그대로} 노출하여 입장의 {차이}를 드러내면서, 당시 지역 사회에 만연한 {파쟁}의 분위기를 {암시}적으로 드러내고 있다. 작가는 {송사}의 과정에서 보여준 김순부의 능력과 유배지에서 쓴 문장의 아름다움을 {예찬}하며 작품을 마무리하고 있다."}];
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz7CrlG8u1xTzQOQ_cyUwXC8_cqhx_mhUVHXG8tulb2PPsjdFTid0r_1JAgc0C9JVw05Q/exec'; // Apps Script 웹 앱 URL 입력

let selected = new Set();
let currentTab = 0;
let activeData = [];
const state = {};

// === SELECTION SCREEN ===
function buildSelection() {
  const grid = document.getElementById('selGrid');
  grid.innerHTML = DATA.map((d,i) => `
    <div class="sel-item ${selected.has(i)?'checked':''}" onclick="toggleItem(${i})">
      <div class="cb">✓</div>
      <div class="lbl">${d.work}<small>${d.author} · ${d.genre}</small></div>
    </div>
  `).join('');
  document.getElementById('selCnt').textContent = selected.size;
  document.getElementById('selStart').disabled = selected.size === 0;
}

function toggleItem(i) {
  selected.has(i) ? selected.delete(i) : selected.add(i);
  buildSelection();
}

function toggleAll() {
  if (selected.size === DATA.length) selected.clear();
  else DATA.forEach((_,i) => selected.add(i));
  buildSelection();
}

function startStudy() {
  if (selected.size === 0) return;
  activeData = [...selected].sort((a,b)=>a-b);
  currentTab = 0;
  document.getElementById('selScreen').classList.add('hidden');
  document.getElementById('studyScreen').classList.remove('hidden');
  buildTabs();
  buildContent();
}

function goBack() {
  document.getElementById('studyScreen').classList.add('hidden');
  document.getElementById('selScreen').classList.remove('hidden');
}

// === STUDY SCREEN ===
const nums=['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳','㉑','㉒','㉓','㉔','㉕','㉖','㉗','㉘','㉙','㉚'];

function normalize(s) { return s.replace(/\s+/g,'').toLowerCase().replace(/[.,!?;:~'"\u201C\u201D\u2018\u2019\u2500\-\u2013\u2014]/g,''); }

function parseTemplate(text) {
  const parts=[]; let idx=0;
  const rx=/\{([^}]+)\}/g; let m, last=0;
  while((m=rx.exec(text))!==null) {
    if(m.index>last) parts.push({type:'text',value:text.slice(last,m.index)});
    parts.push({type:'blank',answer:m[1],id:idx++});
    last=m.index+m[0].length;
  }
  if(last<text.length) parts.push({type:'text',value:text.slice(last)});
  return parts;
}

function renderParts(parts,pi,section) {
  return parts.map(p => {
    if(p.type==='text') return p.value;
    const uid=`${pi}-${section}-${p.id}`;
    const w=Math.max(60,Math.min(160,p.answer.length*16+20));
    const st=state[pi]?.[uid];
    const cls=st?.graded?(st.correct?'correct':'wrong'):'';
    const val=st?.value||'';
    return `<input class="blank-input ${cls}" id="${uid}" data-answer="${p.answer.replace(/"/g,'&quot;')}" data-poem="${pi}" style="width:${w}px" value="${val}" ${st?.graded?'readonly':''} onkeydown="handleKey(event,this)" oninput="onInput(this)"><button class="hint-btn" onclick="showHint('${uid}')" ${!val&&!st?.graded?'disabled':''}>?</button>`;
  }).join('');
}

function buildTabs() {
  document.getElementById('tabs').innerHTML = activeData.map((di,i) => {
    const d=DATA[di];
    return `<div class="tab ${i===currentTab?'active':''}" onclick="switchTab(${i})">${d.author} · ${d.work}</div>`;
  }).join('');
}

function buildContent() {
  const di=activeData[currentTab];
  const d=DATA[di]; const pi=di;
  if(!state[pi]) state[pi]={};
  let html=`<div class="poem-header"><div class="poem-author">${d.author}</div><div class="poem-title">${d.work}</div><div class="poem-genre">${d.genre}</div></div>`;
  html+=`<div class="dual-card"><div class="dual-header"><div>원 문</div><div>줄별 해석 메모 · 빈칸</div></div>`;
  let ln=0;
  d.lines.forEach((line,li) => {
    const isO=line.orig.trim().length>0;
    if(isO) ln++;
    const left=isO?`<span class="ln">${nums[ln-1]||ln}</span>${line.orig}`:'';
    let right='';
    if(line.notes.length===0) right='<span class="dash">—</span>';
    else right=line.notes.map((n,ni) => {
      const isS=n.startsWith('▶');
      const r=renderParts(parseTemplate(n),pi,`n${li}_${ni}`);
      return isS?`<div class="summary-note">${r}</div>`:`<div class="note-line">${r}</div>`;
    }).join('');
    html+=`<div class="dual-row"><div class="left">${left}</div><div class="right">${right}</div></div>`;
  });
  html+=`</div>`;
  if(d.analysis) {
    const r=renderParts(parseTemplate(d.analysis),pi,'analysis');
    html+=`<div class="analysis-card"><div class="analysis-header">작품 해설 · 빈칸 채우기</div><div class="analysis-body">${r}</div></div>`;
  }
  html+=`<div class="controls"><button class="btn-sm" onclick="gradeSection(${pi})">이 섹션 채점</button><button class="btn-sm" onclick="revealSection(${pi})">이 섹션 정답</button></div>`;
  document.getElementById('content').innerHTML=html;
  updateProgress();
}

function switchTab(i) { currentTab=i; buildTabs(); buildContent(); window.scrollTo(0,0); }

function handleKey(e,el) {
  if(e.key==='Enter') {
    e.preventDefault(); gradeOne(el);
    const all=[...document.querySelectorAll('.blank-input:not([readonly])')];
    const idx=all.indexOf(el);
    if(idx>=0&&idx<all.length-1) all[idx+1].focus();
  }
}

function onInput(el) {
  const uid=el.id, pi=parseInt(el.dataset.poem);
  if(!state[pi]) state[pi]={};
  state[pi][uid]={value:el.value,graded:false,correct:false};
  const hb=el.nextElementSibling; if(hb) hb.disabled=!el.value.trim();
}

function gradeOne(el) {
  const uid=el.id, ans=el.dataset.answer, pi=parseInt(el.dataset.poem), val=el.value.trim();
  if(!val) return;
  const ok=normalize(val)===normalize(ans);
  el.classList.remove('correct','wrong'); el.classList.add(ok?'correct':'wrong');
  el.readOnly=true;
  if(!state[pi]) state[pi]={};
  state[pi][uid]={value:val,graded:true,correct:ok};
  updateProgress();
}

function showHint(uid) {
  const el=document.getElementById(uid); if(!el) return;
  el.value=el.dataset.answer; el.classList.remove('wrong'); el.classList.add('correct'); el.readOnly=true;
  const pi=parseInt(el.dataset.poem);
  if(!state[pi]) state[pi]={};
  state[pi][uid]={value:el.dataset.answer,graded:true,correct:true};
  updateProgress();
}

function gradeSection(pi) {
  const blanks=[...document.querySelectorAll(`.blank-input[data-poem="${pi}"]`)];
  const unfilled=blanks.filter(el=>!el.readOnly&&!el.value.trim());
  if(unfilled.length>0){showToast(`⚠️ 빈칸 ${unfilled.length}개를 먼저 채워 주세요.`);unfilled[0].focus();return;}
  blanks.forEach(el=>{if(!el.readOnly&&el.value.trim()) gradeOne(el);});
}
function revealSection(pi) {
  const blanks=[...document.querySelectorAll(`.blank-input[data-poem="${pi}"]`)];
  const unfilled=blanks.filter(el=>!el.readOnly&&!el.value.trim());
  if(unfilled.length>0){showToast(`⚠️ 빈칸 ${unfilled.length}개를 먼저 채워 주세요.`);unfilled[0].focus();return;}
  blanks.forEach(el=>{if(!el.readOnly) showHint(el.id);});
}
function revealAll() {
  let totalUnfilled=0;
  activeData.forEach(di=>{
    const blanks=[...document.querySelectorAll(`.blank-input[data-poem="${di}"]`)];
    totalUnfilled+=blanks.filter(el=>!el.readOnly&&!el.value.trim()).length;
  });
  if(totalUnfilled>0){showToast(`⚠️ 전체 빈칸 ${totalUnfilled}개를 먼저 채워 주세요.`);return;}
  activeData.forEach(di=>revealSection(di));
}
function resetAll() { activeData.forEach(di => { delete state[di]; }); buildContent(); }

function countBlanks(di) {
  const d=DATA[di]; let t=0;
  d.lines.forEach(l => l.notes.forEach(n => { const m=n.match(/\{[^}]+\}/g); if(m) t+=m.length; }));
  if(d.analysis) { const m=d.analysis.match(/\{[^}]+\}/g); if(m) t+=m.length; }
  return t;
}

function updateProgress() {
  let total=0, correct=0;
  activeData.forEach(di => {
    total+=countBlanks(di);
    if(state[di]) Object.values(state[di]).forEach(s => { if(s.graded&&s.correct) correct++; });
  });
  const pct=total>0?Math.round(correct/total*100):0;
  document.getElementById('progText').textContent=pct+'%';
  document.getElementById('progPath').setAttribute('stroke-dasharray',pct+',100');
}

// === SUBMISSION ===
function getResultData() {
  const name=document.getElementById('studentName').value.trim();
  let totalB=0, totalC=0; const sections=[];
  activeData.forEach(di => {
    const d=DATA[di], tb=countBlanks(di);
    let sc=0; const wrongs=[];
    if(state[di]) Object.entries(state[di]).forEach(([uid,s]) => {
      if(s.graded) { if(s.correct) sc++; else wrongs.push(s.value+'→'+document.getElementById(uid)?.dataset.answer); }
    });
    totalB+=tb; totalC+=sc;
    sections.push({work:d.author+' - '+d.work, total:tb, correct:sc, rate:tb>0?Math.round(sc/tb*100):0, wrongs:wrongs.slice(0,10)});
  });
  return {studentName:name, sections, totalBlanks:totalB, totalCorrect:totalC, totalRate:totalB>0?Math.round(totalC/totalB*100):0};
}

function submitResults() {
  const name=document.getElementById('studentName').value.trim();
  if(!name) { showToast('⚠️ 이름을 입력해 주세요.'); return; }
  const data=getResultData();
  if(SCRIPT_URL) {
    const form=document.getElementById('submitForm');
    form.action=SCRIPT_URL;
    document.getElementById('submitData').value=JSON.stringify(data);
    form.submit();
  }
  if(data.totalRate===100) { showCelebration(); }
  else { showToast('✅ 결과가 제출되었습니다!'); }
}

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// === CELEBRATION ===
function showCelebration() {
  document.getElementById('celebration').classList.add('show');
  for(let i=0;i<60;i++) {
    const c=document.createElement('div'); c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=['var(--gold)','var(--green-bright)','var(--green-light)','#fff','var(--gold-dim)'][Math.floor(Math.random()*5)];
    c.style.width=(6+Math.random()*8)+'px'; c.style.height=(6+Math.random()*8)+'px';
    c.style.animationDuration=(2+Math.random()*3)+'s';
    c.style.animationDelay=(Math.random()*2)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),6000);
  }
}
function closeCelebration() { document.getElementById('celebration').classList.remove('show'); }

// INIT
buildSelection();
</script>
</body>
</html>
