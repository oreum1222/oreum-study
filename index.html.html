<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고전시가 본문해석 · 오름 국어</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

:root {
  --bg-deep: #0a0e0a;
  --bg-card: #111a11;
  --bg-card-hover: #162016;
  --bg-input: #101a10;
  --border: rgba(255,255,255,.25);
  --border-row: rgba(255,255,255,.35);
  --border-div: rgba(255,255,255,.40);
  --border-outer: rgba(255,255,255,.35);
  --green-brand: #4a5a3a;
  --green-accent: #6b8f5e;
  --green-light: #8aad7a;
  --green-bright: #4ade80;
  --gold: #c9a84c;
  --gold-dim: #a08838;
  --text-primary: #ece8e0;
  --text-secondary: #c4bfb4;
  --text-muted: #928d82;
  --text-dim: #7a7568;
  --correct: #22c55e;
  --correct-bg: rgba(34,197,94,.10);
  --wrong: #ef4444;
  --wrong-bg: rgba(239,68,68,.10);
  --hint-bg: rgba(201,168,76,.08);
  --toast-bg: #1a2a1a;
  --progress-track: #1a2a1a;
  --radius: 10px;
  --radius-sm: 6px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; -webkit-text-size-adjust:100%; }
body {
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg-deep); color:var(--text-primary);
  line-height:1.75; word-break:keep-all; overflow-wrap:break-word; min-height:100vh;
}

/* ── Header ── */
.header {
  position:sticky; top:0; z-index:100;
  background:rgba(10,14,10,.92); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:14px 24px;
  display:flex; align-items:center; justify-content:space-between; gap:16px;
}
.header-left { display:flex; align-items:center; gap:14px; }
.logo-badge {
  background:linear-gradient(135deg,var(--green-brand),var(--green-accent));
  color:#fff; font-family:'Noto Serif KR',serif;
  font-weight:900; font-size:13px;
  padding:5px 10px; border-radius:var(--radius-sm);
  letter-spacing:.5px; white-space:nowrap;
}
.header-title { font-family:'Noto Serif KR',serif; font-size:17px; font-weight:700; }
.header-sub { font-size:12px; color:var(--text-muted); }
.header-right { display:flex; align-items:center; gap:12px; }

.progress-ring-wrap { position:relative; width:44px; height:44px; }
.progress-ring-wrap svg { transform:rotate(-90deg); }
.progress-ring-bg { fill:none; stroke:var(--progress-track); stroke-width:4; }
.progress-ring-fg { fill:none; stroke:var(--green-bright); stroke-width:4; stroke-linecap:round; transition:stroke-dashoffset .5s ease; }
.progress-ring-text { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--green-bright); }

.ctrl-btn {
  background:var(--bg-card); border:1px solid var(--border);
  color:var(--text-muted); font-size:12px; font-family:'Noto Sans KR',sans-serif;
  padding:6px 14px; border-radius:var(--radius-sm);
  cursor:pointer; transition:all .2s; white-space:nowrap;
}
.ctrl-btn:hover:not(:disabled) { background:var(--bg-card-hover); color:var(--text-primary); }
.ctrl-btn:disabled { opacity:.35; cursor:not-allowed; }
.ctrl-btn.primary { background:var(--green-brand); border-color:var(--green-accent); color:#fff; }
.ctrl-btn.primary:hover:not(:disabled) { background:var(--green-accent); }
.ctrl-btn.gold { background:var(--gold-dim); border-color:var(--gold); color:#fff; }
.ctrl-btn.gold:hover:not(:disabled) { background:var(--gold); color:#1a1200; }
.ctrl-btn .lock-icon { font-size:10px; margin-left:4px; }

/* ── Nav ── */
.nav-bar {
  background:var(--bg-card); border-bottom:1px solid var(--border);
  padding:0 24px; display:flex; overflow-x:auto;
  -ms-overflow-style:none; scrollbar-width:none;
}
.nav-bar::-webkit-scrollbar { display:none; }
.nav-tab {
  padding:12px 18px; font-size:13px; font-weight:500;
  color:var(--text-dim); cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .2s; white-space:nowrap; user-select:none;
}
.nav-tab:hover { color:var(--text-secondary); }
.nav-tab.active { color:var(--gold); border-bottom-color:var(--gold); }
.nav-tab .tab-check { color:var(--correct); margin-left:4px; font-size:11px; }

/* ── Main ── */
.main { max-width:1100px; margin:0 auto; padding:28px 20px 80px; }
.section { display:none; animation:fadeUp .3s ease; }
.section.active { display:block; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

.section-header { margin-bottom:24px; }
.section-title { font-family:'Noto Serif KR',serif; font-size:24px; font-weight:900; margin-bottom:4px; }
.section-title .author { color:var(--green-light); font-weight:700; }
.section-title .work { color:var(--gold); }
.section-genre { font-size:13px; color:var(--text-muted); display:flex; align-items:center; gap:8px; }
.genre-tag { background:var(--green-brand); color:var(--green-light); font-size:11px; padding:2px 8px; border-radius:99px; font-weight:500; }

/* ── Dual Card ── */
.dual-card {
  background:var(--bg-card); border:1px solid var(--border-outer);
  border-radius:var(--radius); overflow:hidden; margin-bottom:20px;
}
.dual-header {
  display:grid; grid-template-columns:1fr 1fr;
  border-bottom:1px solid var(--border-outer);
}
.dual-header-cell {
  padding:14px 20px 10px;
  font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:1.5px;
}
.dual-header-cell.left { color:var(--green-accent); }
.dual-header-cell.right { color:#5aada0; border-left:1px solid var(--border-div); }

.dual-row {
  display:grid; grid-template-columns:1fr 1fr;
  border-bottom:1px solid var(--border-row);
  transition:background .15s;
}
.dual-row:last-child { border-bottom:none; }
.dual-row:hover { background:rgba(106,143,94,.03); }

.dual-cell { padding:12px 20px; display:flex; align-items:flex-start; }
.dual-cell.left {
  font-size:15.5px; color:var(--text-primary); line-height:1.8;
  border-right:1px solid var(--border-div);
}
.dual-cell.right { font-size:14.5px; color:var(--text-secondary); line-height:1.8; }

.line-num {
  display:inline-flex; align-items:center; justify-content:center;
  width:22px; height:22px;
  background:rgba(74,90,58,.3); color:var(--green-light);
  font-size:10px; font-weight:700; border-radius:50%;
  margin-right:10px; flex-shrink:0; margin-top:3px;
}
.note-content { flex:1; }
.note-content.plain { color:var(--text-secondary); }
.note-dash { color:var(--text-dim); font-size:13px; }

/* ── Analysis ── */
.analysis-card {
  background:linear-gradient(135deg,rgba(74,90,58,.10),rgba(201,168,76,.04));
  border:1px solid rgba(255,255,255,.25);
  border-radius:var(--radius); padding:20px 24px; margin-bottom:20px;
}
.card-label {
  font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:1.5px; margin-bottom:14px;
}
.card-label.green { color:var(--green-accent); }
.analysis-text { font-size:15px; color:var(--text-secondary); line-height:1.9; }

/* ── Blanks ── */
.blank-input-wrap { display:inline-flex; align-items:center; gap:4px; vertical-align:baseline; }
.blank-input {
  background:var(--bg-input); border:1.5px solid rgba(255,255,255,.25);
  color:var(--text-primary); font-family:'Noto Sans KR',sans-serif;
  font-size:14.5px; padding:3px 9px; border-radius:var(--radius-sm);
  min-width:70px; max-width:200px; outline:none;
  transition:border-color .2s,background .2s,box-shadow .2s;
}
.blank-input::placeholder { color:var(--text-dim); font-size:12px; }
.blank-input:focus { border-color:var(--green-accent); background:rgba(106,143,94,.08); box-shadow:0 0 0 2px rgba(106,143,94,.12); }
.blank-input.correct { border-color:var(--correct); background:var(--correct-bg); color:var(--correct); font-weight:500; }
.blank-input.wrong { border-color:var(--wrong); background:var(--wrong-bg); color:var(--wrong); }

.reveal-btn {
  background:var(--bg-card); border:1.5px solid rgba(255,255,255,.25);
  color:var(--text-muted); font-size:11px; font-weight:700;
  width:22px; height:22px; border-radius:50%;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all .2s; flex-shrink:0;
}
.reveal-btn:hover:not(:disabled) { border-color:var(--gold); color:var(--gold); background:var(--hint-bg); }
.reveal-btn:disabled { opacity:.3; cursor:not-allowed; }

.section-controls { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }

.toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--toast-bg); border:1px solid var(--green-brand);
  color:var(--text-primary); font-size:13px; padding:10px 20px;
  border-radius:var(--radius); box-shadow:0 8px 32px rgba(0,0,0,.4);
  z-index:999; opacity:0; transition:all .35s cubic-bezier(.4,0,.2,1); pointer-events:none;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@media(max-width:768px) {
  .dual-header { grid-template-columns:1fr; }
  .dual-header-cell.right { border-left:none; border-top:1px solid var(--border-row); }
  .dual-row { grid-template-columns:1fr; }
  .dual-cell.left { border-right:none; border-bottom:1px solid var(--border-row); padding-bottom:8px; }
  .dual-cell.right { padding-top:8px; }
  .header { flex-wrap:wrap; padding:10px 14px; }
  .header-title { font-size:14px; }
  .main { padding:18px 12px 60px; }
  .section-title { font-size:20px; }
  .blank-input { min-width:60px; font-size:13px; }
  .ctrl-btn { font-size:11px; padding:5px 10px; }
  .nav-tab { padding:10px 12px; font-size:12px; }
}

/* ── Submit Bar ── */
.submit-bar {
  background: rgba(10,14,10,.95);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
}
.submit-bar-inner {
  max-width: 1100px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.submit-left { display: flex; align-items: center; gap: 8px; }
.name-label {
  font-size: 12px; font-weight: 600; color: var(--text-muted); white-space: nowrap;
}
.name-input {
  background: var(--bg-input); border: 1.5px solid rgba(255,255,255,.25);
  color: var(--text-primary); font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px; padding: 6px 12px; border-radius: var(--radius-sm);
  width: 160px; outline: none; transition: border-color .2s;
}
.name-input::placeholder { color: var(--text-dim); font-size: 12px; }
.name-input:focus { border-color: var(--green-accent); }
.submit-btn {
  background: linear-gradient(135deg, #2563eb, #1d4ed8) !important;
  border-color: #3b82f6 !important;
  color: #fff !important;
  font-weight: 600 !important;
  padding: 8px 20px !important;
}
.submit-btn:hover:not(:disabled) {
  background: linear-gradient(135deg, #3b82f6, #2563eb) !important;
}
.submit-btn:disabled { opacity: .5; }

/* Submit overlay */
.submit-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .3s;
}
.submit-overlay.show { opacity: 1; pointer-events: auto; }
.submit-modal {
  background: var(--bg-card); border: 1px solid rgba(255,255,255,.2);
  border-radius: 12px; padding: 28px 32px; max-width: 420px; width: 90%;
  text-align: center;
}
.submit-modal h3 {
  font-family: 'Noto Serif KR', serif;
  font-size: 18px; margin-bottom: 16px; color: var(--text-primary);
}
.submit-modal .result-summary {
  font-size: 14px; color: var(--text-secondary); line-height: 1.8;
  margin-bottom: 20px; text-align: left;
}
.submit-modal .result-summary .rate { color: var(--green-bright); font-weight: 700; }
.submit-modal .modal-btns { display: flex; gap: 10px; justify-content: center; }

      { orig:"임의 몸이 오리나무 되고 나의 몸이 칡이 되어", notes:["{대구법}. 화자는 임의 몸과 자신의 몸이 각각 {오리나무}와 {칡넝쿨}로 변하기를 바람. 임에 대한 사랑을 표현하기 위해 '{몸바꿈(전신)}'이라는 참신한 발상을 동원함.", "{시적화자}가 표면에 드러남."] },
      { orig:"주야장상(晝夜長常) 얽히고 비끼여 떨어질 줄 모르다가", notes:[] },
      { orig:"겨울(冬)에 눈비 서리 치더라도 녹지 않을 그리 하여라", notes:["{겨울}. {계절적} 배경.", "임과 화자 사이의 {시련}.", "{설의적} 표현으로 임과 떨어지지 않겠다는 마음을 드러냄."] }
    ],
    analysis:"이 작품은 임과 영원히 함께하고 싶은 화자의 소망을 담은 사설시조이다. 임의 몸과 자신의 몸이 각각 {오리나무}와 {칡넝쿨}로 변하여 {얽히고} 뒤엉키기를 바라는 {참신한} 발상을 통해 이별 없는 사랑을 갈망하고 있다. {대구법}을 통해 서로 대응하는 구조를 만들고, 마지막에 '눈비 서리'라는 {시련}에도 녹지 않겠다는 {설의적} 표현을 통해 변치 않는 {사랑}의 의지를 강조하고 있다."
  }
];

// ── Helpers ──
function parseBlanks(t){const p=[];const r=/\{([^}]+)\}/g;let l=0,m,i=0;while((m=r.exec(t))!==null){if(m.index>l)p.push({type:'text',value:t.slice(l,m.index)});p.push({type:'blank',value:m[1],idx:i++});l=r.lastIndex;}if(l<t.length)p.push({type:'text',value:t.slice(l)});return p;}
function hasBlanks(t){return /\{[^}]+\}/.test(t);}
function esc(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function normalize(s){return s.replace(/\s+/g,'').toLowerCase();}

// ── State ──
let cur=0;
const state={};
DATA.forEach((sec,si)=>{
  const ans=[];
  sec.lines.forEach(l=>l.notes.forEach(n=>parseBlanks(n).filter(p=>p.type==='blank').forEach(b=>ans.push(b.value))));
  parseBlanks(sec.analysis).filter(p=>p.type==='blank').forEach(b=>ans.push(b.value));
  state[si]={answers:ans,inputs:ans.map(()=>''),checked:ans.map(()=>null)};
});

// ── Build blank HTML ──
function blankHTML(si,bi,answer,val,chk){
  const cls=chk===true?'correct':chk===false?'wrong':'';
  const hint=answer.length>2?answer[0]+'…':'';
  const dis=val.trim()===''?'disabled':'';
  const w=Math.max(70,answer.length*16+20);
  return `<span class="blank-input-wrap"><input class="blank-input ${cls}" data-s="${si}" data-b="${bi}" value="${esc(val)}" placeholder="${hint}" style="width:${w}px" oninput="onI(${si},${bi},this)" onkeydown="onK(event,${si},${bi})"/><button class="reveal-btn" ${dis} onclick="revOne(${si},${bi})">?</button></span>`;
}

// ── Render ──
function render(){renderNav();renderSec();updateProg();}

function renderNav(){
  document.getElementById('navBar').innerHTML=DATA.map((s,i)=>{
    const done=isComplete(i);
    const lb=s.work.length>8?s.work.slice(0,8)+'…':s.work;
    return `<div class="nav-tab ${i===cur?'active':''}" onclick="sw(${i})">${s.author}, ‹${lb}›${done?'<span class="tab-check">✓</span>':''}</div>`;
  }).join('');
}

function renderSec(){
  const main=document.getElementById('mainContent');
  main.innerHTML=DATA.map((sec,si)=>{
    let bi=0;
    // dual rows
    let rows='';
    sec.lines.forEach((line,li)=>{
      let rightHTML='';
      if(!line.notes.length){
        rightHTML='<span class="note-dash">—</span>';
      } else {
        line.notes.forEach(note=>{
          if(!hasBlanks(note)){
            rightHTML+=`<div class="note-content plain">${note}</div>`;
          } else {
            let h='';
            parseBlanks(note).forEach(p=>{
              if(p.type==='text') h+=`<span>${p.value}</span>`;
              else { h+=blankHTML(si,bi,state[si].answers[bi],state[si].inputs[bi],state[si].checked[bi]); bi++; }
            });
            rightHTML+=`<div class="note-content">${h}</div>`;
          }
        });
      }
      rows+=`<div class="dual-row"><div class="dual-cell left"><span class="line-num">${li+1}</span><span>${line.orig}</span></div><div class="dual-cell right">${rightHTML}</div></div>`;
    });

    // analysis
    let aHTML='';
    parseBlanks(sec.analysis).forEach(p=>{
      if(p.type==='text') aHTML+=`<span>${p.value}</span>`;
      else { aHTML+=blankHTML(si,bi,state[si].answers[bi],state[si].inputs[bi],state[si].checked[bi]); bi++; }
    });

    const filled=state[si].inputs.every(v=>v.trim()!=='');
    const lk=filled?'':'disabled';

    return `<div class="section ${si===cur?'active':''}" id="sec-${si}">
      <div class="section-header">
        <div class="section-title"><span class="author">${sec.author},</span> <span class="work">‹${sec.work}›</span></div>
        <div class="section-genre"><span class="genre-tag">${sec.genre}</span></div>
      </div>
      <div class="dual-card">
        <div class="dual-header"><div class="dual-header-cell left">원 문</div><div class="dual-header-cell right">줄별 해석 메모 · 빈칸 채우기</div></div>
        ${rows}
      </div>
      <div class="analysis-card">
        <div class="card-label green">작품 해설 · 빈칸 채우기</div>
        <div class="analysis-text">${aHTML}</div>
      </div>
      <div class="section-controls">
        <button class="ctrl-btn primary" ${lk} onclick="gradeSec(${si})">이 섹션 채점${filled?'':'<span class="lock-icon">🔒</span>'}</button>
        <button class="ctrl-btn" ${lk} onclick="showSec(${si})">이 섹션 정답${filled?'':'<span class="lock-icon">🔒</span>'}</button>
      </div>
    </div>`;
  }).join('');
  updateProg();
}

function sw(i){cur=i;render();}

// ── Input ──
function onI(si,bi,el){
  state[si].inputs[bi]=el.value;state[si].checked[bi]=null;
  el.classList.remove('correct','wrong');
  el.parentElement.querySelector('.reveal-btn').disabled=el.value.trim()==='';
  updateLock(si);updateProg();
}
function onK(e,si,bi){if(e.key==='Enter'){e.preventDefault();gradeOne(si,bi);const all=[...document.querySelectorAll(`.section.active .blank-input:not(.correct)`)];const el=document.querySelector(`input[data-s="${si}"][data-b="${bi}"]`);const idx=all.indexOf(el);if(idx>=0&&idx<all.length-1)all[idx+1].focus();}}

function gradeOne(si,bi){
  const s=state[si];if(!s.inputs[bi].trim())return;
  s.checked[bi]=normalize(s.inputs[bi])===normalize(s.answers[bi]);
  const el=document.querySelector(`input[data-s="${si}"][data-b="${bi}"]`);
  if(el){el.classList.remove('correct','wrong');el.classList.add(s.checked[bi]?'correct':'wrong');}
  updateProg();renderNav();
}
function revOne(si,bi){
  const s=state[si];if(s.inputs[bi].trim()===''){showToast('먼저 답을 입력해 주세요');return;}
  s.inputs[bi]=s.answers[bi];s.checked[bi]=true;
  const el=document.querySelector(`input[data-s="${si}"][data-b="${bi}"]`);
  if(el){el.value=s.answers[bi];el.classList.remove('wrong');el.classList.add('correct');}
  updateProg();renderNav();
}
function gradeSec(si){if(state[si].inputs.some(v=>v.trim()==='')){showToast('먼저 모든 빈칸을 채워 주세요');return;}state[si].inputs.forEach((_,bi)=>gradeOne(si,bi));}
function showSec(si){const s=state[si];if(s.inputs.some(v=>v.trim()==='')){showToast('먼저 모든 빈칸을 채워 주세요');return;}s.answers.forEach((a,bi)=>{s.inputs[bi]=a;s.checked[bi]=true;});renderSec();renderNav();}
function showAllAnswers(){if(!Object.values(state).every(s=>s.inputs.every(v=>v.trim()!==''))){showToast('먼저 모든 빈칸을 채워 주세요');return;}Object.keys(state).forEach(si=>{state[si].answers.forEach((a,bi)=>{state[si].inputs[bi]=a;state[si].checked[bi]=true;});});renderSec();renderNav();}
function resetAll(){Object.keys(state).forEach(si=>{state[si].inputs=state[si].inputs.map(()=>'');state[si].checked=state[si].checked.map(()=>null);});render();showToast('초기화 완료');}

function updateLock(si){
  const sec=document.getElementById(`sec-${si}`);if(!sec)return;
  const f=state[si].inputs.every(v=>v.trim()!=='');
  sec.querySelectorAll('.section-controls .ctrl-btn').forEach(b=>{b.disabled=!f;const l=b.querySelector('.lock-icon');if(l)l.textContent=f?'':'🔒';});
  updateShowAll();
}
function updateShowAll(){
  const b=document.getElementById('btnShowAll');
  const f=Object.values(state).every(s=>s.inputs.every(v=>v.trim()!==''));
  b.disabled=!f;b.querySelector('.lock-icon').textContent=f?'':'🔒';
}
function isComplete(si){return state[si].answers.length>0&&state[si].checked.every(c=>c===true);}
function updateProg(){
  let t=0,c=0;Object.values(state).forEach(s=>{t+=s.answers.length;c+=s.checked.filter(x=>x===true).length;});
  const p=t?Math.round(c/t*100):0;
  document.getElementById('ringFg').style.strokeDashoffset=2*Math.PI*18*(1-p/100);
  document.getElementById('ringText').textContent=p+'%';
  updateShowAll();
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}

// ── 결과 제출 ──
// ⬇️ 여기에 Google Apps Script 웹앱 URL을 붙여넣으세요 ⬇️
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz7CrlG8u1xTzQOQ_cyUwXC8_cqhx_mhUVHXG8tulb2PPsjdFTid0r_1JAgc0C9JVw05Q/exec';
// ⬆️ 예: 'https://script.google.com/macros/s/AKfyc.../exec' ⬆️

function getResultData(){
  const name=document.getElementById('studentName').value.trim();
  const sections=[];
  let totalB=0,totalC=0;
  DATA.forEach((sec,si)=>{
    const s=state[si];
    const total=s.answers.length;
    let correct=0;const wrongs=[];
    s.answers.forEach((ans,bi)=>{
      if(s.checked[bi]===true) correct++;
      else if(s.checked[bi]===false) wrongs.push(ans);
    });
    const rate=total?Math.round(correct/total*100):0;
    sections.push({work:sec.author+', '+sec.work,total,correct,rate,wrongs});
    totalB+=total;totalC+=correct;
  });
  return {studentName:name,sections,totalBlanks:totalB,totalCorrect:totalC,totalRate:totalB?Math.round(totalC/totalB*100):0};
}

function submitResults(){
  const name=document.getElementById('studentName').value.trim();
  if(!name){showToast('이름을 입력해 주세요');document.getElementById('studentName').focus();return;}
  const anyChecked=Object.values(state).some(s=>s.checked.some(c=>c!==null));
  if(!anyChecked){showToast('먼저 빈칸을 채우고 채점해 주세요');return;}
  const data=getResultData();
  let html=`<strong>${data.studentName}</strong> 학생 결과:<br><br>`;
  data.sections.forEach(sec=>{
    if(sec.total===0)return;
    html+=`• ${sec.work}: <span class="rate">${sec.correct}/${sec.total} (${sec.rate}%)</span>`;
    if(sec.wrongs.length) html+=`<br>&nbsp;&nbsp;오답: ${sec.wrongs.join(', ')}`;
    html+=`<br>`;
  });
  html+=`<br><strong>전체: <span class="rate">${data.totalCorrect}/${data.totalBlanks} (${data.totalRate}%)</span></strong>`;
  document.getElementById('submitSummary').innerHTML=html;
  document.getElementById('submitOverlay').classList.add('show');
}

function closeSubmit(){document.getElementById('submitOverlay').classList.remove('show');}

async function confirmSubmit(){
  const btn=document.getElementById('btnConfirmSubmit');
  btn.disabled=true;btn.textContent='전송 중...';
  if(!SCRIPT_URL){
    showToast('SCRIPT_URL이 설정되지 않았습니다');
    btn.disabled=false;btn.textContent='제출하기';closeSubmit();return;
  }
  const data=getResultData();
  try{
    // iframe + form 방식 (로컬 파일에서도 작동)
    let iframe=document.getElementById('submitFrame');
    if(!iframe){
      iframe=document.createElement('iframe');
      iframe.id='submitFrame';iframe.name='submitFrame';
      iframe.style.display='none';
      document.body.appendChild(iframe);
    }
    const form=document.createElement('form');
    form.method='POST';form.action=SCRIPT_URL;form.target='submitFrame';
    form.style.display='none';
    const input=document.createElement('input');
    input.name='data';input.value=JSON.stringify(data);
    form.appendChild(input);
    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);
    setTimeout(()=>{
      showToast('✅ 결과가 제출되었습니다!');closeSubmit();
      btn.disabled=false;btn.textContent='제출하기';
    },2000);
  }catch(err){
    showToast('❌ 전송 실패. 인터넷 연결을 확인하세요.');console.error(err);
    btn.disabled=false;btn.textContent='제출하기';
  }
}

render();
</script>
