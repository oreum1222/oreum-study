<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e0a">
<title>[오름] 국어 - 수능특강 갈래복합 본문해석</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep:#0a0e0a;--bg-card:#111a11;--bg-input:#101a10;
  --border-row:rgba(255,255,255,.35);--border-div:rgba(255,255,255,.40);--border-outer:rgba(255,255,255,.35);
  --green-brand:#4a5a3a;--green-accent:#6b8f5e;--green-light:#8aad7a;--green-bright:#4ade80;
  --gold:#c9a84c;--gold-dim:#a08838;
  --text-primary:#ece8e0;--text-secondary:#c4bfb4;--text-muted:#928d82;--text-dim:#7a7568;
  --correct:#22c55e;--wrong:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-deep);color:var(--text-primary);font-family:'Noto Sans KR',sans-serif;word-break:keep-all;font-size:15px;line-height:1.7;-webkit-tap-highlight-color:transparent}

/* === SELECTION SCREEN === */
.sel-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.sel-logo{font-family:'Noto Serif KR',serif;font-size:28px;font-weight:700;color:var(--gold);text-align:center;margin-bottom:4px}
.sel-sub{font-size:16px;color:var(--green-light);text-align:center;margin-bottom:6px}
.sel-desc{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:24px}
.sel-card{background:linear-gradient(145deg,#141e14,#0e160e);border:1px solid var(--border-outer);border-radius:14px;padding:24px;width:100%;max-width:600px;box-shadow:0 8px 32px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06)}
.sel-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.sel-toggle{background:none;border:1px solid var(--green-accent);color:var(--green-light);padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit}
.sel-toggle:hover{background:var(--green-brand)}
.sel-count{font-size:13px;color:var(--text-muted)}
.sel-count b{color:var(--gold);font-size:16px}
.sel-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.sel-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:.15s;border:1px solid rgba(255,255,255,.06)}
.sel-item:hover{background:rgba(255,255,255,.04)}
.sel-item .cb{width:20px;height:20px;border-radius:5px;border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;font-size:13px;color:transparent}
.sel-item.checked .cb{background:var(--green-brand);border-color:var(--green-accent);color:var(--green-light)}
.sel-item .lbl{font-size:13px;color:var(--text-secondary);line-height:1.4}
.sel-item .lbl small{color:var(--text-muted);font-size:11px;display:block}
.sel-start{width:100%;padding:14px;background:linear-gradient(135deg,var(--green-brand),var(--green-accent));color:var(--text-primary);border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
.sel-start:hover{filter:brightness(1.1)}
.sel-start:disabled{opacity:.4;cursor:not-allowed}

/* === HEADER === */
.header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#0d130d,#1a2a1a);border-bottom:1px solid var(--border-outer);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.hdr-left{display:flex;align-items:center;gap:10px}
.btn-back{background:none;border:1px solid var(--text-muted);color:var(--text-muted);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit}
.btn-back:hover{color:var(--text-primary);border-color:var(--text-primary)}
.logo{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:700;color:var(--gold)}
.logo span{color:var(--green-light);font-size:13px;font-weight:400;margin-left:6px}
.hdr-right{display:flex;align-items:center;gap:10px}
.progress-wrap{display:flex;align-items:center;gap:5px}
.progress-ring{width:34px;height:34px}
.progress-text{font-size:12px;color:var(--text-secondary)}
.btn-sm{background:var(--green-brand);color:var(--text-primary);border:1px solid var(--green-accent);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;transition:.2s;white-space:nowrap}
.btn-sm:hover{background:var(--green-accent)}
.btn-sm:disabled{opacity:.4;cursor:not-allowed}

/* === SUBMIT BAR === */
.submit-bar{background:var(--bg-card);border-bottom:1px solid var(--border-outer);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.submit-bar input{background:var(--bg-input);border:1px solid var(--border-row);border-radius:6px;padding:6px 12px;color:var(--text-primary);font-size:16px;font-family:inherit;flex:1;min-width:120px;max-width:200px}
.submit-bar input:focus{outline:none;border-color:var(--gold)}
.btn-submit{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#1a1a0a;border:none;padding:7px 18px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}

/* === TABS === */
.tabs{display:flex;overflow-x:auto;background:var(--bg-card);border-bottom:1px solid var(--border-outer);padding:0 8px;scrollbar-width:thin;-webkit-overflow-scrolling:touch}
.tab{padding:9px 14px;cursor:pointer;font-size:12px;color:var(--text-muted);border-bottom:2px solid transparent;white-space:nowrap;transition:.2s;flex-shrink:0}
.tab:hover{color:var(--text-secondary)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:500}

/* === CONTENT === */
.content{max-width:1100px;margin:0 auto;padding:16px}
.poem-header{text-align:center;margin-bottom:14px}
.poem-author{font-size:12px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.poem-title{font-family:'Noto Serif KR',serif;font-size:21px;color:var(--gold);font-weight:700}
.poem-genre{font-size:11px;color:var(--green-light);margin-top:3px}
.dual-card{border:1px solid var(--border-outer);border-radius:10px;overflow:hidden;margin-bottom:18px;background:var(--bg-card)}
.dual-header{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border-row)}
.dual-header div{padding:7px 14px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--green-light);font-weight:500}
.dual-header div:first-child{border-right:1px solid var(--border-div)}
.dual-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid rgba(255,255,255,.12)}
.dual-row:last-child{border-bottom:none}
.dual-row .left{padding:7px 14px;border-right:1px solid var(--border-div);font-size:15px;color:var(--text-primary);line-height:1.8}
.dual-row .right{padding:7px 14px;font-size:14.5px;color:var(--text-secondary);line-height:1.8}
.dual-row .left .ln{color:var(--text-muted);font-size:11px;margin-right:5px}
.note-line{margin-bottom:3px}.note-line:last-child{margin-bottom:0}
.summary-note{background:rgba(74,90,58,.15);padding:5px 10px;border-radius:6px;font-size:13px;color:var(--green-light);font-weight:500;margin:3px 0}
.blank-input{background:var(--bg-input);border:1px solid var(--border-row);border-radius:4px;padding:2px 6px;font-size:16px;color:var(--text-primary);font-family:inherit;min-width:60px;max-width:160px;outline:none;transition:.2s}
.blank-input:focus{border-color:var(--gold)}
.blank-input.correct{border-color:var(--correct);background:rgba(34,197,94,.1);color:var(--correct)}
.blank-input.wrong{border-color:var(--wrong);background:rgba(239,68,68,.1);color:var(--wrong)}
.hint-btn{background:none;border:1px solid var(--text-muted);color:var(--text-muted);width:20px;height:20px;border-radius:50%;font-size:11px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;margin-left:2px;transition:.2s;vertical-align:middle}
.hint-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.hint-btn:disabled{opacity:.3;cursor:not-allowed}
.analysis-card{border:1px solid var(--border-outer);border-radius:10px;overflow:hidden;margin-bottom:18px;background:var(--bg-card)}
.analysis-header{padding:7px 14px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--green-light);font-weight:500;border-bottom:1px solid var(--border-row)}
.analysis-body{padding:12px 14px;font-size:14.5px;color:var(--text-secondary);line-height:1.9}
.controls{display:flex;gap:10px;justify-content:center;margin:14px 0;flex-wrap:wrap}
.dash{color:var(--text-muted)}
.warning{max-width:700px;margin:40px auto 20px;padding:16px 20px;border:1px solid rgba(239,68,68,.3);border-radius:8px;background:rgba(239,68,68,.05);font-size:12px;color:#d4a0a0;line-height:1.8;text-align:center}
.warning strong{color:#ef4444}

/* === TOAST === */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--green-brand);color:var(--text-primary);padding:12px 24px;border-radius:10px;font-size:14px;z-index:999;transition:.4s;opacity:0;border:1px solid var(--green-accent)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* === CELEBRATION === */
.celebration{position:fixed;inset:0;z-index:998;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,14,10,.92);opacity:0;pointer-events:none;transition:.5s}
.celebration.show{opacity:1;pointer-events:auto}
.cele-emoji{font-size:64px;animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.cele-title{font-family:'Noto Serif KR',serif;font-size:32px;color:var(--gold);font-weight:700;margin:16px 0 8px}
.cele-msg{font-size:15px;color:var(--text-secondary);margin-bottom:24px;text-align:center;padding:0 20px}
.cele-close{background:var(--green-brand);color:var(--text-primary);border:1px solid var(--green-accent);padding:10px 28px;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit}
.confetti{position:fixed;top:-10px;width:10px;height:10px;border-radius:2px;z-index:999;animation:fall linear forwards;pointer-events:none}
@keyframes fall{to{top:110vh;transform:rotate(720deg)}}

/* === HIDDEN === */
.hidden{display:none!important}
@media(max-width:768px){
  .dual-row,.dual-header{grid-template-columns:1fr}
  .dual-header div:first-child,.dual-row .left{border-right:none;border-bottom:1px solid rgba(255,255,255,.12)}
  .sel-grid{grid-template-columns:1fr}
  .submit-bar{flex-direction:column;align-items:stretch}
  .submit-bar input{max-width:100%}
  .header{padding:8px 10px}
  .content{padding:10px}
}
</style>
</head>
<body>

<!-- SELECTION SCREEN -->
<div id="selScreen" class="sel-screen">
  <div class="sel-logo">[오름] 국어</div>
  <div class="sel-sub">수능특강 갈래복합 본문해석</div>
  <div class="sel-desc">시험 범위에 해당하는 작품을 선택하세요.</div>
  <div class="sel-card">
    <div class="sel-top">
      <button class="sel-toggle" onclick="toggleAll()">전체 선택/해제</button>
      <div class="sel-count"><b id="selCnt">0</b>개 작품 선택됨</div>
    </div>
    <div class="sel-grid" id="selGrid"></div>
    <button class="sel-start" id="selStart" disabled onclick="startStudy()">시작하기 →</button>
  </div>
</div>

<!-- STUDY SCREEN -->
<div id="studyScreen" class="hidden">
  <div class="header">
    <div class="hdr-left">
      <button class="btn-back" onclick="goBack()">← 작품 선택</button>
      <div class="logo">[오름] 국어<span>갈래복합 본문해석</span></div>
    </div>
    <div class="hdr-right">
      <div class="progress-wrap">
        <svg class="progress-ring" viewBox="0 0 36 36">
          <path d="M18 2.0845a15.9155 15.9155 0 010 31.831 15.9155 15.9155 0 010-31.831" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="3"/>
          <path id="progPath" d="M18 2.0845a15.9155 15.9155 0 010 31.831 15.9155 15.9155 0 010-31.831" fill="none" stroke="var(--green-bright)" stroke-width="3" stroke-dasharray="0,100" stroke-linecap="round"/>
        </svg>
        <span class="progress-text" id="progText">0%</span>
      </div>
      <button class="btn-sm" onclick="revealAll()">전체 정답</button>
      <button class="btn-sm" onclick="resetAll()">초기화</button>
    </div>
  </div>
  <div class="submit-bar">
    <input type="text" id="studentName" placeholder="이름을 입력하세요">
    <button class="btn-submit" id="btnSubmit" onclick="submitResults()">결과 제출</button>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"></div>
  <div class="warning">
    본 자료는 오직 <strong>[오름] 국어</strong> 학원 수강생들의 성적 향상을 위해 제작된 비매품입니다.<br>
    본 자료를 외부로 유출하거나 무단 배포하는 행위는 학원과 동료 수강생들에게 심각한 피해를 주는 범죄 행위입니다.<br>
    무단 배포 적발 시, 즉각적인 퇴원 조치는 물론, 유출로 인한 경영상 손실에 대해 <strong>강력한 법적 조치</strong>를 취할 예정입니다.
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- CELEBRATION -->
<div class="celebration" id="celebration">
  <div class="cele-emoji">🎉</div>
  <div class="cele-title">완벽해!</div>
  <div class="cele-msg">이대로면 시험도 100점이지. 조금 더 파이팅!</div>
  <button class="cele-close" onclick="closeCelebration()">닫기</button>
</div>

<!-- HIDDEN FORM FOR GOOGLE SHEETS -->
<iframe name="submitFrame" style="display:none"></iframe>
<form id="submitForm" method="POST" target="submitFrame" style="display:none">
  <input type="hidden" name="data" id="submitData">
</form>

<script>
const DATA = [{"author": "김창협", "work": "산민", "genre": "한문수필", "lines": [{"orig": "부인이 문을 열고 나와 보고는", "notes": ["백성들의 {인정}있는 모습"]}, {"orig": "초가집 안으로 맞아들이고", "notes": []}, {"orig": "나그네 위하여 밥상 내온다", "notes": ["어렵게 사는 생활이지만 손님을 위한 대접에는 소홀해하지 않는 백성의 {순박}한 모습"]}, {"orig": "바깥어른은 어디 계시오", "notes": []}, {"orig": "아침에 쟁기 들고 산에 갔다오", "notes": []}, {"orig": "산밭은 너무나 갈기 어려워", "notes": []}, {"orig": "해가 저물도록 못 오신다오", "notes": ["바깥어른의 출타를 묻자 아낙네는 그가 산 속에서 고된 일을 한다고 답함."]}, {"orig": "사방을 둘러봐도 이웃은 없고", "notes": ["산 속에 사는 농민의 {고달픈} 생활상"]}, {"orig": "개와 닭들 비탈에서 서성대누나", "notes": []}, {"orig": "숲속에는 무서운 호랑이 많아", "notes": ["의지할 만한 {사람}이 없음"]}, {"orig": "뜯은 콩잎 광주리에 반도 안 된다", "notes": []}, {"orig": "가련할손 이곳이 뭐가좋다고", "notes": []}, {"orig": "척박한 두메산골 산단 말인가", "notes": []}, {"orig": "편안할사 저 너머 평지활", "notes": ["두려운 존재이나,"]}, {"orig": "가고파도 고을 관리 너무 무서워", "notes": ["{고을관리}보다는 덜 무서운 산짐승"]}], "analysis": "이 작품은 가렴주구를 일삼는 {관리}들을 피해 산속에 사는 사람들의 일상을 그리고 있는 작품이다. {산}은 관리들을 피해 살 수 있는 도피처이지만, 그곳은 극한적인 생존만을 제공할 뿐이다. 그러나 백성들은 관리들의 학경보다는 {극한적생존}이 더 견딜만하다는 점에서 살아가고, 이러한 점에서 민중의 아픔이 드러낸다. 가혹한 정치는 백성들에게 있어 호랑이보다 무섭다는 {가정맹어호}(苛政猛於虎)의 고사성어의 성격이 잘 나타난다. 말에서 내려와 사람 부르니"}, {"author": "작자미상", "work": "합강정가", "genre": "가사", "lines": [{"orig": "구경 가세 구경 가세 합강정에 구경 가세", "notes": ["사람들이 사는 곳"]}, {"orig": "때는 구월 이십삼일 길일인가 명절인가", "notes": []}, {"orig": "순시(巡視) 나온 우리 감사 이날에 뱃놀이하니", "notes": ["민중들의 고달픈 삶의 원인은"]}, {"orig": "천추절 성절일 즐거우나 창오산 저녁 구름 슬프도다", "notes": ["{탐관오리}의 학정임, {가정맹어호}"]}, {"orig": "관찰사 부임 뜻밖이나 남쪽 백성 괴로움 내 알쏜가", "notes": ["{청유형어미}를 반복하여 화자의 의도를 드러냄"]}, {"orig": "뱃놀이 좋을시고 가을걷이 급함을 생각하랴", "notes": ["민생을 살피러 온 감사가 본분을 망각하고 유흥을 즐기는 {모순적} 행태"]}, {"orig": "돌을 깨서 강 막는 데 한 달이나 걸렸구나", "notes": []}, {"orig": "산을 뚫어 길 낼 때에 민가 무덤 옮겼구나", "notes": []}, {"orig": "울부짖는 저 귀신아 풍경 좋은 탓이로다", "notes": []}, {"orig": "범 같은 우리 감사 조금도 원망 마라", "notes": []}, {"orig": "음식 거마(車馬) 장막 온갖 채비 밤낮으로 준비하고", "notes": []}, {"orig": "큰 물고기 낚아내어 배 안에서 요리하네", "notes": []}, {"orig": "응향각을 숙소 삼고 세여울서 배를 탄다", "notes": []}, {"orig": "물 가운데 떠내려가니 강 "orig": "정신이 아득하여 이만하여 그치노라", "notes": []}], "analysis": "이 작품은 {규방가사}로, 조선 시대 여성이 결혼 후 겪게 될 다양한 상황에 대처하는 법을 어머니의 목소리로 전하는 가사이다. 구체적인 덕목을 {나열}하며 시집가는 딸에 대한 어머니의 {걱정}과 부녀자로서 지켜야 할 {도리권계}를 표현한다. {대조적} 상황을 제시하며 삶에 대한 인식을 드러내며 맹자의 어머니의 고사를 {인용}하는 부분에서 유교적 가치관과 어머니의 가르침이 공존함을 알 수 있다."}, {"author": "정약용", "work": "상론", "genre": "한문수필", "lines": [{"orig": "상(相)은 익히는 것으로 인하여 변하고, 형세는 상으로 인하여 이루어지는데 형국(形局)이다 유년(流年)이다의 설(說)을 하는 사람은 거짓이다. 아주 어린 아이가 배를 땅에 대고 엉금엉금 길 적에 그 용모를 보면 예쁠 뿐이다. 하지만 그가 장성해서는 무리가 나누어지게 되는데, 무리가 나누어짐으로써 익히는 것이 서로 달라지고, 익히는 것이 서로 달라짐으로써 상도 이로 인해 변하게 된다.", "notes": ["시부모님의 식성을 고려하여 정성껏 식사를 준비하는 며느리의 {봉양} 태도"]}, {"orig": "서당(書堂)의 무리는 그 상이 아름답고, 시장(市場)의 무리는 그 상이 검고, 목동(牧童)의 무리는 그 상이 산란(散亂)하고, 강패나 마조 같은 무리는 그 상이 사납고 약빠르다체로 그 익히는 것이 오래됨으로써 그 성품이 날로 옮겨 가게 되니, 그 마음속에 생각하고 있는 것이 겉으로 나타나서, 상이 이로 인하여 변하게 되는데, 사람들은 그 상의 변한 것을 보고는 또한 말하기를 ‘그 상이 이렇게 생겼기 때문에 그 익히는 것이 저와 같다.’ 하니, 아, 그것은 틀린 말이다.", "notes": ["맹자 어머니의 고사를 {인용}하여 자녀 교육에서 모범을 보여야야 함을 강조", "{노비}를 인간적으로 대우하되, 상전과 하인의 {신분적} 질서와 위계는 분명히 지켜야 함"]}, {"orig": "대저 학문을 익힌 사람은 사리를 통달하는 데 효과가 있고, 이(利)를 익힌 사람은 재물을 모으는 데 효과가 있고, 힘을 익힌 사람은 비천한 일에 몸을 마치고, 악(惡)을 익힌 사람은 패망(敗亡)한 데 몸을 마치게 되니, 익힘과 효과가 아울러 진보(進步)함으로써 효과와 상이 모두 변하게 된다. 그런데도 사람들은 그 상의 변하는 것을 보고 또한 말하기를 ‘그 상이 이러하기 때문에 그 효과가 저와 같은 것이다.’ 하니, 아, 어쩌면 그렇게 어리석단 말인가.", "notes": []}, {"orig": "어떤 아이가 있는데 그의 눈동자가 빛나면 부모는 말하기를 ‘이 아이는 가르칠 만하다.’ 하고, 그 아이를 위해서 서적(書籍)을 사들이고, 그 아이를 위해서 스승을 정하게 되고, 스승은 말하기를 ‘이 아이는 가르칠 만하다.’ 하여, 그 아이에게 붓·먹·연분·서판을 더욱더 주게 되니, 이 아이는 더욱 공부에 힘쓰고 날로 더 부지런하게 된다. 대부(大夫)는 이 사람을 천거하기를 ‘이 사람은 쓸 만합니다.’ 하고, 임금은 그 사람을 보고 이르기를 ‘이 사람은 대우할 만하다.’ 하여, 그를 권장하고 추켜세우고 칭찬하고 선발하여 이윽고 재상(宰相)에 이르게 된다.", "notes": ["집안의 {기강}을 먼저 바로잡은 뒤에 {재산}을 관리해야 한다는 가사 관리의 우선순위"]}, {"orig": "어떤 아이가 있는데 얼굴이 풍만하게 생겼으면 아이의 부모는 말하기를 ‘이 아이는 부자가 될 만하다.’ 하여, 재산을 더욱더 주고, 부인(富人)은 그 아이를 보고 말하기를 ‘이 아이는 부릴 만하다.’ 하여, 자본을 더 주게 되니, 이 아이는 더욱 힘쓰고 날로 부지런하여 사방으로 장사를 다닌다. 그러면 부인은 그가 상업을 부흥시킬 것이라고 생각하고 그를 주인으로 삼으니 잘될 사람을 더욱 도와주어 조금 뒤에는 백만장자가 되어 버린다.", "notes": ["살림을 맡은 {주부}로서 검소하고 절약하는 태도를 지녀야 함"]}, {"orig": "어떤 아이 짓는 것이 삼분의 이다. 그렇지만 세상 사람들이 이 세 가지의 순서를 매기면 시인은 마루에서 절하고 광대는 마당에 두며 벌레는 죽을 때까지 풀숲과 섬돌 사이를 벗어나지 못한다.다면 사람은 힘든 것을 귀하게 여기고 편한 것을 천하게 여기는 것인가?", "notes": ["그로 인해 관상이 달라진다는 것을", "{대조}적인 예시로 증명함"]}, {"orig": "옛사람이 말하기를 “귀한 사람은 남을 부리고 천한 사람은 남에게 부림을 받는다.” 하였으니 사물은 어찌하여 똑같지 않은 것인가. 늦게야 그러한 줄 깨닫고, 마침내 손가락을 깨물어 맹세하여 시에 대해 말하기를 기피했다. 그렇지만 좋은 시를 보면 문득 기뻐하였으니 마치 병이 나서 술을 절제하는 사람이 문득 술 생각이 나는 것 같았다.", "notes": ["관상이 원인이고 행동이 결과라 믿는 사람들의 {통념}을 {반박}하고 {비판}함", "주변의 {긍정적평가}와 {기대}가 아이의노력과 성취를 이끌어낸 긍정적 사례"]}, {"orig": "지금 허 군*은 유, 불, 도 삼교(三敎)와 제자백가에 통달했는데, 불교의 말을 더욱 믿어 시를 지어 장식했다. 이것은 좋은 벼를 뽑아 버리고 잡초를 키우는 것과 같다들고 부지런한데도 도리어 광대나 벌레보다 못하게 될 것인데, 이 사실을 깨닫지 못하고 있다.", "notes": ["주변의 믿음과 지원이 실제적 성공으로 이루어진 경우로, 상 자체가 아니라"]}, {"orig": "어떤 이는 말한다.", "notes": []}, {"orig": "“마음은 거북 등껍데기와 같아 속을 태우면 조짐이 바깥으로 나타나니, 이것은 마치 생각이 움직여 시를 읊는 것과 같다.”", "notes": ["{후천적환경}의 중요성을 강조"]}, {"orig": "나는 이렇게 생각한다.", "notes": []}, {"orig": "생각은 물과 같고 시는 얼음과 같다. 얼면 얼음이 되고 얼음이 녹으면 도로 물이 된다. 이것은 마치 생각이 움직여 시를 짓고, 시를 읊으면 다시 생각하게 되는 것과 같다. 생각이 깊지 않으면 시가 좋지 않고, 마음이 맑지 않으면 생각이 깊어질 수 없다. 그러므로 깊은 생각에서 나온 시라야 사람을 감동시킬 수 있다.", "notes": ["결과를 보고 원인을 타고난 {상}으로 돌리는 사람들의 어리석은 인과관계 해석을 {비판}함", "능력이 있어도 {관상} 때문에"]}, {"orig": "나는 늙어서 시를 멀리하고 있다. 지금 마침 저녁에 집으로 돌아가다가 허 군을 만나자 나도 모르게 수레에서 내렸다. 누가 나를 이렇게 만들었는가? 시가 과연 좋고 귀한 것이기 때문인가?", "notes": ["기회를 얻지 못하는 불합리한 현실에 대한 {비판}"]}, {"orig": "*허 군: 허균을 가리킴.", "notes": []}], "analysis": "이 글은 {고전수필}로, 시 창작에 대한 글쓴이의 독창적인 견해가 드러나는 {비평적} 특징이 드러난다. 글쓴이는 시를 짓는 행위를 고된 노동으로 규정하며, 시 창작의 {어려움}과 그 속에 담겨야 할 {진정성}의 가치를 논한다. 허균에게 보내는 글임에도 불구하고 허균이 불교에 심취하여 시를 장식하는 태도를 비판하는 대목에서, 그의 재능을 인정하면서도 불교적 색채에 치중하는 {시작}(詩作) 태도를 경계하고 조언하는 특징을 가진다."}, {"author": "이창동", "work": "시", "genre": "현대소설", "lines": [{"orig": "김 시인: 시를 쓴다는 것은 아름다움을 찾는 일이에요. 아시겠어요? 우리 눈앞에 보이는 것들, 이 일상의 삶 속에서 진정한 아름다움을 찾는 겁니다.한 아름다움. 그냥 겉만 아름다워 보이는 것이 아니에요. 여러분들은 다 가슴속에 시를 품고 있어요. 시를 가두어 두고 있는 거예요. 풀어 줘야 해요. 가슴속에 갇혀 있는 시가 날개를 달고 날아오를 수 있도록…….", "notes": ["신분에 상관없이 {관상}에 의존하는", "태도가 가져오는 구체적인 사회적 폐해와 손실"]}, {"orig": "김 시인이 문득 말을 끊는다. 미자가 손을 들고 있다.", "notes": []}, {"orig": "미자: 선생님, 시상은 언제 찾아와요?", "notes": []}, {"orig": "김 시인: 시상이 언제 오냐고요?", "notes": []}, {"orig": "미자: 예, 아무리 시상을 얻으려고 해도 도무지 오지 않아요. 언제 시상이 오는지 좀 알았으면 좋겠어요.", "notes": []}, {"orig": "김 시인: 시상은 찾아오지 않아요. 내가 찾아가서 빌어야 돼.을 해야 돼. 그래도 줄 동 말 동 해요. 그게 얼마나 귀한 건데 함부로 주겠어요? 그러니까 내가 막 찾아가서 사정을 해야 돼.", "notes": ["성인인 {공자}의 일화를 인용하여 외모로 사람을 판단해서는 안된다는 주장을 강화함"]}, {"orig": "미자는 보일락 말락 고개를 끄덕인다. 그래도 못내 미진한 듯 묻는다.", "notes": []}, {"orig": "미자: 어디로 찾아가요?", "notes": []}, {"orig": "시인은 순간적으로 말문이 막힌다. 그리고 약간 짜증이 나는 것을 참으려 한다.", "notes": []}, {"orig": "김 시인: 그거……. 그거는……. 어디를 정해 놓고 찾아가는 것이 아니고……. 그냥 찾는 거예요. 돌아다니면서……. 시상이 어디 나 여기 있소, 하고 문패를 걸어 놓고 기다리고 있겠어요? 분명한 거는 내 주변에 있다는 거야. 멀리 있지 않고……. 지금 내가 있는 자리, 거기서 얻는 거예요. 내가 얘기했죠? 설거지통 속에도 시가 있다고…….", "notes": ["시의 가치와 효용성에 대해 {회의적}인 질문을 던지며 글을 시작함"]}, {"orig": "시인의 말을 듣고 있는 미자의 얼굴. 뭔가 해답을 찾으려고 애쓰는 것 같은 표정이다.", "notes": ["{대조}적인 대상을 {열거}하여 시를 짓는 과정이 타 예술이나 자연 현상보다 고됨을 부각함"]}, {"orig": "S#92. 미자의 집(낮/내부)", "notes": []}, {"orig": "미자의 아파트 안. 싱크대 위 좁은 창문으로 희미한 햇살이 비껴들어 오고 있을 뿐, 집 안은 비어 있다.", "notes": ["소리를 내는 존재들의 {위치}를 구분하여 가장 힘든 정신 노동을 하는 {시인}이 사회적으로 가장 귀한 대접을 받는 현실의 위계를 {공간}적으로 표현"]}, {"orig": "현관문 쪽에서 달칵 소리가 들리는가 싶더니, 문이 열리고 미자의 딸이 들어온다. 40대 초반 정도 되어 보인다. 신발을 벗고 들어서며 미자를 부른다.", "notes": []}, {"orig": "수옥: 엄마!", "notes": []}, {"orig": "대답이 없다. 그녀는 안방과 욱이 방의 방문을 열어 본다. 집 안에는 미자는 보이지 않는다. 식탁에 앉는다. 핸드폰으로 전화를 건다. 그러나 신호는 가지만, 전화는 받지 않는 듯하다. 멍하니 그 자리에 앉아 있다. 미자의 부재가 주는 알 수 없는 느낌에 사로잡힌 것 같은 얼굴이다. 시를 읽는 양미자의 목소리가 들리기 시작한다.", "notes": []}, {"orig": "미자: (O.S.*) 그곳은 어떤가요", "notes": []}, {"orig": "얼마나 적막하나요", "notes": ["힘든 시인은 {대접}받고 편한 광대와 벌레는 {천대}받는 현실을 보며 사물 간에 불평등함에 대해 의문을 제기함"]}, {"orig": "S#93. 아파트 앞(낮/외부)", "notes": []}, {"orig": "누군가의 시점으로 보이는 나무. 바람에 흔들리는 나뭇잎들. 카메라 틸트다운* 하면, 미자가 시상을 떠올리기 위해 앉아 나무를 올려다보던 곳. 미자가 앉았던 자리에 ‘신 20’의 동네 할머니가 앉아서 나무를 올려다보고 있다.와 욱이 배드민턴을 치던 아파트 앞 작은 공터에는 아이들이 훌라후프를 하며 놀고 있다. 미자의 목소리 계속된다.", "notes": ["시 짓기의 괴로움 때문에 시를 멀리하려 맹세했음에도 좋은 시를 보면 기뻐하는 자신을 통해 시에 대한 자신의 억누를 수 없는 {애정}을 표현"]}, {"orig": "미자: (O.S.) 저녁이면 여전히 노을이 지고", "notes": []}, {"orig": "숲으로 가는 새들의 노랫소리 들리나요", "notes": []}, {"orig": "차마 부치지 못한 편지", "notes": []}, {"orig": "당신이 받아 볼 수 있나요", "notes": []}, {"orig": "하지 못한 고백", "notes": []}, {"orig": "전할 수 있나요", "notes": []}, {"orig": "시간은 흐르고 장미는 시들까요", "notes": []}, {"orig": "S#94. 버스 정류장(낮/외부)", "notes": []}, {"orig": "아파트 앞 버스 정류장. 그녀가 늘 버스를 타던 곳. 여느 때와 다름없는 풍경이지만, 오늘따라 버스를 기다리는 사람은 아무도 없이 비어 있다.가 한 대 와서 선다. 그러나 아무도 내리지 않는다. 버스가 다시 출발한다.", "notes": ["허균이 {유교적} 본령(좋은 벼) 대신"]}, {"orig": "미자: (O.S.) 이제 작별을 할 시간", "notes": []}, {"orig": "머물고 가는 바람처럼", "notes": []}, {"orig": "그림자처럼", "notes": []}, {"orig": "*O.S.: 오프 사운드(off sound). 영화에서 대사가 나오는데 화면에는 말하는 사람이 안 보이고 화면 밖에서 말이 나오는 것.", "notes": []}, {"orig": "*틸트다운(tiltdown): 카메라를 수직 방향으로 밑을 향하여 움직이면서 촬영하는 기법.", "notes": []}], "analysis": "이 작품은 시나리오로, 평범한 할머니 ‘미자’가 시를 배우며 겪는 내면의 변화와 고통을 다루고 있다. 시 강습 장면을 통해 시 창작의 본질을 교육적으로 전달하고, 아름다움을 추구하는 시와 추악한 현실을 대비시켜 예술의 윤리적 기능을 묻는다. 미자가 마주하는 현실은 손자가 연루된 여중생의 자살이라는 끔찍한 비극이며, 이를 통해 그는 피해 학생의 고통을 이해하고 애도하는 과정을 겪으며 진정한 시 한 편을 완성한다. S#21. 강의실(낮/내부) 문화원 강의실에서 김 시인이 한창 강의를 하고 있다."}, {"author": "허난설헌", "work": "규원가", "genre": "가사", "lines": [{"orig": "부생모육(父生母育) 신고(辛苦)하여 이내 몸 길러 낼 제", "notes": ["{불교적} 수식(잡초)에 치중하여 시를 짓는 태도가 주객이 전도된 것임을"]}, {"orig": "공후배필(公侯配匹) 못 바라도 군자호구(君子好逑) 원(願)하더니", "notes": ["{비판}함"]}, {"orig": "삼생(三生)의 원업(怨業)이오 월하(月下)의 연분(緣分)으로", "notes": []}, {"orig": "장안유협(長安遊俠) 경박자(輕薄子)를 꿈같이 만나 있어", "notes": ["거북점을 칠 때 불에 굽는 자극이 겉으로 드러나듯, 시 또한 마음 속의 {생각}과 {감정}이 밖으로 표출된 {결과물}임을 설명함"]}, {"orig": "당시(當時)의 용심(用心)하기 살얼음 디디는 듯", "notes": ["물이 얼면 얼음이 되고 녹으면 물이 되듯, 생각과 시는 서로 분리된 것이 아니라 순환하는 관계임을 {비유}적으로 {표현}함"]}, {"orig": "삼오이팔(三五二八) 겨우 지나 천연여질(天然麗質) 절로 이니", "notes": []}, {"orig": "이 얼굴 이 태도(態度)로 백년기약(百年期約) 하였더니", "notes": []}, {"orig": "연광(年光)이 홀홀하고 조물(造物)이 다시(多猜)하여", "notes": []}, {"orig": "봄바람 가을 달이 베올에 북 지나듯", "notes": ["독자에게 진정한 {감동}을 주기 위해서는 시인의 마음이 맑아야 하고 그에 따른 깊은 사유가 전제되어야 함을"]}, {"orig": "설빈화안(雪鬢花顔) 어디 가고 면목가증(面目可憎) 되거고나", "notes": ["{역설}함"]}, {"orig": "내 얼굴 내 보거니 어느 임이 날 괼 , "notes": []}, {"orig": "나아갈 만하기에 나아간 것이므로 이윤과 부열*이 은나라에 벼슬한 것을 두고 뜻을 잃었다고 말할 수 없다.", "notes": ["유한한 삶 속에서 썩지 않을 이름을 남기는 ‘{입신양명(立身揚名)}’을 {바람직}한 가치로 여기는 화자(갑)의 태도"]}, {"orig": "은거할 만하기에 은거한 것이므로 백이와 숙제*가 수양산에 숨은 것을 고상하다고 할수없고, 마땅히 벼슬", "notes": ["화자가 ‘을(목동)’로 전환되어, 공명을 추구하다 초췌해진 ‘갑(양반)’의 모습을 굴원 등에 빗대어 {부정적}으로 인식함."]}, {"orig": "에 나아가야 했기에 나아간 것이므로 강태공이 무왕*을 도와 위세를 떨친 것을 구차하다고 할수없다. 『주", "notes": []}, {"orig": "역』 고괘(蠱卦) 상구(上九)에 이르기를 “왕후를 섬기지 않는다.”라고 했고, 건괘(乾卦) 구이(九二)에 이르기", "notes": []}, {"orig": "를 “대인을 만나 봄이 이롭다.”라고 했으니, 각각 그 처한 상황에 따를 뿐이다.", "notes": []}, {"orig": "간교한 신하가 이익을 탐하여 작록을 사양함으로써 임금의 마음을 얻는 것이라든가, 위선적인 선비가 이", "notes": []}, {"orig": "름을 얻으려고 은둔하는 척 땅을 피해 다니는 것이라든가, 심지어 재주도 없고 덕도 부족해 세상에 버림받", "notes": []}, {"orig": "아 스스로 궁벽한 고을에 살며 아무런 힘도 없는 주제에 남을 꾸짖고 힐난하면서 거들먹거리며 사람들에게", "notes": []}, {"orig": "“나 또한 은자의 무리다.”라고 말하는 것은, 추녀가 미녀 서시의 웃는 모습을 흉내 내는 격이니, 거론할 것", "notes": []}, {"orig": "도 없다.", "notes": ["부귀와 몰락은 하늘에 달린 것이므로 {인위적}으로 추구한다고 얻을 수 있는 것이 아니라는 화자(을)의 가치관"]}], "analysis": "이 글은 한문 수필로 {의리}와 {시의}에 따른 선비의 올바른 출처(出處)와 처신을 주제로 단순히 벼슬을 하는 것(출세)과 숨어 사는 것(은거) 중 무엇이 옳은가를 따지는 것이 아니라, 그 {의리}와 {시의}가 중요함을 역설한다. 작가는 {의리}와 {시의}에 맞다면 벼슬에 나아가는 것도, 물러나는 것도 모두 군자의 길이라 보았으며, {명성}을 얻기 위해 은거를 {가장}하는 행태를 강하게 비판하고 있다. 역사적 인물의 긍정적 사례와 가상 인물의 {위선적 태도}를 {대비}하여 그 주장을 강화한다."}, {"author": "한용운", "work": "낙원은 가시덤불에서", "genre": "수필", "lines": [{"orig": "죽은 줄 알았던 매화나무 가지에, 구슬 같은 꽃방울을 맺혀 주는 쇠잔한 눈 위에, 가만히 오는 봄기운은 아름답기도 합니다.", "notes": ["자신의 한계를 인정하는 것이 아니라, 거창한 도리 대신 소를 치는 일상에서 삶의 이치를 깨달았음을 자부함."]}, {"orig": "그러나 그밖에 다른 하늘에서 오는 알 수 없는 향기는, 모든 꽃의 죽음을 가지고 다니는 쇠잔한 눈이 주는 줄을 아십니까.", "notes": ["자연 속에서 자유롭고 검소하게 살아가는 삶을 비유하며, 화자(을)가 {지향}하는 {안분지족}의 삶을 드러냄."]}, {"orig": "구름은 가늘고 시냇물은 옅고 가을 산은 비었는데, 파리한 바위 사이에 실컷 붉은 단풍은 곱기도 합니다.", "notes": []}, {"orig": "그러나 단풍은 노래도 부르고 울음도 웁니다. 그러한 ‘자연의 인생’은 가을바람의 꿈을 따라 사라지고 기억에만 남아 있는, 지난여름의 무르녹은 녹음이 주는 줄을 아십니까.", "notes": ["물질적으로는 풍요로우나 고단한 노동에 시달리는 삶에 대한 {부정적} 인식을 드러냄."]}, {"orig": "일경초가 장륙금신이 되고, 장륙금신이 일경초가 됩니다.", "notes": ["겉보기엔 화려해 보이나 결국 비참한 죽음을 맞이하는 위태로운 삶을 통해 {정치현실}에 대한 비판을 드러냄"]}, {"orig": "천지는 한 보금자리요, 만유는 같은 소조입니다.", "notes": ["삶의 유형을 {비교}하며, {욕심} 없이 {분수}를 지키며 사는 삶이 가장 바람직하다는 주제 의식을 강조함."]}, {"orig": "나는 자연의 거울에 인생을 비춰 보았습니다.", "notes": []}, {"orig": "고통의 가시덤불 뒤에, 환희의 낙원을 건설하기 위하여 님을 떠난, 나는 아아 행복입니다.", "notes": ["{대구법}을 통해 맑은 바람과 밝은 달을 즐기려고 창을 열고 잠을 줄이는 행위를 통해 {자연친화적인} 태도를 드러냄."]}], "analysis": "이 시는 한용운 특유의 {불교}적 세계관과 {역설}적 인식이 드러난 작품이다. 소멸이 곧 생성이라는 자연의 {순환} 섭리를 관찰한 화자는 ‘일경초’와 ‘장륙금신’이 다르지 않다는 {평등} 사상과. 만물이 한 보금자리라는 깨달음에 도달한다. 이러한 깨달음을 바탕으로 현재의 {이별}과 {고통}이 미래의 환희를 위해 필수적인 과정임을 인식하고, {역설}적으로 ‘{행복}’을 선언한다."}, {"author": "신경림", "work": "산에 대하여", "genre": "현대시", "lines": [{"orig": "다 험하고 가파른 것은 아니다", "notes": ["① 자연을 두고 어디를 혼자 갔겠는가: 누구도 자연을 두고 떠날 수 없다는 {반어적} 표현 / ② 자연을 두고 어디로 떠나 갔느냐: 자연을 자신만 즐길 줄 안다는 화자의 {자부심}을 드러냄."]}, {"orig": "어떤 산은 크고 높은 산 아래", "notes": []}, {"orig": "시시덕거리고 웃으며 나지막이 엎드려 있고", "notes": ["세속적인 벼슬(작록)에 {욕심}이 없음을 {설의적}으로 표현하여 화자의 {탈속적} 가치관을 강조함."]}, {"orig": "또 어떤 산은 험하고 가파른 산자락에서", "notes": []}, {"orig": "슬그머니 빠져 동네까지 내려와", "notes": []}, {"orig": "부러운 듯 사람 사는 꼴을 구경하고 싶다", "notes": ["속세와의 단절 의지를 {문을닫는} 행위로 구체화하여, 세상의 {유혹}을 멀리하려는 태도를 드러냄."]}, {"orig": "그리고는 높은 산을 오르는 사람들에게", "notes": []}, {"orig": "순하디순한 길이 되어 주기도 하고", "notes": []}, {"orig": "남의 눈을 꺼리는 젊은 쌍에게 짐짓", "notes": []}, {"orig": "따뜻한 사랑의 숨을 자리가 되어 주기도 한다", "notes": ["끝없는 인간의 세속적 욕심에 대한 {비판적} 인식을 드러냄."]}, {"orig": "그래서 낮은 산은 내 이웃이던", "notes": []}, {"orig": "가난이네 안방 왕골자리처럼 때에 절고", "notes": []}, {"orig": "그 누더기 이불처럼 지린내가 배지만", "notes": ["낚싯대’라는 소재를 통해 자연 속에서 욕심 없이 살아가는 소박한 삶(안빈낙도)에 대한 {자족감}을 표현함"]}, {"orig": "눈개비나무 찰피나무며 모싯대 개쑥에 덮여", "notes": []}, {"orig": "곤줄박이 개개비 휘파람새 노랫소리를", "notes": []}, {"orig": "듣는 기쁨은 낮은 산만이 안다", "notes": ["박봉을 위해 속세의 벼슬길에 오르는 것을 {경계}함."]}, {"orig": "사람들이 서로 미워서 잡아 죽일 듯", "notes": []}, {"orig": "이빨을 갈고 손톱을 세우다가도", "notes": []}, {"orig": "칡넝쿨처럼 머루 넝쿨처럼 감기고 어우러지는", "notes": []}, {"orig": "사람 사는 재미는 낮은 산만이 안다", "notes": ["당대의 혼란스러운 정치 상황을 ‘바람 비’, ‘칼과 톱’으로 {비유}하여 벼슬길의 {위태로움}을 강조함"]}, {"orig": "사람이 다 크고 잘난 것만이 아니듯", "notes": []}, {"orig": "다 외치며 우뚝 서 있는 것이 아니듯", "notes": []}, {"orig": "산이라 해서 모두 크고 높은 것은 아니다", "notes": []}, {"orig": "모두 흰 구름을 겨드랑이에 끼고", "notes": []}, {"orig": "어깨로 바람 맞받아치며 사는 것은 아니다", "notes": ["{벼슬}에 나아가고 물러나는 일의 판단이 쉽지 않음을 {전제}로 논의를 시작함."]}], "analysis": "이 시는 ‘높은 산’과 ‘낮은 산’의 {대조}를 통해 깨달은 더불어 사는 삶의 가치와 소중함을 노래한다. 화자는 일반적으로 우러러보는 크고 높은 산 대신, 마을 가까이에서 사람들과 살아가는 {낮은산}에 주목한다. 이 과정에서 화자는 낮은 산이 사람들의 삶을 잘 이해하고 {포용}해 주는 존재임을 드러낸다. 이를 통해 힘과 권력을 지향하는 삶보다, 이웃과 더불어 {소박}하게 살아가는 {민중}적 삶의 건강함과 아름다움을 예찬하고 있다. 산이라 해서 다 크고 높은 것은 아니다"}, {"author": "박지원", "work": "능양시집 서", "genre": "한문수필", "lines": [{"orig": "달사는 이상할 것이 없으나 속인은 의심스러운 것투성이다. 이른바 본 것이 적으면 이상하게 생각되는 것이 많은 것이다. 그러나 달사라고 해서 어찌 사물을 쫓아가며 눈으로 보았겠는가? 하나를 들으면 눈으로 열 가지를 떠올리고 열 가지를 보면 마음에 백 가지를 펼치고 보니 수많은 이상야릇한 것들은 도리어 사물에 붙은 것이고 나와는 상관이 없는 것이다. 그러므로 마음은 한가롭고 여유가 있어 무궁무진하게 맞대응할 수 있다.", "notes": ["벼슬에 나아가고 물러나는 핵심 기준은 개인의 이익이 아닌 {‘의리(義理)’}와 {‘시의(時宜)’}에 있다는 글쓴이의 주장을 {집약}함"]}, {"orig": "본 것이 적은 사람은 백로를 기준 삼아 까마귀를 비웃고 물오리를 기준 삼아 학의 긴 다리가 위태롭다고 생각한다. 사물 자체는 이상할 것이 없는데 저 혼자 의심해 화를 내며 한 가지라도 생각과 다르면 만물을 모조리 비방한다.", "notes": ["{대구법}을 사용해 미자, 이윤, 부열 등 역사적 인물들의 {사례}를 들어, 상황에 맞는 올바른 처신의 {정당성}을 논증함."]}, {"orig": "아! 저 까마귀를 보라. 그 날개보다 더 검은색이 없긴 하나 얼핏 옅은 황금색이 돌고, 다시 연한 녹색으로 반짝인다. 햇볕이 비추면 자주색으로 솟구치다, 눈이 어른어른하면 비취색으로도 변한다. 그러므로 내가 비록 푸른 까마귀라고 말해도 괜찮은 것이고 다시 붉은 까마귀라고 말해도 상관없는 것이다. 저 사물은 본디 정해진 색이 없는데도 내가 눈으로 먼저 정해 버리는 것이다. 어찌 그 눈에서만 판정할 따름이라? 보지도 않으면서 마음속에서 미리 판정해 버린다. 슬프다! 까마귀를 검은색으로 고정한 것도 충분한데 다시금 까마귀를 갖고 세상의 온갖 색을 고정하려 하는구나. 까마귀가 과연 검기는 하다. 그러나 누가 다시 이른바 푸르고 붉은 색이 검은색 안에 깃들어 있는 빛깔인 줄 알겠는가?", "notes": ["백이와 숙제의 은거를 고상하지 않다고 평가하는 것은 그 행동이 {정당성있는} 것이기 때문임."]}, {"orig": "검은 것을 일러 어둡다고 하는 자는 비단 까마귀를 알지 못하는 것뿐 아니라 검은색도 모르는 것이다. 왜냐? 물은 깊고 그윽하기 때문에 비출 수 있고, 옻칠은 검기 때문에 비춰 볼 수 있는 것이다. 그러므로 빛깔이 있는 것엔 빛이 있지 않은 것이 없고, 형체가 있는 것엔 자태가 있지 않은 것이 없다.", "notes": ["‘위선적인 선비’가 땅을 피해 다니는 것은 겉으로는 은거를 택했으나 그 목적이 {명성}을 얻기 위해 하는 것이기 때문임.  진정한 도덕성 없이 {명예나이익}을 위해 은거를 흉내 내는 {위선적인} 태도를 비판함."]}, {"orig": "미인을 관찰하면 시를 알 수 있다. 그녀가 고개를 숙이고 있는 것은 부끄러워하고 있음을 나타내고, 턱을 받치고 있는 것은 한스러워함을 나타낸다. 홀로 서 있는 것은 누군가 그리워하고 있음을 나타내고, 눈썹을 찌푸리는 것은 근심하고 있음을 나타낸다. 기다리는 바가 있으면 난간 아래 서 있는 모습으로 보여 주고, 바라는 바가 있으면 파초 아래 서 있는 모습으로 보여 준다. 만약 다시 그녀에게 서 있는 모습이 재계한 것처럼 단정하지 않다고 나무라거나 앉은 모습이 불상처럼 가부좌가 아니라고 나무란다면, 이는 양 귀비에게 치통을 앓는다고 꾸짖고, 번희에게 쪽 찐 머리를 감싸 쥐지 말라고 금하며, 사뿐사뿐한 걸음걸이를 요염하다고 조롱하고, 손뼉 치며 추는 춤을 가볍다고 꾸짖는 격이다.", "notes": ["소멸해 가는 대상(‘쇠잔한 눈’)이 새로운 생명(‘꽃방울’)의 탄생을 돕는 자연의 {순환}적 섭리와 봄의 아름다움을 {예찬}함."]}, {"orig": "나의 조카 종선은 자가 계지인데 시를 잘 썼다. 한 가지 법에 매이지 않고 온갖 시체를 두루 갖추었으니, 우뚝이 동방의 대가가 된다. 성당의 시인가 싶어 보면 어느새 한위의 시체를 띠고 또 홀연 송명의 시체를 띤다. 겨우 송명체라고 말하려니 다시 성당의 시체를 띠고 있다.", "notes": ["꽃의 향기(생명력)가 꽃의 죽음을 재촉하는 눈(소멸)에서 비롯된다는 {역설}적 인식을 통해 생과 사가 연결되어 있음을 강조함. {의문}형 어미를 통해 자연의 섭리에 대한 깨달음을 {환기}하고 있음."]}, {"orig": "아! 세상 사람들이 까마귀를 비웃고 학을 위태롭게 여기는 것이 또한 너무 심하다. 그러나 계지의 동산에는 까마귀가 문득 푸르렀다 붉었다 한다. 세상 사람들은 미인을 재계하는 모습이나 불상처럼 만들고 싶어 하나, 손뼉 치며 추는 춤과 사뿐사뿐한 걸음걸이는 날이 갈수록 가볍고 요염해지고 쪽 찐 머리를 감싸 쥐거나 치통을 앓는 모습은 모두 각기 자태를 갖추고 있으니, 그 성내고 화를 내는 것이 심해질 것임은 의심할 바 없다.", "notes": ["단풍(가을)의 아름다움과 슬픔은 지난 여름의 녹음(원인)이 있었기에 가능한 것임을 제시하며 {인과}적 자연 섭리를 통찰함."]}, {"orig": "세상에 달사는 적고 속인은 많다. 그러니 침묵하고 말하지 않는 것이 좋으리라. 그런데도 말을 그칠 수 없는 것은 왜일까? 아! 연암 노인이 연상각에서 쓴다.", "notes": []}], "analysis": "박지원이 조카 박종선의 시집인 <능양시집>에 써준 서문으로, 사람들이 사물을 있는 그래로 보지 못하고 자신의 편협한 경험과 {고정관념}으로 재단하는 것을 비판하며 대상을 바라보는 유연하고 올바른 인식 태도를 강조한다. ‘{까마귀}’를 통해 사물의 본질은 {고정}되어 있지 않음을, ‘{미인}’의 자태를 통해 시 또한 하나의 격식에 얽매여서는 안됨을 주장한다. 이는 {획일성}을 거부하고 {다양성}과 {개성}을 중시하는 글쓴이의 진취적인 철학을 보여준다."}, {"author": "이학규", "work": "박꽃이 피어난 집", "genre": "한시", "lines": [{"orig": "내가 사는 집은 높이가 한 길이 채 되지 않고 너비가 아홉 자가 되지 않는다. 일어나 인사하려면 갓이 걸리고, 드러누우려면 무릎을 구부려야 한다.이 쏟아져 들어와 창문이 열에 달아오른다. 그래서 집을 에워싼 담장 밑에 박을 십여 뿌리 심었더니 넝쿨이 뻗어 올라가 지붕을 뒤덮었고, 그 그늘 덕을 보게 되었다. 그러나 파리와 모기가 그 컴컴한 그늘에 서식하고 뱀과 구렁이가 서늘한 습지에 도사리고 있어서 어두컴컴해진 밤이 되면 자주 일어나 등잔이나 촛불을 들고 마당을 왔다 갔다 하였다. 조용히 앉아 있자니 벌레에 물린 자리를 긁어 대느라 지치고, 벌떡 일어나 빨리 걸으면 저들에게 독하게 물릴까 겁이 났다.곤이 날이 갈수록 심해지더니 병이 나서 소갈병도 생기고 우울증도 생겼다.", "notes": ["미물인 풀(‘일경초’)과 거대한 불상(‘장륙금신’)이 본질적으로 다르지 않다는 {불교}적 연기설과 제행무상의 깨달음을 드러냄.", "온 세상과 우주 만물이 하나로 {연결}되어 있다는 ‘만유일화(萬有一化)’의 {불교}적 세계관을 제시함."]}, {"orig": "손님을 만나기만 하면 그 처지를 털어놓곤 하였다. 서울에서 찾아온 과객이 있어 내 하소연을 듣고서 안타까워하더니 예전에 직접 겪은 일이라며 다음과 같은 사연을 들려주었다.", "notes": ["이별의 고통(‘가시덤불’)을 인내하고 승화시켜야 진정한 구원(‘낙원’)에 이를 수 있다는 {역설}적 깨달음을 통해 비극적 상황을 {행복}으로 수용함. 고통이 단순히 회피해야 할 대상이 아닌 환희와 연결된 과정임을 {주관적변용}을 통해 드러냄."]}, {"orig": "저는 어려서부터 가난하여 장사를 해 왔습니다. 조령 이남의 나루터나 역마을의 여관에서부터 후미진 시골의 작은 주막집까지 발길이 닿지 않은 데가 없습지요. 무더운 여름철이 되면 나그네들이 한데 모여듭니다. 지방 수령이나 사신들은 먼저 호젓한 안채에서 서늘한 바람을 쐬고, 바람 잘 드는 행랑이나 한데서 잘 수 있는 평상은 또 그들을 따라다니는 종이나 역졸들이 차지합니다. 남아 있는 곳은 벽을 후벼 파서 관솔불을 피운 후덥지근한 온돌방이나 대자리를 쳐서 빈대를 쫓아내는 뜨뜻한 평상이 그나마 깔끔한 자리인데 바로 우리 같은 과객들이 하루이틀 묵는 곳입니다.", "notes": ["산에 대해 사람들이 일반적으로 가지는 {고정관념}을 부정하며 시상을 전개함."]}, {"orig": "밤이 깊어 갈수록 사람들로부터 열기가 후끈 달아올라 마치 가마솥에서 밥을 짓는 김이 오르는 느낌입죠. 겨드랑이에서 냄새가 심히 나는 이도 있고, 방귀 뀌는 자, 코를 드르렁드르렁 고는 자, 이를 부득부득 가는 자, 옴이 나서 긁어 대는 자, 잠꼬대하며 욕을 하는 자가 있어 나오는 소리와 하는 짓이 천태만상이라 이루다 표현할 수 없습니다.", "notes": ["낮은 산을 {의인}화하여 독자적 가치를 지니면서도 권위적이지 않고 {소박}하며 {친근}한 태도를 지닌 존재로 묘사함."]}, {"orig": "그 고역을 견디지 못해 옷가지를 집어 들고 돗자리를 옆에 끼고 부엌두렁, 소 외양간이나 마구간을 두루 찾아다니다 보면 어느새 네댓 번 자리를 옮기게 되더군요. 그런데 여관집 머슴이나 종을 보면 땟국물이 흐르는 머리와 얼굴을 하고서 부산하게 소나 말처럼 뛰어다니면서 아침저녁으로 행인들이 남긴 음식을 받아먹습니다.먹다 버린 밥이나 국도 달게 먹지 않는 법이 없습니다. 술에 취하거나 배가 부르면 자리에 드러눕자마자 바로 잠이 듭니다. 우리들이 접때 견디지 못하던 잠자리에서 그놈들은 마치 쌀쌀한 날씨에 시원한 집에서 잠을 자듯이 편안히 잘도 잡니다.그놈들의 행동이나 낯빛을 보면 남루한 누더기 옷을 걸치고는 있으나 살결은 튼튼하여 병도 고통도 없이 천수를 누리지요.", "notes": ["사람들의 삶에 관심을 갖고 가까이 어울리고 싶어 하는 낮은 산의 {서민}적이고 {공동체}적인 지향성을 드러냄.", "타인을 위해 자신을 내주는 ‘길’과 ‘숨을 자리’가 되어주는 낮은 산의 이타적이고 포용적인 덕성을 {구체적행위}로 제시함.", "{직유법}을 통해 낮은 산을 가난한 이웃의 생활상에 빗대어, 비록 겉모습은 누추해 보일지라고 서민들의 삶과 애환을 함께하며 그들을 {포용}하고 {위로}하는 존재임을 강조함."]}, {"orig": "그건 다른 요인이 있어서가 아니더군요. 저들은 자기들이 사는 곳을 여관으로 간주하고 운명과 분수가 본래부터 그렇게 정해졌다고 여깁니다.분개하거나 걱정함으로써 속을 상하게 하거나 끙끙대고 탄식하여 기운을 허비하는 일도 없습니다. 그러다 보니 병도 고통도 없이 천수를 누리는 게지요.", "notes": ["사소하고 작은 자연물들과 어우러지는 {소박}한 기쁨은 낮고 겸손한 산만이 누릴 수 있는 가치임을 역설함."]}, {"orig": "다른 한편으로 보면, 지금 이 세상이란 우리들이 목숨을 이어 가며 죽은 이를 떠나보내는 여관인데 그 여관이란 게 또 하룻밤이나 이틀 밤을 자고 떠나는 여관일 뿐입니다.그런데 지금 어르신께서는 이 여관 안에서 몸을 부쳐 살면서 또 옹색하게 떠돌아 후미진 골짜기에 몸을 숨기는 처지이니 이는 또 여관 속의 여관에서 머무는 꼴입니다.", "notes": ["{갈등}이 있어도 결국은 {화해}하며 어우러져 사는 인간사의 진정한 재미와 이치를 {낮은산}만이 이해하고 있음을 보여줌.", "{유추}를 통해 크고 강한 것만이 가치 있는 것이 아님을, {평범}하고 {소박}한 존재들의 삶이 지닌 가치를 재확인하며 마무리함."]}, {"orig": "저 머슴이나 종은 무식하고 무지하여 여관을 여관이라 알고 있을 뿐 음식을 잘 먹고 잠을 편히 자므로 추위와 더위가 그에게 해를 가하지 못하고 질병이 그에게 재앙을 끼치지 못합니다. 반면에 어르신께서는 도를 지키고 운명을 순종하며 평상시의 살아가는 길을 잘 알고서 행하시는 분입니다.관 속의 여관에서 머무는 처지임에도 여관이라 여기지 않고서 스스로 속에서 일어나는 불을 돋워 일으키고 원기를 해치니 질병이 생기고 위기나 죽음이 당장 이를 것입니다.고자 하는 분들은 옛날의 성현이건마는 여관의 머슴이나 종과 같은 자들보다 못하단 말입니까?", "notes": ["사물의 이치를 통달한 ‘달사’와 식견이 좁은 ‘속인’을 {대조}하여, 경험과 식견의 차이가 {인식}의 차이를 만듦을 제시함. 여기서 달사는 현상에 얽매이지 않고 대상의 본질을 꿰뚫어 보는 {통찰}의 자세를 지니고 있음.", "자기의 좁은 소견과 {고정관념}을 기준으로 타인을 판단하고 비방하는 속인의 어리석은 태도를 {구체적사례}(백로, 물오리)를 들어 비판함.", "빛의 각도에 따라 다양하게 변하는 {까마귀}의 색을 예로 들어, 대상을 고정된 시각(‘검다’)으로만 규정하려는 {선입견}의 오류를 지적함. 여기서 ‘검은색’은 대상을 한 가지 잣대로만 평가하려는 사람들의 {고정관념}이 투영된 소재임."]}, {"orig": "과객의 말을 듣고서 그 말을 조리 있게 다듬어 벽에 써서 박꽃이 피어난 집의 기문으로 삼는다.", "notes": []}], "analysis": "이 작품은 {유배지}의 좁고 열악한 집에서 {더위}에 괴로워하며 살아가던 글쓴이가 한 {과객}이 들려준 머슴들에 대한 이야기를 통해 얻은 {깨달음}을 서술한 수필이다. 과객이 들려준 이야기를 {인용}하여 그와의 우연한 {대화}를 통해 자신이 잊고 지냈던 삶의 {교훈}을 깨닫게 되었음을 말하고 있다. {마음가짐}에 따라 달라지는 삶의 행복과 고통 그리고 주어진 처지에 {순응}하는 삶의 지혜를 서술하고 있다. 비유적 표현을 사용하여 추상적 개념인 인생을 {구체화}하여 설명하고 있으며 {대조}적 대상을 제시하여 주제를 부각하고 있다."}, {"author": "공선옥", "work": "한데서 울다", "genre": "현대소설", "lines": [{"orig": "[앞부분 줄거리] 정희는 집을 구하기 위해 도시에 갔다가 돌아오려는 참에, 막무가내로 불쾌한 수작을 거는 사내를 주차장에서 맞닥뜨려 황급히 자리를 피해 운전대에 오른다.", "notes": []}, {"orig": "남편이 돌아오기 전에 집에 가려면 속력을 내야 할 것이었다. 다행히 도시 외곽으로 갈수록 차가 쑥쑥 빠져서 낯모르는 남자 때문에 고약했던 기분도 차차 나아졌다.사라지자 그 자리에 불안감이 들어찼다. 팔자에도 없던 ‘전원생활’을 하게 된 남편은 그 덕분에 길어진 출퇴근길이 주는 스트레스를 툭하면 그녀에게 쏟아 내곤 했다. 그런데 이즈음 남편의 짜증이 갑자기 없어진 이유를 정희는 ‘그 여자’ 때문이라고 여겼다. 도시에서 한 시간 남짓 되는 그 출근길에 남편은 동네 입구에 사는 그 처녀를 태우고, 그러니까 도시식으로 말하면 ‘카풀’하여 다니게 되었던 것이다. 그것 때문인가. 그녀가 도저히 그곳의 생활을 견딜 수 없다고 판단하여 다시 도시로 들어오려고 하는 이유가. 그건 맹세코 아니었다. 정희가 더 이상은 이곳에서 못 살겠다, 하면 남편은 틀림없이 그럼 달나라에 가 살라고 하고도 남을 거였다.각하면 도시에 집보러 다니는 이즈음 자신의 행각을 도저히 남편한테 털어놓을 수 없는 형편이었다.", "notes": ["‘검은색=어둡다‘라는 {고정관념}을 비판하고 검은색의 속성(사물을 비춤)을 재해석함. 이를 통해 현상 너머의 본질을 보지 못하는 피상적 인식을 비판하고 깊이 있는 {통찰}을 강조함.", "{미인}의 자태가 상황과 감정에 따라 다양하듯, 시(문학) 또한 하나의 형식이나 규범에 얽매이지 않고 다양하게 표현되어야 함을 {유추}를 통해 설파함."]}, {"orig": "시골로 이사하여 다행히 아이들도 그런대로 잘 적응하고 시어머니도 노인들 특유의 자연 친화력으로 도시 살 때와는 사뭇 다른 건강하고 온화한 ‘시골 할머니’가 되어 가는 중이었다.음 시어머니를 봤을 때의 느낌은 그녀가 고등학교 때 읽은 도스토옙스키 소설에 나오는 전당포 노인을 연상시키는 바도 있었다. 그처럼 외롭고 각박하고 쓸쓸해 보이는 모습이었는데 이즈음 시어머니는 아주 많이 따스해졌다. 그런데 왜 정희는 도시로 다시 나오려 하는 것일까. 그 이유를 어떻게, 누구한테 설명할 수 있을까. 정희는 아득해졌다. 사람들이 움직이는 이유는, 그리고 살아가는 이유는 모두 다 거창해야만 하고 분명해야만 하는 것일까. 꼭 그래야만 하는 것일까. 왜 자신으로서는 절실한 이유가, 문제가 타인들에게는 하찮고 우습고 그래서 짜증 나는 것이 될까.", "notes": ["조카 종선의 시가 특정한 격식에 얽매이지 않고 변화무쌍하고 {유연함}을 칭찬하며, 이것이 진정한 ‘대가’의 면모임을 밝힘.", "세상 사람들의 {편협}한 시각을 탄식하며, 이와 대조적으로 종신은 열린 사고와 유연한 관점을 지니고 있음을 {비유}적으로 표현함."]}, {"orig": "아침에 정희는 또 그 소리를 들었다. 그녀가 정말 바라지 않는 그 소리. 새소리, 이슬방울 떨어지는 소리보다도 더 빨리 듣게 되는 소리. 남편이나 아이들이나 시어머니나 이웃들은 다들 아무렇지 않고 오히려 은근히 기다릴지도 모르는 소리. 다시 한번 고쳐 생각해 보면 정말 정희 자신으로서도 아무렇지 않은 소리. 어찌 해석하면 눈물겨운 삶의 소리.네에 살 때 날마다 들었던 소리. 이를테면 개사요, 염소 사요, 소리들. 콩나물 사요, 따끈따끈한 두부 사요, 소리. 그 남자는 꼭 세 번째에 왔다. 그러고는 확성기를 소리 높여 틀었다. 그 남자는 꼭 카세트를 튼다. 중간중간에 기괴한 추임새가 들어가는, 관광버스 안에서 아줌마들이 춤출 때 트는 그 노래들 끝나면 이윽고 남자는 자신이 가지고 다니는 품목들을 열거하기 시작한다. 이미 콩나물, 두부를 파는 사람이 동네를 한 바퀴 돌고 나간 뒤인데도 제깟 게 돌고 나갔든지 말았든지 자기로서는 알 바 아니라는 듯, 한가롭게, 태평하게, 천연덕스럽게, 혹은 청승맞게.", "notes": ["{협소}하고 누추한 집의 형태를 {과장된} 표현과 {대구법}을 활용하여 구체적으로 묘사함.", "{열악한} 주거 환경으로 인해 겪게 되는 육체적, 심리적 {고통}을 감각적 이미지를 통해 제시함."]}, {"orig": "번개탄 있어요, 미원 있어요, 왜간장 있어요, 아부래기 있어요, 간고등어 있어요, 화장지 있어요, 계란 있어요, 명태 있어요, 있어요, 있어요…… 한없는 있어요, 소리. 그 남자 때문일까. 시골 동네 입식 부엌, 기름 보일러 안 한 집 없는데 도대체 어느 시대를 살다 왔는지, 언제 녹음한 걸 트는 건지 아무도 사지 않을 번개탄부터 사라고 외치는 남자가 자신을 괴롭혔으면 어디를 얼마나 괴롭혔다고, 자신을 짜증 나게 했으면 어디를 얼마나 짜증 나게 했다고를 벌여 가며 이주를 해 온 시골집인데, 그런 집을 놔두고 또다시, 그렇게도 저주해 마지않던 도시의 ‘집도 아닌 집’을 보러 다닌단 말인가. 그렇다면 자신이 남편 출근하고 아이들 학교 가고 시어머니 아파 누워 있는 이웃 할머니네로 병문안차 마실 간 사이에 네 살배기 옆에 끼고 벌건 대낮에 그놈의 집도 아닌 집을 구하러 도시 바닥을 싸돌아다니는 이유가 도대체 뭐란 말인가.", "notes": ["글쓴이와 {대화}하는 인물인 과객의 입을 빌려 현상을 바라보는 {새로운} 관점을 제시하고 있음.", "과객이 경험한 {열악한} 잠자리를 {열거하여} 글쓴이 못지않은 고통스러운 환경이 존재함을 드러냄."]}, {"orig": "[중략 부분 줄거리] 정희는 마을의 사냥꾼들로 인한 총기 사건 때문에 마을을 떠나고 싶어졌던 것을 떠올린다.", "notes": []}, {"orig": "마을에서 파란색 작은 트럭이 내려오고 있다. 정희는 제 차를 길가 쪽으로 바짝 붙여 댄다. 차가 가까이 올수록 귀에 익은 노랫소리도 선명하다. 정희는 모른 척하고 왼고개를 튼 채 차가 비켜 가기를 기다린다. 차가 다 비켜 갔겠지, 싶어 고개를 바로 하는 순간 운전석 옆자리에 앉은 아이가 고개를 있는 힘껏 뒤로 젖혀 그녀를 바라본다. 그러고는 손을 흔든다.고 있다니. 한 번도 상상해 보지 않은 일이다. 아이는 마냥 손을 흔든다. 웃는다. 정희는 클랙슨을 길게 울렸다. 트럭이 멈춘다.", "notes": ["{열거법}이 사용됨. 타인과 섞여 지내야 하는 {불편한} 상황을 {청각}적, {후각}적 심상을 활용하여 사실적이고 {해학}적으로 묘사함."]}, {"orig": "“오늘 아침에는 안 오셨던가요?”", "notes": []}, {"orig": "마음에도 없는 소리를 한다. 아침에 안 오더니 기어코 오후에 온 모양이군, 속으로는 삐죽거리는 심보면서.", "notes": ["독이나 단지 따위를 놓기 위하여 부엌 한쪽에 턱을 지어 쌓은 단."]}, {"orig": "“예에, 어제 얘 엄마가 애를 낳았어요. 뭘 드릴까요?” / “간고등어 있어요?”", "notes": []}, {"orig": "“명태도 있고 갈치도 있어요.” / “번개탄도 있잖아요.” / 사내가 씨익 웃는다.", "notes": []}, {"orig": "“요새도 분명히 연탄 때는 집이 있는데 번개탄 장수는 안 온다 그래서 갖고 다니지요.”", "notes": ["{열악}한 환경 속에서도 생계를 위해 분주하게 움직이는 {하층민}들의 삶을 관찰함."]}, {"orig": "언제 간을 했는지 부옇게 소금기가 말라붙어 있는 간고등어 한 손만 사려다가 아기를 낳은 엄마 땜에 아빠를 따라다니는 어린것한테 마음이 끌려 ‘아부래기’도 산다.산 것들을 차에 갖다 놓고 지갑을 찾아봐도 지갑이 없다. / “명수야, 엄마 지갑 못 봤어?”", "notes": ["과객과 머슴의 태도를 {대조하여} 인식의 차이가 {결과}의 차이를 만듦을 강조함."]}, {"orig": "지갑이라는 말이 뭔 말인지도 모를 아이한테 지갑 얻다 뒀냐고 건짜증을 낸다.", "notes": []}, {"orig": "“찌갑? 찌갑 여기쩌.” / 아이가 내미는 것은 내내 손에 쥐고 다니던 장난감 로봇이다.", "notes": []}, {"orig": "낭패다. / “아저씨, 내일 또 와요?” / “오다마다요.”", "notes": []}, {"orig": "“그럼 오늘은 외상을 달아 놓으세요. 저 어디 사는지 아시죠?” / “알다마다요.”", "notes": []}, {"orig": "트럭은 떠났다. 아이가 손을 흔드는데도 같이 흔들어 줄 정신이 없다. 그러면서 또렷이 떠오르는 시내 주차장에서의 일. 진저리가 절로 인다.", "notes": []}, {"orig": "차를 몰아 집으로 오며 정희는 다짐한다. 내일부터는 시내 나갈 일도 없을 것이라고. 분수에 맞지도 않는 이놈의 차도 없애 버릴 거라고.그런데 웬 놈의 눈물은 그렇게도 쏟아지는지, 정희는 그만 차의 시동을 끄고 말았다.", "notes": ["자신의 처지를 있는 그대로 {수용}하고 욕심을 부리지 않는 머슴들의 {순응}적 태도를 서술함.", "인생을 잠시 머물다 가는 ‘여관’에 {비유}하여 삶의 유한성과 {무상함}을 일깨움."]}], "analysis": "이 작품은 삶의 공간을 통해 자신이 {지향}하는 삶의 모습을 고민하는 한 주부의 이야기를 다루고 있는 소설이다. {도시} 아파트에서의 삶과 {시골} 마을 땅집에서의 삶을 {대조}적인 공간으로 놓고 ‘집’의 의미를 고민하는 주인공과 그 가족의 모습을 통해 {이상}과 {현실} 사이에서 방황하고 {갈등}하는 현대인의 모습을 형상화하고 있다. 진정한 ‘집’의 의미와 삶의 위안, 소외된 {이웃}과의 소통을 통한 {내면}의 치유를 서술하고 있다. 트럭 소리에 대한 인물의 인식 {변화}가 주제 형상화에 }임."]}, {"orig": "거울 속에 나타나 온다.", "notes": ["{설의법}이 사용되어 {부정}적인 자아 인식이 드러나고 있음.", "일제 강점하의 {조국}을 의미함."]}], "analysis": "이 시는 {암울한} 시대 상황에 처한 시인의 자세가 잘 드러난 시로 평가받는다. 과거 자신의 삶을 욕된 것으로 인식하고 ‘무슨 기쁨을 바라 살아왔던가.’와 같은 {탄식}으로 참회를 갈음하던 화자는 언제이든 반드시 찾아올 ‘그 어느 즐거운 날’을 {전망}하면서 그때 자신이 ‘부끄런 고백’, 즉 현재의 참회를 {다시} 참회할 수 있기를 기대한다. 그러나 이러한 기대를 실현하기 위해서 화자는 ‘밤이면 밤마다’, ‘손바닥으로 발바닥으로’ 거울을 닦는 행위, 즉 {치열}하고 처절한 {자아성찰}이 요구됨을 인식한다. 이러한 자아 성찰의 결과 자신이 ‘홀로’, ‘슬픈’ 희생의 길을 걷게 될 것임을 깨닫고도 이를 감내하겠다는 화자의 태도에서 숙연함을 느낄 수 있다. 자아 성찰을 통한 {참회}와 {희생}의 의지가 주제이다. 1~2연에서는 {과거} 자신의 삶에 대한 {성찰}과 이에 대한 {참회}를 하는 화자의 모습이 드러난다. 3연에서는 미래에 대한 {긍정}적 전망과 새로운 {참회}의 필요성을 드러내고 있다. 4~5연에서는 치열한 자아 {성찰}을 통해 확인하는 {희생}과 비극적 운명을 감내하겠다는 화자의 의지가 나타나고 있다."}, {"author": "허형만", "work": "녹을 닦으며", "genre": "현대시", "lines": [{"orig": "새로이 이사를 와서", "notes": ["녹이 낀 거울은 {오랜} 역사의 유물이라는 점에서 단순한 {반성}적 자기 인식 이상의 것, 즉 오랜 세월 동안 이어져 온 {역사}의 거울을 의미한다고 볼 수 있음. 이를 통해 {민족}과 {역사}에 관련된 참회를 하고 있음이 드러남."]}, {"orig": "형편없이 더럽게 슬어 있는", "notes": []}, {"orig": "흑갈빛 대문의 녹을 닦으며", "notes": ["현재의 시점에서 {과거} 자신의 삶을 되돌아보고 쓰는 {부끄러움}의 기록임.", "자기의 {잘못}에 대하여 깨닫고 {깊이} 뉘우침.", "부끄럽고 {무의미}한 삶이었으므로 {길게} 쓸 필요가 없다고 느낌."]}, {"orig": "내 지나온 생애에는", "notes": []}, {"orig": "얼마나 지독한 녹이 슬어 있을지", "notes": []}, {"orig": "부끄럽고 죄스러워 손이 아린 줄 몰랐다", "notes": ["현재의 화자가 쓴 한 줄의 {참회록} 내용"]}, {"orig": "나는, 대문의 녹을 닦으며", "notes": []}, {"orig": "내 깊고 어두운 생명 저편을 보았다", "notes": ["화자가 살아온 {모든} 삶으로 화자의 {나이}임."]}, {"orig": "비늘처럼 총총히 돋쳐 있는", "notes": ["자기 {평생}의 삶이 {무의미}함."]}, {"orig": "회한의 슬픈 역사 그것은 바다 위에서", "notes": ["{미래} 상황으로 조국이 {광복}하는 날을 의미함.", "{미래}의 시점에서 {현재} 자신의 삶을 되돌아보고 쓰는 {부끄러움}의 기록을 말함."]}, {"orig": "혼신의 힘으로 일어서는 빗방울", "notes": ["{미래}의 ‘어느 즐거운 날’에 적을 {참회록}의 내용으로 {현재}의 자신을 반성함."]}, {"orig": "그리 살아온", "notes": []}, {"orig": "마흔세 해 수많은 불면의 촉수가", "notes": []}, {"orig": "노을 앞에서 바람 앞에서", "notes": []}, {"orig": "철없이 울먹였던 뽀오얀 사랑까지", "notes": []}, {"orig": "바로 내 영혼 깊숙이", "notes": []}, {"orig": "칙칙하게 녹이 되어 슬어 있음을 보고", "notes": ["2연의 ‘만 이십 사 년 ~ 바라 살아왔던가’에 해당함. {암담}한 현실에 {적극}적으로 맞서지 못하고 참회록이나 쓰고 있었던 {소극}적인 자신을 "자신의 삶이 선부라는 {이름}에 걸맞은지 되돌아보며 {반성}하는 겸손하고 성찰적인 태도임."]}], "analysis": "이 작품은 삶의 여정에서 {필연}적으로 겪게 되는 {상실}과 비애를 바탕으로, 결국 세상에 {홀로} 남는 인간 존재의 본질을 형상화하고 있다. ‘강을 따라갔다 돌아왔다’는 것은 {물리}적 여정을 넘어 인생의 시작과 끝, 떠남과 귀환을 {상징}한다. 특히 강의 {흐름}을 따라가며 마주하는 다양한 변화의 장면을 {대비}하여 드러내고, 지향과 전진의 삶의 국면이 회고와 상실이라는 양방향성과 함께하고 있음을 통해 인생의 {무상감}과 죽음에 대한 {성찰}을 드러내고 있다. 혼(魂)이 오늘은 유빙(流氷)처럼 떠가네"}, {"author": "김인숙", "work": "길의 안내자들", "genre": "현대소설", "lines": [{"orig": "모든 여행은, 그것이 비록 아침에 떠났다가 한잠도 자지 않고 새벽이 되기 전에 돌아오는 짧은 것이라고 하더라도, 그 시간은 터널 안에 있다는 생각이 든다. 터널의 울림은 깊고, 어둠은 몽롱하지만, 그러나 모든 터널은 바깥을 향해 열려 있다. 한때는 예닐곱 살 어린아이이던 내가 오늘에 이르기까지 수십 년의 여행이 늘 성공적이던 것은 아니다. 그럴 리가 있으랴! 아마도 대개는 실패였으리라. 터널을 지나 세상으로 나왔으나, 그 세상이 내가 원하던 곳인 적은 그리 많지 않다.", "notes": ["다른 사람의 {평가}가 잘못되어 너그럽게 포용하는 것이 아니라, 글쓴이 {스스로} 자신의 삶이 ‘선자’를 놓을 만한 자격이 되는지 염려하는 {성찰}적 자세에서 비롯된 진술임.", "자전거 바퀴가 돌아가는 소리를 가을의 {계절감}을 드러내는 여치 울음소리에 {비유}하여 {청각}적으로 형상화함."]}, {"orig": "나는 대개 길을 잃고 망연자실 서 있다가 서둘러 되돌아갈 터널을 찾는다. 나는 떠나는 쪽보다는 늘 회귀하는 쪽이어서, 실패를 자인하는 순간에 가장 먼저 취하는 태도는 더 멀리 나가는 것이 아니라 되돌아가는 쪽이다. 그리하여 여행지에서 남는 사진은 황홀한 추억보다 망설임과 초조함이다. 그러나 그중에서도 빛나는 사진은 있다. 대체 언제 찍었는지, 어떤 상황에서 찍혔는지 알 수 없으나 사진 속의 나는 잇몸을 다 드러낸 채 웃고 있다. 기억할 수 없는 찰나가 나를 위로한다. 무엇이 걱정이랴. 나는 수십 년을 살고도 여전히 살아 있으니, 떠나는 일은 이미 내 몸이 아니랴.", "notes": []}, {"orig": "지난해까지 내가 몇 년 동안 머물던 중국의 도시 다롄에는 여행하는 사람들을 위한 특별한 직업이 있다. 공항에서 시내로 들어오다 보면 팻말 하나씩을 들고 길가에 줄줄이 서 있는 사람들을 볼 수 있는데, 그들의 직업은 ‘향도(嚮導)’ 즉 길을 안내하는 사람들이다. 사람들은 ‘향도’라고 씌어진 공책 크기만 한 팻말을 가슴 앞으로 치켜들고 서 있거나, 앉아 있거나, 고개를 끄덕거리며 졸고 있다. 그들을 처음 발견했을 때 나는 그들이 인력 시장에 나와 있는 구직자들이 아닌가 했다. 길을 안내하는 사람들이라는 팻말을 봤는데도, 그 남루하고 한가해 보이는 사람들이 오히려 ‘어디에든 날 좀 데려가 주세요’라고 하는 듯이 보였기 때문이다.", "notes": ["구체적인 사물의 {움직임}을 통해 인생의 의미를 형상화하고 있음."]}, {"orig": "그들의 직업을 이해하는 것이 쉬운 일은 아니다. 길을 모르는 운전자들이 그들에게 길을 물을 때, 그들은 지도를 판매하거나 혹은 손가락을 펴서 방향을 지시하는 것이 아니다. 그들은 운전자의 차에 동승을 해서 운전자의 목적지까지 가장 빠르거나 가장 안전한 길을 안내한다. 마치 길을 묻는 어린아이나 노인을 집 앞까지 데려다주는 친절한 소년처럼. 그러니, 길 모르는 사람이 나타나지 않는 한은 아무 쓸모도 없는 그들이 하루 종일 땡볕과 추위, 먼지 속에서 꿈꾸는 것은, 세상의 단 한 사람 오직 그밖에는 알지 못하는, 아주 먼 곳의, 어떤 곳을 물어봐 주는 고객이 나타나 주는 것일지도 모른다. 경쟁자는 너무 많고 고객은 너무 없는 것이다.", "notes": []}, {"orig": "여행자는 비굴할 필요 없이 그들에게 무엇이든 물을 수 있다. “여보세요, 나는 어디로 가야 하지?” 물론 대가는 치러야 한다. 먼 길은 먼 길만큼, 가까운 길은 가까운 길만큼. 그러나 나는 바로 이 대가가 마음에 들거니와, 세상에 대가 없이 도달할 수 있는 종착역이 어디에 있겠는가.", "notes": []}, {"orig": "다행히 중국에서 길 안내자들에게 지불하는 대가는 아주 싸다. 다만 낯선 사람을 보조석에 태워야 하고, 그 낯선 이가 지시하는 길이 완전히 안전하고 또 세상에서 가장 빠른 길이라고 믿어야 하는, ‘사소한’ 문제점이 있을 뿐이다. 안내자들은 결코 망설이거나, 차를 멈추게 하지 않는다. 가야 할 곳을 모른다고 말하는 경우도 결코 없다. 처음 가는 길을 갈망정, 안내자들은 망설임 없이 결연한 어조로 좌회전과 우회전을 거듭해 말하고, 가끔 의혹의 눈길을 보내는 운전자들에게는 며칠 전까지 있던 길이 감쪽같이 사라져 버렸다고도 말할 수 있다. 그런 일이 어떻게 있을 수 있느냐고 물어볼 필요는 없다. 어차피 모르는 길에 있기는 마찬가지인 것이다. 중요한 것은 어쨌든, 마침내 목적지에 도착한다는 것. 안내자의 얼굴에 먼저 미소가 번진다.", "notes": ["{시각}적 이미지와 {청각}적 이미지를 결합하여 자전거를 타는 행위를 {벼}를 찧는 행위에 {연결}하여 연상함.", "{구름}을 입양 가는 아기의 차가운 뺨에 {비유}하여, 대상이 지닌 {비극}적 상황과 {슬픔}을 감각적으로 환기함."]}, {"orig": "아니, 그런데 길 안내자들, 그들은 어떻게 돌아오나? 나는 그 가난한 귀로를 생각해 본다. 멀리 떠날수록 멀리서 돌아와야 할 터이니, 그렇게 멀리서 돌아오는 길은 지치고, 배고프고, 고단한 것임에 틀림없을 터이다. 그러나 그들은 돌아오는 길 내내 절대로 주먹 쥔 손을 펴지 않을 터이니, 그 주먹 안에 들어 있는 몇 푼의 동전을 절대로 놓쳐서는 안 될 것이기 때문이다.", "notes": ["화자의 {상처}를 덮어 주는 행위를 통해 위로와 {치유}의 이미지를 형상화함."]}, {"orig": "삶이란 어쩌면 그런 것이 아닐까. 아주아주 가난한 귀로, 그러나 다행히 텅 빈 손은 아닌 것. 길에서 얻은 몇 푼의 동전, 그토록 가난해서 소중한 대가 같은 것, 말이다.", "notes": ["자전거를 타고 골목을 도는 행위를 둥근 {사과}를 깎는 행위로 {전이}시켜 표현함. 자전거를 타는 행위를 통해 삶에서 생긴 {상처}를 다듬고 다독이는 과정으로 해석할 수 있음."]}], "analysis": "이 작품은 여행지에서의 경험을 바탕으로 글쓴이의 {깨달음}을 드러내고 있는 수필이다. 모든 {여행}은 계획이나 목표대로 이루어지는 것은 아니며, 그 과정에서 얻는 {경험}에 의미를 부여하고 있다. 특히 중국 여행에서 만나게 된 길 안내자 ‘향도’를 소재로 하여, 그들이 길을 안내하는 방식을 소개하며 삶에 대한 깨달음을 드러내고 있다."}];
const SCRIPT_URL = ''; // Apps Script 웹 앱 URL 입력

let selected = new Set();
let currentTab = 0;
let activeData = [];
const state = {};

// === SELECTION SCREEN ===
function buildSelection() {
  const grid = document.getElementById('selGrid');
  grid.innerHTML = DATA.map((d,i) => `
    <div class="sel-item ${selected.has(i)?'checked':''}" onclick="toggleItem(${i})">
      <div class="cb">✓</div>
      <div class="lbl">${d.work}<small>${d.author} · ${d.genre}</small></div>
    </div>
  `).join('');
  document.getElementById('selCnt').textContent = selected.size;
  document.getElementById('selStart').disabled = selected.size === 0;
}

function toggleItem(i) {
  selected.has(i) ? selected.delete(i) : selected.add(i);
  buildSelection();
}

function toggleAll() {
  if (selected.size === DATA.length) selected.clear();
  else DATA.forEach((_,i) => selected.add(i));
  buildSelection();
}

function startStudy() {
  if (selected.size === 0) return;
  activeData = [...selected].sort((a,b)=>a-b);
  currentTab = 0;
  document.getElementById('selScreen').classList.add('hidden');
  document.getElementById('studyScreen').classList.remove('hidden');
  buildTabs();
  buildContent();
}

function goBack() {
  document.getElementById('studyScreen').classList.add('hidden');
  document.getElementById('selScreen').classList.remove('hidden');
}

// === STUDY SCREEN ===
const nums=['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳','㉑','㉒','㉓','㉔','㉕','㉖','㉗','㉘','㉙','㉚'];

function normalize(s) { return s.replace(/\s+/g,'').toLowerCase().replace(/[.,!?;:~'"\u201C\u201D\u2018\u2019\u2500\-\u2013\u2014]/g,''); }

function parseTemplate(text) {
  const parts=[]; let idx=0;
  const rx=/\{([^}]+)\}/g; let m, last=0;
  while((m=rx.exec(text))!==null) {
    if(m.index>last) parts.push({type:'text',value:text.slice(last,m.index)});
    parts.push({type:'blank',answer:m[1],id:idx++});
    last=m.index+m[0].length;
  }
  if(last<text.length) parts.push({type:'text',value:text.slice(last)});
  return parts;
}

function renderParts(parts,pi,section) {
  return parts.map(p => {
    if(p.type==='text') return p.value;
    const uid=`${pi}-${section}-${p.id}`;
    const w=Math.max(60,Math.min(160,p.answer.length*16+20));
    const st=state[pi]?.[uid];
    const cls=st?.graded?(st.correct?'correct':'wrong'):'';
    const val=st?.value||'';
    return `<input class="blank-input ${cls}" id="${uid}" data-answer="${p.answer.replace(/"/g,'&quot;')}" data-poem="${pi}" style="width:${w}px" value="${val}" ${st?.graded?'readonly':''} onkeydown="handleKey(event,this)" oninput="onInput(this)"><button class="hint-btn" onclick="showHint('${uid}')" ${!val&&!st?.graded?'disabled':''}>?</button>`;
  }).join('');
}

function buildTabs() {
  document.getElementById('tabs').innerHTML = activeData.map((di,i) => {
    const d=DATA[di];
    return `<div class="tab ${i===currentTab?'active':''}" onclick="switchTab(${i})">${d.author} · ${d.work}</div>`;
  }).join('');
}

function buildContent() {
  const di=activeData[currentTab];
  const d=DATA[di]; const pi=di;
  if(!state[pi]) state[pi]={};
  let html=`<div class="poem-header"><div class="poem-author">${d.author}</div><div class="poem-title">${d.work}</div><div class="poem-genre">${d.genre}</div></div>`;
  html+=`<div class="dual-card"><div class="dual-header"><div>원 문</div><div>줄별 해석 메모 · 빈칸</div></div>`;
  let ln=0;
  d.lines.forEach((line,li) => {
    const isO=line.orig.trim().length>0;
    if(isO) ln++;
    const left=isO?`<span class="ln">${nums[ln-1]||ln}</span>${line.orig}`:'';
    let right='';
    if(line.notes.length===0) right='<span class="dash">—</span>';
    else right=line.notes.map((n,ni) => {
      const isS=n.startsWith('▶');
      const r=renderParts(parseTemplate(n),pi,`n${li}_${ni}`);
      return isS?`<div class="summary-note">${r}</div>`:`<div class="note-line">${r}</div>`;
    }).join('');
    html+=`<div class="dual-row"><div class="left">${left}</div><div class="right">${right}</div></div>`;
  });
  html+=`</div>`;
  if(d.analysis) {
    const r=renderParts(parseTemplate(d.analysis),pi,'analysis');
    html+=`<div class="analysis-card"><div class="analysis-header">작품 해설 · 빈칸 채우기</div><div class="analysis-body">${r}</div></div>`;
  }
  html+=`<div class="controls"><button class="btn-sm" onclick="gradeSection(${pi})">이 섹션 채점</button><button class="btn-sm" onclick="revealSection(${pi})">이 섹션 정답</button></div>`;
  document.getElementById('content').innerHTML=html;
  updateProgress();
}

function switchTab(i) { currentTab=i; buildTabs(); buildContent(); window.scrollTo(0,0); }

function handleKey(e,el) {
  if(e.key==='Enter') {
    e.preventDefault(); gradeOne(el);
    const all=[...document.querySelectorAll('.blank-input:not([readonly])')];
    const idx=all.indexOf(el);
    if(idx>=0&&idx<all.length-1) all[idx+1].focus();
  }
}

function onInput(el) {
  const uid=el.id, pi=parseInt(el.dataset.poem);
  if(!state[pi]) state[pi]={};
  state[pi][uid]={value:el.value,graded:false,correct:false};
  const hb=el.nextElementSibling; if(hb) hb.disabled=!el.value.trim();
}

function gradeOne(el) {
  const uid=el.id, ans=el.dataset.answer, pi=parseInt(el.dataset.poem), val=el.value.trim();
  if(!val) return;
  const ok=normalize(val)===normalize(ans);
  el.classList.remove('correct','wrong'); el.classList.add(ok?'correct':'wrong');
  el.readOnly=true;
  if(!state[pi]) state[pi]={};
  state[pi][uid]={value:val,graded:true,correct:ok};
  updateProgress();
}

function showHint(uid) {
  const el=document.getElementById(uid); if(!el) return;
  el.value=el.dataset.answer; el.classList.remove('wrong'); el.classList.add('correct'); el.readOnly=true;
  const pi=parseInt(el.dataset.poem);
  if(!state[pi]) state[pi]={};
  state[pi][uid]={value:el.dataset.answer,graded:true,correct:true};
  updateProgress();
}

function gradeSection(pi) {
  const blanks=[...document.querySelectorAll(`.blank-input[data-poem="${pi}"]`)];
  const unfilled=blanks.filter(el=>!el.readOnly&&!el.value.trim());
  if(unfilled.length>0){showToast(`⚠️ 빈칸 ${unfilled.length}개를 먼저 채워 주세요.`);unfilled[0].focus();return;}
  blanks.forEach(el=>{if(!el.readOnly&&el.value.trim()) gradeOne(el);});
}
function revealSection(pi) {
  const blanks=[...document.querySelectorAll(`.blank-input[data-poem="${pi}"]`)];
  const unfilled=blanks.filter(el=>!el.readOnly&&!el.value.trim());
  if(unfilled.length>0){showToast(`⚠️ 빈칸 ${unfilled.length}개를 먼저 채워 주세요.`);unfilled[0].focus();return;}
  blanks.forEach(el=>{if(!el.readOnly) showHint(el.id);});
}
function revealAll() {
  let totalUnfilled=0;
  activeData.forEach(di=>{
    const blanks=[...document.querySelectorAll(`.blank-input[data-poem="${di}"]`)];
    totalUnfilled+=blanks.filter(el=>!el.readOnly&&!el.value.trim()).length;
  });
  if(totalUnfilled>0){showToast(`⚠️ 전체 빈칸 ${totalUnfilled}개를 먼저 채워 주세요.`);return;}
  activeData.forEach(di=>revealSection(di));
}
function resetAll() { activeData.forEach(di => { delete state[di]; }); buildContent(); }

function countBlanks(di) {
  const d=DATA[di]; let t=0;
  d.lines.forEach(l => l.notes.forEach(n => { const m=n.match(/\{[^}]+\}/g); if(m) t+=m.length; }));
  if(d.analysis) { const m=d.analysis.match(/\{[^}]+\}/g); if(m) t+=m.length; }
  return t;
}

function updateProgress() {
  let total=0, correct=0;
  activeData.forEach(di => {
    total+=countBlanks(di);
    if(state[di]) Object.values(state[di]).forEach(s => { if(s.graded&&s.correct) correct++; });
  });
  const pct=total>0?Math.round(correct/total*100):0;
  document.getElementById('progText').textContent=pct+'%';
  document.getElementById('progPath').setAttribute('stroke-dasharray',pct+',100');
}

// === SUBMISSION ===
function getResultData() {
  const name=document.getElementById('studentName').value.trim();
  let totalB=0, totalC=0; const sections=[];
  activeData.forEach(di => {
    const d=DATA[di], tb=countBlanks(di);
    let sc=0; const wrongs=[];
    if(state[di]) Object.entries(state[di]).forEach(([uid,s]) => {
      if(s.graded) { if(s.correct) sc++; else wrongs.push(s.value+'→'+document.getElementById(uid)?.dataset.answer); }
    });
    totalB+=tb; totalC+=sc;
    sections.push({work:d.author+' - '+d.work, total:tb, correct:sc, rate:tb>0?Math.round(sc/tb*100):0, wrongs:wrongs.slice(0,10)});
  });
  return {studentName:name, sections, totalBlanks:totalB, totalCorrect:totalC, totalRate:totalB>0?Math.round(totalC/totalB*100):0};
}

function submitResults() {
  const name=document.getElementById('studentName').value.trim();
  if(!name) { showToast('⚠️ 이름을 입력해 주세요.'); return; }
  const data=getResultData();
  if(SCRIPT_URL) {
    const form=document.getElementById('submitForm');
    form.action=SCRIPT_URL;
    document.getElementById('submitData').value=JSON.stringify(data);
    form.submit();
  }
  if(data.totalRate===100) { showCelebration(); }
  else { showToast('✅ 결과가 제출되었습니다!'); }
}

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// === CELEBRATION ===
function showCelebration() {
  document.getElementById('celebration').classList.add('show');
  for(let i=0;i<60;i++) {
    const c=document.createElement('div'); c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=['var(--gold)','var(--green-bright)','var(--green-light)','#fff','var(--gold-dim)'][Math.floor(Math.random()*5)];
    c.style.width=(6+Math.random()*8)+'px'; c.style.height=(6+Math.random()*8)+'px';
    c.style.animationDuration=(2+Math.random()*3)+'s';
    c.style.animationDelay=(Math.random()*2)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),6000);
  }
}
function closeCelebration() { document.getElementById('celebration').classList.remove('show'); }

// INIT
buildSelection();
</script>
</body>
</html>
